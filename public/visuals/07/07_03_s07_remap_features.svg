<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #4a2e78; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6a1c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Data Pump REMAP Features</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Import 시 스키마/테이블스페이스/데이터/테이블 리매핑</text>

  <!-- Source DB (Left) -->
  <rect x="30" y="80" width="300" height="180" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5" />
  <text x="180" y="105" text-anchor="middle" class="label" fill="#2456a8">Source Database (원본)</text>

  <rect x="50" y="120" width="120" height="35" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="110" y="142" text-anchor="middle" class="code">SCHEMA: HR</text>

  <rect x="190" y="120" width="120" height="35" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="250" y="142" text-anchor="middle" class="code">TS: USERS</text>

  <rect x="50" y="170" width="120" height="35" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="110" y="192" text-anchor="middle" class="code">TABLE: EMP</text>

  <rect x="190" y="170" width="120" height="35" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="250" y="192" text-anchor="middle" class="code">DATA: col1</text>

  <text x="180" y="245" text-anchor="middle" class="small">expdp로 Export된 .dmp 파일</text>

  <!-- Arrows with REMAP labels -->
  <line x1="330" y1="137" x2="470" y2="137" class="arrow-line" marker-end="url(#ah)" />
  <text x="400" y="128" text-anchor="middle" class="code">REMAP_SCHEMA</text>

  <line x1="330" y1="187" x2="470" y2="187" class="arrow-line" marker-end="url(#ah)" />
  <text x="400" y="178" text-anchor="middle" class="code">REMAP_TABLE</text>

  <!-- Target DB (Right) -->
  <rect x="470" y="80" width="300" height="180" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="620" y="105" text-anchor="middle" class="label" fill="#2f6a1c">Target Database (대상)</text>

  <rect x="490" y="120" width="120" height="35" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="550" y="142" text-anchor="middle" class="code">SCHEMA: SCOTT</text>

  <rect x="630" y="120" width="120" height="35" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="690" y="142" text-anchor="middle" class="code">TS: DATA01</text>

  <rect x="490" y="170" width="120" height="35" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="550" y="192" text-anchor="middle" class="code">TABLE: STAFF</text>

  <rect x="630" y="170" width="120" height="35" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="690" y="192" text-anchor="middle" class="code">DATA: remapped</text>

  <text x="620" y="245" text-anchor="middle" class="small">impdp로 Import 시 자동 변환</text>

  <!-- REMAP Details -->
  <rect x="30" y="280" width="740" height="185" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1.5" />
  <text x="50" y="305" class="label" fill="#8a5a10">REMAP Parameter Details (REMAP 파라미터 상세)</text>

  <!-- REMAP_SCHEMA -->
  <rect x="50" y="320" width="340" height="60" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="70" y="340" class="label" fill="#4a2e78">REMAP_SCHEMA</text>
  <text x="70" y="358" class="code">REMAP_SCHEMA=HR:SCOTT</text>
  <text x="70" y="374" class="small">HR 스키마의 모든 객체를 SCOTT으로 이관</text>

  <!-- REMAP_TABLESPACE -->
  <rect x="410" y="320" width="340" height="60" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="430" y="340" class="label" fill="#2f6a1c">REMAP_TABLESPACE</text>
  <text x="430" y="358" class="code">REMAP_TABLESPACE=USERS:DATA01</text>
  <text x="430" y="374" class="small">USERS TS의 객체를 DATA01 TS로 이동</text>

  <!-- REMAP_TABLE -->
  <rect x="50" y="395" width="340" height="55" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="70" y="415" class="label" fill="#8a5a10">REMAP_TABLE</text>
  <text x="70" y="433" class="code">REMAP_TABLE=HR.EMP:STAFF</text>
  <text x="70" y="446" class="small">테이블명을 EMP에서 STAFF로 변경</text>

  <!-- REMAP_DATA -->
  <rect x="410" y="395" width="340" height="55" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1" />
  <text x="430" y="415" class="label" fill="#be123c">REMAP_DATA</text>
  <text x="430" y="433" class="code">REMAP_DATA=HR.EMP.SAL:remap_pkg.fn</text>
  <text x="430" y="446" class="small">PL/SQL 함수로 컬럼 데이터 변환</text>
</svg>