<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #6F6BEA; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Data Pump REMAP Features</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Import 시 스키마/테이블스페이스/데이터/테이블 리매핑</text>

  <!-- Source DB (Left) -->
  <rect x="30" y="80" width="300" height="180" class="box" fill="rgba(59,130,246,0.06)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="180" y="105" text-anchor="middle" class="label" fill="#3B82F6">Source Database (원본)</text>

  <rect x="50" y="120" width="120" height="35" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1" />
  <text x="110" y="142" text-anchor="middle" class="code">SCHEMA: HR</text>

  <rect x="190" y="120" width="120" height="35" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1" />
  <text x="250" y="142" text-anchor="middle" class="code">TS: USERS</text>

  <rect x="50" y="170" width="120" height="35" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1" />
  <text x="110" y="192" text-anchor="middle" class="code">TABLE: EMP</text>

  <rect x="190" y="170" width="120" height="35" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1" />
  <text x="250" y="192" text-anchor="middle" class="code">DATA: col1</text>

  <text x="180" y="245" text-anchor="middle" class="small">expdp로 Export된 .dmp 파일</text>

  <!-- Arrows with REMAP labels -->
  <line x1="330" y1="137" x2="470" y2="137" class="arrow-line" marker-end="url(#ah)" />
  <text x="400" y="128" text-anchor="middle" class="code">REMAP_SCHEMA</text>

  <line x1="330" y1="187" x2="470" y2="187" class="arrow-line" marker-end="url(#ah)" />
  <text x="400" y="178" text-anchor="middle" class="code">REMAP_TABLE</text>

  <!-- Target DB (Right) -->
  <rect x="470" y="80" width="300" height="180" class="box" fill="rgba(16,185,129,0.06)" stroke="#10B981" stroke-width="1.5" />
  <text x="620" y="105" text-anchor="middle" class="label" fill="#10B981">Target Database (대상)</text>

  <rect x="490" y="120" width="120" height="35" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1" />
  <text x="550" y="142" text-anchor="middle" class="code">SCHEMA: SCOTT</text>

  <rect x="630" y="120" width="120" height="35" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1" />
  <text x="690" y="142" text-anchor="middle" class="code">TS: DATA01</text>

  <rect x="490" y="170" width="120" height="35" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1" />
  <text x="550" y="192" text-anchor="middle" class="code">TABLE: STAFF</text>

  <rect x="630" y="170" width="120" height="35" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1" />
  <text x="690" y="192" text-anchor="middle" class="code">DATA: remapped</text>

  <text x="620" y="245" text-anchor="middle" class="small">impdp로 Import 시 자동 변환</text>

  <!-- REMAP Details -->
  <rect x="30" y="280" width="740" height="185" class="box" fill="rgba(42,43,61,0.4)" stroke="#2A2B3D" stroke-width="1.5" />
  <text x="50" y="305" class="label" fill="#F59E0B">REMAP Parameter Details (REMAP 파라미터 상세)</text>

  <!-- REMAP_SCHEMA -->
  <rect x="50" y="320" width="340" height="60" class="box" fill="rgba(111,107,234,0.08)" stroke="#6F6BEA" stroke-width="1" />
  <text x="70" y="340" class="label" fill="#6F6BEA">REMAP_SCHEMA</text>
  <text x="70" y="358" class="code">REMAP_SCHEMA=HR:SCOTT</text>
  <text x="70" y="374" class="small">HR 스키마의 모든 객체를 SCOTT으로 이관</text>

  <!-- REMAP_TABLESPACE -->
  <rect x="410" y="320" width="340" height="60" class="box" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1" />
  <text x="430" y="340" class="label" fill="#10B981">REMAP_TABLESPACE</text>
  <text x="430" y="358" class="code">REMAP_TABLESPACE=USERS:DATA01</text>
  <text x="430" y="374" class="small">USERS TS의 객체를 DATA01 TS로 이동</text>

  <!-- REMAP_TABLE -->
  <rect x="50" y="395" width="340" height="55" class="box" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="1" />
  <text x="70" y="415" class="label" fill="#F59E0B">REMAP_TABLE</text>
  <text x="70" y="433" class="code">REMAP_TABLE=HR.EMP:STAFF</text>
  <text x="70" y="446" class="small">테이블명을 EMP에서 STAFF로 변경</text>

  <!-- REMAP_DATA -->
  <rect x="410" y="395" width="340" height="55" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1" />
  <text x="430" y="415" class="label" fill="#F43F5E">REMAP_DATA</text>
  <text x="430" y="433" class="code">REMAP_DATA=HR.EMP.SAL:remap_pkg.fn</text>
  <text x="430" y="446" class="small">PL/SQL 함수로 컬럼 데이터 변환</text>
</svg>