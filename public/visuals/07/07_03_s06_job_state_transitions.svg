<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #4a2e78; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6a1c" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#be123c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Data Pump Job State Transitions</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">작업 상태 전이 다이어그램 및 모니터링 뷰</text>

  <!-- DEFINING -->
  <rect x="60" y="85" width="140" height="50" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" />
  <text x="130" y="108" text-anchor="middle" class="label" fill="#4a2e78">DEFINING</text>
  <text x="130" y="125" text-anchor="middle" class="small">작업 정의 중</text>

  <!-- Arrow to EXECUTING -->
  <line x1="200" y1="110" x2="280" y2="110" class="arrow-line" marker-end="url(#ah)" />
  <text x="240" y="100" text-anchor="middle" class="small">START</text>

  <!-- EXECUTING -->
  <rect x="280" y="85" width="140" height="50" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="2" />
  <text x="350" y="108" text-anchor="middle" class="label" fill="#2f6a1c">EXECUTING</text>
  <text x="350" y="125" text-anchor="middle" class="small">실행 중</text>

  <!-- Arrow to COMPLETING -->
  <line x1="420" y1="110" x2="500" y2="110" class="arrow-line" marker-end="url(#ah)" />
  <text x="460" y="100" text-anchor="middle" class="small">처리 완료</text>

  <!-- COMPLETING -->
  <rect x="500" y="85" width="140" height="50" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5" />
  <text x="570" y="108" text-anchor="middle" class="label" fill="#2456a8">COMPLETING</text>
  <text x="570" y="125" text-anchor="middle" class="small">완료 처리 중</text>

  <!-- Arrow to COMPLETED -->
  <line x1="640" y1="110" x2="680" y2="110" class="arrow-line" marker-end="url(#ah)" />

  <!-- COMPLETED -->
  <rect x="680" y="85" width="100" height="50" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="730" y="108" text-anchor="middle" class="sublabel" fill="#2f6a1c">COMPLETED</text>
  <text x="730" y="125" text-anchor="middle" class="small">완료</text>

  <!-- STOP_JOB path -->
  <line x1="350" y1="135" x2="350" y2="195" stroke="#8a5a10" stroke-width="2" fill="none" marker-end="url(#ah)" />
  <text x="370" y="170" class="small" fill="#8a5a10">STOP_JOB</text>

  <!-- STOPPED -->
  <rect x="280" y="195" width="140" height="50" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5" />
  <text x="350" y="218" text-anchor="middle" class="label" fill="#8a5a10">STOPPED</text>
  <text x="350" y="235" text-anchor="middle" class="small">중지 (재시작 가능)</text>

  <!-- Restart arrow -->
  <path d="M 280 220 Q 230 160 280 110" stroke="#2f6a1c" stroke-width="2" fill="none" marker-end="url(#ah-green)" />
  <text x="220" y="170" text-anchor="middle" class="small" fill="#2f6a1c">RESTART</text>

  <!-- IDLING -->
  <rect x="500" y="195" width="140" height="50" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="570" y="218" text-anchor="middle" class="sublabel" fill="#2456a8">IDLING</text>
  <text x="570" y="235" text-anchor="middle" class="small">유휴 (Worker 대기)</text>

  <line x1="420" y1="110" x2="500" y2="220" stroke="#2456a8" stroke-width="1" stroke-dasharray="4,4" fill="none" />

  <!-- NOT RUNNING -->
  <rect x="280" y="275" width="140" height="50" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="350" y="298" text-anchor="middle" class="label" fill="#be123c">NOT RUNNING</text>
  <text x="350" y="315" text-anchor="middle" class="small">클라이언트 분리됨</text>

  <line x1="350" y1="245" x2="350" y2="273" stroke="#be123c" stroke-width="1.5" fill="none" marker-end="url(#ah-red)" />
  <text x="370" y="262" class="small" fill="#be123c">EXIT_CLIENT</text>

  <!-- ATTACH arrow back -->
  <path d="M 280 300 Q 180 250 280 225" stroke="#2f6a1c" stroke-width="1.5" fill="none" marker-end="url(#ah-green)" />
  <text x="200" y="275" text-anchor="middle" class="small" fill="#2f6a1c">ATTACH</text>

  <!-- Monitoring Views -->
  <rect x="30" y="350" width="740" height="120" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1.5" />
  <text x="50" y="375" class="label" fill="#4a2e78">Monitoring Views (모니터링 뷰)</text>

  <rect x="50" y="390" width="220" height="60" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="70" y="410" class="code">DBA_DATAPUMP_JOBS</text>
  <text x="70" y="428" class="small">작업 목록 + 상태 (STATE)</text>
  <text x="70" y="443" class="small">JOB_NAME, OPERATION, JOB_MODE</text>

  <rect x="290" y="390" width="220" height="60" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="310" y="410" class="code">V$SESSION_LONGOPS</text>
  <text x="310" y="428" class="small">진행률 (% complete)</text>
  <text x="310" y="443" class="small">SOFAR, TOTALWORK, ELAPSED</text>

  <rect x="530" y="390" width="220" height="60" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="550" y="410" class="code">DBA_DATAPUMP_SESSIONS</text>
  <text x="550" y="428" class="small">세션 정보</text>
  <text x="550" y="443" class="code">V$DATAPUMP_JOB / _SESSION</text>
</svg>