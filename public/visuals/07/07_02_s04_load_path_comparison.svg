<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #4a2e78; stroke-width: 2; fill: none; }
    .yes { font-size: 11px; fill: #2f6a1c; font-weight: 600; }
    .no { font-size: 11px; fill: #be123c; font-weight: 600; }
  </style>
  <defs>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2456a8" />
    </marker>
    <marker id="ah-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a5a10" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Conventional Path vs Direct Path Load</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">로드 경로 비교 및 로드 모드(INSERT/APPEND/REPLACE/TRUNCATE)</text>

  <!-- Data File -->
  <rect x="310" y="70" width="180" height="45" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="400" y="98" text-anchor="middle" class="label" fill="#2f6a1c">Data File (데이터 파일)</text>

  <!-- Split arrows -->
  <line x1="350" y1="115" x2="180" y2="160" stroke="#2456a8" stroke-width="2" fill="none" marker-end="url(#ah-blue)" />
  <line x1="450" y1="115" x2="620" y2="160" stroke="#8a5a10" stroke-width="2" fill="none" marker-end="url(#ah-amber)" />

  <!-- Conventional Path -->
  <rect x="40" y="160" width="300" height="220" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="2" />
  <text x="190" y="185" text-anchor="middle" class="label" fill="#2456a8">Conventional Path</text>
  <text x="190" y="203" text-anchor="middle" class="code">DIRECT=FALSE (기본)</text>

  <rect x="60" y="215" width="260" height="30" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="190" y="235" text-anchor="middle" class="sublabel">SQL INSERT 문 생성 및 실행</text>

  <rect x="60" y="252" width="260" height="30" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="190" y="272" text-anchor="middle" class="sublabel">SGA Buffer Cache 경유</text>

  <rect x="60" y="289" width="260" height="30" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="190" y="309" text-anchor="middle" class="sublabel">전체 Redo + Undo 생성</text>

  <text x="60" y="345" class="yes">트리거 실행됨</text>
  <text x="60" y="362" class="yes">제약조건 실시간 확인</text>
  <text x="60" y="375" class="small">ROWS 기본 256행마다 COMMIT</text>

  <!-- Direct Path -->
  <rect x="460" y="160" width="300" height="220" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="2" />
  <text x="610" y="185" text-anchor="middle" class="label" fill="#8a5a10">Direct Path</text>
  <text x="610" y="203" text-anchor="middle" class="code">DIRECT=TRUE</text>

  <rect x="480" y="215" width="260" height="30" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="610" y="235" text-anchor="middle" class="sublabel">SQL 레이어 완전 우회</text>

  <rect x="480" y="252" width="260" height="30" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="610" y="272" text-anchor="middle" class="sublabel">데이터 블록 직접 포맷 (HWM 위)</text>

  <rect x="480" y="289" width="260" height="30" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="610" y="309" text-anchor="middle" class="sublabel">최소 Redo, Undo 없음</text>

  <text x="480" y="345" class="no">트리거 실행 안됨</text>
  <text x="480" y="362" class="no">제약조건 로드 후 확인</text>
  <text x="480" y="375" class="small">인덱스 UNUSABLE 가능 → 재구축 필요</text>

  <!-- Target Table -->
  <rect x="230" y="400" width="340" height="40" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="400" y="425" text-anchor="middle" class="label" fill="#2f6a1c">Target Table (대상 테이블)</text>

  <line x1="190" y1="380" x2="310" y2="400" stroke="#2456a8" stroke-width="1.5" fill="none" marker-end="url(#ah-blue)" />
  <line x1="610" y1="380" x2="490" y2="400" stroke="#8a5a10" stroke-width="1.5" fill="none" marker-end="url(#ah-amber)" />

  <!-- Load Modes -->
  <text x="400" y="470" text-anchor="middle" class="label">Load Modes (로드 모드)</text>

  <rect x="30" y="485" width="170" height="55" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="115" y="505" text-anchor="middle" class="sublabel" fill="#2456a8">INSERT</text>
  <text x="115" y="525" text-anchor="middle" class="small">빈 테이블에만 로드</text>
  <text x="115" y="537" text-anchor="middle" class="small">(기본값, 기존 데이터 있으면 에러)</text>

  <rect x="215" y="485" width="170" height="55" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="300" y="505" text-anchor="middle" class="sublabel" fill="#2f6a1c">APPEND</text>
  <text x="300" y="525" text-anchor="middle" class="small">기존 데이터 유지 +</text>
  <text x="300" y="537" text-anchor="middle" class="small">새 데이터 추가</text>

  <rect x="400" y="485" width="170" height="55" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="485" y="505" text-anchor="middle" class="sublabel" fill="#8a5a10">REPLACE</text>
  <text x="485" y="525" text-anchor="middle" class="small">DELETE 후 INSERT</text>
  <text x="485" y="537" text-anchor="middle" class="small">(DELETE 트리거 실행)</text>

  <rect x="585" y="485" width="180" height="55" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1" />
  <text x="675" y="505" text-anchor="middle" class="sublabel" fill="#be123c">TRUNCATE</text>
  <text x="675" y="525" text-anchor="middle" class="small">TRUNCATE 후 INSERT</text>
  <text x="675" y="537" text-anchor="middle" class="small">(DELETE보다 빠름, 롤백 불가)</text>
</svg>