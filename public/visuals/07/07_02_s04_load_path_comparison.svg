<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #6F6BEA; stroke-width: 2; fill: none; }
    .yes { font-size: 11px; fill: #10B981; font-weight: 600; }
    .no { font-size: 11px; fill: #F43F5E; font-weight: 600; }
  </style>
  <defs>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
    <marker id="ah-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Conventional Path vs Direct Path Load</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">로드 경로 비교 및 로드 모드(INSERT/APPEND/REPLACE/TRUNCATE)</text>

  <!-- Data File -->
  <rect x="310" y="70" width="180" height="45" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5" />
  <text x="400" y="98" text-anchor="middle" class="label" fill="#10B981">Data File (데이터 파일)</text>

  <!-- Split arrows -->
  <line x1="350" y1="115" x2="180" y2="160" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#ah-blue)" />
  <line x1="450" y1="115" x2="620" y2="160" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#ah-amber)" />

  <!-- Conventional Path -->
  <rect x="40" y="160" width="300" height="220" class="box" fill="rgba(59,130,246,0.06)" stroke="#3B82F6" stroke-width="2" />
  <text x="190" y="185" text-anchor="middle" class="label" fill="#3B82F6">Conventional Path</text>
  <text x="190" y="203" text-anchor="middle" class="code">DIRECT=FALSE (기본)</text>

  <rect x="60" y="215" width="260" height="30" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1" />
  <text x="190" y="235" text-anchor="middle" class="sublabel">SQL INSERT 문 생성 및 실행</text>

  <rect x="60" y="252" width="260" height="30" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1" />
  <text x="190" y="272" text-anchor="middle" class="sublabel">SGA Buffer Cache 경유</text>

  <rect x="60" y="289" width="260" height="30" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1" />
  <text x="190" y="309" text-anchor="middle" class="sublabel">전체 Redo + Undo 생성</text>

  <text x="60" y="345" class="yes">트리거 실행됨</text>
  <text x="60" y="362" class="yes">제약조건 실시간 확인</text>
  <text x="60" y="375" class="small">ROWS 기본 256행마다 COMMIT</text>

  <!-- Direct Path -->
  <rect x="460" y="160" width="300" height="220" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="2" />
  <text x="610" y="185" text-anchor="middle" class="label" fill="#F59E0B">Direct Path</text>
  <text x="610" y="203" text-anchor="middle" class="code">DIRECT=TRUE</text>

  <rect x="480" y="215" width="260" height="30" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="610" y="235" text-anchor="middle" class="sublabel">SQL 레이어 완전 우회</text>

  <rect x="480" y="252" width="260" height="30" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="610" y="272" text-anchor="middle" class="sublabel">데이터 블록 직접 포맷 (HWM 위)</text>

  <rect x="480" y="289" width="260" height="30" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="610" y="309" text-anchor="middle" class="sublabel">최소 Redo, Undo 없음</text>

  <text x="480" y="345" class="no">트리거 실행 안됨</text>
  <text x="480" y="362" class="no">제약조건 로드 후 확인</text>
  <text x="480" y="375" class="small">인덱스 UNUSABLE 가능 → 재구축 필요</text>

  <!-- Target Table -->
  <rect x="230" y="400" width="340" height="40" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5" />
  <text x="400" y="425" text-anchor="middle" class="label" fill="#10B981">Target Table (대상 테이블)</text>

  <line x1="190" y1="380" x2="310" y2="400" stroke="#3B82F6" stroke-width="1.5" fill="none" marker-end="url(#ah-blue)" />
  <line x1="610" y1="380" x2="490" y2="400" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#ah-amber)" />

  <!-- Load Modes -->
  <text x="400" y="470" text-anchor="middle" class="label">Load Modes (로드 모드)</text>

  <rect x="30" y="485" width="170" height="55" class="box" fill="rgba(59,130,246,0.08)" stroke="#3B82F6" stroke-width="1" />
  <text x="115" y="505" text-anchor="middle" class="sublabel" fill="#3B82F6">INSERT</text>
  <text x="115" y="525" text-anchor="middle" class="small">빈 테이블에만 로드</text>
  <text x="115" y="537" text-anchor="middle" class="small">(기본값, 기존 데이터 있으면 에러)</text>

  <rect x="215" y="485" width="170" height="55" class="box" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1" />
  <text x="300" y="505" text-anchor="middle" class="sublabel" fill="#10B981">APPEND</text>
  <text x="300" y="525" text-anchor="middle" class="small">기존 데이터 유지 +</text>
  <text x="300" y="537" text-anchor="middle" class="small">새 데이터 추가</text>

  <rect x="400" y="485" width="170" height="55" class="box" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="1" />
  <text x="485" y="505" text-anchor="middle" class="sublabel" fill="#F59E0B">REPLACE</text>
  <text x="485" y="525" text-anchor="middle" class="small">DELETE 후 INSERT</text>
  <text x="485" y="537" text-anchor="middle" class="small">(DELETE 트리거 실행)</text>

  <rect x="585" y="485" width="180" height="55" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1" />
  <text x="675" y="505" text-anchor="middle" class="sublabel" fill="#F43F5E">TRUNCATE</text>
  <text x="675" y="525" text-anchor="middle" class="small">TRUNCATE 후 INSERT</text>
  <text x="675" y="537" text-anchor="middle" class="small">(DELETE보다 빠름, 롤백 불가)</text>
</svg>