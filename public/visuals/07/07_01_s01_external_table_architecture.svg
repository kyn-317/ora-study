<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #6F6BEA; stroke-width: 2; fill: none; }
    .dashed { stroke-dasharray: 6,4; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">External Table Architecture (외부 테이블 아키텍처)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">쿼리 시점에 외부 파일을 실시간으로 읽어 SQL로 조회하는 구조</text>

  <!-- Oracle Database Instance -->
  <rect x="30" y="65" width="740" height="300" class="box" fill="none" stroke="#6F6BEA" stroke-width="2" stroke-dasharray="8,4" />
  <text x="50" y="87" class="label" fill="#6F6BEA">Oracle Database Instance</text>

  <!-- SQL Engine -->
  <rect x="60" y="100" width="200" height="60" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="160" y="125" text-anchor="middle" class="label" fill="#3B82F6">SQL Engine</text>
  <text x="160" y="145" text-anchor="middle" class="sublabel">SELECT 실행</text>

  <!-- Data Dictionary -->
  <rect x="300" y="100" width="200" height="60" class="box" fill="rgba(111,107,234,0.12)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="400" y="125" text-anchor="middle" class="label" fill="#6F6BEA">Data Dictionary</text>
  <text x="400" y="145" text-anchor="middle" class="sublabel">External Table Metadata</text>

  <!-- Arrow: SQL Engine -> Data Dictionary -->
  <line x1="260" y1="130" x2="298" y2="130" class="arrow-line" marker-end="url(#ah)" />

  <!-- Access Driver Box -->
  <rect x="140" y="190" width="520" height="150" class="box" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1.5" />
  <text x="400" y="215" text-anchor="middle" class="label" fill="#10B981">Access Driver (액세스 드라이버)</text>

  <!-- ORACLE_LOADER -->
  <rect x="160" y="230" width="150" height="50" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1" />
  <text x="235" y="252" text-anchor="middle" class="code">ORACLE_LOADER</text>
  <text x="235" y="270" text-anchor="middle" class="small">CSV, 고정폭 텍스트</text>

  <!-- ORACLE_DATAPUMP -->
  <rect x="325" y="230" width="160" height="50" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1" />
  <text x="405" y="252" text-anchor="middle" class="code">ORACLE_DATAPUMP</text>
  <text x="405" y="270" text-anchor="middle" class="small">Oracle 바이너리 형식</text>

  <!-- ORACLE_BIGDATA -->
  <rect x="500" y="230" width="145" height="50" class="box" fill="rgba(111,107,234,0.12)" stroke="#6F6BEA" stroke-width="1" />
  <text x="572" y="252" text-anchor="middle" class="code">ORACLE_BIGDATA</text>
  <text x="572" y="270" text-anchor="middle" class="small">Parquet, Avro, ORC</text>

  <!-- Direction labels -->
  <text x="235" y="300" text-anchor="middle" class="small">읽기 전용 (Read Only)</text>
  <text x="405" y="300" text-anchor="middle" class="small">읽기/쓰기 (R/W)</text>
  <text x="572" y="300" text-anchor="middle" class="small">읽기 전용 (Read Only)</text>

  <!-- Arrow: SQL Engine -> Access Driver -->
  <line x1="160" y1="160" x2="160" y2="188" class="arrow-line" marker-end="url(#ah)" />
  <text x="100" y="180" class="small">쿼리 요청</text>

  <!-- OS File System / Object Storage -->
  <rect x="30" y="400" width="740" height="160" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="50" y="425" class="label" fill="#F59E0B">OS File System / Object Storage</text>

  <!-- Directory Object label -->
  <rect x="530" y="95" width="220" height="70" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="640" y="118" text-anchor="middle" class="label" fill="#F59E0B">Directory Object</text>
  <text x="640" y="138" text-anchor="middle" class="code">CREATE DIRECTORY</text>
  <text x="640" y="155" text-anchor="middle" class="small">OS 경로 추상화 계층</text>

  <!-- File icons -->
  <rect x="80" y="445" width="120" height="55" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1" />
  <text x="140" y="468" text-anchor="middle" class="sublabel">data.csv</text>
  <text x="140" y="488" text-anchor="middle" class="small">텍스트 파일</text>

  <rect x="230" y="445" width="120" height="55" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="290" y="468" text-anchor="middle" class="sublabel">data.dmp</text>
  <text x="290" y="488" text-anchor="middle" class="small">Data Pump 형식</text>

  <rect x="380" y="445" width="120" height="55" class="box" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="1" />
  <text x="440" y="468" text-anchor="middle" class="sublabel">data.parquet</text>
  <text x="440" y="488" text-anchor="middle" class="small">빅데이터 형식</text>

  <rect x="530" y="445" width="120" height="55" class="box" fill="rgba(244,63,94,0.1)" stroke="#F43F5E" stroke-width="1" />
  <text x="590" y="468" text-anchor="middle" class="sublabel">load.log</text>
  <text x="590" y="488" text-anchor="middle" class="small">로그/Bad 파일</text>

  <!-- Arrows from Access Drivers to Files -->
  <line x1="235" y1="340" x2="140" y2="443" stroke="#3B82F6" stroke-width="1.5" fill="none" marker-end="url(#ah-blue)" />
  <line x1="405" y1="340" x2="290" y2="443" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#ah)" />
  <line x1="572" y1="340" x2="440" y2="443" stroke="#6F6BEA" stroke-width="1.5" fill="none" marker-end="url(#ah)" />

  <!-- Key characteristics -->
  <text x="400" y="540" text-anchor="middle" class="sublabel">SELECT Only (DML 불가) | No Index | Parallel Query 지원 | REJECT LIMIT 제어</text>
  <text x="400" y="560" text-anchor="middle" class="small">데이터는 DB 외부에 존재 / 메타데이터만 데이터 딕셔너리에 저장</text>
</svg>