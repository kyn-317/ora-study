<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .conn-label { font-size: 11px; font-weight: 600; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-r" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
    <marker id="ah-blue-r" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#3B82F6" />
    </marker>
    <marker id="ah-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
    <marker id="ah-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">단원 간 연결 관계 (Cross-Section Connections)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">3개 단원은 독립적이지 않으며 5가지 핵심 연결고리로 결합</text>

  <!-- Three main boxes - arranged in triangle -->
  <!-- 07_01 External Tables (top left) -->
  <rect x="40" y="80" width="230" height="110" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="2" />
  <text x="155" y="105" text-anchor="middle" class="label" fill="#3B82F6">07_01 외부 파일 조작</text>
  <text x="155" y="123" text-anchor="middle" class="sublabel">External Tables</text>
  <text x="155" y="145" text-anchor="middle" class="code">ORACLE_LOADER</text>
  <text x="155" y="160" text-anchor="middle" class="code">ORACLE_DATAPUMP</text>
  <text x="155" y="175" text-anchor="middle" class="code">ORACLE_BIGDATA</text>

  <!-- 07_02 SQL*Loader (top right) -->
  <rect x="530" y="80" width="230" height="110" class="box" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="2" />
  <text x="645" y="105" text-anchor="middle" class="label" fill="#6F6BEA">07_02 대량 로드 처리</text>
  <text x="645" y="123" text-anchor="middle" class="sublabel">SQL*Loader (sqlldr)</text>
  <text x="645" y="145" text-anchor="middle" class="code">Conventional Path</text>
  <text x="645" y="160" text-anchor="middle" class="code">Direct Path Load</text>
  <text x="645" y="175" text-anchor="middle" class="code">Express Mode</text>

  <!-- 07_03 Data Pump (bottom center) -->
  <rect x="285" y="310" width="230" height="110" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="2" />
  <text x="400" y="335" text-anchor="middle" class="label" fill="#F59E0B">07_03 Data Pump</text>
  <text x="400" y="353" text-anchor="middle" class="sublabel">expdp / impdp</text>
  <text x="400" y="375" text-anchor="middle" class="code">DBMS_DATAPUMP</text>
  <text x="400" y="390" text-anchor="middle" class="code">Direct Path API</text>
  <text x="400" y="405" text-anchor="middle" class="code">Master Table</text>

  <!-- Connection 1: 07_01 <-> 07_02 (ORACLE_LOADER engine sharing) -->
  <line x1="270" y1="120" x2="530" y2="120" stroke="#10B981" stroke-width="2.5" fill="none" marker-end="url(#ah-green)" />
  <rect x="315" y="70" width="170" height="38" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1" />
  <text x="400" y="86" text-anchor="middle" class="conn-label" fill="#10B981">연결 2: 엔진 공유</text>
  <text x="400" y="100" text-anchor="middle" class="small">ORACLE_LOADER = sqlldr 엔진</text>

  <!-- Connection 2: 07_01 <-> 07_03 (ORACLE_DATAPUMP format sharing) -->
  <line x1="155" y1="190" x2="310" y2="310" stroke="#EC4899" stroke-width="2.5" fill="none" marker-end="url(#ah-pink)" />
  <rect x="95" y="235" width="185" height="38" class="box" fill="rgba(236,72,153,0.12)" stroke="#EC4899" stroke-width="1" />
  <text x="187" y="251" text-anchor="middle" class="conn-label" fill="#EC4899">연결 3: 바이너리 형식 공유</text>
  <text x="187" y="265" text-anchor="middle" class="small">ORACLE_DATAPUMP = .dmp 형식</text>

  <!-- Connection 3: 07_02 <-> 07_03 (Direct Path) -->
  <line x1="645" y1="190" x2="490" y2="310" stroke="#F59E0B" stroke-width="2.5" fill="none" marker-end="url(#ah-yellow)" />
  <rect x="510" y="235" width="185" height="38" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1" />
  <text x="602" y="251" text-anchor="middle" class="conn-label" fill="#F59E0B">연결 4: Direct Path 공유</text>
  <text x="602" y="265" text-anchor="middle" class="small">SQL 우회 고속 I/O 엔진</text>

  <!-- Common Foundation: Directory Object -->
  <rect x="120" y="450" width="560" height="55" class="box" fill="rgba(111,107,234,0.08)" stroke="#6F6BEA" stroke-width="2" />
  <text x="400" y="472" text-anchor="middle" class="label" fill="#6F6BEA">연결 1: Directory Object — 모든 서버 측 도구의 공통 기반</text>
  <text x="400" y="492" text-anchor="middle" class="sublabel">CREATE DIRECTORY → OS 경로 추상화 | READ/WRITE ON DIRECTORY 권한 제어</text>

  <!-- Arrows from boxes to Directory Object -->
  <line x1="155" y1="190" x2="220" y2="448" stroke="#6F6BEA" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#ah)" />
  <line x1="400" y1="420" x2="400" y2="448" stroke="#6F6BEA" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#ah)" />

  <!-- Client vs Server classification -->
  <rect x="120" y="520" width="560" height="45" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1" />
  <text x="400" y="540" text-anchor="middle" class="label" fill="#F59E0B">연결 5: 실행 위치에 따른 도구 선택</text>
  <text x="260" y="557" text-anchor="middle" class="sublabel">서버 측: External Tables + Data Pump</text>
  <text x="540" y="557" text-anchor="middle" class="sublabel">클라이언트 측: SQL*Loader</text>

  <!-- Legend -->
  <rect x="600" y="450" width="170" height="105" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1" />
  <text x="685" y="470" text-anchor="middle" class="sublabel">범례 (Legend)</text>
  <line x1="615" y1="482" x2="645" y2="482" stroke="#10B981" stroke-width="2" />
  <text x="655" y="486" class="small">엔진 공유</text>
  <line x1="615" y1="500" x2="645" y2="500" stroke="#EC4899" stroke-width="2" />
  <text x="655" y="504" class="small">형식 공유</text>
  <line x1="615" y1="518" x2="645" y2="518" stroke="#F59E0B" stroke-width="2" />
  <text x="655" y="522" class="small">Direct Path</text>
  <line x1="615" y1="536" x2="645" y2="536" stroke="#6F6BEA" stroke-width="2" stroke-dasharray="5,3" />
  <text x="655" y="540" class="small">Directory Obj</text>
</svg>