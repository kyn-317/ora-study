<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .header { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
    .cell { font-size: 11px; fill: #4a4a46; }
    .yes { font-size: 11px; fill: #2f6a1c; font-weight: 600; }
    .no { font-size: 11px; fill: #be123c; font-weight: 600; }
    .partial { font-size: 11px; fill: #8a5a10; font-weight: 600; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">External Table vs SQL*Loader vs Data Pump</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">외부 테이블 제한사항 및 로드 도구 비교</text>

  <!-- Table header -->
  <rect x="30" y="70" width="740" height="35" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="145" y="92" text-anchor="middle" class="header">비교 항목</text>
  <text x="330" y="92" text-anchor="middle" class="header" fill="#2456a8">External Table</text>
  <text x="510" y="92" text-anchor="middle" class="header" fill="#8a5a10">SQL*Loader</text>
  <text x="685" y="92" text-anchor="middle" class="header" fill="#2f6a1c">Data Pump</text>

  <!-- Column separator lines -->
  <line x1="235" y1="70" x2="235" y2="395" stroke="#f3efe4" stroke-width="1" />
  <line x1="420" y1="70" x2="420" y2="395" stroke="#f3efe4" stroke-width="1" />
  <line x1="600" y1="70" x2="600" y2="395" stroke="#f3efe4" stroke-width="1" />

  <!-- Rows -->
  <!-- Row 1 -->
  <rect x="30" y="105" width="740" height="30" class="box" fill="#f3efe4" />
  <text x="50" y="124" class="cell">실행 위치</text>
  <text x="330" y="124" text-anchor="middle" class="cell">서버 측 (Server-Side)</text>
  <text x="510" y="124" text-anchor="middle" class="cell">클라이언트 측 (Client)</text>
  <text x="685" y="124" text-anchor="middle" class="cell">서버 측 (Server-Side)</text>

  <!-- Row 2 -->
  <rect x="30" y="135" width="740" height="30" class="box" fill="none" />
  <text x="50" y="154" class="cell">DML 지원</text>
  <text x="330" y="154" text-anchor="middle" class="no">SELECT Only</text>
  <text x="510" y="154" text-anchor="middle" class="yes">INSERT (로드 전용)</text>
  <text x="685" y="154" text-anchor="middle" class="yes">Export + Import</text>

  <!-- Row 3 -->
  <rect x="30" y="165" width="740" height="30" class="box" fill="#f3efe4" />
  <text x="50" y="184" class="cell">인덱스 생성</text>
  <text x="330" y="184" text-anchor="middle" class="no">불가</text>
  <text x="510" y="184" text-anchor="middle" class="yes">대상 테이블에 가능</text>
  <text x="685" y="184" text-anchor="middle" class="yes">가능</text>

  <!-- Row 4 -->
  <rect x="30" y="195" width="740" height="30" class="box" fill="none" />
  <text x="50" y="214" class="cell">제약조건</text>
  <text x="330" y="214" text-anchor="middle" class="no">NOT NULL만 (미적용)</text>
  <text x="510" y="214" text-anchor="middle" class="yes">적용됨</text>
  <text x="685" y="214" text-anchor="middle" class="yes">적용됨</text>

  <!-- Row 5 -->
  <rect x="30" y="225" width="740" height="30" class="box" fill="#f3efe4" />
  <text x="50" y="244" class="cell">트리거 실행</text>
  <text x="330" y="244" text-anchor="middle" class="no">불가</text>
  <text x="510" y="244" text-anchor="middle" class="partial">Conventional만</text>
  <text x="685" y="244" text-anchor="middle" class="no">불가</text>

  <!-- Row 6 -->
  <rect x="30" y="255" width="740" height="30" class="box" fill="none" />
  <text x="50" y="274" class="cell">병렬 처리</text>
  <text x="330" y="274" text-anchor="middle" class="yes">Parallel Query</text>
  <text x="510" y="274" text-anchor="middle" class="yes">Direct Path Parallel</text>
  <text x="685" y="274" text-anchor="middle" class="yes">PARALLEL Workers</text>

  <!-- Row 7 -->
  <rect x="30" y="285" width="740" height="30" class="box" fill="#f3efe4" />
  <text x="50" y="304" class="cell">데이터 물리적 로드</text>
  <text x="330" y="304" text-anchor="middle" class="no">불필요 (실시간 읽기)</text>
  <text x="510" y="304" text-anchor="middle" class="yes">테이블에 적재</text>
  <text x="685" y="304" text-anchor="middle" class="yes">테이블에 적재</text>

  <!-- Row 8 -->
  <rect x="30" y="315" width="740" height="30" class="box" fill="none" />
  <text x="50" y="334" class="cell">조인 가능</text>
  <text x="330" y="334" text-anchor="middle" class="yes">내부 테이블과 조인</text>
  <text x="510" y="334" text-anchor="middle" class="no">로드 후 가능</text>
  <text x="685" y="334" text-anchor="middle" class="no">Import 후 가능</text>

  <!-- Row 9 -->
  <rect x="30" y="345" width="740" height="30" class="box" fill="#f3efe4" />
  <text x="50" y="364" class="cell">파일 형식</text>
  <text x="330" y="364" text-anchor="middle" class="cell">CSV, 고정폭, Parquet</text>
  <text x="510" y="364" text-anchor="middle" class="cell">CSV, 고정폭, 가변</text>
  <text x="685" y="364" text-anchor="middle" class="cell">Oracle .dmp 형식</text>

  <!-- Row 10 -->
  <rect x="30" y="375" width="740" height="30" class="box" fill="none" />
  <text x="50" y="394" class="cell">최적 사용 사례</text>
  <text x="330" y="394" text-anchor="middle" class="cell">ETL, 임시 조회, 검증</text>
  <text x="510" y="394" text-anchor="middle" class="cell">대량 초기 로드</text>
  <text x="685" y="394" text-anchor="middle" class="cell">DB 간 이관, 백업</text>

  <!-- External Table Limitations summary -->
  <rect x="30" y="420" width="740" height="70" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1" />
  <text x="50" y="442" class="label" fill="#be123c">External Table 주요 제한사항 요약</text>
  <text x="50" y="462" class="small">INSERT/UPDATE/DELETE 불가 (ORACLE_DATAPUMP 언로드 제외) | 인덱스/제약조건 미지원 | 읽기 일관성(Read Consistency) 미보장</text>
  <text x="50" y="480" class="small">파티셔닝 불가 | 통계정보 자동 수집 없음 (DBMS_STATS 수동 수집) | 파일 미존재 시 ORA-29913 에러</text>
</svg>