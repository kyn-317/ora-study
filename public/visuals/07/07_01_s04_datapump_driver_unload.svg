<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #4a2e78; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6a1c" />
    </marker>
    <marker id="ah-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a5a10" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">ORACLE_DATAPUMP Driver - Bidirectional Data Flow</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">ORACLE_DATAPUMP 드라이버 - 읽기/쓰기 양방향 지원 (데이터 언로드 포함)</text>

  <!-- Internal Table (Left) -->
  <rect x="40" y="90" width="200" height="140" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5" />
  <text x="140" y="115" text-anchor="middle" class="label" fill="#2456a8">Internal Table</text>
  <text x="140" y="135" text-anchor="middle" class="sublabel">내부 테이블</text>
  <text x="140" y="165" text-anchor="middle" class="code">SELECT * FROM emp;</text>
  <text x="140" y="185" text-anchor="middle" class="small">일반 DML 가능</text>
  <text x="140" y="205" text-anchor="middle" class="small">인덱스/제약조건 지원</text>

  <!-- CTAS / INSERT arrow (top, left to right) -->
  <line x1="240" y1="130" x2="330" y2="130" stroke="#2f6a1c" stroke-width="2" fill="none" marker-end="url(#ah-green)" />
  <text x="285" y="120" text-anchor="middle" class="small" fill="#2f6a1c">CTAS / INSERT</text>
  <text x="285" y="108" text-anchor="middle" class="small" fill="#2f6a1c">SELECT (로드)</text>

  <!-- External Table DATAPUMP (Center) -->
  <rect x="330" y="80" width="200" height="160" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="2" />
  <text x="430" y="105" text-anchor="middle" class="label" fill="#8a5a10">External Table</text>
  <text x="430" y="125" text-anchor="middle" class="code">TYPE ORACLE_DATAPUMP</text>
  <text x="430" y="150" text-anchor="middle" class="sublabel">SELECT (읽기)</text>
  <text x="430" y="170" text-anchor="middle" class="sublabel">+ INSERT (쓰기/언로드)</text>
  <text x="430" y="195" text-anchor="middle" class="small">유일하게 쓰기 가능한</text>
  <text x="430" y="210" text-anchor="middle" class="small">액세스 드라이버</text>

  <!-- Unload arrow (bottom, left to center) -->
  <line x1="240" y1="190" x2="330" y2="190" stroke="#8a5a10" stroke-width="2" fill="none" marker-end="url(#ah-amber)" />
  <text x="285" y="183" text-anchor="middle" class="small" fill="#8a5a10">INSERT INTO</text>

  <!-- DMP File (Right) -->
  <rect x="580" y="90" width="180" height="140" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" />
  <text x="670" y="115" text-anchor="middle" class="label" fill="#4a2e78">.dmp File</text>
  <text x="670" y="135" text-anchor="middle" class="sublabel">Oracle 바이너리 형식</text>
  <text x="670" y="165" text-anchor="middle" class="small">플랫폼 독립적</text>
  <text x="670" y="185" text-anchor="middle" class="small">병렬 처리 가능</text>
  <text x="670" y="205" text-anchor="middle" class="small">Data Pump와 호환</text>

  <!-- Bidirectional arrows -->
  <line x1="530" y1="140" x2="578" y2="140" stroke="#4a2e78" stroke-width="2" fill="none" marker-end="url(#ah)" />
  <text x="554" y="130" text-anchor="middle" class="small">읽기</text>
  <line x1="530" y1="190" x2="578" y2="190" stroke="#8a5a10" stroke-width="2" fill="none" marker-end="url(#ah-amber)" />
  <text x="554" y="215" text-anchor="middle" class="small">쓰기</text>

  <!-- Unload Process Flow -->
  <rect x="40" y="275" width="720" height="160" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1.5" />
  <text x="60" y="300" class="label" fill="#8a5a10">Data Unload Process (데이터 언로드 프로세스)</text>

  <!-- Step boxes -->
  <rect x="60" y="315" width="155" height="55" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="137" y="338" text-anchor="middle" class="sublabel">1. External Table 생성</text>
  <text x="137" y="358" text-anchor="middle" class="code">TYPE ORACLE_DATAPUMP</text>

  <line x1="215" y1="342" x2="235" y2="342" class="arrow-line" marker-end="url(#ah)" />

  <rect x="237" y="315" width="155" height="55" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="314" y="338" text-anchor="middle" class="sublabel">2. INSERT INTO ext_tbl</text>
  <text x="314" y="358" text-anchor="middle" class="code">SELECT * FROM emp</text>

  <line x1="392" y1="342" x2="412" y2="342" class="arrow-line" marker-end="url(#ah)" />

  <rect x="414" y="315" width="155" height="55" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="491" y="338" text-anchor="middle" class="sublabel">3. .dmp 파일 생성</text>
  <text x="491" y="358" text-anchor="middle" class="code">바이너리 덤프 출력</text>

  <line x1="569" y1="342" x2="589" y2="342" class="arrow-line" marker-end="url(#ah)" />

  <rect x="591" y="315" width="155" height="55" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="668" y="338" text-anchor="middle" class="sublabel">4. 다른 DB에서 읽기</text>
  <text x="668" y="358" text-anchor="middle" class="code">SELECT FROM ext_tbl</text>

  <!-- Note -->
  <text x="60" y="415" class="small">ORACLE_LOADER는 SELECT만 가능 (읽기 전용), ORACLE_DATAPUMP만 INSERT INTO external_table이 가능 (쓰기/언로드)</text>
</svg>