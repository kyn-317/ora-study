<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #4a2e78; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Data Pump Interactive Mode &amp; Job Control</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">대화형 모드 (Ctrl+C) 진입 및 작업 제어 명령어</text>

  <!-- Normal execution -->
  <rect x="30" y="75" width="270" height="50" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="165" y="98" text-anchor="middle" class="label" fill="#2f6a1c">Normal Execution (실행 중)</text>
  <text x="165" y="115" text-anchor="middle" class="code">expdp hr/hr DIRECTORY=dp_dir ...</text>

  <!-- Ctrl+C arrow -->
  <line x1="300" y1="100" x2="340" y2="100" class="arrow-line" marker-end="url(#ah)" />
  <text x="320" y="90" text-anchor="middle" class="small" fill="#8a5a10">Ctrl+C</text>

  <!-- Interactive Mode -->
  <rect x="340" y="75" width="430" height="50" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="2" />
  <text x="555" y="98" text-anchor="middle" class="label" fill="#8a5a10">Interactive Mode (대화형 모드)</text>
  <text x="555" y="115" text-anchor="middle" class="code">Export> _  (프롬프트 표시)</text>

  <!-- Commands Grid -->
  <rect x="30" y="145" width="740" height="295" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1.5" />
  <text x="50" y="170" class="label" fill="#4a2e78">Interactive Mode Commands (대화형 모드 명령어)</text>

  <!-- Status -->
  <rect x="50" y="185" width="220" height="60" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="70" y="205" class="code">STATUS [interval]</text>
  <text x="70" y="222" class="small">작업 진행 상태 확인</text>
  <text x="70" y="237" class="small">interval: 자동 갱신 간격(초)</text>

  <!-- PARALLEL -->
  <rect x="290" y="185" width="220" height="60" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="310" y="205" class="code">PARALLEL=N</text>
  <text x="310" y="222" class="small">Worker 수 동적 변경</text>
  <text x="310" y="237" class="small">실행 중 병렬도 조절 가능</text>

  <!-- ADD_FILE -->
  <rect x="530" y="185" width="220" height="60" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="550" y="205" class="code">ADD_FILE=dir:file.dmp</text>
  <text x="550" y="222" class="small">덤프 파일 동적 추가</text>
  <text x="550" y="237" class="small">공간 부족 시 활용</text>

  <!-- STOP_JOB -->
  <rect x="50" y="260" width="220" height="60" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1" />
  <text x="70" y="280" class="code">STOP_JOB [=IMMEDIATE]</text>
  <text x="70" y="297" class="small">작업 중지 (재시작 가능)</text>
  <text x="70" y="312" class="small">Master Table 보존</text>

  <!-- KILL_JOB -->
  <rect x="290" y="260" width="220" height="60" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="310" y="280" class="code">KILL_JOB</text>
  <text x="310" y="297" class="small">작업 강제 종료 + Master Table 삭제</text>
  <text x="310" y="312" class="small" fill="#be123c">재시작 불가!</text>

  <!-- CONTINUE_CLIENT -->
  <rect x="530" y="260" width="220" height="60" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="550" y="280" class="code">CONTINUE_CLIENT</text>
  <text x="550" y="297" class="small">대화형 모드 종료</text>
  <text x="550" y="312" class="small">일반 실행으로 복귀</text>

  <!-- EXIT_CLIENT -->
  <rect x="50" y="335" width="220" height="55" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="70" y="355" class="code">EXIT_CLIENT</text>
  <text x="70" y="372" class="small">클라이언트만 종료</text>
  <text x="70" y="387" class="small">서버 작업은 계속 실행됨</text>

  <!-- ATTACH -->
  <rect x="290" y="335" width="220" height="55" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="310" y="355" class="code">impdp ATTACH=job_name</text>
  <text x="310" y="372" class="small">실행 중인 작업에 재연결</text>
  <text x="310" y="387" class="small">EXIT 후에도 ATTACH 가능</text>

  <!-- FILESIZE -->
  <rect x="530" y="335" width="220" height="55" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="550" y="355" class="code">FILESIZE=2G</text>
  <text x="550" y="372" class="small">덤프 파일 최대 크기 지정</text>
  <text x="550" y="387" class="small">초과 시 새 파일 자동 생성</text>

  <!-- Note -->
  <text x="400" y="455" text-anchor="middle" class="small">STOP_JOB: Master Table 보존 → 재시작 가능 | KILL_JOB: Master Table 삭제 → 재시작 불가</text>
</svg>