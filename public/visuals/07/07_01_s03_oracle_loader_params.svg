<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #4a2e78; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">ORACLE_LOADER Access Parameters (액세스 파라미터)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">텍스트 파일 파싱 규칙 정의 - SQL*Loader 제어 파일과 유사한 구문</text>

  <!-- Main ACCESS PARAMETERS box -->
  <rect x="30" y="65" width="740" height="340" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2" stroke-dasharray="8,4" />
  <text x="50" y="88" class="label" fill="#4a2e78">ACCESS PARAMETERS ( ... )</text>

  <!-- Record Level -->
  <rect x="50" y="100" width="340" height="80" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5" />
  <text x="220" y="120" text-anchor="middle" class="label" fill="#2456a8">Record Level (레코드 수준)</text>
  <text x="70" y="142" class="code">RECORDS DELIMITED BY NEWLINE</text>
  <text x="70" y="160" class="code">CHARACTERSET AL32UTF8</text>
  <text x="70" y="172" class="code">SKIP 1              </text><text x="240" y="172" class="small">-- 헤더 행 건너뛰기</text>

  <!-- Field Level -->
  <rect x="410" y="100" width="340" height="80" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="580" y="120" text-anchor="middle" class="label" fill="#2f6a1c">Field Level (필드 수준)</text>
  <text x="430" y="142" class="code">FIELDS TERMINATED BY ','</text>
  <text x="430" y="160" class="code">OPTIONALLY ENCLOSED BY '"'</text>
  <text x="430" y="172" class="code">MISSING FIELD VALUES ARE NULL</text>

  <!-- Column Definition -->
  <rect x="50" y="195" width="340" height="95" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5" />
  <text x="220" y="215" text-anchor="middle" class="label" fill="#8a5a10">Column Definition (컬럼 정의)</text>
  <text x="70" y="238" class="code">( emp_id    CHAR(10),</text>
  <text x="70" y="255" class="code">  hire_date CHAR DATE_FORMAT</text>
  <text x="70" y="272" class="code">            DATE 'YYYY-MM-DD' )</text>
  <text x="70" y="285" class="small">고정폭: POSITION(1:10) CHAR(10)</text>

  <!-- Log/Error Files -->
  <rect x="410" y="195" width="340" height="95" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="580" y="215" text-anchor="middle" class="label" fill="#be123c">Log / Error Files (로그/오류 파일)</text>
  <text x="430" y="238" class="code">LOGFILE  log_dir:'load.log'</text>
  <text x="430" y="255" class="code">BADFILE  bad_dir:'load.bad'</text>
  <text x="430" y="272" class="code">DISCARDFILE log_dir:'load.dsc'</text>
  <text x="430" y="285" class="small">NOLOGFILE / NOBADFILE / NODISCARDFILE</text>

  <!-- Preprocessor -->
  <rect x="50" y="305" width="700" height="50" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="70" y="328" class="label" fill="#4a2e78">Preprocessor</text>
  <text x="220" y="328" class="code">PREPROCESSOR exec_dir:'gunzip'</text>
  <text x="490" y="328" class="small">압축 파일(.gz) 직접 읽기 / EXECUTE ON DIRECTORY 권한 필요</text>
  <text x="70" y="348" class="code">LOCATION ('data.csv.gz')</text>

  <!-- File format comparison -->
  <text x="400" y="430" text-anchor="middle" class="label">데이터 파일 형식별 필드 정의 비교</text>

  <!-- CSV -->
  <rect x="30" y="445" width="240" height="100" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="150" y="468" text-anchor="middle" class="sublabel" fill="#2456a8">CSV (구분자 방식)</text>
  <text x="50" y="490" class="code">FIELDS TERMINATED BY ','</text>
  <text x="50" y="508" class="code">OPTIONALLY ENCLOSED BY '"'</text>
  <text x="50" y="530" class="small">가장 일반적인 형식</text>

  <!-- Fixed Width -->
  <rect x="285" y="445" width="230" height="100" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="400" y="468" text-anchor="middle" class="sublabel" fill="#8a5a10">Fixed Width (고정폭)</text>
  <text x="305" y="490" class="code">POSITION(1:5) CHAR(5)</text>
  <text x="305" y="508" class="code">POSITION(6:30) CHAR(25)</text>
  <text x="305" y="530" class="small">바이트 위치로 필드 지정</text>

  <!-- Pipe-delimited -->
  <rect x="530" y="445" width="240" height="100" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="650" y="468" text-anchor="middle" class="sublabel" fill="#2f6a1c">Pipe-Delimited (파이프)</text>
  <text x="550" y="490" class="code">FIELDS TERMINATED BY '|'</text>
  <text x="550" y="508" class="code">MISSING FIELD VALUES</text>
  <text x="550" y="523" class="code">ARE NULL</text>
  <text x="550" y="543" class="small">데이터에 쉼표 포함 시 사용</text>
</svg>