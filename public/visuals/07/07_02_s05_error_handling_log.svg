<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #6F6BEA; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F43F5E" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">SQL*Loader Error Handling &amp; Log Analysis</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">에러 처리 흐름 - Bad File, Discard File, Log File 생성 과정</text>

  <!-- Data File Input -->
  <rect x="310" y="70" width="180" height="40" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5" />
  <text x="400" y="96" text-anchor="middle" class="label" fill="#10B981">Data Records (입력 레코드)</text>

  <!-- Decision: Parse OK? -->
  <polygon points="400,130 490,170 400,210 310,170" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="400" y="168" text-anchor="middle" class="sublabel">Parse</text>
  <text x="400" y="182" text-anchor="middle" class="sublabel">OK?</text>

  <line x1="400" y1="110" x2="400" y2="130" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#ah-green)" />

  <!-- Bad File (Right - parse fail) -->
  <line x1="490" y1="170" x2="610" y2="170" stroke="#F43F5E" stroke-width="2" fill="none" marker-end="url(#ah-red)" />
  <text x="550" y="160" text-anchor="middle" class="small" fill="#F43F5E">No (실패)</text>

  <rect x="610" y="145" width="160" height="55" class="box" fill="rgba(244,63,94,0.12)" stroke="#F43F5E" stroke-width="1.5" />
  <text x="690" y="168" text-anchor="middle" class="label" fill="#F43F5E">Bad File (.bad)</text>
  <text x="690" y="188" text-anchor="middle" class="small">타입 변환 실패 레코드</text>

  <!-- Decision: WHEN OK? -->
  <line x1="400" y1="210" x2="400" y2="240" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#ah-green)" />
  <text x="340" y="230" class="small" fill="#10B981">Yes (성공)</text>

  <polygon points="400,240 490,280 400,320 310,280" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="400" y="278" text-anchor="middle" class="sublabel">WHEN</text>
  <text x="400" y="292" text-anchor="middle" class="sublabel">조건?</text>

  <!-- Discard File (Right - WHEN fail) -->
  <line x1="490" y1="280" x2="610" y2="280" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#ah)" />
  <text x="550" y="268" text-anchor="middle" class="small" fill="#F59E0B">No (불만족)</text>

  <rect x="610" y="255" width="160" height="55" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="690" y="278" text-anchor="middle" class="label" fill="#F59E0B">Discard File (.dsc)</text>
  <text x="690" y="298" text-anchor="middle" class="small">WHEN 조건 불만족 레코드</text>

  <!-- Loaded (Bottom) -->
  <line x1="400" y1="320" x2="400" y2="350" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#ah-green)" />
  <text x="340" y="342" class="small" fill="#10B981">Yes (만족)</text>

  <rect x="310" y="350" width="180" height="40" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1.5" />
  <text x="400" y="375" text-anchor="middle" class="label" fill="#10B981">Loaded (로드 성공)</text>

  <!-- Log File (Left) -->
  <rect x="30" y="120" width="230" height="280" class="box" fill="rgba(42,43,61,0.5)" stroke="#2A2B3D" stroke-width="1.5" />
  <text x="145" y="145" text-anchor="middle" class="label" fill="#6F6BEA">Log File (.log) 분석 항목</text>

  <text x="50" y="172" class="code">Table HR.EMPLOYEES:</text>
  <text x="50" y="192" class="sublabel">1000 Rows successfully loaded</text>
  <text x="50" y="212" class="sublabel">5 Rows not loaded (data errors)</text>
  <text x="50" y="232" class="sublabel">3 Rows not loaded (WHEN failed)</text>
  <text x="50" y="262" class="code">--- 성능 통계 ---</text>
  <text x="50" y="282" class="small">Total logical records read: 1008</text>
  <text x="50" y="300" class="small">Total logical records rejected: 5</text>
  <text x="50" y="318" class="small">Total logical records discarded: 3</text>
  <text x="50" y="348" class="code">--- 파라미터 ---</text>
  <text x="50" y="368" class="small">ERRORS=50 (기본값)</text>
  <text x="50" y="386" class="small">에러 수 > ERRORS → 로드 중단</text>

  <!-- Connection line from process to log -->
  <line x1="310" y1="170" x2="262" y2="170" stroke="#6F6BEA" stroke-width="1" stroke-dasharray="4,4" fill="none" />
  <line x1="310" y1="280" x2="262" y2="280" stroke="#6F6BEA" stroke-width="1" stroke-dasharray="4,4" fill="none" />
</svg>