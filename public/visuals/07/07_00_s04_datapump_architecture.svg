<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #6F6BEA; stroke-width: 2; fill: none; }
    .dashed { stroke-dasharray: 6,4; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
    <marker id="ah-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Data Pump 아키텍처 개요 (Data Pump Architecture)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">서버 측 고속 Export/Import — DBMS_DATAPUMP + Direct Path API</text>

  <!-- Client Side -->
  <rect x="30" y="70" width="200" height="100" class="box" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="130" y="95" text-anchor="middle" class="label" fill="#F59E0B">Client</text>
  <rect x="50" y="108" width="70" height="40" class="box" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1" />
  <text x="85" y="132" text-anchor="middle" class="code">expdp</text>
  <rect x="140" y="108" width="70" height="40" class="box" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1" />
  <text x="175" y="132" text-anchor="middle" class="code">impdp</text>

  <!-- Arrow Client -> Server -->
  <line x1="230" y1="130" x2="268" y2="130" class="arrow-line" marker-end="url(#ah)" />
  <text x="249" y="122" text-anchor="middle" class="small">API 호출</text>

  <!-- Oracle Database Server -->
  <rect x="270" y="65" width="500" height="410" class="box" fill="none" stroke="#6F6BEA" stroke-width="2" stroke-dasharray="8,4" />
  <text x="290" y="87" class="label" fill="#6F6BEA">Oracle Database Server (서버 측)</text>

  <!-- DBMS_DATAPUMP Engine -->
  <rect x="290" y="100" width="220" height="60" class="box" fill="rgba(111,107,234,0.15)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="400" y="125" text-anchor="middle" class="label" fill="#6F6BEA">DBMS_DATAPUMP</text>
  <text x="400" y="143" text-anchor="middle" class="small">Data Pump Engine (작업 관리)</text>

  <!-- DBMS_METADATA -->
  <rect x="530" y="100" width="220" height="60" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="640" y="125" text-anchor="middle" class="label" fill="#3B82F6">DBMS_METADATA</text>
  <text x="640" y="143" text-anchor="middle" class="small">DDL 추출/변환 (XML)</text>

  <!-- Arrow between engines -->
  <line x1="510" y1="130" x2="528" y2="130" stroke="#3B82F6" stroke-width="1.5" fill="none" marker-end="url(#ah-blue)" />

  <!-- MCP -->
  <rect x="290" y="185" width="180" height="55" class="box" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="380" y="208" text-anchor="middle" class="label" fill="#6F6BEA">Master Control Process</text>
  <text x="380" y="225" text-anchor="middle" class="small">MCP — 작업 전체 조율</text>

  <!-- Arrow Engine -> MCP -->
  <line x1="400" y1="160" x2="400" y2="183" class="arrow-line" marker-end="url(#ah)" />

  <!-- Worker Processes -->
  <rect x="290" y="265" width="460" height="70" class="box" fill="rgba(59,130,246,0.08)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="520" y="288" text-anchor="middle" class="label" fill="#3B82F6">Worker Processes (워커 프로세스)</text>

  <rect x="310" y="298" width="90" height="28" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" />
  <text x="355" y="316" text-anchor="middle" class="code">Worker 1</text>
  <rect x="415" y="298" width="90" height="28" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" />
  <text x="460" y="316" text-anchor="middle" class="code">Worker 2</text>
  <rect x="520" y="298" width="90" height="28" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" />
  <text x="565" y="316" text-anchor="middle" class="code">Worker N</text>
  <text x="635" y="316" text-anchor="middle" class="small">PARALLEL=N</text>

  <!-- Arrow MCP -> Workers -->
  <line x1="380" y1="240" x2="380" y2="263" class="arrow-line" marker-end="url(#ah)" />

  <!-- Master Table -->
  <rect x="530" y="185" width="210" height="55" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="635" y="208" text-anchor="middle" class="label" fill="#F59E0B">Master Table</text>
  <text x="635" y="225" text-anchor="middle" class="small">진행 상태 저장 → 재시작 지원</text>

  <!-- Arrow MCP -> Master Table -->
  <line x1="470" y1="212" x2="528" y2="212" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#ah-yellow)" />

  <!-- Direct Path API -->
  <rect x="290" y="360" width="460" height="50" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5" />
  <text x="520" y="385" text-anchor="middle" class="label" fill="#10B981">Direct Path API (SQL 레이어 우회 고속 I/O)</text>
  <text x="520" y="400" text-anchor="middle" class="small">Redo/Undo 최소화 | 블록 직접 생성/읽기</text>

  <!-- Arrow Workers -> Direct Path -->
  <line x1="460" y1="335" x2="460" y2="358" stroke="#10B981" stroke-width="1.5" fill="none" marker-end="url(#ah)" />

  <!-- Dump Files (OS) -->
  <rect x="30" y="490" width="740" height="90" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="50" y="515" class="label" fill="#F59E0B">Directory Object → OS File System</text>

  <rect x="60" y="530" width="130" height="35" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="125" y="552" text-anchor="middle" class="code">export.dmp</text>

  <rect x="210" y="530" width="130" height="35" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="275" y="552" text-anchor="middle" class="code">export_02.dmp</text>

  <rect x="360" y="530" width="130" height="35" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="425" y="552" text-anchor="middle" class="code">export_03.dmp</text>

  <rect x="510" y="530" width="120" height="35" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1" />
  <text x="570" y="552" text-anchor="middle" class="code">export.log</text>

  <text x="700" y="552" text-anchor="middle" class="small">PARALLEL=3</text>

  <!-- Arrow Direct Path -> Files -->
  <line x1="520" y1="440" x2="520" y2="488" class="arrow-line" marker-end="url(#ah)" />
  <text x="540" y="470" class="small">Export/Import</text>

  <!-- Interactive Mode labels -->
  <rect x="30" y="195" width="200" height="110" class="box" fill="rgba(111,107,234,0.06)" stroke="#6F6BEA" stroke-width="1" />
  <text x="130" y="218" text-anchor="middle" class="label" fill="#6F6BEA">대화형 모드 (Ctrl+C)</text>
  <text x="50" y="240" class="code">STOP_JOB</text>
  <text x="145" y="240" class="small">정상 종료</text>
  <text x="50" y="258" class="code">KILL_JOB</text>
  <text x="145" y="258" class="small">강제 종료</text>
  <text x="50" y="276" class="code">EXIT_CLIENT</text>
  <text x="145" y="276" class="small">클라이언트 분리</text>
  <text x="50" y="294" class="code">ATTACH</text>
  <text x="145" y="294" class="small">재연결</text>

  <!-- Arrow interactive -> MCP -->
  <line x1="230" y1="230" x2="268" y2="215" stroke="#6F6BEA" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#ah)" />

  <!-- Export Modes at bottom -->
  <text x="400" y="475" text-anchor="middle" class="sublabel">Export 모드: FULL | SCHEMAS (기본) | TABLES | TABLESPACES | TRANSPORTABLE</text>
</svg>