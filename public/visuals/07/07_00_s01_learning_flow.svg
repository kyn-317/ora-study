<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #6F6BEA; stroke-width: 2; fill: none; }
    .step-num { font-size: 20px; font-weight: 700; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
    <marker id="ah-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">챕터 07 학습 순서 흐름도 (Chapter 07 Learning Flow)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">3개 핵심 축을 순서대로 학습하여 데이터 이동 전체를 파악</text>

  <!-- Step 1: External Tables -->
  <rect x="40" y="80" width="220" height="160" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="2" />
  <circle cx="70" cy="105" r="16" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="70" y="111" text-anchor="middle" class="step-num" fill="#3B82F6">1</text>
  <text x="155" y="108" text-anchor="middle" class="label" fill="#3B82F6">07_01 외부 파일 조작</text>
  <text x="150" y="128" text-anchor="middle" class="sublabel">External Tables</text>
  <line x1="60" y1="140" x2="240" y2="140" stroke="#3B82F6" stroke-width="0.5" stroke-dasharray="4,3" />
  <text x="150" y="160" text-anchor="middle" class="small">핵심 질문:</text>
  <text x="150" y="178" text-anchor="middle" class="sublabel">외부 파일을 SQL로</text>
  <text x="150" y="195" text-anchor="middle" class="sublabel">어떻게 조회하는가?</text>
  <text x="150" y="220" text-anchor="middle" class="code">Directory Object</text>
  <text x="150" y="234" text-anchor="middle" class="code">Access Driver</text>

  <!-- Arrow 1->2 -->
  <line x1="260" y1="160" x2="288" y2="160" class="arrow-line" marker-end="url(#ah)" />

  <!-- Step 2: SQL*Loader -->
  <rect x="290" y="80" width="220" height="160" class="box" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="2" />
  <circle cx="320" cy="105" r="16" fill="rgba(111,107,234,0.3)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="320" y="111" text-anchor="middle" class="step-num" fill="#6F6BEA">2</text>
  <text x="405" y="108" text-anchor="middle" class="label" fill="#6F6BEA">07_02 대량 로드 처리</text>
  <text x="400" y="128" text-anchor="middle" class="sublabel">SQL*Loader (sqlldr)</text>
  <line x1="310" y1="140" x2="490" y2="140" stroke="#6F6BEA" stroke-width="0.5" stroke-dasharray="4,3" />
  <text x="400" y="160" text-anchor="middle" class="small">핵심 질문:</text>
  <text x="400" y="178" text-anchor="middle" class="sublabel">외부 파일 데이터를 DB에</text>
  <text x="400" y="195" text-anchor="middle" class="sublabel">어떻게 고속 적재하는가?</text>
  <text x="400" y="220" text-anchor="middle" class="code">Conventional / Direct Path</text>
  <text x="400" y="234" text-anchor="middle" class="code">Control File / Express</text>

  <!-- Arrow 2->3 -->
  <line x1="510" y1="160" x2="538" y2="160" class="arrow-line" marker-end="url(#ah)" />

  <!-- Step 3: Data Pump -->
  <rect x="540" y="80" width="220" height="160" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="2" />
  <circle cx="570" cy="105" r="16" fill="rgba(245,158,11,0.3)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="570" y="111" text-anchor="middle" class="step-num" fill="#F59E0B">3</text>
  <text x="655" y="108" text-anchor="middle" class="label" fill="#F59E0B">07_03 Data Pump</text>
  <text x="650" y="128" text-anchor="middle" class="sublabel">expdp / impdp</text>
  <line x1="560" y1="140" x2="740" y2="140" stroke="#F59E0B" stroke-width="0.5" stroke-dasharray="4,3" />
  <text x="650" y="160" text-anchor="middle" class="small">핵심 질문:</text>
  <text x="650" y="178" text-anchor="middle" class="sublabel">Oracle DB 간 데이터를</text>
  <text x="650" y="195" text-anchor="middle" class="sublabel">어떻게 이동하는가?</text>
  <text x="650" y="220" text-anchor="middle" class="code">DBMS_DATAPUMP</text>
  <text x="650" y="234" text-anchor="middle" class="code">Direct Path API</text>

  <!-- Connection reasons -->
  <text x="275" y="268" text-anchor="middle" class="small">ORACLE_LOADER 드라이버가</text>
  <text x="275" y="283" text-anchor="middle" class="small">SQL*Loader 엔진 공유</text>
  <text x="525" y="268" text-anchor="middle" class="small">ORACLE_DATAPUMP 드라이버와</text>
  <text x="525" y="283" text-anchor="middle" class="small">동일 바이너리 형식 공유</text>

  <!-- Execution Location Section -->
  <rect x="40" y="310" width="360" height="85" class="box" fill="rgba(59,130,246,0.06)" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="60" y="335" class="label" fill="#3B82F6">서버 측 (Server-Side)</text>
  <text x="60" y="355" class="sublabel">External Tables — SQL로 서버 파일 접근</text>
  <text x="60" y="372" class="sublabel">Data Pump — 서버 측 Export/Import</text>
  <text x="60" y="386" class="small">Directory Object 필수</text>

  <rect x="430" y="310" width="330" height="85" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="450" y="335" class="label" fill="#F59E0B">클라이언트 측 (Client-Side)</text>
  <text x="450" y="355" class="sublabel">SQL*Loader — 클라이언트에서 실행</text>
  <text x="450" y="372" class="sublabel">로컬 파일 직접 읽기 가능</text>
  <text x="450" y="386" class="small">Express Mode로 간편 사용</text>

  <!-- Common foundation -->
  <rect x="40" y="420" width="720" height="80" class="box" fill="rgba(111,107,234,0.06)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="400" y="448" text-anchor="middle" class="label" fill="#6F6BEA">공통 기반 (Shared Foundation)</text>
  <text x="200" y="472" text-anchor="middle" class="code">Directory Object</text>
  <text x="200" y="488" text-anchor="middle" class="small">OS 경로 추상화</text>
  <text x="400" y="472" text-anchor="middle" class="code">Direct Path API</text>
  <text x="400" y="488" text-anchor="middle" class="small">SQL 우회 고속 처리</text>
  <text x="600" y="472" text-anchor="middle" class="code">Oracle Binary Format</text>
  <text x="600" y="488" text-anchor="middle" class="small">ORACLE_DATAPUMP 형식 공유</text>
</svg>