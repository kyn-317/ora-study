<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #6F6BEA; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Data Pump Export Modes (expdp 모드)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Export 범위에 따른 5가지 모드 및 핵심 파라미터</text>

  <!-- Database representation at top -->
  <rect x="250" y="70" width="300" height="40" class="box" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="400" y="95" text-anchor="middle" class="label" fill="#6F6BEA">Oracle Database (Export Source)</text>

  <!-- 5 Export Modes -->
  <!-- FULL -->
  <line x1="400" y1="110" x2="100" y2="140" class="arrow-line" marker-end="url(#ah)" />
  <rect x="30" y="140" width="140" height="85" class="box" fill="rgba(244,63,94,0.1)" stroke="#F43F5E" stroke-width="1.5" />
  <text x="100" y="162" text-anchor="middle" class="label" fill="#F43F5E">FULL</text>
  <text x="100" y="182" text-anchor="middle" class="code">FULL=Y</text>
  <text x="100" y="200" text-anchor="middle" class="small">데이터베이스 전체</text>
  <text x="100" y="215" text-anchor="middle" class="small">EXP_FULL_DATABASE</text>

  <!-- SCHEMAS -->
  <line x1="400" y1="110" x2="265" y2="140" class="arrow-line" marker-end="url(#ah)" />
  <rect x="195" y="140" width="140" height="85" class="box" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="265" y="162" text-anchor="middle" class="label" fill="#6F6BEA">SCHEMAS</text>
  <text x="265" y="182" text-anchor="middle" class="code">SCHEMAS=HR,SCOTT</text>
  <text x="265" y="200" text-anchor="middle" class="small">지정 스키마 전체</text>
  <text x="265" y="215" text-anchor="middle" class="small">(기본 모드)</text>

  <!-- TABLES -->
  <line x1="400" y1="110" x2="430" y2="140" class="arrow-line" marker-end="url(#ah)" />
  <rect x="360" y="140" width="140" height="85" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="430" y="162" text-anchor="middle" class="label" fill="#3B82F6">TABLES</text>
  <text x="430" y="182" text-anchor="middle" class="code">TABLES=HR.EMP</text>
  <text x="430" y="200" text-anchor="middle" class="small">지정 테이블 + 관련객체</text>

  <!-- TABLESPACES -->
  <line x1="400" y1="110" x2="595" y2="140" class="arrow-line" marker-end="url(#ah)" />
  <rect x="525" y="140" width="140" height="85" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1.5" />
  <text x="595" y="162" text-anchor="middle" class="label" fill="#10B981">TABLESPACES</text>
  <text x="595" y="182" text-anchor="middle" class="code">TABLESPACES=TS1</text>
  <text x="595" y="200" text-anchor="middle" class="small">지정 테이블스페이스</text>

  <!-- TRANSPORTABLE -->
  <line x1="400" y1="110" x2="700" y2="140" class="arrow-line" marker-end="url(#ah)" />
  <rect x="672" y="140" width="110" height="85" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="727" y="162" text-anchor="middle" class="label" fill="#F59E0B">TRANSPORT</text>
  <text x="727" y="182" text-anchor="middle" class="code">TRANSPORT_</text>
  <text x="727" y="196" text-anchor="middle" class="code">TABLESPACES</text>
  <text x="727" y="215" text-anchor="middle" class="small">메타데이터만</text>

  <!-- Key Parameters Section -->
  <rect x="30" y="250" width="740" height="235" class="box" fill="rgba(42,43,61,0.4)" stroke="#2A2B3D" stroke-width="1.5" />
  <text x="50" y="275" class="label" fill="#6F6BEA">핵심 파라미터 (Key Parameters)</text>

  <!-- Row 1: File related -->
  <rect x="50" y="290" width="220" height="55" class="box" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="1" />
  <text x="160" y="310" text-anchor="middle" class="sublabel" fill="#F59E0B">파일 관련</text>
  <text x="70" y="330" class="code">DUMPFILE=exp_%U.dmp</text>
  <text x="70" y="342" class="code">LOGFILE=exp.log</text>

  <!-- Row 1: Content -->
  <rect x="290" y="290" width="220" height="55" class="box" fill="rgba(59,130,246,0.08)" stroke="#3B82F6" stroke-width="1" />
  <text x="400" y="310" text-anchor="middle" class="sublabel" fill="#3B82F6">내용 범위</text>
  <text x="310" y="330" class="code">CONTENT=ALL</text>
  <text x="310" y="342" class="small">ALL | DATA_ONLY | METADATA_ONLY</text>

  <!-- Row 1: Performance -->
  <rect x="530" y="290" width="220" height="55" class="box" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1" />
  <text x="640" y="310" text-anchor="middle" class="sublabel" fill="#10B981">성능 관련</text>
  <text x="550" y="330" class="code">PARALLEL=4</text>
  <text x="550" y="342" class="code">COMPRESSION=ALL</text>

  <!-- Row 2: Filter -->
  <rect x="50" y="360" width="220" height="55" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1" />
  <text x="160" y="380" text-anchor="middle" class="sublabel" fill="#F43F5E">필터링</text>
  <text x="70" y="400" class="code">EXCLUDE=INDEX,GRANT</text>
  <text x="70" y="412" class="code">INCLUDE=TABLE:"IN(...)"</text>

  <!-- Row 2: Consistency -->
  <rect x="290" y="360" width="220" height="55" class="box" fill="rgba(111,107,234,0.08)" stroke="#6F6BEA" stroke-width="1" />
  <text x="400" y="380" text-anchor="middle" class="sublabel" fill="#6F6BEA">일관성</text>
  <text x="310" y="400" class="code">FLASHBACK_TIME=...</text>
  <text x="310" y="412" class="code">FLASHBACK_SCN=...</text>

  <!-- Row 2: Security -->
  <rect x="530" y="360" width="220" height="55" class="box" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="1" />
  <text x="640" y="380" text-anchor="middle" class="sublabel" fill="#F59E0B">보안</text>
  <text x="550" y="400" class="code">ENCRYPTION=ALL</text>
  <text x="550" y="412" class="code">ENCRYPTION_PASSWORD=...</text>

  <!-- Tip -->
  <rect x="50" y="430" width="700" height="40" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1" />
  <text x="70" y="450" class="small">DUMPFILE에 %U 사용 + PARALLEL=N → 자동으로 N개의 덤프 파일 생성 (exp_01.dmp, exp_02.dmp, ...)</text>
  <text x="70" y="465" class="small">FLASHBACK_TIME/SCN 미지정 시 테이블 간 일관성 미보장 → 프로덕션에서는 반드시 지정 권장</text>
</svg>