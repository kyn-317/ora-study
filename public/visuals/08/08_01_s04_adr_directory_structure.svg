<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" fill="none">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
    .tree-line { stroke: #4a2e78; stroke-width: 1.5; }
  </style>

  <text x="400" y="32" text-anchor="middle" class="title">ADR 디렉터리 구조 및 진단 데이터 흐름</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Automatic Diagnostic Repository Directory Structure</text>

  <!-- ADR_BASE -->
  <rect x="30" y="70" width="740" height="36" fill="#4a2e78" fill-opacity="0.1" stroke="#4a2e78" stroke-width="2" class="box"/>
  <text x="50" y="93" class="mono" fill="#4a2e78">ADR_BASE/</text>
  <text x="200" y="93" class="desc">최상위 디렉터리 (DIAGNOSTIC_DEST 파라미터로 설정)</text>

  <!-- diag -->
  <line x1="60" y1="106" x2="60" y2="125" class="tree-line"/>
  <line x1="60" y1="125" x2="80" y2="125" class="tree-line"/>
  <rect x="80" y="112" width="690" height="30" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="100" y="132" class="mono" fill="#2456a8">diag/</text>
  <text x="200" y="132" class="desc">진단 데이터 루트</text>

  <!-- rdbms/product -->
  <line x1="100" y1="142" x2="100" y2="160" class="tree-line"/>
  <line x1="100" y1="160" x2="120" y2="160" class="tree-line"/>
  <rect x="120" y="148" width="650" height="30" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="140" y="168" class="mono" fill="#2456a8">rdbms/</text>
  <text x="220" y="168" class="desc">제품 유형 (rdbms, asm, tnslsnr 등)</text>

  <!-- db_name -->
  <line x1="140" y1="178" x2="140" y2="196" class="tree-line"/>
  <line x1="140" y1="196" x2="160" y2="196" class="tree-line"/>
  <rect x="160" y="184" width="610" height="30" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="180" y="204" class="mono" fill="#2456a8">orcl/ORCL/</text>
  <text x="310" y="204" class="desc">DB_UNIQUE_NAME/INSTANCE_NAME  ← ADR Home</text>

  <!-- Sub-directories -->
  <!-- alert -->
  <line x1="180" y1="214" x2="180" y2="240" class="tree-line"/>
  <line x1="180" y1="240" x2="200" y2="240" class="tree-line"/>
  <rect x="200" y="228" width="280" height="35" fill="#f3efe4" stroke="#8a5a10" stroke-width="2" class="box"/>
  <text x="220" y="248" class="mono" fill="#8a5a10">alert/</text>
  <text x="290" y="248" class="desc">Alert Log (XML/JSON 형식)</text>
  <text x="220" y="258" class="desc">V$DIAG_ALERT_EXT로 SQL 조회 가능</text>

  <!-- trace -->
  <line x1="180" y1="263" x2="180" y2="280" class="tree-line"/>
  <line x1="180" y1="280" x2="200" y2="280" class="tree-line"/>
  <rect x="200" y="268" width="280" height="35" fill="#f3efe4" stroke="#2456a8" stroke-width="2" class="box"/>
  <text x="220" y="288" class="mono" fill="#2456a8">trace/</text>
  <text x="290" y="288" class="desc">Trace 파일 (.trc, .trm)</text>
  <text x="220" y="298" class="desc">텍스트 형식 Alert Log도 이곳에 저장</text>

  <!-- incident -->
  <line x1="180" y1="303" x2="180" y2="320" class="tree-line"/>
  <line x1="180" y1="320" x2="200" y2="320" class="tree-line"/>
  <rect x="200" y="308" width="280" height="35" fill="#f3efe4" stroke="#be123c" stroke-width="2" class="box"/>
  <text x="220" y="328" class="mono" fill="#be123c">incident/</text>
  <text x="320" y="328" class="desc">인시던트 덤프</text>
  <text x="220" y="338" class="desc">incdir_N/ 하위 폴더에 이벤트별 저장</text>

  <!-- cdump -->
  <line x1="180" y1="343" x2="180" y2="360" class="tree-line"/>
  <line x1="180" y1="360" x2="200" y2="360" class="tree-line"/>
  <rect x="200" y="348" width="280" height="30" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1.5" class="box"/>
  <text x="220" y="368" class="mono" fill="#2f6a1c">cdump/</text>
  <text x="310" y="368" class="desc">Core 덤프 파일</text>

  <!-- hm -->
  <line x1="180" y1="378" x2="180" y2="395" class="tree-line"/>
  <line x1="180" y1="395" x2="200" y2="395" class="tree-line"/>
  <rect x="200" y="383" width="280" height="30" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5" class="box"/>
  <text x="220" y="403" class="mono" fill="#4a2e78">hm/</text>
  <text x="270" y="403" class="desc">Health Monitor 보고서</text>

  <!-- Right side: Access methods -->
  <rect x="520" y="228" width="250" height="185" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="645" y="252" text-anchor="middle" class="label">접근 방법 (Access Methods)</text>
  <rect x="535" y="262" width="220" height="26" rx="4" fill="#8a5a10" opacity="0.1"/>
  <text x="545" y="280" class="mono" fill="#8a5a10">ADRCI</text>
  <text x="605" y="280" class="desc">CLI 도구</text>
  <rect x="535" y="295" width="220" height="26" rx="4" fill="#2456a8" opacity="0.1"/>
  <text x="545" y="313" class="mono" fill="#2456a8">V$DIAG_INFO</text>
  <text x="660" y="313" class="desc">경로 조회</text>
  <rect x="535" y="328" width="220" height="26" rx="4" fill="#4a2e78" opacity="0.1"/>
  <text x="545" y="346" class="mono" fill="#4a2e78">V$DIAG_ALERT_EXT</text>
  <text x="710" y="346" class="desc">SQL</text>
  <rect x="535" y="361" width="220" height="26" rx="4" fill="#2f6a1c" opacity="0.1"/>
  <text x="545" y="379" class="mono" fill="#2f6a1c">Enterprise Manager</text>
  <text x="545" y="399" class="desc">Oracle 26ai: JSON Alert Log 기본 지원</text>

  <!-- Incident flow -->
  <rect x="30" y="435" width="740" height="100" fill="#f3efe4" stroke="#be123c" stroke-width="1" class="box"/>
  <text x="400" y="458" text-anchor="middle" class="label" fill="#be123c">인시던트 관리 흐름 (Incident Lifecycle)</text>
  <rect x="50" y="470" width="110" height="30" rx="4" fill="#be123c" opacity="0.15"/>
  <text x="105" y="490" text-anchor="middle" class="mono" fill="#be123c">에러 발생</text>
  <text x="175" y="490" class="desc">→</text>
  <rect x="190" y="470" width="120" height="30" rx="4" fill="#8a5a10" opacity="0.15"/>
  <text x="250" y="490" text-anchor="middle" class="mono" fill="#8a5a10">인시던트 생성</text>
  <text x="325" y="490" class="desc">→</text>
  <rect x="340" y="470" width="120" height="30" rx="4" fill="#2456a8" opacity="0.15"/>
  <text x="400" y="490" text-anchor="middle" class="mono" fill="#2456a8">Flood Control</text>
  <text x="475" y="490" class="desc">→</text>
  <rect x="490" y="470" width="120" height="30" rx="4" fill="#4a2e78" opacity="0.15"/>
  <text x="550" y="490" text-anchor="middle" class="mono" fill="#4a2e78">IPS 패키징</text>
  <text x="625" y="490" class="desc">→</text>
  <rect x="640" y="470" width="110" height="30" rx="4" fill="#2f6a1c" opacity="0.15"/>
  <text x="695" y="490" text-anchor="middle" class="mono" fill="#2f6a1c">SR 제출</text>
  <text x="50" y="522" class="desc">동일 Problem 반복 시 Flood Control로 인시던트 과다 생성 방지 → IPS(Incident Packaging Service)로 관련 파일 패키징</text>
</svg>
