<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #6F6BEA; stroke-width: 1.5; marker-end: url(#ah5); }
  </style>
  <defs>
    <marker id="ah5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" class="title">어드바이저 프레임워크 전체 구조</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Oracle Advisor Framework Overview</text>

  <!-- DBMS_ADVISOR -->
  <rect x="200" y="70" width="400" height="45" fill="#6F6BEA" fill-opacity="0.15" stroke="#6F6BEA" stroke-width="2" class="box"/>
  <text x="400" y="93" text-anchor="middle" class="label" fill="#6F6BEA">DBMS_ADVISOR 패키지 (공통 인터페이스)</text>
  <text x="400" y="108" text-anchor="middle" class="desc">CREATE_TASK → SET_TASK_PARAMETER → EXECUTE_TASK → GET_TASK_REPORT</text>

  <!-- Arrows to advisors -->
  <line x1="200" y1="115" x2="110" y2="150" class="arrow"/>
  <line x1="310" y1="115" x2="270" y2="150" class="arrow"/>
  <line x1="400" y1="115" x2="400" y2="150" class="arrow"/>
  <line x1="490" y1="115" x2="530" y2="150" class="arrow"/>
  <line x1="600" y1="115" x2="690" y2="150" class="arrow"/>

  <!-- Advisor 1: ADDM -->
  <rect x="30" y="153" width="155" height="95" fill="#1E1F2E" stroke="#F43F5E" stroke-width="2" class="box"/>
  <rect x="30" y="153" width="155" height="28" fill="#F43F5E" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="107" y="172" text-anchor="middle" class="label" fill="#F43F5E">ADDM</text>
  <text x="45" y="197" class="desc">자동 성능 진단</text>
  <text x="45" y="214" class="desc">DB Time 분석</text>
  <text x="45" y="231" class="mono" fill="#F43F5E">DBMS_ADDM</text>

  <!-- Advisor 2: SQL Tuning -->
  <rect x="195" y="153" width="155" height="95" fill="#1E1F2E" stroke="#F59E0B" stroke-width="2" class="box"/>
  <rect x="195" y="153" width="155" height="28" fill="#F59E0B" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="272" y="172" text-anchor="middle" class="label" fill="#F59E0B">SQL Tuning</text>
  <text x="210" y="197" class="desc">SQL 문 심층 분석</text>
  <text x="210" y="214" class="desc">SQL Profile 생성</text>
  <text x="210" y="231" class="mono" fill="#F59E0B">DBMS_SQLTUNE</text>

  <!-- Advisor 3: SQL Access -->
  <rect x="360" y="153" width="155" height="95" fill="#1E1F2E" stroke="#3B82F6" stroke-width="2" class="box"/>
  <rect x="360" y="153" width="155" height="28" fill="#3B82F6" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="437" y="172" text-anchor="middle" class="label" fill="#3B82F6">SQL Access</text>
  <text x="375" y="197" class="desc">인덱스/MV 구조 권고</text>
  <text x="375" y="214" class="desc">워크로드 최적화</text>
  <text x="375" y="231" class="mono" fill="#3B82F6">DBMS_ADVISOR</text>

  <!-- Advisor 4: Segment -->
  <rect x="525" y="153" width="120" height="95" fill="#1E1F2E" stroke="#10B981" stroke-width="2" class="box"/>
  <rect x="525" y="153" width="120" height="28" fill="#10B981" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="585" y="172" text-anchor="middle" class="label" fill="#10B981">Segment</text>
  <text x="540" y="197" class="desc">공간 낭비 식별</text>
  <text x="540" y="214" class="desc">Shrink 권고</text>
  <text x="540" y="231" class="mono" fill="#10B981">DBMS_SPACE</text>

  <!-- Advisor 5: Stats -->
  <rect x="655" y="153" width="120" height="95" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="2" class="box"/>
  <rect x="655" y="153" width="120" height="28" fill="#6F6BEA" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="715" y="172" text-anchor="middle" class="label" fill="#6F6BEA">Stats</text>
  <text x="670" y="197" class="desc">통계 품질 분석</text>
  <text x="670" y="214" class="desc">수집 전략 권고</text>
  <text x="670" y="231" class="mono" fill="#6F6BEA">DBMS_STATS</text>

  <!-- Common workflow -->
  <rect x="30" y="275" width="740" height="120" fill="#1E1F2E" stroke="#2A2B3D" stroke-width="1" class="box"/>
  <text x="400" y="298" text-anchor="middle" class="label">어드바이저 공통 실행 워크플로우</text>

  <!-- Steps -->
  <rect x="50" y="310" width="120" height="40" rx="6" fill="#6F6BEA" opacity="0.15" stroke="#6F6BEA" stroke-width="1"/>
  <text x="110" y="328" text-anchor="middle" class="mono" fill="#6F6BEA">1. CREATE</text>
  <text x="110" y="344" text-anchor="middle" class="desc">태스크 생성</text>

  <line x1="170" y1="330" x2="200" y2="330" class="arrow"/>

  <rect x="200" y="310" width="120" height="40" rx="6" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="260" y="328" text-anchor="middle" class="mono" fill="#3B82F6">2. SET_PARAM</text>
  <text x="260" y="344" text-anchor="middle" class="desc">파라미터 설정</text>

  <line x1="320" y1="330" x2="350" y2="330" class="arrow"/>

  <rect x="350" y="310" width="120" height="40" rx="6" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
  <text x="410" y="328" text-anchor="middle" class="mono" fill="#F59E0B">3. EXECUTE</text>
  <text x="410" y="344" text-anchor="middle" class="desc">분석 실행</text>

  <line x1="470" y1="330" x2="500" y2="330" class="arrow"/>

  <rect x="500" y="310" width="120" height="40" rx="6" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1"/>
  <text x="560" y="328" text-anchor="middle" class="mono" fill="#10B981">4. REPORT</text>
  <text x="560" y="344" text-anchor="middle" class="desc">결과 조회</text>

  <line x1="620" y1="330" x2="650" y2="330" class="arrow"/>

  <rect x="650" y="310" width="100" height="40" rx="6" fill="#F43F5E" opacity="0.15" stroke="#F43F5E" stroke-width="1"/>
  <text x="700" y="328" text-anchor="middle" class="mono" fill="#F43F5E">5. ACCEPT</text>
  <text x="700" y="344" text-anchor="middle" class="desc">권고 수락</text>

  <text x="60" y="382" class="desc">결과 저장: DBA_ADVISOR_TASKS → DBA_ADVISOR_FINDINGS → DBA_ADVISOR_RECOMMENDATIONS → DBA_ADVISOR_ACTIONS</text>

  <!-- SQL Profile / Plan Baseline / Patch comparison -->
  <rect x="30" y="415" width="740" height="130" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1" class="box"/>
  <text x="400" y="438" text-anchor="middle" class="label" fill="#F59E0B">SQL 최적화 도구 비교</text>

  <rect x="50" y="450" width="210" height="80" rx="6" fill="#F59E0B" opacity="0.06" stroke="#F59E0B" stroke-width="1"/>
  <text x="155" y="470" text-anchor="middle" class="label" fill="#F59E0B">SQL Profile</text>
  <text x="65" y="488" class="desc">비용 추정 보정 (보조 정보)</text>
  <text x="65" y="503" class="desc">실행 계획 고정 안함</text>
  <text x="65" y="518" class="mono" fill="#F59E0B">DBMS_SQLTUNE</text>

  <rect x="290" y="450" width="210" height="80" rx="6" fill="#3B82F6" opacity="0.06" stroke="#3B82F6" stroke-width="1"/>
  <text x="395" y="470" text-anchor="middle" class="label" fill="#3B82F6">SQL Plan Baseline</text>
  <text x="305" y="488" class="desc">특정 실행 계획 고정</text>
  <text x="305" y="503" class="desc">SPM에 의해 자동 캡처</text>
  <text x="305" y="518" class="mono" fill="#3B82F6">DBMS_SPM</text>

  <rect x="530" y="450" width="210" height="80" rx="6" fill="#F43F5E" opacity="0.06" stroke="#F43F5E" stroke-width="1"/>
  <text x="635" y="470" text-anchor="middle" class="label" fill="#F43F5E">SQL Patch</text>
  <text x="545" y="488" class="desc">힌트 적용으로 계획 유도</text>
  <text x="545" y="503" class="desc">수동 생성만 가능</text>
  <text x="545" y="518" class="mono" fill="#F43F5E">DBMS_SQLDIAG</text>
</svg>
