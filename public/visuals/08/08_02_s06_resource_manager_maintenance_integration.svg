<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="32" text-anchor="middle" class="title">Resource Manager와 Maintenance Window 통합</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Integration of Resource Manager and Maintenance Window</text>

  <!-- Normal Operation -->
  <rect x="30" y="75" width="355" height="140" fill="#f3efe4" stroke="#2456a8" stroke-width="2" class="box"/>
  <rect x="30" y="75" width="355" height="30" fill="#2456a8" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="207" y="95" text-anchor="middle" class="label" fill="#2456a8">정상 운영 시간 (Business Hours)</text>
  
  <text x="50" y="125" class="desc">Resource Plan:</text>
  <text x="160" y="125" class="mono" fill="#2456a8">DEFAULT_PLAN 또는 사용자 정의 플랜</text>
  <text x="50" y="150" class="desc">CPU 배분:</text>
  <rect x="160" y="138" width="200" height="16" rx="3" fill="#2456a8" opacity="0.3"/>
  <rect x="160" y="138" width="160" height="16" rx="3" fill="#2456a8" opacity="0.6"/>
  <text x="240" y="150" text-anchor="middle" class="mono" fill="#1a1a1a">업무 세션 80%</text>
  <text x="50" y="175" class="desc">유지 관리 태스크: 최소 자원 또는 미실행</text>
  <text x="50" y="195" class="desc">ORA$AUTOTASK: 제한된 CPU 할당</text>

  <!-- Maintenance Window -->
  <rect x="415" y="75" width="355" height="140" fill="#f3efe4" stroke="#8a5a10" stroke-width="2" class="box"/>
  <rect x="415" y="75" width="355" height="30" fill="#8a5a10" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="592" y="95" text-anchor="middle" class="label" fill="#8a5a10">유지 관리 윈도우 (Maintenance Window)</text>
  
  <text x="435" y="125" class="desc">Resource Plan:</text>
  <text x="545" y="125" class="mono" fill="#8a5a10">DEFAULT_MAINTENANCE_PLAN</text>
  <text x="435" y="150" class="desc">CPU 배분:</text>
  <rect x="545" y="138" width="200" height="16" rx="3" fill="#8a5a10" opacity="0.3"/>
  <rect x="545" y="138" width="50" height="16" rx="3" fill="#8a5a10" opacity="0.6"/>
  <text x="640" y="150" text-anchor="middle" class="mono" fill="#1a1a1a">유지 태스크 25%</text>
  <text x="435" y="175" class="desc">자동 태스크: 통계 수집, SQL 튜닝, 공간 관리</text>
  <text x="435" y="195" class="desc">ORA$AUTOTASK_SUB_GROUP: 우선 실행</text>

  <!-- Transition Arrow -->
  <line x1="385" y1="140" x2="415" y2="140" stroke="#4a2e78" stroke-width="2" marker-end="url(#ah4)"/>
  <defs>
    <marker id="ah4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a2e78"/>
    </marker>
  </defs>

  <!-- Plan switch mechanism -->
  <rect x="30" y="240" width="740" height="145" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5" class="box"/>
  <text x="400" y="265" text-anchor="middle" class="label" fill="#4a2e78">윈도우 열림/닫힘 시 자동 플랜 전환 메커니즘</text>

  <!-- Timeline -->
  <line x1="60" y1="310" x2="740" y2="310" stroke="#f3efe4" stroke-width="2"/>
  
  <!-- Business hours -->
  <rect x="60" y="296" width="200" height="28" rx="4" fill="#2456a8" opacity="0.15"/>
  <text x="160" y="314" text-anchor="middle" class="mono" fill="#2456a8">업무 시간 (DEFAULT_PLAN)</text>
  
  <!-- Window open -->
  <line x1="260" y1="290" x2="260" y2="330" stroke="#8a5a10" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="260" y="285" text-anchor="middle" class="desc" fill="#8a5a10">22:00 윈도우 열림</text>
  
  <!-- Maintenance window -->
  <rect x="260" y="296" width="250" height="28" rx="4" fill="#8a5a10" opacity="0.15"/>
  <text x="385" y="314" text-anchor="middle" class="mono" fill="#8a5a10">유지 관리 (MAINTENANCE_PLAN)</text>
  
  <!-- Window close -->
  <line x1="510" y1="290" x2="510" y2="330" stroke="#8a5a10" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="510" y="285" text-anchor="middle" class="desc" fill="#8a5a10">02:00 윈도우 닫힘</text>
  
  <!-- Back to business -->
  <rect x="510" y="296" width="230" height="28" rx="4" fill="#2456a8" opacity="0.15"/>
  <text x="625" y="314" text-anchor="middle" class="mono" fill="#2456a8">업무 시간 (DEFAULT_PLAN)</text>

  <text x="60" y="355" class="desc">윈도우 OPEN  → Scheduler가 RESOURCE_MANAGER_PLAN을 DEFAULT_MAINTENANCE_PLAN으로 자동 전환</text>
  <text x="60" y="372" class="desc">윈도우 CLOSE → 이전 Resource Plan으로 자동 복원 (미완료 태스크는 다음 윈도우에서 재개)</text>
</svg>
