<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #6F6BEA; stroke-width: 1.5; marker-end: url(#ah3); }
  </style>
  <defs>
    <marker id="ah3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" class="title">Resource Manager 구성요소 관계도</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Resource Manager Component Relationships</text>

  <!-- Resource Plan -->
  <rect x="250" y="70" width="300" height="70" fill="#6F6BEA" fill-opacity="0.15" stroke="#6F6BEA" stroke-width="2" class="box"/>
  <text x="400" y="95" text-anchor="middle" class="label" fill="#6F6BEA">리소스 플랜 (Resource Plan)</text>
  <text x="400" y="115" text-anchor="middle" class="desc">자원 배분 정책 정의 — RESOURCE_MANAGER_PLAN 파라미터로 활성화</text>
  <text x="400" y="130" text-anchor="middle" class="mono" fill="#6F6BEA">예: DEFAULT_MAINTENANCE_PLAN, DEFAULT_PLAN</text>

  <!-- Arrows down -->
  <line x1="300" y1="140" x2="200" y2="175" class="arrow"/>
  <line x1="500" y1="140" x2="600" y2="175" class="arrow"/>

  <!-- Resource Plan Directive -->
  <rect x="50" y="178" width="310" height="80" fill="#1E1F2E" stroke="#3B82F6" stroke-width="2" class="box"/>
  <text x="205" y="200" text-anchor="middle" class="label" fill="#3B82F6">리소스 플랜 디렉티브</text>
  <text x="205" y="218" text-anchor="middle" class="desc">Plan Directive</text>
  <text x="70" y="238" class="desc">Plan → Consumer Group 매핑 규칙</text>
  <text x="70" y="253" class="desc">CPU%, 병렬도, 세션 제한 등 정의</text>

  <!-- Consumer Group -->
  <rect x="440" y="178" width="310" height="80" fill="#1E1F2E" stroke="#F59E0B" stroke-width="2" class="box"/>
  <text x="595" y="200" text-anchor="middle" class="label" fill="#F59E0B">소비자 그룹</text>
  <text x="595" y="218" text-anchor="middle" class="desc">Consumer Group</text>
  <text x="460" y="238" class="desc">세션을 논리적으로 분류</text>
  <text x="460" y="253" class="desc">예: SYS_GROUP, OTHER_GROUPS, ORA$AUTOTASK</text>

  <!-- Directive to Consumer Group connection -->
  <line x1="360" y1="218" x2="440" y2="218" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Resource Control Types -->
  <rect x="30" y="290" width="740" height="110" fill="#1E1F2E" stroke="#2A2B3D" stroke-width="1" class="box"/>
  <text x="400" y="315" text-anchor="middle" class="label">Resource Manager 제어 가능 자원</text>

  <rect x="50" y="330" width="120" height="55" rx="4" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="1"/>
  <text x="110" y="350" text-anchor="middle" class="mono" fill="#3B82F6">CPU</text>
  <text x="110" y="365" text-anchor="middle" class="desc">CPU 사용률 %</text>
  <text x="110" y="378" text-anchor="middle" class="desc">MGMT_P1~P8</text>

  <rect x="190" y="330" width="120" height="55" rx="4" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <text x="250" y="350" text-anchor="middle" class="mono" fill="#10B981">병렬도</text>
  <text x="250" y="365" text-anchor="middle" class="desc">Parallel DOP</text>
  <text x="250" y="378" text-anchor="middle" class="desc">PARALLEL_*</text>

  <rect x="330" y="330" width="120" height="55" rx="4" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="1"/>
  <text x="390" y="350" text-anchor="middle" class="mono" fill="#F59E0B">세션 제한</text>
  <text x="390" y="365" text-anchor="middle" class="desc">Active Sessions</text>
  <text x="390" y="378" text-anchor="middle" class="desc">MAX_ACTIVE_SESS</text>

  <rect x="470" y="330" width="120" height="55" rx="4" fill="#F43F5E" opacity="0.1" stroke="#F43F5E" stroke-width="1"/>
  <text x="530" y="350" text-anchor="middle" class="mono" fill="#F43F5E">실행 시간</text>
  <text x="530" y="365" text-anchor="middle" class="desc">Execution Time</text>
  <text x="530" y="378" text-anchor="middle" class="desc">SWITCH_TIME</text>

  <rect x="610" y="330" width="140" height="55" rx="4" fill="#6F6BEA" opacity="0.1" stroke="#6F6BEA" stroke-width="1"/>
  <text x="680" y="350" text-anchor="middle" class="mono" fill="#6F6BEA">I/O 제한</text>
  <text x="680" y="365" text-anchor="middle" class="desc">I/O Bandwidth</text>
  <text x="680" y="378" text-anchor="middle" class="desc">MAX_IOPS/MBPS</text>

  <!-- CDB/PDB Resource Manager -->
  <rect x="30" y="420" width="740" height="125" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="1.5" class="box"/>
  <text x="400" y="445" text-anchor="middle" class="label" fill="#6F6BEA">CDB/PDB 환경 Resource Manager (2단계 제어)</text>

  <!-- CDB level -->
  <rect x="50" y="458" width="330" height="72" rx="6" fill="#6F6BEA" opacity="0.08" stroke="#6F6BEA" stroke-width="1"/>
  <text x="215" y="478" text-anchor="middle" class="label" fill="#6F6BEA">CDB Resource Plan</text>
  <text x="65" y="498" class="desc">PDB 간 자원 배분 (shares, utilization_limit)</text>
  <text x="65" y="515" class="mono" fill="#6F6BEA">DEFAULT_CDB_PLAN: PDB별 공평 배분</text>

  <!-- PDB level -->
  <rect x="420" y="458" width="330" height="72" rx="6" fill="#F59E0B" opacity="0.08" stroke="#F59E0B" stroke-width="1"/>
  <text x="585" y="478" text-anchor="middle" class="label" fill="#F59E0B">PDB Resource Plan</text>
  <text x="435" y="498" class="desc">PDB 내부 Consumer Group 간 자원 배분</text>
  <text x="435" y="515" class="mono" fill="#F59E0B">각 PDB별 독립적 플랜 설정 가능</text>

  <!-- Arrow between CDB and PDB -->
  <line x1="380" y1="494" x2="420" y2="494" class="arrow"/>
  <text x="400" y="486" text-anchor="middle" class="desc">계층</text>
</svg>
