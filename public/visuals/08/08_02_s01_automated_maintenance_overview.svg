<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #6F6BEA; stroke-width: 2; marker-end: url(#ah2); }
  </style>
  <defs>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" class="title">자동 유지 관리 태스크 아키텍처</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Automated Maintenance Tasks Architecture</text>

  <!-- Scheduler -->
  <rect x="250" y="70" width="300" height="50" fill="#6F6BEA" fill-opacity="0.15" stroke="#6F6BEA" stroke-width="2" class="box"/>
  <text x="400" y="93" text-anchor="middle" class="label" fill="#6F6BEA">Oracle Scheduler</text>
  <text x="400" y="110" text-anchor="middle" class="desc">자동 유지 관리 태스크 스케줄링 엔진</text>

  <line x1="400" y1="120" x2="400" y2="145" class="arrow"/>

  <!-- Auto Task Framework -->
  <rect x="150" y="148" width="500" height="42" fill="#1E1F2E" stroke="#3B82F6" stroke-width="2" class="box"/>
  <text x="400" y="168" text-anchor="middle" class="label" fill="#3B82F6">Auto Task Framework (DBMS_AUTO_TASK_ADMIN)</text>
  <text x="400" y="183" text-anchor="middle" class="desc">CLIENT_NAME 기반 태스크 관리, 활성화/비활성화 제어</text>

  <!-- Three main tasks -->
  <line x1="280" y1="190" x2="130" y2="225" class="arrow"/>
  <line x1="400" y1="190" x2="400" y2="225" class="arrow"/>
  <line x1="520" y1="190" x2="670" y2="225" class="arrow"/>

  <!-- Task 1: Optimizer Statistics -->
  <rect x="30" y="228" width="210" height="120" fill="#1E1F2E" stroke="#10B981" stroke-width="2" class="box"/>
  <rect x="30" y="228" width="210" height="32" fill="#10B981" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="135" y="249" text-anchor="middle" class="label" fill="#10B981">옵티마이저 통계 수집</text>
  <text x="45" y="275" class="mono" fill="#10B981">auto optimizer stats</text>
  <text x="45" y="275" class="mono" fill="#10B981">auto optimizer stats</text>
  <text x="45" y="292" class="desc">collection</text>
  <text x="45" y="312" class="desc">노후화된 통계 자동 수집</text>
  <text x="45" y="328" class="desc">DBMS_STATS.GATHER_*</text>
  <text x="45" y="345" class="desc">STALE_PERCENT &gt; 10% 기준</text>

  <!-- Task 2: SQL Tuning -->
  <rect x="295" y="228" width="210" height="120" fill="#1E1F2E" stroke="#F59E0B" stroke-width="2" class="box"/>
  <rect x="295" y="228" width="210" height="32" fill="#F59E0B" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="400" y="249" text-anchor="middle" class="label" fill="#F59E0B">SQL 튜닝 어드바이저</text>
  <text x="310" y="275" class="mono" fill="#F59E0B">sql tuning advisor</text>
  <text x="310" y="295" class="desc">고부하 SQL 자동 분석</text>
  <text x="310" y="315" class="desc">SQL Profile 자동 적용</text>
  <text x="310" y="335" class="desc">SYS_AUTO_SQL_TUNING</text>

  <!-- Task 3: Segment Advisor -->
  <rect x="560" y="228" width="210" height="120" fill="#1E1F2E" stroke="#F43F5E" stroke-width="2" class="box"/>
  <rect x="560" y="228" width="210" height="32" fill="#F43F5E" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="665" y="249" text-anchor="middle" class="label" fill="#F43F5E">세그먼트 어드바이저</text>
  <text x="575" y="275" class="mono" fill="#F43F5E">auto space advisor</text>
  <text x="575" y="295" class="desc">공간 낭비 세그먼트 식별</text>
  <text x="575" y="315" class="desc">Shrink/Compress 권고</text>
  <text x="575" y="335" class="desc">성장 추이 분석</text>

  <!-- Maintenance Window -->
  <rect x="30" y="375" width="740" height="130" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1.5" class="box"/>
  <text x="400" y="400" text-anchor="middle" class="label" fill="#F59E0B">유지 관리 윈도우 (Maintenance Window)</text>
  
  <!-- Week timeline -->
  <line x1="60" y1="430" x2="740" y2="430" stroke="#2A2B3D" stroke-width="2"/>
  
  <rect x="60" y="418" width="80" height="24" rx="4" fill="#3B82F6" opacity="0.2"/>
  <text x="100" y="434" text-anchor="middle" class="mono" fill="#3B82F6">MON</text>
  <rect x="155" y="418" width="80" height="24" rx="4" fill="#3B82F6" opacity="0.2"/>
  <text x="195" y="434" text-anchor="middle" class="mono" fill="#3B82F6">TUE</text>
  <rect x="250" y="418" width="80" height="24" rx="4" fill="#3B82F6" opacity="0.2"/>
  <text x="290" y="434" text-anchor="middle" class="mono" fill="#3B82F6">WED</text>
  <rect x="345" y="418" width="80" height="24" rx="4" fill="#3B82F6" opacity="0.2"/>
  <text x="385" y="434" text-anchor="middle" class="mono" fill="#3B82F6">THU</text>
  <rect x="440" y="418" width="80" height="24" rx="4" fill="#3B82F6" opacity="0.2"/>
  <text x="480" y="434" text-anchor="middle" class="mono" fill="#3B82F6">FRI</text>
  <rect x="535" y="418" width="90" height="24" rx="4" fill="#10B981" opacity="0.2"/>
  <text x="580" y="434" text-anchor="middle" class="mono" fill="#10B981">SAT</text>
  <rect x="640" y="418" width="90" height="24" rx="4" fill="#10B981" opacity="0.2"/>
  <text x="685" y="434" text-anchor="middle" class="mono" fill="#10B981">SUN</text>

  <text x="100" y="458" text-anchor="middle" class="desc">22:00~02:00</text>
  <text x="195" y="458" text-anchor="middle" class="desc">22:00~02:00</text>
  <text x="290" y="458" text-anchor="middle" class="desc">22:00~02:00</text>
  <text x="385" y="458" text-anchor="middle" class="desc">22:00~02:00</text>
  <text x="480" y="458" text-anchor="middle" class="desc">22:00~02:00</text>
  <text x="580" y="458" text-anchor="middle" class="desc">06:00~02:00</text>
  <text x="685" y="458" text-anchor="middle" class="desc">06:00~02:00</text>
  
  <text x="300" y="480" class="desc">평일: 4시간 (22:00 시작)</text>
  <text x="560" y="480" class="desc">주말: 20시간 (06:00 시작)</text>
  <text x="60" y="498" class="desc">DBMS_SCHEDULER.SET_ATTRIBUTE로 윈도우 시간 변경 가능 / Resource Manager와 연동하여 자원 제어</text>
</svg>
