<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .label-sm { font-size: 12px; font-weight: 600; }
    .sublabel { font-size: 11px; fill: #787368; }
    .conn-label { font-size: 11px; font-weight: 600; }
    .code { font-family: monospace; font-size: 12px; fill: #8a5a10; }
    .box { fill: rgba(42,42,42,0.05); stroke: #f3efe4; stroke-width: 1.5; rx: 8; }
    .unit-01 { fill: #d8cfe5; stroke: #4a2e78; stroke-width: 2; rx: 10; }
    .unit-02 { fill: #f0ddb3; stroke: #8a5a10; stroke-width: 2; rx: 10; }
    .unit-03 { fill: #dee5f5; stroke: #2456a8; stroke-width: 2; rx: 10; }
    .unit-04 { fill: #cfe1b8; stroke: #2f6a1c; stroke-width: 2; rx: 10; }
    .arrow-p { stroke: #4a2e78; stroke-width: 2; fill: none; marker-end: url(#aP); }
    .arrow-y { stroke: #8a5a10; stroke-width: 2; fill: none; marker-end: url(#aY); }
    .arrow-b { stroke: #2456a8; stroke-width: 2; fill: none; marker-end: url(#aB); }
    .arrow-g { stroke: #2f6a1c; stroke-width: 2; fill: none; marker-end: url(#aG); }
    .conn-box { rx: 6; stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="aP" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="aY" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a5a10" />
    </marker>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2456a8" />
    </marker>
    <marker id="aG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6a1c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">단원 간 연결 관계 (Cross-Section Connections)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">4개 단원이 상호 연결되는 5대 핵심 파이프라인</text>

  <!-- 4 Unit Boxes at top -->
  <rect x="30" y="70" width="170" height="60" class="unit-01" />
  <text x="115" y="95" text-anchor="middle" class="label" fill="#4a2e78">08_01</text>
  <text x="115" y="115" text-anchor="middle" class="sublabel">기본 모니터링/로깅</text>

  <rect x="220" y="70" width="170" height="60" class="unit-02" />
  <text x="305" y="95" text-anchor="middle" class="label" fill="#8a5a10">08_02</text>
  <text x="305" y="115" text-anchor="middle" class="sublabel">자동화 기반 태스크</text>

  <rect x="410" y="70" width="170" height="60" class="unit-03" />
  <text x="495" y="95" text-anchor="middle" class="label" fill="#2456a8">08_03</text>
  <text x="495" y="115" text-anchor="middle" class="sublabel">문제 해결 어드바이저</text>

  <rect x="600" y="70" width="170" height="60" class="unit-04" />
  <text x="685" y="95" text-anchor="middle" class="label" fill="#2f6a1c">08_04</text>
  <text x="685" y="115" text-anchor="middle" class="sublabel">진단 모니터 (ADDM)</text>

  <!-- Connection 1: AWR → ADDM → Advisor -->
  <rect x="30" y="160" width="740" height="72" class="conn-box" fill="#d8cfe5" stroke="#4a2e78" />
  <text x="50" y="180" class="conn-label" fill="#4a2e78">연결 1</text>
  <text x="50" y="196" class="label-sm">AWR → ADDM → 어드바이저 (데이터 수집 → 자동 진단 → 권고)</text>

  <!-- Pipeline boxes inside connection 1 -->
  <rect x="60" y="205" width="130" height="22" rx="4" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1"/>
  <text x="125" y="220" text-anchor="middle" class="label-sm" fill="#4a2e78">AWR 스냅샷</text>
  <path d="M 190 216 L 220 216" class="arrow-p" />
  <rect x="230" y="205" width="150" height="22" rx="4" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1"/>
  <text x="305" y="220" text-anchor="middle" class="label-sm" fill="#2f6a1c">ADDM 자동 분석</text>
  <path d="M 380 216 L 410 216" class="arrow-g" />
  <rect x="420" y="205" width="180" height="22" rx="4" fill="#dee5f5" stroke="#2456a8" stroke-width="1"/>
  <text x="510" y="220" text-anchor="middle" class="label-sm" fill="#2456a8">SQL 튜닝 어드바이저 권고</text>
  <text x="690" y="220" class="sublabel">Oracle 자동 성능 관리의 핵심 축</text>

  <!-- Connection 2: Maintenance Window → AutoTask → Advisors -->
  <rect x="30" y="250" width="740" height="72" class="conn-box" fill="#f0ddb3" stroke="#8a5a10" />
  <text x="50" y="270" class="conn-label" fill="#8a5a10">연결 2</text>
  <text x="50" y="286" class="label-sm">Maintenance Window → AutoTask → 어드바이저 (스케줄 → 실행 → 최적화)</text>

  <rect x="60" y="295" width="150" height="22" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="135" y="310" text-anchor="middle" class="label-sm" fill="#8a5a10">Window 열림</text>
  <path d="M 210 306 L 240 306" class="arrow-y" />
  <rect x="250" y="295" width="130" height="22" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="315" y="310" text-anchor="middle" class="label-sm" fill="#8a5a10">AutoTask 실행</text>
  <path d="M 380 306 L 410 306" class="arrow-y" />
  <rect x="420" y="295" width="120" height="22" rx="4" fill="#dee5f5" stroke="#2456a8" stroke-width="1"/>
  <text x="480" y="310" text-anchor="middle" class="label-sm" fill="#2456a8">통계/튜닝/분석</text>
  <text x="620" y="310" class="sublabel">HIGH → MEDIUM 우선순위 배분</text>

  <!-- Connection 3: STATISTICS_LEVEL controls everything -->
  <rect x="30" y="340" width="740" height="72" class="conn-box" fill="#f0ddb3" stroke="#8a5a10" stroke-dasharray="4,4" />
  <text x="50" y="360" class="conn-label" fill="#8a5a10">연결 3</text>
  <text x="50" y="376" class="label-sm">STATISTICS_LEVEL 파라미터 — 하나의 설정이 전체 연쇄</text>

  <rect x="60" y="385" width="200" height="22" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="160" y="400" text-anchor="middle" class="code">STATISTICS_LEVEL=TYPICAL</text>
  <path d="M 260 396 L 290 396" class="arrow-y" />
  <text x="310" y="400" class="label-sm" fill="#4a2e78">AWR</text>
  <text x="345" y="400" class="sublabel">+</text>
  <text x="365" y="400" class="label-sm" fill="#2f6a1c">ADDM</text>
  <text x="410" y="400" class="sublabel">+</text>
  <text x="440" y="400" class="label-sm" fill="#8a5a10">AutoTask</text>
  <text x="530" y="400" class="sublabel">= BASIC이면 전부 비활성화!</text>

  <!-- Connection 4: Resource Manager ↔ Maintenance Window -->
  <rect x="30" y="430" width="740" height="72" class="conn-box" fill="#dee5f5" stroke="#2456a8" />
  <text x="50" y="450" class="conn-label" fill="#2456a8">연결 4</text>
  <text x="50" y="466" class="label-sm">Resource Manager ↔ Maintenance Window — PDB 리소스 격리</text>

  <rect x="60" y="475" width="140" height="22" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="130" y="490" text-anchor="middle" class="label-sm" fill="#8a5a10">Resource Plan</text>
  <path d="M 200 486 L 240 486" class="arrow-b" />
  <rect x="250" y="475" width="150" height="22" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="325" y="490" text-anchor="middle" class="label-sm" fill="#8a5a10">Window 연동 전환</text>
  <path d="M 400 486 L 440 486" class="arrow-b" />
  <rect x="450" y="475" width="160" height="22" rx="4" fill="#dee5f5" stroke="#2456a8" stroke-width="1"/>
  <text x="530" y="490" text-anchor="middle" class="label-sm" fill="#2456a8">CDB/PDB 2계층 격리</text>

  <!-- Connection 5: STS shared input -->
  <rect x="30" y="520" width="740" height="72" class="conn-box" fill="#dee5f5" stroke="#2456a8" />
  <text x="50" y="540" class="conn-label" fill="#2456a8">연결 5</text>
  <text x="50" y="556" class="label-sm">SQL Tuning Set — 3개 어드바이저의 공유 입력 데이터</text>

  <rect x="200" y="565" width="120" height="22" rx="4" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <text x="260" y="580" text-anchor="middle" class="label-sm" fill="#2456a8">STS</text>

  <!-- STS → 3 advisors -->
  <path d="M 320 576 L 380 566" class="arrow-b" />
  <path d="M 320 576 L 380 576" class="arrow-b" />
  <path d="M 320 576 L 380 586" class="arrow-b" />

  <text x="390" y="568" class="label-sm" fill="#2456a8">SQL 튜닝 어드바이저</text>
  <text x="575" y="568" class="sublabel">→ 개별 SQL 최적화</text>
  <text x="390" y="582" class="label-sm" fill="#2456a8">SQL 액세스 어드바이저</text>
  <text x="575" y="582" class="sublabel">→ 스키마 구조 최적화</text>
  <text x="390" y="596" class="label-sm" fill="#2456a8">SQL 퍼포먼스 애널라이저</text>
  <text x="575" y="596" class="sublabel">→ 변경 영향도 평가</text>

  <!-- Footer note -->
  <text x="400" y="640" text-anchor="middle" class="sublabel">각 단원은 독립적이지 않으며 위 5대 연결고리를 통해 유기적으로 작동합니다</text>
</svg>