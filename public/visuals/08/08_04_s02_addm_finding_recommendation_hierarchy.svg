<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
    .tree { stroke: #4a2e78; stroke-width: 1.5; }
  </style>

  <text x="400" y="32" text-anchor="middle" class="title">ADDM Finding → Recommendation 계층 구조</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">ADDM Finding and Recommendation Hierarchy</text>

  <!-- Finding -->
  <rect x="30" y="75" width="740" height="55" fill="#be123c" fill-opacity="0.08" stroke="#be123c" stroke-width="2" class="box"/>
  <text x="50" y="98" class="label" fill="#be123c">Finding (발견된 문제)</text>
  <text x="50" y="118" class="desc">예: "Top SQL by DB Time" — Impact: 45% of DB Time (1,620 seconds)</text>
  <text x="600" y="98" class="mono" fill="#be123c">DBA_ADVISOR_FINDINGS</text>

  <!-- Tree lines -->
  <line x1="70" y1="130" x2="70" y2="155" class="tree"/>
  <line x1="70" y1="155" x2="100" y2="155" class="tree"/>
  <line x1="70" y1="155" x2="70" y2="280" class="tree"/>

  <!-- Recommendation 1 -->
  <rect x="100" y="140" width="670" height="55" fill="#8a5a10" fill-opacity="0.08" stroke="#8a5a10" stroke-width="1.5" class="box"/>
  <text x="120" y="163" class="label" fill="#8a5a10">Recommendation 1 (대안 1) — Benefit: 1,200 sec DB Time 절약</text>
  <text x="600" y="163" class="mono" fill="#8a5a10">DBA_ADVISOR_RECOMMENDATIONS</text>

  <!-- Actions for Rec 1 -->
  <line x1="130" y1="195" x2="130" y2="210" class="tree"/>
  <line x1="130" y1="210" x2="160" y2="210" class="tree"/>
  <line x1="130" y1="210" x2="130" y2="240" class="tree"/>
  <line x1="130" y1="240" x2="160" y2="240" class="tree"/>
  <line x1="130" y1="240" x2="130" y2="268" class="tree"/>
  <line x1="130" y1="268" x2="160" y2="268" class="tree"/>

  <rect x="160" y="198" width="310" height="24" rx="4" fill="#2456a8" opacity="0.1" stroke="#2456a8" stroke-width="1"/>
  <text x="175" y="214" class="mono" fill="#2456a8">Action 1.1: SQL Tuning Advisor 실행</text>

  <rect x="160" y="228" width="310" height="24" rx="4" fill="#2456a8" opacity="0.1" stroke="#2456a8" stroke-width="1"/>
  <text x="175" y="244" class="mono" fill="#2456a8">Action 1.2: SQL Profile 적용 고려</text>

  <rect x="160" y="256" width="310" height="24" rx="4" fill="#2f6a1c" opacity="0.1" stroke="#2f6a1c" stroke-width="1"/>
  <text x="175" y="272" class="mono" fill="#2f6a1c">Rationale: SQL_ID=abc123이 35% DB Time 소비</text>

  <text x="490" y="214" class="mono" fill="#787368">DBA_ADVISOR_ACTIONS</text>
  <text x="490" y="272" class="mono" fill="#787368">DBA_ADVISOR_RATIONALE</text>

  <!-- Recommendation 2 -->
  <line x1="70" y1="280" x2="100" y2="295" class="tree"/>
  <rect x="100" y="285" width="670" height="45" fill="#8a5a10" fill-opacity="0.05" stroke="#8a5a10" stroke-width="1" class="box"/>
  <text x="120" y="305" class="label" fill="#8a5a10">Recommendation 2 (대안 2) — Benefit: 800 sec DB Time 절약</text>
  <line x1="130" y1="330" x2="130" y2="342" class="tree"/>
  <line x1="130" y1="342" x2="160" y2="342" class="tree"/>
  <rect x="160" y="335" width="310" height="20" rx="4" fill="#2456a8" opacity="0.08"/>
  <text x="175" y="349" class="mono" fill="#2456a8">Action 2.1: 인덱스 생성 (Automatic Indexing)</text>

  <!-- Recommendation types -->
  <rect x="30" y="375" width="740" height="90" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="400" y="398" text-anchor="middle" class="label">Recommendation 유형 (Type Classification)</text>

  <rect x="50" y="410" width="130" height="40" rx="4" fill="#be123c" opacity="0.1" stroke="#be123c" stroke-width="1"/>
  <text x="115" y="428" text-anchor="middle" class="mono" fill="#be123c">Hardware</text>
  <text x="115" y="443" text-anchor="middle" class="desc">CPU/메모리/I/O 추가</text>

  <rect x="200" y="410" width="130" height="40" rx="4" fill="#8a5a10" opacity="0.1" stroke="#8a5a10" stroke-width="1"/>
  <text x="265" y="428" text-anchor="middle" class="mono" fill="#8a5a10">Configuration</text>
  <text x="265" y="443" text-anchor="middle" class="desc">파라미터/구성 변경</text>

  <rect x="350" y="410" width="130" height="40" rx="4" fill="#2456a8" opacity="0.1" stroke="#2456a8" stroke-width="1"/>
  <text x="415" y="428" text-anchor="middle" class="mono" fill="#2456a8">Schema</text>
  <text x="415" y="443" text-anchor="middle" class="desc">인덱스/파티션 변경</text>

  <rect x="500" y="410" width="130" height="40" rx="4" fill="#2f6a1c" opacity="0.1" stroke="#2f6a1c" stroke-width="1"/>
  <text x="565" y="428" text-anchor="middle" class="mono" fill="#2f6a1c">Application</text>
  <text x="565" y="443" text-anchor="middle" class="desc">SQL/코드 변경</text>

  <rect x="650" y="410" width="100" height="40" rx="4" fill="#4a2e78" opacity="0.1" stroke="#4a2e78" stroke-width="1"/>
  <text x="700" y="428" text-anchor="middle" class="mono" fill="#4a2e78">Other</text>
  <text x="700" y="443" text-anchor="middle" class="desc">기타 조치</text>
</svg>
