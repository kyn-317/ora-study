<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" fill="none">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #4a2e78; stroke-width: 2; marker-end: url(#ah8); }
  </style>
  <defs>
    <marker id="ah8" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a2e78"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" class="title">ADDM 자동 실행 흐름 및 아키텍처</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">ADDM Automatic Execution Flow and Architecture</text>

  <!-- MMON -->
  <rect x="30" y="80" width="160" height="80" fill="#4a2e78" fill-opacity="0.15" stroke="#4a2e78" stroke-width="2" class="box"/>
  <text x="110" y="105" text-anchor="middle" class="label" fill="#4a2e78">MMON</text>
  <text x="110" y="122" text-anchor="middle" class="desc">Manageability</text>
  <text x="110" y="138" text-anchor="middle" class="desc">Monitor Process</text>
  <text x="110" y="155" text-anchor="middle" class="mono" fill="#4a2e78">기본 1시간 주기</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="110" x2="230" y2="110" class="arrow"/>
  <text x="210" y="103" text-anchor="middle" class="desc">수집</text>

  <!-- V$ Views -->
  <rect x="230" y="80" width="150" height="80" fill="#f3efe4" stroke="#2456a8" stroke-width="2" class="box"/>
  <text x="305" y="103" text-anchor="middle" class="label" fill="#2456a8">V$ Views</text>
  <text x="305" y="122" text-anchor="middle" class="desc">SGA 메모리</text>
  <text x="305" y="140" text-anchor="middle" class="desc">실시간 통계</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="110" x2="420" y2="110" class="arrow"/>
  <text x="400" y="103" text-anchor="middle" class="desc">스냅샷</text>

  <!-- AWR -->
  <rect x="420" y="80" width="150" height="80" fill="#f3efe4" stroke="#8a5a10" stroke-width="2" class="box"/>
  <text x="495" y="103" text-anchor="middle" class="label" fill="#8a5a10">AWR</text>
  <text x="495" y="122" text-anchor="middle" class="desc">SYSAUX TS</text>
  <text x="495" y="140" text-anchor="middle" class="desc">이력 스냅샷 저장</text>

  <!-- Arrow 3 -->
  <line x1="570" y1="110" x2="610" y2="110" class="arrow"/>
  <text x="590" y="103" text-anchor="middle" class="desc">분석</text>

  <!-- ADDM Engine -->
  <rect x="610" y="75" width="160" height="90" fill="#be123c" fill-opacity="0.1" stroke="#be123c" stroke-width="2" class="box"/>
  <text x="690" y="98" text-anchor="middle" class="label" fill="#be123c">ADDM 엔진</text>
  <text x="690" y="118" text-anchor="middle" class="desc">DB Time 분해</text>
  <text x="690" y="136" text-anchor="middle" class="desc">근본 원인 추적</text>
  <text x="690" y="154" text-anchor="middle" class="desc">권장 사항 생성</text>

  <!-- DB Time Decomposition -->
  <rect x="30" y="190" width="740" height="160" fill="#f3efe4" stroke="#be123c" stroke-width="1.5" class="box"/>
  <text x="400" y="215" text-anchor="middle" class="label" fill="#be123c">DB Time 분해 분석 (Top-Down Decomposition)</text>

  <!-- DB Time bar -->
  <text x="50" y="240" class="label">DB Time 전체</text>
  <rect x="180" y="228" width="570" height="22" rx="4" fill="#f3efe4" opacity="0.1"/>

  <!-- CPU Time -->
  <text x="50" y="270" class="desc">CPU Time</text>
  <rect x="180" y="258" width="200" height="18" rx="3" fill="#2456a8" opacity="0.4"/>
  <text x="280" y="271" text-anchor="middle" class="mono" fill="#2456a8">35%</text>

  <!-- Wait Time breakdown -->
  <text x="50" y="295" class="desc">User I/O</text>
  <rect x="180" y="283" width="150" height="18" rx="3" fill="#8a5a10" opacity="0.4"/>
  <text x="255" y="296" text-anchor="middle" class="mono" fill="#8a5a10">25%</text>

  <text x="50" y="318" class="desc">Concurrency</text>
  <rect x="180" y="306" width="90" height="18" rx="3" fill="#be123c" opacity="0.4"/>
  <text x="225" y="319" text-anchor="middle" class="mono" fill="#be123c">15%</text>

  <text x="50" y="341" class="desc">기타 대기</text>
  <rect x="180" y="329" width="130" height="18" rx="3" fill="#2f6a1c" opacity="0.4"/>
  <text x="245" y="342" text-anchor="middle" class="mono" fill="#2f6a1c">25%</text>

  <text x="420" y="270" class="desc">각 구성요소별 상위 원인까지 하향식 분석</text>
  <text x="420" y="290" class="desc">→ Top SQL, Hot Segment, Configuration 문제 식별</text>
  <text x="420" y="310" class="desc">→ Finding 생성 (Problem / Symptom / Information)</text>
  <text x="420" y="330" class="desc">→ Recommendation + Benefit (예상 DB Time 절약량)</text>

  <!-- Finding Types -->
  <rect x="30" y="370" width="740" height="80" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="400" y="393" text-anchor="middle" class="label">ADDM Finding 3가지 유형</text>

  <rect x="50" y="405" width="210" height="32" rx="6" fill="#be123c" opacity="0.1" stroke="#be123c" stroke-width="1"/>
  <text x="155" y="420" text-anchor="middle" class="label" fill="#be123c">Problem (문제)</text>
  <text x="155" y="435" text-anchor="middle" class="desc">근본 원인, 해결 필요</text>

  <rect x="290" y="405" width="210" height="32" rx="6" fill="#8a5a10" opacity="0.1" stroke="#8a5a10" stroke-width="1"/>
  <text x="395" y="420" text-anchor="middle" class="label" fill="#8a5a10">Symptom (증상)</text>
  <text x="395" y="435" text-anchor="middle" class="desc">문제의 결과/현상</text>

  <rect x="530" y="405" width="210" height="32" rx="6" fill="#2456a8" opacity="0.1" stroke="#2456a8" stroke-width="1"/>
  <text x="635" y="420" text-anchor="middle" class="label" fill="#2456a8">Information (정보)</text>
  <text x="635" y="435" text-anchor="middle" class="desc">참고용 정보</text>

  <!-- Key Parameters -->
  <rect x="30" y="470" width="740" height="75" fill="#f3efe4" stroke="#4a2e78" stroke-width="1" class="box"/>
  <text x="400" y="493" text-anchor="middle" class="label" fill="#4a2e78">핵심 파라미터</text>
  <text x="50" y="515" class="mono" fill="#4a2e78">STATISTICS_LEVEL = TYPICAL (기본)</text>
  <text x="350" y="515" class="desc">BASIC 시 ADDM 비활성화</text>
  <text x="50" y="535" class="mono" fill="#4a2e78">CONTROL_MANAGEMENT_PACK_ACCESS = DIAGNOSTIC+TUNING</text>
  <text x="520" y="535" class="desc">NONE 시 비활성화</text>
</svg>
