<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="32" text-anchor="middle" class="title">데이터 딕셔너리 뷰 계층 비교</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Data Dictionary View Prefix Comparison (DBA_ / ALL_ / USER_ / CDB_)</text>

  <!-- DBA_ -->
  <rect x="30" y="75" width="170" height="200" fill="#f3efe4" stroke="#be123c" stroke-width="2" class="box"/>
  <rect x="30" y="75" width="170" height="36" fill="#be123c" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="115" y="98" text-anchor="middle" class="label" fill="#be123c">DBA_ 뷰</text>
  <text x="45" y="128" class="desc">범위: DB 전체 객체</text>
  <text x="45" y="148" class="desc">권한: SELECT_CATALOG_ROLE</text>
  <text x="45" y="168" class="desc">     또는 SELECT ANY</text>
  <text x="45" y="188" class="desc">     DICTIONARY</text>
  <text x="45" y="215" class="mono" fill="#be123c">DBA_TABLES</text>
  <text x="45" y="232" class="mono" fill="#be123c">DBA_USERS</text>
  <text x="45" y="249" class="mono" fill="#be123c">DBA_TABLESPACES</text>
  <text x="45" y="266" class="desc">OWNER 컬럼: 있음</text>

  <!-- ALL_ -->
  <rect x="220" y="75" width="170" height="200" fill="#f3efe4" stroke="#2456a8" stroke-width="2" class="box"/>
  <rect x="220" y="75" width="170" height="36" fill="#2456a8" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="305" y="98" text-anchor="middle" class="label" fill="#2456a8">ALL_ 뷰</text>
  <text x="235" y="128" class="desc">범위: 접근 가능 객체</text>
  <text x="235" y="148" class="desc">권한: 별도 권한 불요</text>
  <text x="235" y="168" class="desc">     (GRANT 받은 객체</text>
  <text x="235" y="188" class="desc">      + 본인 소유)</text>
  <text x="235" y="215" class="mono" fill="#2456a8">ALL_TABLES</text>
  <text x="235" y="232" class="mono" fill="#2456a8">ALL_OBJECTS</text>
  <text x="235" y="249" class="mono" fill="#2456a8">ALL_TAB_COLUMNS</text>
  <text x="235" y="266" class="desc">OWNER 컬럼: 있음</text>

  <!-- USER_ -->
  <rect x="410" y="75" width="170" height="200" fill="#f3efe4" stroke="#2f6a1c" stroke-width="2" class="box"/>
  <rect x="410" y="75" width="170" height="36" fill="#2f6a1c" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="495" y="98" text-anchor="middle" class="label" fill="#2f6a1c">USER_ 뷰</text>
  <text x="425" y="128" class="desc">범위: 본인 소유 객체만</text>
  <text x="425" y="148" class="desc">권한: 별도 권한 불요</text>
  <text x="425" y="168" class="desc">     (자신의 스키마</text>
  <text x="425" y="188" class="desc">      객체만 표시)</text>
  <text x="425" y="215" class="mono" fill="#2f6a1c">USER_TABLES</text>
  <text x="425" y="232" class="mono" fill="#2f6a1c">USER_INDEXES</text>
  <text x="425" y="249" class="mono" fill="#2f6a1c">USER_CONSTRAINTS</text>
  <text x="425" y="266" class="desc">OWNER 컬럼: 없음</text>

  <!-- CDB_ -->
  <rect x="600" y="75" width="170" height="200" fill="#f3efe4" stroke="#4a2e78" stroke-width="2" class="box"/>
  <rect x="600" y="75" width="170" height="36" fill="#4a2e78" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="685" y="98" text-anchor="middle" class="label" fill="#4a2e78">CDB_ 뷰</text>
  <text x="615" y="128" class="desc">범위: CDB 전체</text>
  <text x="615" y="148" class="desc">     (모든 PDB 포함)</text>
  <text x="615" y="168" class="desc">권한: SYSDBA 또는</text>
  <text x="615" y="188" class="desc">     공통 권한</text>
  <text x="615" y="215" class="mono" fill="#4a2e78">CDB_TABLES</text>
  <text x="615" y="232" class="mono" fill="#4a2e78">CDB_USERS</text>
  <text x="615" y="249" class="mono" fill="#4a2e78">CDB_TABLESPACES</text>
  <text x="615" y="266" class="desc">CON_ID 컬럼: 있음</text>

  <!-- Bottom: Base Tables -->
  <rect x="150" y="310" width="500" height="60" fill="#f3efe4" stroke="#8a5a10" stroke-width="2" class="box"/>
  <text x="400" y="335" text-anchor="middle" class="label" fill="#8a5a10">기본 테이블 (Base Tables) — SYS 소유</text>
  <text x="400" y="355" text-anchor="middle" class="mono" fill="#8a5a10">TAB$  OBJ$  COL$  USER$  TS$  SEG$  FILE$</text>
  <text x="400" y="365" text-anchor="middle" class="desc">SYSTEM 테이블스페이스에 저장 / 직접 조회 비권장</text>

  <!-- Arrows from views to base -->
  <line x1="115" y1="275" x2="250" y2="310" stroke="#be123c" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="305" y1="275" x2="340" y2="310" stroke="#2456a8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="495" y1="275" x2="460" y2="310" stroke="#2f6a1c" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="685" y1="275" x2="550" y2="310" stroke="#4a2e78" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Comparison with V$ -->
  <rect x="30" y="395" width="740" height="75" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="400" y="418" text-anchor="middle" class="label">딕셔너리 뷰 vs V$ 뷰 핵심 차이</text>
  <text x="50" y="440" class="desc">딕셔너리 뷰: 디스크 저장 → 읽기 일관성 보장 → DDL 시 갱신 → OPEN 상태에서만 접근</text>
  <text x="50" y="458" class="desc">V$ 뷰:       SGA 메모리 → 읽기 일관성 미보장 → 실시간 갱신 → NOMOUNT부터 부분 접근</text>
</svg>
