<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 12px; }
    .small-mono { font-family: 'Consolas', monospace; font-size: 10px; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #6F6BEA; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" class="title">V$ 뷰 내부 계층 구조</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">V$ View Internal Layer Architecture</text>

  <!-- Layer 1: User SQL -->
  <rect x="250" y="70" width="300" height="44" fill="#1E1F2E" stroke="#E2E8F0" stroke-width="1.5" class="box"/>
  <text x="400" y="88" text-anchor="middle" class="mono" fill="#E2E8F0">SELECT * FROM V$SESSION;</text>
  <text x="400" y="104" text-anchor="middle" class="desc">사용자 SQL 쿼리</text>

  <!-- Arrow -->
  <line x1="400" y1="114" x2="400" y2="134" class="arrow"/>

  <!-- Layer 2: Public Synonym -->
  <rect x="220" y="138" width="360" height="44" fill="#1E1F2E" stroke="#3B82F6" stroke-width="2" class="box"/>
  <text x="400" y="157" text-anchor="middle" class="mono" fill="#3B82F6">V$SESSION</text>
  <text x="400" y="173" text-anchor="middle" class="desc">Public Synonym (공개 동의어)</text>

  <line x1="400" y1="182" x2="400" y2="202" class="arrow"/>

  <!-- Layer 3: View -->
  <rect x="220" y="206" width="360" height="44" fill="#1E1F2E" stroke="#10B981" stroke-width="2" class="box"/>
  <text x="400" y="225" text-anchor="middle" class="mono" fill="#10B981">SYS.V_$SESSION</text>
  <text x="400" y="241" text-anchor="middle" class="desc">View (뷰 객체, SYS 소유)</text>

  <!-- Branch to GV$ -->
  <rect x="600" y="206" width="180" height="44" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1.5" class="box"/>
  <text x="690" y="225" text-anchor="middle" class="mono" fill="#F59E0B">SYS.GV_$SESSION</text>
  <text x="690" y="241" text-anchor="middle" class="desc">Global View (RAC 전체)</text>
  <line x1="580" y1="228" x2="600" y2="228" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="590" y="220" class="small-mono" fill="#F59E0B">필터</text>

  <line x1="400" y1="250" x2="400" y2="270" class="arrow"/>

  <!-- Layer 4: Fixed View -->
  <rect x="220" y="274" width="360" height="44" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="2" class="box"/>
  <text x="400" y="293" text-anchor="middle" class="mono" fill="#6F6BEA">V$SESSION (Fixed View)</text>
  <text x="400" y="309" text-anchor="middle" class="desc">고정 뷰 (V$FIXED_VIEW_DEFINITION에서 정의 조회)</text>

  <line x1="400" y1="318" x2="400" y2="338" class="arrow"/>

  <!-- Layer 5: Fixed Table -->
  <rect x="220" y="342" width="360" height="44" fill="#1E1F2E" stroke="#F43F5E" stroke-width="2" class="box"/>
  <text x="400" y="361" text-anchor="middle" class="mono" fill="#F43F5E">X$KSUSE (Fixed Table)</text>
  <text x="400" y="377" text-anchor="middle" class="desc">고정 테이블 — C 구조체 매핑, SYS만 접근</text>

  <line x1="400" y1="386" x2="400" y2="406" class="arrow"/>

  <!-- Layer 6: SGA Memory -->
  <rect x="180" y="410" width="440" height="50" fill="#6F6BEA" fill-opacity="0.1" stroke="#6F6BEA" stroke-width="2" class="box"/>
  <text x="400" y="433" text-anchor="middle" class="label" fill="#6F6BEA">SGA 메모리 내 커널 데이터 구조</text>
  <text x="400" y="450" text-anchor="middle" class="desc">SGA Memory Kernel Data Structures</text>

  <!-- Right side: Instance State access -->
  <rect x="30" y="480" width="740" height="85" fill="#1E1F2E" stroke="#2A2B3D" stroke-width="1" class="box"/>
  <text x="400" y="502" text-anchor="middle" class="label">인스턴스 상태별 V$ 뷰 접근 범위</text>
  <rect x="50" y="512" width="150" height="24" rx="4" fill="#F43F5E" opacity="0.15"/>
  <text x="125" y="528" text-anchor="middle" class="mono" fill="#F43F5E">NOMOUNT</text>
  <text x="210" y="528" class="small-mono" fill="#94A3B8">V$INSTANCE, V$SGA, V$PARAMETER</text>

  <rect x="50" y="538" width="200" height="24" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="150" y="554" text-anchor="middle" class="mono" fill="#F59E0B">MOUNT</text>
  <text x="260" y="554" class="small-mono" fill="#94A3B8">+ V$DATABASE, V$DATAFILE, V$LOGFILE</text>

  <rect x="500" y="512" width="230" height="24" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="615" y="528" text-anchor="middle" class="mono" fill="#10B981">OPEN</text>
  <text x="615" y="554" text-anchor="middle" class="small-mono" fill="#94A3B8">모든 V$ 뷰 접근 가능</text>
</svg>
