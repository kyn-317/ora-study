<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 10px; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #6F6BEA; stroke-width: 1.5; marker-end: url(#ah7); }
  </style>
  <defs>
    <marker id="ah7" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" class="title">세그먼트 어드바이저 분석 프로세스</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Segment Advisor Analysis Process</text>

  <!-- Input: Segment Analysis -->
  <rect x="30" y="75" width="200" height="100" fill="#1E1F2E" stroke="#3B82F6" stroke-width="2" class="box"/>
  <text x="130" y="98" text-anchor="middle" class="label" fill="#3B82F6">분석 대상</text>
  <text x="45" y="118" class="desc">테이블 (Table)</text>
  <text x="45" y="136" class="desc">인덱스 (Index)</text>
  <text x="45" y="154" class="desc">테이블스페이스 (Tablespace)</text>
  <text x="45" y="172" class="desc">파티션 (Partition)</text>

  <line x1="230" y1="125" x2="270" y2="125" class="arrow"/>

  <!-- Analysis Engine -->
  <rect x="270" y="70" width="260" height="110" fill="#1E1F2E" stroke="#F59E0B" stroke-width="2" class="box"/>
  <text x="400" y="93" text-anchor="middle" class="label" fill="#F59E0B">Segment Advisor 엔진</text>
  <text x="285" y="118" class="desc">공간 사용 분석:</text>
  <text x="285" y="135" class="mono" fill="#F59E0B">DBMS_SPACE.SPACE_USAGE (ASSM)</text>
  <text x="285" y="152" class="mono" fill="#F59E0B">DBMS_SPACE.UNUSED_SPACE</text>
  <text x="285" y="170" class="desc">HWM 위치 vs 실제 데이터 분석</text>

  <line x1="530" y1="125" x2="570" y2="125" class="arrow"/>

  <!-- Recommendations -->
  <rect x="570" y="75" width="200" height="100" fill="#1E1F2E" stroke="#10B981" stroke-width="2" class="box"/>
  <text x="670" y="98" text-anchor="middle" class="label" fill="#10B981">권고 사항</text>
  <text x="585" y="118" class="desc">Shrink (온라인 축소)</text>
  <text x="585" y="136" class="desc">Compress (압축)</text>
  <text x="585" y="154" class="desc">Move (재구성)</text>
  <text x="585" y="172" class="desc">Deallocate (공간 해제)</text>

  <!-- Space Waste Concept -->
  <rect x="30" y="200" width="740" height="90" fill="#1E1F2E" stroke="#F43F5E" stroke-width="1.5" class="box"/>
  <text x="400" y="223" text-anchor="middle" class="label" fill="#F43F5E">공간 낭비 (Reclaimable Space) 개념도</text>

  <!-- HWM visualization -->
  <rect x="60" y="240" width="500" height="30" rx="4" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="1"/>
  <rect x="60" y="240" width="250" height="30" rx="4" fill="#3B82F6" opacity="0.3"/>
  <text x="185" y="260" text-anchor="middle" class="desc" fill="#E2E8F0">실제 데이터 (Used)</text>
  <text x="435" y="260" text-anchor="middle" class="desc" fill="#F43F5E">회수 가능 공간 (Reclaimable)</text>
  <line x1="310" y1="235" x2="310" y2="275" stroke="#F43F5E" stroke-width="2"/>
  <text x="310" y="232" text-anchor="middle" class="mono" fill="#F43F5E">실제 데이터 끝</text>
  <line x1="560" y1="235" x2="560" y2="275" stroke="#F59E0B" stroke-width="2"/>
  <text x="560" y="232" text-anchor="middle" class="mono" fill="#F59E0B">HWM</text>

  <text x="600" y="250" class="desc">DELETE 후</text>
  <text x="600" y="265" class="desc">HWM은 내려가지 않음</text>
  <text x="600" y="280" class="desc">→ Shrink 필요</text>

  <!-- Growth Trend -->
  <rect x="30" y="310" width="740" height="75" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="1" class="box"/>
  <text x="400" y="333" text-anchor="middle" class="label" fill="#6F6BEA">세그먼트 성장 추이 분석 (DBA_HIST_SEG_STAT)</text>
  <text x="50" y="355" class="desc">자동 실행: auto space advisor (유지 관리 윈도우 내) / 수동 실행: DBMS_ADVISOR.CREATE_TASK('Segment Advisor')</text>
  <text x="50" y="373" class="desc">조회 뷰: DBA_ADVISOR_FINDINGS, DBA_ADVISOR_RECOMMENDATIONS / 성장 추이: DBA_HIST_SEG_STAT (AWR 기반)</text>
</svg>
