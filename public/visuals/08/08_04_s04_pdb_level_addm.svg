<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="32" text-anchor="middle" class="title">CDB vs PDB 레벨 ADDM 비교</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">CDB-Level vs PDB-Level ADDM Comparison (Oracle 26ai)</text>

  <!-- CDB Level ADDM -->
  <rect x="30" y="75" width="355" height="200" fill="#f3efe4" stroke="#4a2e78" stroke-width="2" class="box"/>
  <rect x="30" y="75" width="355" height="32" fill="#4a2e78" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="207" y="96" text-anchor="middle" class="label" fill="#4a2e78">CDB 레벨 ADDM</text>

  <text x="50" y="128" class="desc">분석 범위:</text>
  <text x="160" y="128" class="mono" fill="#4a2e78">CDB 전체 워크로드</text>
  <text x="50" y="148" class="desc">AWR 소스:</text>
  <text x="160" y="148" class="mono" fill="#4a2e78">CDB$ROOT AWR</text>
  <text x="50" y="168" class="desc">Finding 범위:</text>
  <text x="160" y="168" class="desc">전체 인스턴스 성능</text>
  <text x="50" y="188" class="desc">권장 사항:</text>
  <text x="160" y="188" class="desc">인스턴스 레벨 구성 포함</text>
  <text x="50" y="208" class="desc">MMON 동작:</text>
  <text x="160" y="208" class="desc">CDB 루트에서 실행</text>
  <text x="50" y="228" class="desc">결과 저장:</text>
  <text x="160" y="228" class="desc">CDB 루트 AWR</text>
  <text x="50" y="248" class="desc">조회:</text>
  <text x="160" y="248" class="desc">EM CDB 홈에서 조회</text>
  <text x="50" y="268" class="desc">SGA/CPU:</text>
  <text x="160" y="268" class="desc">공유 자원 병목 분석 가능</text>

  <!-- PDB Level ADDM -->
  <rect x="415" y="75" width="355" height="200" fill="#f3efe4" stroke="#8a5a10" stroke-width="2" class="box"/>
  <rect x="415" y="75" width="355" height="32" fill="#8a5a10" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="592" y="96" text-anchor="middle" class="label" fill="#8a5a10">PDB 레벨 ADDM</text>

  <text x="435" y="128" class="desc">분석 범위:</text>
  <text x="545" y="128" class="mono" fill="#8a5a10">해당 PDB 워크로드만</text>
  <text x="435" y="148" class="desc">AWR 소스:</text>
  <text x="545" y="148" class="mono" fill="#8a5a10">PDB 로컬 AWR</text>
  <text x="435" y="168" class="desc">Finding 범위:</text>
  <text x="545" y="168" class="desc">PDB 특정 성능</text>
  <text x="435" y="188" class="desc">권장 사항:</text>
  <text x="545" y="188" class="desc">PDB 변경 가능 항목만</text>
  <text x="435" y="208" class="desc">MMON 동작:</text>
  <text x="545" y="208" class="desc">PDB 컨텍스트 전환 실행</text>
  <text x="435" y="228" class="desc">결과 저장:</text>
  <text x="545" y="228" class="desc">PDB 로컬 AWR</text>
  <text x="435" y="248" class="desc">조회:</text>
  <text x="545" y="248" class="desc">EM PDB 홈에서 조회</text>
  <text x="435" y="268" class="desc">SGA/CPU:</text>
  <text x="545" y="268" class="desc" fill="#be123c">공유 자원 분석 제한적</text>

  <!-- Version Timeline -->
  <rect x="30" y="295" width="740" height="55" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1.5" class="box"/>
  <text x="400" y="318" text-anchor="middle" class="label" fill="#2f6a1c">Oracle 버전별 PDB AWR/ADDM 지원 변화</text>
  
  <line x1="60" y1="340" x2="740" y2="340" stroke="#f3efe4" stroke-width="2"/>
  <circle cx="120" cy="340" r="5" fill="#be123c"/>
  <text x="120" y="332" text-anchor="middle" class="mono" fill="#be123c">12c</text>
  <text x="120" y="345" text-anchor="middle" class="desc" dy="6">미지원</text>

  <circle cx="280" cy="340" r="5" fill="#8a5a10"/>
  <text x="280" y="332" text-anchor="middle" class="mono" fill="#8a5a10">18c~19c</text>
  <text x="280" y="345" text-anchor="middle" class="desc" dy="6">수동 활성화</text>

  <circle cx="440" cy="340" r="5" fill="#8a5a10"/>
  <text x="440" y="332" text-anchor="middle" class="mono" fill="#8a5a10">21c</text>
  <text x="440" y="345" text-anchor="middle" class="desc" dy="6">수동 활성화</text>

  <circle cx="620" cy="340" r="5" fill="#2f6a1c"/>
  <text x="620" y="332" text-anchor="middle" class="mono" fill="#2f6a1c">23ai/26ai</text>
  <text x="620" y="345" text-anchor="middle" class="desc" dy="6">자동 활성화</text>

  <!-- Key Parameter -->
  <rect x="30" y="368" width="740" height="58" fill="#f3efe4" stroke="#f3efe4" stroke-width="1" class="box"/>
  <text x="50" y="393" class="label" fill="#2f6a1c">핵심 파라미터</text>
  <text x="210" y="393" class="mono" fill="#2f6a1c">AWR_PDB_AUTOFLUSH_ENABLED</text>
  <text x="50" y="415" class="desc">Oracle 26ai 기본값: TRUE → PDB 레벨 AWR 및 ADDM 자동 활성화 / 21c 이하: FALSE (수동 설정 필요)</text>
</svg>
