<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="32" text-anchor="middle" class="title">CDB vs PDB 레벨 ADDM 비교</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">CDB-Level vs PDB-Level ADDM Comparison (Oracle 26ai)</text>

  <!-- CDB Level ADDM -->
  <rect x="30" y="75" width="355" height="200" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="2" class="box"/>
  <rect x="30" y="75" width="355" height="32" fill="#6F6BEA" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="207" y="96" text-anchor="middle" class="label" fill="#6F6BEA">CDB 레벨 ADDM</text>

  <text x="50" y="128" class="desc">분석 범위:</text>
  <text x="160" y="128" class="mono" fill="#6F6BEA">CDB 전체 워크로드</text>
  <text x="50" y="148" class="desc">AWR 소스:</text>
  <text x="160" y="148" class="mono" fill="#6F6BEA">CDB$ROOT AWR</text>
  <text x="50" y="168" class="desc">Finding 범위:</text>
  <text x="160" y="168" class="desc">전체 인스턴스 성능</text>
  <text x="50" y="188" class="desc">권장 사항:</text>
  <text x="160" y="188" class="desc">인스턴스 레벨 구성 포함</text>
  <text x="50" y="208" class="desc">MMON 동작:</text>
  <text x="160" y="208" class="desc">CDB 루트에서 실행</text>
  <text x="50" y="228" class="desc">결과 저장:</text>
  <text x="160" y="228" class="desc">CDB 루트 AWR</text>
  <text x="50" y="248" class="desc">조회:</text>
  <text x="160" y="248" class="desc">EM CDB 홈에서 조회</text>
  <text x="50" y="268" class="desc">SGA/CPU:</text>
  <text x="160" y="268" class="desc">공유 자원 병목 분석 가능</text>

  <!-- PDB Level ADDM -->
  <rect x="415" y="75" width="355" height="200" fill="#1E1F2E" stroke="#F59E0B" stroke-width="2" class="box"/>
  <rect x="415" y="75" width="355" height="32" fill="#F59E0B" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="592" y="96" text-anchor="middle" class="label" fill="#F59E0B">PDB 레벨 ADDM</text>

  <text x="435" y="128" class="desc">분석 범위:</text>
  <text x="545" y="128" class="mono" fill="#F59E0B">해당 PDB 워크로드만</text>
  <text x="435" y="148" class="desc">AWR 소스:</text>
  <text x="545" y="148" class="mono" fill="#F59E0B">PDB 로컬 AWR</text>
  <text x="435" y="168" class="desc">Finding 범위:</text>
  <text x="545" y="168" class="desc">PDB 특정 성능</text>
  <text x="435" y="188" class="desc">권장 사항:</text>
  <text x="545" y="188" class="desc">PDB 변경 가능 항목만</text>
  <text x="435" y="208" class="desc">MMON 동작:</text>
  <text x="545" y="208" class="desc">PDB 컨텍스트 전환 실행</text>
  <text x="435" y="228" class="desc">결과 저장:</text>
  <text x="545" y="228" class="desc">PDB 로컬 AWR</text>
  <text x="435" y="248" class="desc">조회:</text>
  <text x="545" y="248" class="desc">EM PDB 홈에서 조회</text>
  <text x="435" y="268" class="desc">SGA/CPU:</text>
  <text x="545" y="268" class="desc" fill="#F43F5E">공유 자원 분석 제한적</text>

  <!-- Version Timeline -->
  <rect x="30" y="295" width="740" height="55" fill="#1E1F2E" stroke="#10B981" stroke-width="1.5" class="box"/>
  <text x="400" y="318" text-anchor="middle" class="label" fill="#10B981">Oracle 버전별 PDB AWR/ADDM 지원 변화</text>
  
  <line x1="60" y1="340" x2="740" y2="340" stroke="#2A2B3D" stroke-width="2"/>
  <circle cx="120" cy="340" r="5" fill="#F43F5E"/>
  <text x="120" y="332" text-anchor="middle" class="mono" fill="#F43F5E">12c</text>
  <text x="120" y="345" text-anchor="middle" class="desc" dy="6">미지원</text>

  <circle cx="280" cy="340" r="5" fill="#F59E0B"/>
  <text x="280" y="332" text-anchor="middle" class="mono" fill="#F59E0B">18c~19c</text>
  <text x="280" y="345" text-anchor="middle" class="desc" dy="6">수동 활성화</text>

  <circle cx="440" cy="340" r="5" fill="#F59E0B"/>
  <text x="440" y="332" text-anchor="middle" class="mono" fill="#F59E0B">21c</text>
  <text x="440" y="345" text-anchor="middle" class="desc" dy="6">수동 활성화</text>

  <circle cx="620" cy="340" r="5" fill="#10B981"/>
  <text x="620" y="332" text-anchor="middle" class="mono" fill="#10B981">23ai/26ai</text>
  <text x="620" y="345" text-anchor="middle" class="desc" dy="6">자동 활성화</text>

  <!-- Key Parameter -->
  <rect x="30" y="368" width="740" height="58" fill="#1E1F2E" stroke="#2A2B3D" stroke-width="1" class="box"/>
  <text x="50" y="393" class="label" fill="#10B981">핵심 파라미터</text>
  <text x="210" y="393" class="mono" fill="#10B981">AWR_PDB_AUTOFLUSH_ENABLED</text>
  <text x="50" y="415" class="desc">Oracle 26ai 기본값: TRUE → PDB 레벨 AWR 및 ADDM 자동 활성화 / 21c 이하: FALSE (수동 설정 필요)</text>
</svg>
