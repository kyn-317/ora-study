<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <defs>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2456a8"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2f6a1c"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#be123c"/>
    </marker>
    <marker id="arrY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a5a10"/>
    </marker>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a2e78"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">UNDO 데이터 동작 흐름</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">UNDO Data Flow — Rollback, Read Consistency, Recovery</text>

  <!-- Step 1: User DML -->
  <rect x="30" y="75" width="170" height="55" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <text x="115" y="98" text-anchor="middle" class="label" fill="#2456a8">1. DML 실행</text>
  <text x="115" y="118" text-anchor="middle" class="code">UPDATE emp SET sal=5000</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="102" x2="260" y2="102" stroke="#2456a8" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- Step 2: Before Image to UNDO -->
  <rect x="260" y="75" width="200" height="55" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="360" y="98" text-anchor="middle" class="label" fill="#4a2e78">2. Before Image 저장</text>
  <text x="360" y="118" text-anchor="middle" class="sublabel">이전 값(sal=3000) → UNDO 세그먼트</text>

  <!-- Arrow 2→3 -->
  <line x1="460" y1="102" x2="520" y2="102" stroke="#4a2e78" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- Step 3: Redo for UNDO -->
  <rect x="520" y="75" width="240" height="55" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="640" y="98" text-anchor="middle" class="label" fill="#8a5a10">3. UNDO의 Redo 기록</text>
  <text x="640" y="118" text-anchor="middle" class="sublabel">UNDO 변경도 Redo Log에 기록</text>

  <!-- Step 4: Data Block Change -->
  <rect x="30" y="165" width="200" height="55" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="130" y="188" text-anchor="middle" class="label" fill="#2f6a1c">4. 데이터 블록 변경</text>
  <text x="130" y="208" text-anchor="middle" class="sublabel">Buffer Cache에서 sal=5000으로 변경</text>

  <!-- Branching: COMMIT or ROLLBACK -->
  <rect x="300" y="165" width="200" height="55" class="box" fill="rgba(42,42,42,0.05)" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="400" y="192" text-anchor="middle" class="label">5. COMMIT 또는 ROLLBACK?</text>

  <!-- Arrow 4→5 -->
  <line x1="230" y1="192" x2="298" y2="192" stroke="#2f6a1c" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- COMMIT path -->
  <line x1="400" y1="220" x2="200" y2="275" stroke="#2f6a1c" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="270" y="258" class="sublabel" fill="#2f6a1c">COMMIT</text>

  <rect x="50" y="275" width="300" height="80" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.2"/>
  <text x="200" y="298" text-anchor="middle" class="label" fill="#2f6a1c">COMMIT 경로</text>
  <text x="200" y="318" text-anchor="middle" class="sublabel">변경 확정 — UNDO는 즉시 삭제되지 않음</text>
  <text x="200" y="338" text-anchor="middle" class="code">UNDO_RETENTION(기본 900초) 동안 보존</text>

  <!-- ROLLBACK path -->
  <line x1="400" y1="220" x2="600" y2="275" stroke="#be123c" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="530" y="258" class="sublabel" fill="#be123c">ROLLBACK</text>

  <rect x="450" y="275" width="310" height="80" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.2"/>
  <text x="605" y="298" text-anchor="middle" class="label" fill="#be123c">ROLLBACK 경로</text>
  <text x="605" y="318" text-anchor="middle" class="sublabel">UNDO 데이터로 원래 상태 복원</text>
  <text x="605" y="338" text-anchor="middle" class="code">sal=3000으로 되돌림</text>

  <!-- Read Consistency Section -->
  <rect x="30" y="385" width="740" height="100" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.2"/>
  <text x="400" y="410" text-anchor="middle" class="label" fill="#2456a8">읽기 일관성 (Read Consistency) — Statement-Level</text>

  <!-- Session A -->
  <rect x="55" y="420" width="220" height="50" rx="6" ry="6" fill="#f5d0d0" stroke="#be123c" stroke-width="0.8"/>
  <text x="165" y="440" text-anchor="middle" class="sublabel" fill="#be123c">Session A: UPDATE sal=5000</text>
  <text x="165" y="458" text-anchor="middle" class="small" fill="#be123c">(COMMIT 전)</text>

  <!-- Arrow -->
  <line x1="275" y1="445" x2="340" y2="445" stroke="#4a2e78" stroke-width="2" marker-end="url(#arrP)"/>
  <text x="305" y="438" text-anchor="middle" class="small" fill="#4a2e78">UNDO</text>

  <!-- UNDO provides CR copy -->
  <rect x="340" y="420" width="160" height="50" rx="6" ry="6" fill="#d8cfe5" stroke="#4a2e78" stroke-width="0.8"/>
  <text x="420" y="440" text-anchor="middle" class="sublabel" fill="#4a2e78">UNDO 세그먼트</text>
  <text x="420" y="458" text-anchor="middle" class="code">Before Image: sal=3000</text>

  <!-- Arrow -->
  <line x1="500" y1="445" x2="545" y2="445" stroke="#2f6a1c" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="520" y="438" text-anchor="middle" class="small" fill="#2f6a1c">CR Copy</text>

  <!-- Session B -->
  <rect x="545" y="420" width="210" height="50" rx="6" ry="6" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="0.8"/>
  <text x="650" y="440" text-anchor="middle" class="sublabel" fill="#2f6a1c">Session B: SELECT sal → 3000</text>
  <text x="650" y="458" text-anchor="middle" class="small" fill="#2f6a1c">일관된 읽기 보장</text>

  <!-- UNDO Data States -->
  <rect x="30" y="510" width="740" height="100" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1"/>
  <text x="400" y="535" text-anchor="middle" class="label">UNDO 데이터 상태 전이 (UNDO Data State Transition)</text>

  <!-- ACTIVE -->
  <rect x="70" y="550" width="160" height="40" rx="6" ry="6" fill="#f5d0d0" stroke="#be123c" stroke-width="1.2"/>
  <text x="150" y="568" text-anchor="middle" class="sublabel" fill="#be123c">ACTIVE</text>
  <text x="150" y="583" text-anchor="middle" class="small" fill="#be123c">활성 트랜잭션 — 삭제 불가</text>

  <!-- Arrow -->
  <line x1="230" y1="570" x2="285" y2="570" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="255" y="562" text-anchor="middle" class="small">COMMIT</text>

  <!-- UNEXPIRED -->
  <rect x="285" y="550" width="190" height="40" rx="6" ry="6" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.2"/>
  <text x="380" y="568" text-anchor="middle" class="sublabel" fill="#8a5a10">UNEXPIRED</text>
  <text x="380" y="583" text-anchor="middle" class="small" fill="#8a5a10">보존 기간 중 — 가능하면 보존</text>

  <!-- Arrow -->
  <line x1="475" y1="570" x2="530" y2="570" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="500" y="562" text-anchor="middle" class="small">시간 경과</text>

  <!-- EXPIRED -->
  <rect x="530" y="550" width="190" height="40" rx="6" ry="6" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.2"/>
  <text x="625" y="568" text-anchor="middle" class="sublabel" fill="#2f6a1c">EXPIRED</text>
  <text x="625" y="583" text-anchor="middle" class="small" fill="#2f6a1c">보존 기간 만료 — 덮어쓰기 가능</text>
</svg>