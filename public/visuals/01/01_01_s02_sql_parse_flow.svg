<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 660">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6a1c" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#be123c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">SQL Processing Flow: Hard Parse vs Soft Parse</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">SQL 처리 흐름 — 구문 분석부터 실행 계획 생성까지</text>

  <!-- Step 1: SQL Submitted -->
  <rect x="310" y="70" width="180" height="40" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" />
  <text x="400" y="95" text-anchor="middle" class="label" fill="#4a2e78">SQL 문장 제출</text>

  <line x1="400" y1="110" x2="400" y2="135" stroke="#4a2e78" stroke-width="1.5" marker-end="url(#ah)" />

  <!-- Step 2: Syntax Check -->
  <rect x="310" y="135" width="180" height="45" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5" />
  <text x="400" y="155" text-anchor="middle" class="sublabel">1. Syntax Check</text>
  <text x="400" y="172" text-anchor="middle" class="small">구문 분석 (문법 검사)</text>

  <line x1="400" y1="180" x2="400" y2="205" stroke="#4a2e78" stroke-width="1.5" marker-end="url(#ah)" />

  <!-- Step 3: Semantic Check -->
  <rect x="310" y="205" width="180" height="45" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5" />
  <text x="400" y="225" text-anchor="middle" class="sublabel">2. Semantic Check</text>
  <text x="400" y="242" text-anchor="middle" class="small">의미 분석 (객체/권한 확인)</text>

  <!-- Data Dictionary Cache reference -->
  <line x1="490" y1="228" x2="565" y2="228" stroke="#8a5a10" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ah)" />
  <rect x="565" y="210" width="160" height="35" rx="6" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="645" y="232" text-anchor="middle" class="small" fill="#8a5a10">Data Dictionary Cache</text>

  <line x1="400" y1="250" x2="400" y2="275" stroke="#4a2e78" stroke-width="1.5" marker-end="url(#ah)" />

  <!-- Step 4: Shared Pool Check (Decision Diamond) -->
  <polygon points="400,275 510,315 400,355 290,315" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" />
  <text x="400" y="312" text-anchor="middle" class="sublabel">3. Library Cache</text>
  <text x="400" y="328" text-anchor="middle" class="small">동일 SQL 존재?</text>

  <!-- Soft Parse path (YES - left) -->
  <line x1="290" y1="315" x2="175" y2="315" stroke="#2f6a1c" stroke-width="1.5" marker-end="url(#ah-green)" />
  <text x="235" y="305" text-anchor="middle" class="sublabel" fill="#2f6a1c">YES</text>

  <rect x="50" y="290" width="125" height="50" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="112" y="312" text-anchor="middle" class="label" fill="#2f6a1c">Soft Parse</text>
  <text x="112" y="330" text-anchor="middle" class="small">실행 계획 재사용</text>

  <!-- Soft Parse arrow down to execution (drawn BEFORE tips box so box covers it) -->
  <line x1="112" y1="340" x2="112" y2="533" stroke="#2f6a1c" stroke-width="1.5" marker-end="url(#ah-green)" />

  <!-- Optimization tips box (opaque bg, covers the arrow behind it) -->
  <rect x="35" y="357" width="245" height="124" class="box" fill="#faf8f3" stroke="#2f6a1c" stroke-width="1" />
  <text x="58" y="376" class="sublabel" fill="#2f6a1c">Hard Parse 줄이는 방법</text>
  <text x="58" y="396" class="small">1. 바인드 변수(Bind Variable) 사용</text>
  <text x="58" y="413" class="code">WHERE id = :emp_id</text>
  <text x="58" y="433" class="small">2. CURSOR_SHARING = FORCE</text>
  <text x="73" y="448" class="small">리터럴 → 바인드 변수 자동 치환</text>
  <text x="58" y="463" class="small">3. 표준 SQL 코딩 규칙 적용</text>

  <!-- Hard Parse path (NO - down) -->
  <line x1="400" y1="355" x2="400" y2="393" stroke="#be123c" stroke-width="1.5" marker-end="url(#ah-red)" />
  <text x="418" y="375" class="sublabel" fill="#be123c">NO</text>

  <!-- Hard Parse label -->
  <rect x="545" y="365" width="125" height="35" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="607" y="387" text-anchor="middle" class="label" fill="#be123c">Hard Parse</text>
  <line x1="540" y1="382" x2="495" y2="382" stroke="#be123c" stroke-width="1" stroke-dasharray="4,3" />

  <!-- Step 5: Optimization -->
  <rect x="310" y="393" width="180" height="42" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="400" y="412" text-anchor="middle" class="sublabel">4. Optimization</text>
  <text x="400" y="428" text-anchor="middle" class="small">CBO 최적 실행 계획 생성</text>

  <line x1="400" y1="435" x2="400" y2="463" stroke="#be123c" stroke-width="1.5" marker-end="url(#ah-red)" />

  <!-- Step 6: Row Source Generation -->
  <rect x="310" y="463" width="180" height="42" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="400" y="482" text-anchor="middle" class="sublabel">5. Row Source Generation</text>
  <text x="400" y="498" text-anchor="middle" class="small">행 소스 트리 변환</text>

  <line x1="400" y1="505" x2="400" y2="533" stroke="#4a2e78" stroke-width="1.5" marker-end="url(#ah)" />

  <!-- Execution -->
  <rect x="100" y="533" width="500" height="40" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" />
  <text x="350" y="558" text-anchor="middle" class="label" fill="#4a2e78">SQL Execution (SQL 실행)</text>

  <!-- === Bottom info area (below main flow, no overlap) === -->

  <!-- Cost comparison box -->
  <rect x="100" y="595" width="220" height="55" rx="6" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1" />
  <text x="120" y="614" class="sublabel">비용 비교 (Cost)</text>
  <rect x="120" y="624" width="100" height="10" rx="2" fill="#f5d0d0" />
  <text x="230" y="633" class="small" fill="#be123c">Hard Parse</text>
  <rect x="120" y="639" width="25" height="10" rx="2" fill="#cfe1b8" />
  <text x="230" y="648" class="small" fill="#2f6a1c">Soft Parse</text>

  <!-- Color Legend -->
  <rect x="380" y="595" width="220" height="55" rx="6" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1" />
  <text x="400" y="614" class="sublabel">화살표 색상 범례</text>
  <line x1="400" y1="628" x2="425" y2="628" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="432" y="632" class="small" fill="#2f6a1c">Soft Parse 경로</text>
  <line x1="400" y1="644" x2="425" y2="644" stroke="#be123c" stroke-width="1.5" />
  <text x="432" y="648" class="small" fill="#be123c">Hard Parse 경로</text>
</svg>
