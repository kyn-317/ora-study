<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2456a8" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#be123c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Redo Log Buffer: Circular Buffer + LGWR</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">리두 로그 버퍼 순환 구조와 LGWR 기록 조건</text>

  <!-- === Circular Buffer Visualization === -->
  <rect x="30" y="65" width="380" height="340" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5" />
  <text x="50" y="88" class="label" fill="#2456a8">Redo Log Buffer (Circular)</text>
  <text x="50" y="106" class="code">LOG_BUFFER</text>

  <!-- Circular buffer ring -->
  <circle cx="220" cy="240" r="110" fill="none" stroke="#f3efe4" stroke-width="20" />

  <!-- Used portion (arc segments) -->
  <!-- Filled segments representing redo entries -->
  <path d="M 220 130 A 110 110 0 0 1 320 190" fill="none" stroke="#f5d0d0" stroke-width="18" />
  <path d="M 320 190 A 110 110 0 0 1 330 240" fill="none" stroke="#f5d0d0" stroke-width="18" />

  <!-- Written to disk (already flushed) -->
  <path d="M 160 330 A 110 110 0 0 1 220 130" fill="none" stroke="#cfe1b8" stroke-width="18" />

  <!-- Free space -->
  <path d="M 330 240 A 110 110 0 0 1 160 330" fill="none" stroke="rgba(42,42,42,0.05)" stroke-width="18" />

  <!-- Write pointer (server process) -->
  <circle cx="330" cy="240" r="6" fill="#be123c" />
  <text x="348" y="235" class="small" fill="#be123c">Write Ptr</text>
  <text x="348" y="250" class="small" fill="#be123c">(서버 프로세스)</text>

  <!-- LGWR read pointer -->
  <circle cx="160" cy="330" r="6" fill="#2f6a1c" />
  <text x="80" y="345" class="small" fill="#2f6a1c">LGWR Ptr</text>

  <!-- Center label -->
  <text x="220" y="235" text-anchor="middle" class="sublabel">순환 버퍼</text>
  <text x="220" y="252" text-anchor="middle" class="small">Circular Buffer</text>

  <!-- Legend for circular buffer -->
  <rect x="50" y="370" width="12" height="12" rx="2" fill="#f5d0d0" />
  <text x="68" y="381" class="small">미기록 Redo Entry</text>
  <rect x="200" y="370" width="12" height="12" rx="2" fill="#cfe1b8" />
  <text x="218" y="381" class="small">기록 완료 (재사용 가능)</text>

  <!-- === Server Process writing === -->
  <rect x="50" y="125" width="100" height="35" rx="6" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="100" y="147" text-anchor="middle" class="small">Server Process</text>
  <line x1="150" y1="142" x2="210" y2="142" stroke="#4a2e78" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah)" />

  <!-- === LGWR Trigger Conditions === -->
  <rect x="430" y="65" width="340" height="280" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="450" y="90" class="label" fill="#be123c">LGWR Flush Conditions</text>
  <text x="450" y="108" class="small">LGWR이 디스크에 기록하는 5가지 조건</text>

  <!-- Condition 1 -->
  <rect x="450" y="120" width="300" height="35" rx="6" fill="#f5d0d0" stroke="#be123c" stroke-width="1" />
  <text x="460" y="137" class="sublabel" fill="#be123c">1</text>
  <text x="480" y="137" class="sublabel">COMMIT 발생</text>
  <text x="480" y="150" class="small">Log Force at Commit — 트랜잭션 보장</text>

  <!-- Condition 2 -->
  <rect x="450" y="165" width="300" height="35" rx="6" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="460" y="182" class="sublabel" fill="#8a5a10">2</text>
  <text x="480" y="182" class="sublabel">버퍼 1/3 이상 사용</text>
  <text x="480" y="195" class="small">공간 부족 예방 임계값</text>

  <!-- Condition 3 -->
  <rect x="450" y="210" width="300" height="35" rx="6" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="460" y="227" class="sublabel" fill="#8a5a10">3</text>
  <text x="480" y="227" class="sublabel">3초마다 타이머</text>
  <text x="480" y="240" class="small">주기적 타이머 기반 기록</text>

  <!-- Condition 4 -->
  <rect x="450" y="255" width="300" height="35" rx="6" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="460" y="272" class="sublabel" fill="#2456a8">4</text>
  <text x="480" y="272" class="sublabel">DBWn 기록 전</text>
  <text x="480" y="285" class="small">Write-Ahead Logging 원칙 준수</text>

  <!-- Condition 5 -->
  <rect x="450" y="300" width="300" height="35" rx="6" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="460" y="317" class="sublabel" fill="#2456a8">5</text>
  <text x="480" y="317" class="sublabel">1MB 이상 Redo 축적</text>
  <text x="480" y="330" class="small">사이즈 기반 임계값</text>

  <!-- === Write-Ahead Logging === -->
  <rect x="30" y="415" width="740" height="130" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5" />
  <text x="50" y="440" class="label" fill="#8a5a10">Write-Ahead Logging (WAL) 원칙</text>

  <!-- WAL Flow -->
  <rect x="50" y="455" width="120" height="40" rx="6" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="110" y="478" text-anchor="middle" class="sublabel">DML 실행</text>

  <line x1="170" y1="475" x2="200" y2="475" stroke="#4a2e78" stroke-width="1.5" marker-end="url(#ah)" />

  <rect x="205" y="455" width="140" height="40" rx="6" fill="#f5d0d0" stroke="#be123c" stroke-width="1" />
  <text x="275" y="472" text-anchor="middle" class="sublabel">Redo Entry 생성</text>
  <text x="275" y="488" text-anchor="middle" class="small">→ Redo Log Buffer</text>

  <line x1="345" y1="475" x2="375" y2="475" stroke="#be123c" stroke-width="1.5" marker-end="url(#ah-red)" />

  <rect x="380" y="455" width="150" height="40" rx="6" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="455" y="472" text-anchor="middle" class="sublabel" fill="#2f6a1c">LGWR 디스크 기록</text>
  <text x="455" y="488" text-anchor="middle" class="small">→ Online Redo Log</text>

  <line x1="530" y1="475" x2="560" y2="475" stroke="#2f6a1c" stroke-width="1.5" />

  <rect x="565" y="455" width="130" height="40" rx="6" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="630" y="472" text-anchor="middle" class="sublabel">DBWn 기록</text>
  <text x="630" y="488" text-anchor="middle" class="small">→ Data File</text>

  <!-- Order labels -->
  <text x="120" y="510" text-anchor="middle" class="code">Step 1</text>
  <text x="275" y="510" text-anchor="middle" class="code">Step 2</text>
  <text x="455" y="510" text-anchor="middle" class="code">Step 3 (먼저!)</text>
  <text x="630" y="510" text-anchor="middle" class="code">Step 4 (나중)</text>

  <!-- Key note -->
  <text x="50" y="540" class="sublabel" fill="#8a5a10">핵심: Redo가 디스크에 먼저 기록 → 그 후에야 데이터 파일 변경 가능 (장애 복구 보장)</text>
</svg>