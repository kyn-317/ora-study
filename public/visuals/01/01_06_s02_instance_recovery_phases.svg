<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">인스턴스 복구 동작 단계 Instance Recovery Phases</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">SMON 프로세스에 의한 자동 복구: Roll Forward → Database OPEN → Roll Back</text>

  <!-- Timeline -->
  <line x1="60" y1="85" x2="740" y2="85" stroke="#2A2B3D" stroke-width="2"/>

  <!-- Crash point -->
  <circle cx="120" cy="85" r="8" fill="#F43F5E"/>
  <text x="120" y="75" text-anchor="middle" class="small" fill="#F43F5E">장애 발생</text>

  <!-- Restart point -->
  <circle cx="220" cy="85" r="8" fill="#3B82F6"/>
  <text x="220" y="75" text-anchor="middle" class="small" fill="#3B82F6">인스턴스 재시작</text>

  <!-- MOUNT -->
  <circle cx="340" cy="85" r="8" fill="#6F6BEA"/>
  <text x="340" y="75" text-anchor="middle" class="small" fill="#6F6BEA">MOUNT 단계</text>

  <!-- OPEN -->
  <circle cx="530" cy="85" r="8" fill="#10B981"/>
  <text x="530" y="75" text-anchor="middle" class="small" fill="#10B981">DB OPEN</text>

  <!-- Recovery complete -->
  <circle cx="700" cy="85" r="8" fill="#10B981"/>
  <text x="700" y="75" text-anchor="middle" class="small" fill="#10B981">복구 완료</text>

  <!-- Phase 1 bracket -->
  <rect x="310" y="95" width="200" height="8" fill="#3B82F6" fill-opacity="0.3" rx="4"/>
  <text x="410" y="118" text-anchor="middle" class="small" fill="#3B82F6">1단계: Roll Forward</text>

  <!-- Phase 2 bracket -->
  <rect x="510" y="95" width="220" height="8" fill="#F59E0B" fill-opacity="0.3" rx="4"/>
  <text x="620" y="118" text-anchor="middle" class="small" fill="#F59E0B">2단계: Roll Back</text>

  <!-- Phase 1: Roll Forward Detail -->
  <rect x="30" y="140" width="360" height="260" fill="#1E1E2E" stroke="#3B82F6" stroke-width="1.5" class="box"/>
  <rect x="30" y="140" width="360" height="30" fill="#3B82F6" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="210" y="160" text-anchor="middle" class="label" fill="#3B82F6">1단계: Roll Forward (Cache Recovery)</text>

  <!-- Roll Forward steps -->
  <rect x="50" y="182" width="320" height="28" fill="#2A2B3D" class="box"/>
  <text x="60" y="200" class="sublabel">1. Control File에서 마지막 Checkpoint SCN 확인</text>

  <line x1="210" y1="210" x2="210" y2="220" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="206,218 214,218 210,224" fill="#3B82F6"/>

  <rect x="50" y="226" width="320" height="28" fill="#2A2B3D" class="box"/>
  <text x="60" y="244" class="sublabel">2. Checkpoint SCN 이후의 Redo 레코드 읽기</text>

  <line x1="210" y1="254" x2="210" y2="264" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="206,262 214,262 210,268" fill="#3B82F6"/>

  <rect x="50" y="270" width="320" height="28" fill="#2A2B3D" class="box"/>
  <text x="60" y="288" class="sublabel">3. Redo를 데이터 파일에 순서대로 적용</text>

  <line x1="210" y1="298" x2="210" y2="308" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="206,306 214,306 210,312" fill="#3B82F6"/>

  <rect x="50" y="314" width="320" height="40" fill="#2A2B3D" class="box"/>
  <text x="60" y="332" class="sublabel">4. 커밋된 + 커밋되지 않은 트랜잭션 모두 적용</text>
  <text x="60" y="347" class="small">→ 데이터베이스가 장애 직전 상태로 복원</text>

  <rect x="50" y="365" width="320" height="24" fill="#3B82F6" fill-opacity="0.1" class="box"/>
  <text x="210" y="381" text-anchor="middle" class="code">Online Redo Log → Data Files</text>

  <!-- Phase 2: Roll Back Detail -->
  <rect x="410" y="140" width="360" height="260" fill="#1E1E2E" stroke="#F59E0B" stroke-width="1.5" class="box"/>
  <rect x="410" y="140" width="360" height="30" fill="#F59E0B" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="590" y="160" text-anchor="middle" class="label" fill="#F59E0B">2단계: Roll Back (Transaction Recovery)</text>

  <!-- Roll Back steps -->
  <rect x="430" y="182" width="320" height="28" fill="#2A2B3D" class="box"/>
  <text x="440" y="200" class="sublabel">1. 데이터베이스 OPEN 상태로 전환</text>

  <line x1="590" y1="210" x2="590" y2="220" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="586,218 594,218 590,224" fill="#F59E0B"/>

  <rect x="430" y="226" width="320" height="28" fill="#2A2B3D" class="box"/>
  <text x="440" y="244" class="sublabel">2. UNDO 세그먼트 스캔 → 미완료 트랜잭션 식별</text>

  <line x1="590" y1="254" x2="590" y2="264" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="586,262 594,262 590,268" fill="#F59E0B"/>

  <rect x="430" y="270" width="320" height="28" fill="#2A2B3D" class="box"/>
  <text x="440" y="288" class="sublabel">3. UNDO 데이터로 커밋 안 된 변경 되돌림</text>

  <line x1="590" y1="298" x2="590" y2="308" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="586,306 594,306 590,312" fill="#F59E0B"/>

  <rect x="430" y="314" width="320" height="40" fill="#2A2B3D" class="box"/>
  <text x="440" y="332" class="sublabel">4. 백그라운드에서 수행 (서비스 이미 재개)</text>
  <text x="440" y="347" class="small">→ 사용자 접근 시 on-demand 즉시 롤백</text>

  <rect x="430" y="365" width="320" height="24" fill="#F59E0B" fill-opacity="0.1" class="box"/>
  <text x="590" y="381" text-anchor="middle" class="code">UNDO Tablespace → 미커밋 트랜잭션 롤백</text>

  <!-- Key insight box -->
  <rect x="30" y="420" width="740" height="70" fill="#1E1E2E" stroke="#10B981" stroke-width="1.5" class="box"/>
  <text x="50" y="442" class="label" fill="#10B981">핵심 포인트 Key Insight</text>
  <text x="50" y="462" class="sublabel">Roll Forward는 MOUNT→OPEN 전환 시 수행 (사용자 접근 불가)</text>
  <text x="50" y="480" class="sublabel">Roll Back은 OPEN 후 백그라운드에서 수행 → 빠른 서비스 재개 가능</text>

  <!-- Bottom: Process info -->
  <rect x="30" y="505" width="740" height="55" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1" class="box"/>
  <text x="50" y="525" class="sublabel">담당 프로세스:</text>
  <text x="155" y="525" class="code">SMON (System Monitor)</text>
  <text x="370" y="525" class="sublabel">복구 판단 기준:</text>
  <text x="490" y="525" class="code">Checkpoint SCN vs 마지막 Redo SCN</text>
  <text x="50" y="548" class="small">인스턴스 복구 시간은 Roll Forward에서 적용해야 할 Redo 양에 비례 → FAST_START_MTTR_TARGET으로 제어</text>
</svg>