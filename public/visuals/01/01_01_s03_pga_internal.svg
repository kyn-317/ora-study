<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">PGA Internal Structure + SQL Work Area Modes</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">PGA 내부 구성 트리와 SQL 작업 영역의 3단계 동작 모드</text>

  <!-- === PGA Tree Structure === -->
  <rect x="30" y="65" width="380" height="370" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="50" y="90" class="label" fill="#2f6a1c">PGA (Program Global Area)</text>
  <text x="50" y="108" class="small">프로세스당 1개, 비공유(Private)</text>

  <!-- PGA root -->
  <rect x="120" y="120" width="200" height="30" rx="6" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="220" y="140" text-anchor="middle" class="sublabel" fill="#2f6a1c">PGA</text>

  <!-- Branch lines -->
  <line x1="220" y1="150" x2="220" y2="165" stroke="#2f6a1c" stroke-width="1" />
  <line x1="100" y1="165" x2="340" y2="165" stroke="#2f6a1c" stroke-width="1" />
  <line x1="100" y1="165" x2="100" y2="180" stroke="#2f6a1c" stroke-width="1" />
  <line x1="220" y1="165" x2="220" y2="180" stroke="#2f6a1c" stroke-width="1" />
  <line x1="340" y1="165" x2="340" y2="180" stroke="#2f6a1c" stroke-width="1" />

  <!-- Private SQL Area -->
  <rect x="50" y="182" width="100" height="30" rx="5" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="100" y="201" text-anchor="middle" class="small" fill="#2456a8">Private SQL</text>

  <!-- Sub-branches for Private SQL -->
  <line x1="100" y1="212" x2="100" y2="225" stroke="#2456a8" stroke-width="1" />
  <line x1="65" y1="225" x2="135" y2="225" stroke="#2456a8" stroke-width="1" />
  <line x1="65" y1="225" x2="65" y2="238" stroke="#2456a8" stroke-width="1" />
  <line x1="135" y1="225" x2="135" y2="238" stroke="#2456a8" stroke-width="1" />

  <rect x="43" y="240" width="45" height="50" rx="4" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="65" y="260" text-anchor="middle" class="small">Persist</text>
  <text x="65" y="275" text-anchor="middle" class="small">ent</text>
  <text x="65" y="300" class="small" fill="#787368" font-size="9">바인드 값</text>

  <rect x="113" y="240" width="45" height="50" rx="4" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="135" y="260" text-anchor="middle" class="small">Run</text>
  <text x="135" y="275" text-anchor="middle" class="small">time</text>
  <text x="113" y="300" class="small" fill="#787368" font-size="9">실행 상태</text>

  <!-- SQL Work Area -->
  <rect x="170" y="182" width="100" height="30" rx="5" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="220" y="201" text-anchor="middle" class="small" fill="#8a5a10">SQL Work</text>

  <!-- Sub-branches for Work Area -->
  <line x1="220" y1="212" x2="220" y2="225" stroke="#8a5a10" stroke-width="1" />
  <line x1="180" y1="225" x2="260" y2="225" stroke="#8a5a10" stroke-width="1" />
  <line x1="180" y1="225" x2="180" y2="238" stroke="#8a5a10" stroke-width="1" />
  <line x1="220" y1="225" x2="220" y2="238" stroke="#8a5a10" stroke-width="1" />
  <line x1="260" y1="225" x2="260" y2="238" stroke="#8a5a10" stroke-width="1" />

  <rect x="168" y="240" width="25" height="50" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="180" y="260" text-anchor="middle" class="small" font-size="9">Sort</text>

  <rect x="208" y="240" width="25" height="50" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="220" y="260" text-anchor="middle" class="small" font-size="9">Hash</text>

  <rect x="248" y="240" width="25" height="50" rx="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="260" y="260" text-anchor="middle" class="small" font-size="9">BM</text>

  <text x="170" y="305" class="small" fill="#787368" font-size="9">정렬/해시/비트맵</text>

  <!-- Session Memory -->
  <rect x="290" y="182" width="100" height="30" rx="5" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="340" y="201" text-anchor="middle" class="small" fill="#4a2e78">Session Mem</text>

  <rect x="295" y="230" width="90" height="70" rx="4" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="340" y="250" text-anchor="middle" class="small">로그인 정보</text>
  <text x="340" y="265" text-anchor="middle" class="small">세션 변수</text>
  <text x="340" y="280" text-anchor="middle" class="small">NLS 설정</text>
  <text x="340" y="295" text-anchor="middle" class="small">PL/SQL 변수</text>

  <!-- PGA Parameters -->
  <rect x="50" y="330" width="340" height="90" rx="6" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1" />
  <text x="70" y="350" class="sublabel">관련 파라미터</text>
  <text x="70" y="370" class="code">PGA_AGGREGATE_TARGET    전체 PGA 목표 크기</text>
  <text x="70" y="388" class="code">WORKAREA_SIZE_POLICY    AUTO(기본) / MANUAL</text>
  <text x="70" y="406" class="code">OPEN_CURSORS            세션당 최대 커서 수</text>

  <!-- === SQL Work Area Execution Modes === -->
  <rect x="430" y="65" width="340" height="370" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5" />
  <text x="450" y="90" class="label" fill="#8a5a10">SQL Work Area Execution Modes</text>
  <text x="450" y="108" class="small">작업 영역 크기에 따른 3단계 실행 모드</text>

  <!-- Optimal Mode -->
  <rect x="450" y="125" width="300" height="80" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="470" y="148" class="label" fill="#2f6a1c">Optimal (최적)</text>
  <text x="470" y="166" class="sublabel">전체 작업이 메모리 내에서 완료</text>
  <text x="470" y="184" class="small">디스크 I/O 없음 → 최고 성능</text>
  <!-- Performance bar -->
  <rect x="640" y="195" width="100" height="6" rx="3" fill="#2f6a1c" opacity="0.6" />

  <!-- One-pass Mode -->
  <rect x="450" y="220" width="300" height="80" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5" />
  <text x="470" y="243" class="label" fill="#8a5a10">One-pass (1회 디스크)</text>
  <text x="470" y="261" class="sublabel">메모리 초과 → 임시 디스크 1회 사용</text>
  <text x="470" y="279" class="small">Temp Tablespace 사용 → 중간 성능</text>
  <!-- Performance bar -->
  <rect x="640" y="290" width="60" height="6" rx="3" fill="#8a5a10" opacity="0.6" />

  <!-- Multi-pass Mode -->
  <rect x="450" y="315" width="300" height="80" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="470" y="338" class="label" fill="#be123c">Multi-pass (다회 디스크)</text>
  <text x="470" y="356" class="sublabel">메모리 매우 부족 → 디스크 여러 번 사용</text>
  <text x="470" y="374" class="small">심각한 성능 저하 → 반드시 회피</text>
  <!-- Performance bar -->
  <rect x="640" y="385" width="25" height="6" rx="3" fill="#be123c" opacity="0.6" />

  <text x="700" y="420" text-anchor="end" class="small">← 성능</text>

  <!-- Monitoring view -->
  <rect x="450" y="400" width="300" height="25" rx="4" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1" />
  <text x="600" y="417" text-anchor="middle" class="code">V$SQL_WORKAREA_HISTOGRAM</text>

  <!-- === Multiple PGA instances illustration === -->
  <rect x="30" y="450" width="740" height="95" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1" />
  <text x="50" y="475" class="label">PGA Instances (프로세스별 독립 할당)</text>

  <!-- Process 1 -->
  <rect x="60" y="490" width="110" height="40" rx="6" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="115" y="510" text-anchor="middle" class="small" fill="#2f6a1c">Server Proc 1</text>
  <text x="115" y="524" text-anchor="middle" class="small">PGA: 50MB</text>

  <!-- Process 2 -->
  <rect x="190" y="490" width="110" height="40" rx="6" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="245" y="510" text-anchor="middle" class="small" fill="#2f6a1c">Server Proc 2</text>
  <text x="245" y="524" text-anchor="middle" class="small">PGA: 120MB</text>

  <!-- Process 3 -->
  <rect x="320" y="490" width="110" height="40" rx="6" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="375" y="510" text-anchor="middle" class="small" fill="#2f6a1c">Server Proc 3</text>
  <text x="375" y="524" text-anchor="middle" class="small">PGA: 30MB</text>

  <!-- ... -->
  <text x="460" y="515" class="sublabel">...</text>

  <!-- BG Process -->
  <rect x="490" y="490" width="110" height="40" rx="6" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="545" y="510" text-anchor="middle" class="small" fill="#4a2e78">DBWn (BG)</text>
  <text x="545" y="524" text-anchor="middle" class="small">PGA: 10MB</text>

  <!-- Total -->
  <rect x="630" y="490" width="120" height="40" rx="6" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="690" y="507" text-anchor="middle" class="small" fill="#8a5a10">Total PGA</text>
  <text x="690" y="524" text-anchor="middle" class="code">PGA_AGGREGATE_TARGET</text>
</svg>