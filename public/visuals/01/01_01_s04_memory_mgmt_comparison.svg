<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F43F5E" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">Memory Management Comparison + Decision Flow</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">메모리 관리 방식 비교: AMM vs ASMM vs Manual + 판단 플로차트</text>

  <!-- === Three columns comparison === -->

  <!-- AMM -->
  <rect x="30" y="65" width="240" height="270" class="box" fill="rgba(16,185,129,0.06)" stroke="#10B981" stroke-width="2" />
  <text x="150" y="90" text-anchor="middle" class="label" fill="#10B981">AMM</text>
  <text x="150" y="108" text-anchor="middle" class="small">Automatic Memory Management</text>
  <text x="150" y="123" text-anchor="middle" class="small">자동 메모리 관리</text>

  <!-- AMM diagram -->
  <rect x="55" y="135" width="190" height="35" rx="6" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1.5" />
  <text x="150" y="157" text-anchor="middle" class="code">MEMORY_TARGET</text>

  <line x1="150" y1="170" x2="150" y2="185" stroke="#10B981" stroke-width="1.5" />
  <line x1="95" y1="185" x2="205" y2="185" stroke="#10B981" stroke-width="1" />
  <line x1="95" y1="185" x2="95" y2="195" stroke="#10B981" stroke-width="1" />
  <line x1="205" y1="185" x2="205" y2="195" stroke="#10B981" stroke-width="1" />

  <rect x="55" y="197" width="80" height="30" rx="5" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="1" />
  <text x="95" y="216" text-anchor="middle" class="small" fill="#6F6BEA">SGA</text>
  <rect x="145" y="197" width="80" height="30" rx="5" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1" />
  <text x="185" y="216" text-anchor="middle" class="small" fill="#3B82F6">PGA</text>

  <!-- Bidirectional arrow -->
  <line x1="125" y1="237" x2="155" y2="237" stroke="#10B981" stroke-width="1.5" />
  <polygon points="125,234 118,237 125,240" fill="#10B981" />
  <polygon points="155,234 162,237 155,240" fill="#10B981" />
  <text x="150" y="255" text-anchor="middle" class="small" fill="#10B981">자동 재분배</text>

  <text x="50" y="280" class="small">자동화: 최고</text>
  <text x="50" y="295" class="small">DBA 개입: 최소</text>
  <text x="50" y="310" class="small">SGA-PGA 재분배: 가능</text>
  <text x="50" y="325" class="small" fill="#10B981">Oracle 권장</text>

  <!-- ASMM -->
  <rect x="280" y="65" width="240" height="270" class="box" fill="rgba(59,130,246,0.06)" stroke="#3B82F6" stroke-width="2" />
  <text x="400" y="90" text-anchor="middle" class="label" fill="#3B82F6">ASMM</text>
  <text x="400" y="108" text-anchor="middle" class="small">Automatic Shared Memory Mgmt</text>
  <text x="400" y="123" text-anchor="middle" class="small">자동 공유 메모리 관리</text>

  <!-- ASMM diagram -->
  <rect x="305" y="135" width="90" height="35" rx="6" fill="rgba(111,107,234,0.12)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="350" y="157" text-anchor="middle" class="code">SGA_TARGET</text>
  <rect x="405" y="135" width="90" height="35" rx="6" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="450" y="150" text-anchor="middle" class="code" font-size="9">PGA_AGGREGATE</text>
  <text x="450" y="163" text-anchor="middle" class="code" font-size="9">_TARGET</text>

  <!-- SGA internal auto -->
  <rect x="300" y="185" width="100" height="50" rx="5" fill="rgba(111,107,234,0.08)" stroke="#6F6BEA" stroke-width="1" />
  <text x="350" y="205" text-anchor="middle" class="small" fill="#6F6BEA">SGA 내부</text>
  <text x="350" y="220" text-anchor="middle" class="small" fill="#6F6BEA">자동 조정</text>

  <!-- PGA separate auto -->
  <rect x="410" y="185" width="90" height="50" rx="5" fill="rgba(59,130,246,0.08)" stroke="#3B82F6" stroke-width="1" />
  <text x="455" y="205" text-anchor="middle" class="small" fill="#3B82F6">PGA</text>
  <text x="455" y="220" text-anchor="middle" class="small" fill="#3B82F6">별도 관리</text>

  <!-- X between SGA and PGA -->
  <text x="400" y="255" text-anchor="middle" class="label" fill="#F43F5E">X</text>
  <text x="400" y="270" text-anchor="middle" class="small" fill="#F43F5E">재분배 불가</text>

  <text x="300" y="290" class="small">자동화: 중간</text>
  <text x="300" y="305" class="small">DBA 개입: 부분적</text>
  <text x="300" y="320" class="small">SGA-PGA 재분배: 불가</text>
  <text x="300" y="335" class="small" fill="#3B82F6">SGA/PGA 비율 고정 시</text>

  <!-- Manual -->
  <rect x="530" y="65" width="240" height="270" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="2" />
  <text x="650" y="90" text-anchor="middle" class="label" fill="#F59E0B">Manual</text>
  <text x="650" y="108" text-anchor="middle" class="small">Manual Memory Management</text>
  <text x="650" y="123" text-anchor="middle" class="small">수동 메모리 관리</text>

  <!-- Manual - individual params -->
  <rect x="545" y="140" width="85" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="1" />
  <text x="587" y="155" text-anchor="middle" class="code" font-size="9">DB_CACHE_SIZE</text>
  <rect x="640" y="140" width="115" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="1" />
  <text x="697" y="155" text-anchor="middle" class="code" font-size="9">SHARED_POOL_SIZE</text>

  <rect x="545" y="168" width="85" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="1" />
  <text x="587" y="183" text-anchor="middle" class="code" font-size="9">LOG_BUFFER</text>
  <rect x="640" y="168" width="115" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="1" />
  <text x="697" y="183" text-anchor="middle" class="code" font-size="9">LARGE_POOL_SIZE</text>

  <rect x="545" y="196" width="85" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="1" />
  <text x="587" y="211" text-anchor="middle" class="code" font-size="9">SORT_AREA_SIZE</text>
  <rect x="640" y="196" width="115" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="1" />
  <text x="697" y="211" text-anchor="middle" class="code" font-size="9">HASH_AREA_SIZE</text>

  <text x="650" y="245" text-anchor="middle" class="small">모든 파라미터를</text>
  <text x="650" y="260" text-anchor="middle" class="small">DBA가 개별 지정</text>

  <text x="550" y="290" class="small">자동화: 없음</text>
  <text x="550" y="305" class="small">DBA 개입: 전면적</text>
  <text x="550" y="320" class="small">SGA-PGA 재분배: 불가</text>
  <text x="550" y="335" class="small" fill="#F59E0B">특수 환경/레거시</text>

  <!-- === Decision Flowchart === -->
  <rect x="30" y="350" width="740" height="215" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1" />
  <text x="50" y="375" class="label">Decision Flowchart (판단 플로차트)</text>

  <!-- Decision 1 -->
  <polygon points="200,400 310,430 200,460 90,430" fill="rgba(111,107,234,0.1)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="200" y="427" text-anchor="middle" class="code">MEMORY_TARGET</text>
  <text x="200" y="442" text-anchor="middle" class="small">&gt; 0 ?</text>

  <!-- YES to AMM -->
  <line x1="200" y1="400" x2="200" y2="385" stroke="#10B981" stroke-width="2" marker-end="url(#ah-green)" />
  <text x="215" y="394" class="small" fill="#10B981">YES</text>
  <rect x="150" y="378" width="100" height="0" rx="0" fill="none" />

  <rect x="140" y="358" width="120" height="25" rx="6" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5" />
  <text x="200" y="375" text-anchor="middle" class="sublabel" fill="#10B981">AMM</text>

  <!-- NO to Decision 2 -->
  <line x1="310" y1="430" x2="400" y2="430" stroke="#F43F5E" stroke-width="2" />
  <text x="340" y="423" class="small" fill="#F43F5E">NO</text>

  <!-- Decision 2 -->
  <polygon points="500,400 600,430 500,460 400,430" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="500" y="427" text-anchor="middle" class="code">SGA_TARGET</text>
  <text x="500" y="442" text-anchor="middle" class="small">&gt; 0 ?</text>

  <!-- YES to ASMM -->
  <line x1="500" y1="400" x2="500" y2="385" stroke="#10B981" stroke-width="2" marker-end="url(#ah-green)" />
  <text x="515" y="394" class="small" fill="#10B981">YES</text>

  <rect x="440" y="358" width="120" height="25" rx="6" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="500" y="375" text-anchor="middle" class="sublabel" fill="#3B82F6">ASMM</text>

  <!-- NO to Manual -->
  <line x1="600" y1="430" x2="660" y2="430" stroke="#F43F5E" stroke-width="2" marker-end="url(#ah-red)" />
  <text x="625" y="423" class="small" fill="#F43F5E">NO</text>

  <rect x="665" y="418" width="85" height="25" rx="6" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="707" y="435" text-anchor="middle" class="sublabel" fill="#F59E0B">Manual</text>

  <!-- Bottom note -->
  <text x="50" y="490" class="sublabel">ASMM에서 개별 파라미터 지정 시 → 해당 값이 최솟값(하한선)으로 작동</text>
  <text x="50" y="510" class="sublabel">AMM에서 SGA_TARGET / PGA_AGGREGATE_TARGET 지정 시 → 역시 최솟값(하한선)</text>

  <!-- Monitoring views -->
  <text x="50" y="540" class="code">V$MEMORY_DYNAMIC_COMPONENTS</text>
  <text x="340" y="540" class="small">AMM 모니터링</text>
  <text x="50" y="555" class="code">V$SGA_DYNAMIC_COMPONENTS</text>
  <text x="340" y="555" class="small">ASMM 모니터링</text>
</svg>