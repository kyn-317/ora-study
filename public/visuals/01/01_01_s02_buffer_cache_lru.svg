<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F43F5E" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Buffer Cache: LRU List + Touch Count Mechanism</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">버퍼 캐시 내부 리스트 구조와 접근 빈도 기반 관리</text>

  <!-- === LRU List Section === -->
  <rect x="30" y="65" width="740" height="190" class="box" fill="rgba(59,130,246,0.05)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="50" y="88" class="label" fill="#3B82F6">LRU List (Least Recently Used)</text>

  <!-- Hot End -->
  <rect x="50" y="100" width="100" height="30" rx="4" fill="rgba(244,63,94,0.2)" stroke="#F43F5E" stroke-width="1" />
  <text x="100" y="120" text-anchor="middle" class="sublabel" fill="#F43F5E">Hot End (MRU)</text>

  <!-- Buffer blocks in LRU -->
  <rect x="170" y="105" width="55" height="45" rx="4" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1" />
  <text x="197" y="123" text-anchor="middle" class="small" fill="#F43F5E">TC: 8</text>
  <text x="197" y="140" text-anchor="middle" class="small">Dirty</text>

  <rect x="235" y="105" width="55" height="45" rx="4" fill="rgba(244,63,94,0.12)" stroke="#F43F5E" stroke-width="1" />
  <text x="262" y="123" text-anchor="middle" class="small" fill="#F43F5E">TC: 6</text>
  <text x="262" y="140" text-anchor="middle" class="small">Clean</text>

  <rect x="300" y="105" width="55" height="45" rx="4" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1" />
  <text x="327" y="123" text-anchor="middle" class="small" fill="#F59E0B">TC: 4</text>
  <text x="327" y="140" text-anchor="middle" class="small">Clean</text>

  <rect x="365" y="105" width="55" height="45" rx="4" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="1" />
  <text x="392" y="123" text-anchor="middle" class="small" fill="#F59E0B">TC: 3</text>
  <text x="392" y="140" text-anchor="middle" class="small">Dirty</text>

  <rect x="430" y="105" width="55" height="45" rx="4" fill="rgba(59,130,246,0.08)" stroke="#3B82F6" stroke-width="1" />
  <text x="457" y="123" text-anchor="middle" class="small" fill="#3B82F6">TC: 2</text>
  <text x="457" y="140" text-anchor="middle" class="small">Clean</text>

  <rect x="495" y="105" width="55" height="45" rx="4" fill="rgba(59,130,246,0.05)" stroke="#3B82F6" stroke-width="1" />
  <text x="522" y="123" text-anchor="middle" class="small" fill="#3B82F6">TC: 1</text>
  <text x="522" y="140" text-anchor="middle" class="small">Free</text>

  <rect x="560" y="105" width="55" height="45" rx="4" fill="rgba(255,255,255,0.03)" stroke="#475569" stroke-width="1" />
  <text x="587" y="123" text-anchor="middle" class="small">TC: 0</text>
  <text x="587" y="140" text-anchor="middle" class="small">Free</text>

  <!-- Cold End -->
  <rect x="640" y="100" width="110" height="30" rx="4" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1" />
  <text x="695" y="120" text-anchor="middle" class="sublabel" fill="#3B82F6">Cold End (LRU)</text>

  <!-- Arrow showing direction -->
  <line x1="155" y1="135" x2="165" y2="135" stroke="#6F6BEA" stroke-width="1.5" marker-end="url(#ah)" />
  <line x1="620" y1="135" x2="635" y2="135" stroke="#6F6BEA" stroke-width="1.5" marker-end="url(#ah)" />

  <!-- Touch Count explanation -->
  <text x="50" y="175" class="sublabel">Touch Count (TC) = 접근 횟수</text>
  <text x="50" y="193" class="small">TC가 높은 버퍼 → Hot End로 이동 (캐시에 오래 유지)</text>
  <text x="50" y="211" class="small">TC가 낮은 버퍼 → Cold End에 위치 (교체 후보)</text>
  <text x="50" y="229" class="small">새 블록 적재 시 Cold End에서 Free/Clean 버퍼를 찾아 교체</text>
  <text x="460" y="175" class="sublabel" fill="#10B981">자주 사용되는 블록 보호</text>
  <text x="460" y="193" class="small">인덱스 루트 블록, 자주 조회되는</text>
  <text x="460" y="211" class="small">소규모 테이블 등이 캐시에 상주</text>

  <!-- === Buffer States Section === -->
  <rect x="30" y="260" width="355" height="140" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1" />
  <text x="50" y="283" class="label">Buffer States (버퍼 상태)</text>

  <rect x="50" y="295" width="80" height="28" rx="4" fill="rgba(255,255,255,0.05)" stroke="#475569" stroke-width="1" />
  <text x="90" y="314" text-anchor="middle" class="small">Free</text>
  <text x="145" y="314" class="small">미사용 빈 버퍼</text>

  <rect x="50" y="328" width="80" height="28" rx="4" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1" />
  <text x="90" y="347" text-anchor="middle" class="small" fill="#10B981">Clean</text>
  <text x="145" y="347" class="small">변경 없음 / 이미 디스크 기록됨</text>

  <rect x="50" y="361" width="80" height="28" rx="4" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1" />
  <text x="90" y="380" text-anchor="middle" class="small" fill="#F43F5E">Dirty</text>
  <text x="145" y="380" class="small">변경됨, 아직 디스크 미기록</text>

  <!-- === Checkpoint Queue Section === -->
  <rect x="400" y="260" width="370" height="140" class="box" fill="rgba(244,63,94,0.05)" stroke="#F43F5E" stroke-width="1.5" />
  <text x="420" y="283" class="label" fill="#F43F5E">Checkpoint Queue (Write List)</text>
  <text x="420" y="300" class="small">Dirty Buffer만 추적 (LRBA 순서)</text>

  <!-- Dirty buffers in checkpoint queue -->
  <rect x="420" y="310" width="65" height="35" rx="4" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1" />
  <text x="452" y="332" text-anchor="middle" class="small" fill="#F43F5E">Dirty 1</text>
  <rect x="495" y="310" width="65" height="35" rx="4" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1" />
  <text x="527" y="332" text-anchor="middle" class="small" fill="#F43F5E">Dirty 2</text>
  <rect x="570" y="310" width="65" height="35" rx="4" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1" />
  <text x="602" y="332" text-anchor="middle" class="small" fill="#F43F5E">Dirty 3</text>

  <!-- Arrow to DBWn -->
  <line x1="585" y1="355" x2="585" y2="375" stroke="#F43F5E" stroke-width="1.5" marker-end="url(#ah-red)" />
  <text x="420" y="390" class="sublabel">DBWn → 데이터 파일에 기록</text>

  <!-- === Buffer Pool Types === -->
  <rect x="30" y="415" width="740" height="130" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1" />
  <text x="50" y="440" class="label">Buffer Pool Types (버퍼 풀 유형)</text>

  <!-- Default Pool -->
  <rect x="50" y="455" width="210" height="75" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1" />
  <text x="155" y="478" text-anchor="middle" class="sublabel" fill="#3B82F6">Default Pool</text>
  <text x="155" y="496" text-anchor="middle" class="small">일반 블록의 기본 캐싱 영역</text>
  <text x="155" y="520" text-anchor="middle" class="code">DB_CACHE_SIZE</text>

  <!-- Keep Pool -->
  <rect x="280" y="455" width="210" height="75" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1" />
  <text x="385" y="478" text-anchor="middle" class="sublabel" fill="#10B981">Keep Pool</text>
  <text x="385" y="496" text-anchor="middle" class="small">자주 접근하는 소규모 객체 상주</text>
  <text x="385" y="520" text-anchor="middle" class="code">DB_KEEP_CACHE_SIZE</text>

  <!-- Recycle Pool -->
  <rect x="510" y="455" width="210" height="75" class="box" fill="rgba(245,158,11,0.1)" stroke="#F59E0B" stroke-width="1" />
  <text x="615" y="478" text-anchor="middle" class="sublabel" fill="#F59E0B">Recycle Pool</text>
  <text x="615" y="496" text-anchor="middle" class="small">재사용 낮은 대규모 블록, 빠른 교체</text>
  <text x="615" y="520" text-anchor="middle" class="code">DB_RECYCLE_CACHE_SIZE</text>
</svg>