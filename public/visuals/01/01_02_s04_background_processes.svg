<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <defs>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F43F5E"/>
    </marker>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="aY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">백그라운드 프로세스 관계도</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Background Processes and Their Interactions</text>

  <!-- SGA Block -->
  <rect x="180" y="70" width="440" height="150" class="box" fill="rgba(59,130,246,0.06)" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="400" y="90" text-anchor="middle" class="label" fill="#3B82F6">SGA (System Global Area)</text>

  <rect x="200" y="100" width="120" height="50" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1"/>
  <text x="260" y="120" text-anchor="middle" class="sublabel">Buffer Cache</text>
  <text x="260" y="140" text-anchor="middle" class="small">Dirty Buffers</text>

  <rect x="340" y="100" width="120" height="50" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1"/>
  <text x="400" y="120" text-anchor="middle" class="sublabel">Redo Log Buffer</text>
  <text x="400" y="140" text-anchor="middle" class="small">Redo Entries</text>

  <rect x="480" y="100" width="120" height="50" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1"/>
  <text x="540" y="120" text-anchor="middle" class="sublabel">Shared Pool</text>
  <text x="540" y="140" text-anchor="middle" class="small">Library/Dict Cache</text>

  <rect x="200" y="165" width="120" height="40" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1"/>
  <text x="260" y="188" text-anchor="middle" class="small">Checkpoint Queue</text>

  <rect x="340" y="165" width="120" height="40" class="box" fill="rgba(59,130,246,0.1)" stroke="#3B82F6" stroke-width="1"/>
  <text x="400" y="188" text-anchor="middle" class="small">AWR / ASH Data</text>

  <!-- ====== Mandatory Processes ====== -->
  <text x="400" y="248" text-anchor="middle" class="label" fill="#F43F5E">필수 프로세스 (Mandatory) — 실패 시 인스턴스 크래시</text>

  <!-- DBWn -->
  <rect x="30" y="270" width="150" height="95" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="105" y="292" text-anchor="middle" class="label" fill="#F43F5E">DBWn</text>
  <text x="105" y="310" text-anchor="middle" class="sublabel">Database Writer</text>
  <text x="105" y="330" text-anchor="middle" class="small">Dirty Buffer →</text>
  <text x="105" y="345" text-anchor="middle" class="small">데이터 파일 기록</text>
  <line x1="210" y1="150" x2="105" y2="270" stroke="#F43F5E" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- LGWR -->
  <rect x="200" y="270" width="150" height="95" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="275" y="292" text-anchor="middle" class="label" fill="#F43F5E">LGWR</text>
  <text x="275" y="310" text-anchor="middle" class="sublabel">Log Writer</text>
  <text x="275" y="330" text-anchor="middle" class="small">Redo Log Buffer →</text>
  <text x="275" y="345" text-anchor="middle" class="small">Redo Log 파일 기록</text>
  <line x1="400" y1="150" x2="275" y2="270" stroke="#F43F5E" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CKPT -->
  <rect x="370" y="270" width="150" height="95" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="445" y="292" text-anchor="middle" class="label" fill="#F43F5E">CKPT</text>
  <text x="445" y="310" text-anchor="middle" class="sublabel">Checkpoint</text>
  <text x="445" y="330" text-anchor="middle" class="small">파일 헤더 갱신</text>
  <text x="445" y="345" text-anchor="middle" class="small">DBWn에 기록 요청</text>

  <!-- Arrow CKPT -> DBWn (routed above boxes) -->
  <polyline points="445,270 445,258 105,258 105,270" fill="none" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#aY)"/>
  <text x="200" y="253" text-anchor="middle" class="small" fill="#F59E0B">기록 요청</text>

  <!-- SMON -->
  <rect x="540" y="270" width="150" height="95" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="615" y="292" text-anchor="middle" class="label" fill="#F43F5E">SMON</text>
  <text x="615" y="310" text-anchor="middle" class="sublabel">System Monitor</text>
  <text x="615" y="330" text-anchor="middle" class="small">인스턴스 복구</text>
  <text x="615" y="345" text-anchor="middle" class="small">임시 세그먼트 정리</text>

  <!-- PMON -->
  <rect x="30" y="390" width="150" height="95" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="105" y="412" text-anchor="middle" class="label" fill="#F43F5E">PMON</text>
  <text x="105" y="430" text-anchor="middle" class="sublabel">Process Monitor</text>
  <text x="105" y="450" text-anchor="middle" class="small">실패 프로세스 정리</text>
  <text x="105" y="465" text-anchor="middle" class="small">잠금/메모리 해제</text>

  <!-- PMON 23ai note -->
  <rect x="30" y="492" width="150" height="45" class="box" fill="rgba(107,107,234,0.08)" stroke="#6F6BEA" stroke-width="1"/>
  <text x="105" y="508" text-anchor="middle" class="code">26ai: PMON+CLMN+CLnn</text>
  <text x="105" y="525" text-anchor="middle" class="small" fill="#6F6BEA">병렬 정리 (Parallel Cleanup)</text>

  <!-- LREG -->
  <rect x="200" y="390" width="150" height="95" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="275" y="412" text-anchor="middle" class="label" fill="#F43F5E">LREG</text>
  <text x="275" y="430" text-anchor="middle" class="sublabel">Listener Registration</text>
  <text x="275" y="450" text-anchor="middle" class="small">리스너에 서비스 등록</text>
  <text x="275" y="465" text-anchor="middle" class="small">~60초마다 갱신</text>

  <!-- MMON -->
  <rect x="370" y="390" width="150" height="95" class="box" fill="rgba(244,63,94,0.08)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="445" y="412" text-anchor="middle" class="label" fill="#F43F5E">MMON</text>
  <text x="445" y="430" text-anchor="middle" class="sublabel">Manageability Monitor</text>
  <text x="445" y="450" text-anchor="middle" class="small">AWR 스냅샷 수집</text>
  <text x="445" y="465" text-anchor="middle" class="small">ADDM 분석 실행</text>

  <!-- ====== Optional Processes ====== -->
  <text x="660" y="410" text-anchor="middle" class="label" fill="#10B981">선택적 프로세스</text>
  <text x="660" y="428" text-anchor="middle" class="small">(Optional)</text>

  <rect x="540" y="440" width="105" height="42" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1"/>
  <text x="592" y="458" text-anchor="middle" class="code">ARCn</text>
  <text x="592" y="474" text-anchor="middle" class="small">Archiver</text>

  <rect x="660" y="440" width="105" height="42" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1"/>
  <text x="712" y="458" text-anchor="middle" class="code">RECO</text>
  <text x="712" y="474" text-anchor="middle" class="small">Recoverer</text>

  <rect x="540" y="492" width="105" height="42" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1"/>
  <text x="592" y="510" text-anchor="middle" class="code">CJQ0</text>
  <text x="592" y="526" text-anchor="middle" class="small">Job Scheduler</text>

  <rect x="660" y="492" width="105" height="42" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="1"/>
  <text x="712" y="510" text-anchor="middle" class="code">MMNL</text>
  <text x="712" y="526" text-anchor="middle" class="small">ASH Flush</text>

  <!-- Physical Files -->
  <rect x="30" y="570" width="740" height="95" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="400" y="593" text-anchor="middle" class="label" fill="#F59E0B">물리적 파일 (Physical Files)</text>

  <rect x="50" y="605" width="130" height="42" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
  <text x="115" y="622" text-anchor="middle" class="sublabel">데이터 파일</text>
  <text x="115" y="640" text-anchor="middle" class="small">Data Files</text>

  <rect x="200" y="605" width="150" height="42" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
  <text x="275" y="622" text-anchor="middle" class="sublabel">온라인 Redo Log</text>
  <text x="275" y="640" text-anchor="middle" class="small">Online Redo Log Files</text>

  <rect x="370" y="605" width="130" height="42" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
  <text x="435" y="622" text-anchor="middle" class="sublabel">컨트롤 파일</text>
  <text x="435" y="640" text-anchor="middle" class="small">Control Files</text>

  <rect x="520" y="605" width="130" height="42" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
  <text x="585" y="622" text-anchor="middle" class="sublabel">아카이브 로그</text>
  <text x="585" y="640" text-anchor="middle" class="small">Archive Log Files</text>

  <rect x="670" y="605" width="90" height="42" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
  <text x="715" y="622" text-anchor="middle" class="sublabel">Alert Log</text>
  <text x="715" y="640" text-anchor="middle" class="small">진단 로그</text>

  <!-- Arrows from processes to files (routed around boxes) -->
  <!-- DBWn → Data Files (left edge route, outside PMON) -->
  <polyline points="30,320 18,320 18,552 115,552 115,605" fill="none" stroke="#F43F5E" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="60" y="565" class="small" fill="#F43F5E">Write</text>

  <!-- LGWR → Redo Log (PMON-LREG gap at x=188) -->
  <polyline points="200,320 188,320 188,552 275,552 275,605" fill="none" stroke="#F43F5E" stroke-width="1.5" marker-end="url(#aR)"/>
  <text x="225" y="565" class="small" fill="#F43F5E">Write</text>

  <!-- CKPT → Control Files (CKPT-SMON gap at x=532) -->
  <polyline points="520,320 532,320 532,548 435,548 435,605" fill="none" stroke="#F43F5E" stroke-width="1.2" marker-end="url(#aR)"/>
  <text x="470" y="561" class="small" fill="#F43F5E">Update</text>

  <!-- ARCn → Archive Log (MMON-Optional gap at x=528) -->
  <polyline points="540,465 528,465 528,556 585,556 585,605" fill="none" stroke="#10B981" stroke-width="1.2" marker-end="url(#aG)"/>
  <text x="550" y="569" class="small" fill="#10B981">Copy</text>

  <!-- Write-Ahead Logging note (below SMON) -->
  <rect x="540" y="370" width="200" height="20" class="box" fill="rgba(244,63,94,0.12)" stroke="#F43F5E" stroke-width="1"/>
  <text x="640" y="384" text-anchor="middle" class="small" fill="#F43F5E">Write-Ahead Logging: LGWR 선행!</text>
</svg>