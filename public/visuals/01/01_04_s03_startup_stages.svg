<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Oracle 인스턴스 기동 단계 (Instance Startup Stages)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">SHUTDOWN → NOMOUNT → MOUNT → OPEN</text>

  <!-- SHUTDOWN state -->
  <rect x="310" y="70" width="180" height="44" class="box" fill="none" stroke="#F43F5E" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="90" text-anchor="middle" class="label" fill="#F43F5E">SHUTDOWN</text>
  <text x="400" y="105" text-anchor="middle" class="small">종료 상태 (Stopped)</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="114" x2="400" y2="148" stroke="#6F6BEA" stroke-width="2" marker-end="url(#arrowV)"/>
  <text x="510" y="136" class="code">STARTUP NOMOUNT</text>

  <!-- NOMOUNT -->
  <rect x="200" y="150" width="400" height="120" class="box" fill="none" stroke="#6F6BEA" stroke-width="2"/>
  <rect x="200" y="150" width="400" height="28" rx="8" ry="8" fill="#6F6BEA" opacity="0.2"/>
  <text x="220" y="169" class="label" fill="#6F6BEA">1. NOMOUNT</text>
  <text x="530" y="169" text-anchor="end" class="small">Instance Started</text>

  <text x="220" y="195" class="sublabel">• 초기화 파라미터 파일 읽기 (spfile/pfile)</text>
  <text x="220" y="213" class="sublabel">• SGA 메모리 할당</text>
  <text x="220" y="231" class="sublabel">• 백그라운드 프로세스 기동 (SMON, PMON, DBWn, LGWR...)</text>
  <text x="220" y="249" class="sublabel">• Alert Log 기록 시작</text>

  <!-- Available files indicator -->
  <rect x="620" y="170" width="160" height="90" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="700" y="188" text-anchor="middle" class="small">사용 파일</text>
  <text x="700" y="208" text-anchor="middle" class="code">파라미터 파일만</text>
  <line x1="630" y1="220" x2="770" y2="220" stroke="#2A2B3D" stroke-width="1"/>
  <text x="700" y="238" text-anchor="middle" class="small">가능한 작업</text>
  <text x="700" y="253" text-anchor="middle" class="code">CREATE DATABASE</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="270" x2="400" y2="304" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="510" y="292" class="code">ALTER DATABASE MOUNT</text>

  <!-- MOUNT -->
  <rect x="200" y="306" width="400" height="120" class="box" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <rect x="200" y="306" width="400" height="28" rx="8" ry="8" fill="#3B82F6" opacity="0.2"/>
  <text x="220" y="325" class="label" fill="#3B82F6">2. MOUNT</text>
  <text x="530" y="325" text-anchor="end" class="small">Database Mounted</text>

  <text x="220" y="351" class="sublabel">• 컨트롤 파일 오픈 (CONTROL_FILES 파라미터 참조)</text>
  <text x="220" y="369" class="sublabel">• 데이터 파일/Redo Log 파일 경로 인식 (열지 않음)</text>
  <text x="220" y="387" class="sublabel">• 인스턴스와 데이터베이스 연결 (Association)</text>
  <text x="220" y="405" class="sublabel">• 체크포인트 정보, DB 이름, 아카이브 모드 확인</text>

  <rect x="620" y="326" width="160" height="90" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="700" y="344" text-anchor="middle" class="small">사용 파일</text>
  <text x="700" y="364" text-anchor="middle" class="code">+ 컨트롤 파일</text>
  <line x1="630" y1="376" x2="770" y2="376" stroke="#2A2B3D" stroke-width="1"/>
  <text x="700" y="394" text-anchor="middle" class="small">가능한 작업</text>
  <text x="700" y="409" text-anchor="middle" class="code">ARCHIVELOG 변경</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="426" x2="400" y2="460" stroke="#10B981" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="510" y="448" class="code">ALTER DATABASE OPEN</text>

  <!-- OPEN -->
  <rect x="200" y="462" width="400" height="120" class="box" fill="none" stroke="#10B981" stroke-width="2"/>
  <rect x="200" y="462" width="400" height="28" rx="8" ry="8" fill="#10B981" opacity="0.2"/>
  <text x="220" y="481" class="label" fill="#10B981">3. OPEN</text>
  <text x="530" y="481" text-anchor="end" class="small">Database Opened</text>

  <text x="220" y="507" class="sublabel">• 데이터 파일 + Redo Log 파일 열기 및 검증</text>
  <text x="220" y="525" class="sublabel">• 일관성 검증 (SCN 비교) → 필요 시 인스턴스 복구</text>
  <text x="220" y="543" class="sublabel">• 데이터 딕셔너리 접근 가능</text>
  <text x="220" y="561" class="sublabel">• 일반 사용자 접속 가능</text>

  <rect x="620" y="482" width="160" height="90" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="700" y="500" text-anchor="middle" class="small">사용 파일</text>
  <text x="700" y="520" text-anchor="middle" class="code">+ 데이터/Redo 파일</text>
  <line x1="630" y1="532" x2="770" y2="532" stroke="#2A2B3D" stroke-width="1"/>
  <text x="700" y="550" text-anchor="middle" class="small">모드</text>
  <text x="700" y="565" text-anchor="middle" class="code">RW / RO / RESTRICT</text>

  <!-- Bottom note -->
  <text x="400" y="608" text-anchor="middle" class="small">STARTUP 명령은 기본적으로 세 단계를 모두 거쳐 OPEN까지 진행</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowV" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>
</svg>