<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">미디어 복구 유형 Media Recovery Types</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Complete Recovery vs Incomplete Recovery (Point-in-Time Recovery)</text>

  <!-- Prerequisite bar -->
  <rect x="30" y="65" width="740" height="35" fill="#1E1E2E" stroke="#F43F5E" stroke-width="1" class="box"/>
  <text x="50" y="87" class="sublabel" fill="#F43F5E">전제 조건:</text>
  <text x="140" y="87" class="code">ARCHIVELOG 모드 필수</text>
  <text x="360" y="87" class="sublabel" fill="#F43F5E">+</text>
  <text x="390" y="87" class="code">유효한 백업 (RMAN / 사용자 관리 백업)</text>

  <!-- Complete Recovery -->
  <rect x="30" y="115" width="365" height="310" fill="#1E1E2E" stroke="#3B82F6" stroke-width="1.5" class="box"/>
  <rect x="30" y="115" width="365" height="32" fill="#3B82F6" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="212" y="136" text-anchor="middle" class="label" fill="#3B82F6">완전 복구 Complete Recovery</text>

  <text x="50" y="167" class="sublabel">목표: 장애 직전 최신 상태로 복구</text>
  <text x="50" y="185" class="small">커밋된 모든 트랜잭션 보존 (데이터 손실 없음)</text>

  <!-- Steps -->
  <rect x="50" y="200" width="320" height="30" fill="#3B82F6" fill-opacity="0.1" class="box"/>
  <text x="60" y="219" class="code">1. RMAN> RESTORE DATABASE;</text>
  <text x="260" y="219" class="small">백업에서 복원</text>

  <line x1="210" y1="230" x2="210" y2="238" stroke="#3B82F6" stroke-width="1"/>
  <polygon points="207,236 213,236 210,242" fill="#3B82F6"/>

  <rect x="50" y="244" width="320" height="30" fill="#3B82F6" fill-opacity="0.1" class="box"/>
  <text x="60" y="263" class="code">2. RMAN> RECOVER DATABASE;</text>
  <text x="260" y="263" class="small">Redo 적용</text>

  <line x1="210" y1="274" x2="210" y2="282" stroke="#3B82F6" stroke-width="1"/>
  <polygon points="207,280 213,280 210,286" fill="#3B82F6"/>

  <rect x="50" y="288" width="320" height="30" fill="#3B82F6" fill-opacity="0.1" class="box"/>
  <text x="60" y="307" class="code">3. RMAN> ALTER DATABASE OPEN;</text>
  <text x="285" y="307" class="small">DB 오픈</text>

  <!-- Benefits -->
  <rect x="50" y="332" width="320" height="78" fill="#2A2B3D" class="box"/>
  <text x="65" y="352" class="sublabel" fill="#10B981">장점:</text>
  <text x="65" y="370" class="small">- 데이터 손실 없음 (커밋된 모든 트랜잭션 복구)</text>
  <text x="65" y="387" class="small">- RESETLOGS 불필요 (기존 로그 시퀀스 유지)</text>
  <text x="65" y="404" class="small">- 데이터 파일 레벨: DB OPEN 상태에서 가능</text>

  <!-- Incomplete Recovery -->
  <rect x="405" y="115" width="365" height="310" fill="#1E1E2E" stroke="#F59E0B" stroke-width="1.5" class="box"/>
  <rect x="405" y="115" width="365" height="32" fill="#F59E0B" fill-opacity="0.15" rx="8" ry="8"/>
  <text x="587" y="136" text-anchor="middle" class="label" fill="#F59E0B">불완전 복구 Incomplete / PITR</text>

  <text x="425" y="167" class="sublabel">목표: 특정 시점까지만 복구</text>
  <text x="425" y="185" class="small">지정 시점 이후의 트랜잭션은 손실됨</text>

  <!-- Recovery types -->
  <rect x="425" y="200" width="320" height="30" fill="#F59E0B" fill-opacity="0.1" class="box"/>
  <text x="435" y="219" class="code">UNTIL TIME '2026-04-07 10:00:00'</text>
  <text x="695" y="219" class="small">시간 기반</text>

  <rect x="425" y="236" width="320" height="30" fill="#F59E0B" fill-opacity="0.1" class="box"/>
  <text x="435" y="255" class="code">UNTIL SCN 123456</text>
  <text x="695" y="255" class="small">SCN 기반</text>

  <rect x="425" y="272" width="320" height="30" fill="#F59E0B" fill-opacity="0.1" class="box"/>
  <text x="435" y="291" class="code">UNTIL CANCEL</text>
  <text x="695" y="291" class="small">수동 중단</text>

  <rect x="425" y="308" width="320" height="30" fill="#F59E0B" fill-opacity="0.1" class="box"/>
  <text x="435" y="327" class="code">UNTIL SEQUENCE 100</text>
  <text x="695" y="327" class="small">로그 시퀀스</text>

  <!-- RESETLOGS warning -->
  <rect x="425" y="350" width="320" height="60" fill="#F43F5E" fill-opacity="0.1" stroke="#F43F5E" stroke-width="1" class="box"/>
  <text x="435" y="370" class="sublabel" fill="#F43F5E">필수 후속 작업:</text>
  <text x="435" y="388" class="code">ALTER DATABASE OPEN RESETLOGS;</text>
  <text x="435" y="404" class="small">Redo Log 초기화 + 새 Incarnation 시작</text>

  <!-- Timeline diagram -->
  <rect x="30" y="440" width="740" height="90" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1" class="box"/>
  <text x="50" y="462" class="label">복구 범위 비교 Timeline</text>

  <!-- Timeline base -->
  <line x1="60" y1="490" x2="740" y2="490" stroke="#2A2B3D" stroke-width="2"/>

  <!-- Backup point -->
  <rect x="100" y="480" width="8" height="20" fill="#6F6BEA"/>
  <text x="104" y="476" text-anchor="middle" class="small">백업</text>

  <!-- Archive logs -->
  <rect x="140" y="485" width="400" height="10" fill="#3B82F6" fill-opacity="0.3" rx="3"/>
  <text x="340" y="510" text-anchor="middle" class="small" fill="#3B82F6">Archive Redo Logs 적용</text>

  <!-- PITR point -->
  <rect x="400" y="478" width="3" height="24" fill="#F59E0B"/>
  <text x="401" y="476" text-anchor="middle" class="small" fill="#F59E0B">PITR 시점</text>

  <!-- Online redo -->
  <rect x="540" y="485" width="120" height="10" fill="#10B981" fill-opacity="0.3" rx="3"/>
  <text x="600" y="510" text-anchor="middle" class="small" fill="#10B981">Online Redo</text>

  <!-- Crash point -->
  <rect x="660" y="478" width="3" height="24" fill="#F43F5E"/>
  <text x="661" y="476" text-anchor="middle" class="small" fill="#F43F5E">장애</text>

  <!-- Complete recovery arrow -->
  <line x1="100" y1="518" x2="660" y2="518" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="656,514 656,522 664,518" fill="#3B82F6"/>
  <text x="380" y="530" text-anchor="middle" class="small" fill="#3B82F6">Complete Recovery (장애 직전까지)</text>

  <!-- Incomplete recovery arrow -->
  <line x1="100" y1="540" x2="400" y2="540" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="396,536 396,544 404,540" fill="#F59E0B"/>
  <text x="250" y="550" text-anchor="middle" class="small" fill="#F59E0B">Incomplete Recovery (지정 시점까지)</text>
</svg>