<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Oracle 복구 메커니즘 개요 Recovery Mechanism Overview</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Write-Ahead Logging (WAL) 원칙 기반의 3가지 복구 유형</text>

  <!-- WAL Principle Box -->
  <rect x="30" y="70" width="740" height="70" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5" class="box"/>
  <text x="400" y="92" text-anchor="middle" class="label" fill="#4a2e78">WAL 원칙 Write-Ahead Logging</text>
  <text x="400" y="112" text-anchor="middle" class="sublabel">데이터 변경 전에 반드시 Redo 로그를 먼저 기록 → 커밋된 트랜잭션은 어떤 장애에서도 복구 가능</text>
  <text x="400" y="128" text-anchor="middle" class="code">트랜잭션 변경 → Redo Log Buffer → LGWR → Online Redo Log File (디스크)</text>

  <!-- Three Recovery Types -->
  <!-- Instance Recovery -->
  <rect x="30" y="165" width="235" height="185" fill="#f3efe4" stroke="#2456a8" stroke-width="1.5" class="box"/>
  <rect x="30" y="165" width="235" height="32" fill="#2456a8" fill-opacity="0.2" rx="8" ry="8"/>
  <text x="147" y="186" text-anchor="middle" class="label" fill="#2456a8">인스턴스 복구</text>
  <text x="147" y="202" text-anchor="middle" class="small">Instance Recovery</text>

  <text x="45" y="225" class="sublabel">원인: 비정상 종료</text>
  <text x="45" y="243" class="small">(정전, SHUTDOWN ABORT 등)</text>
  <text x="45" y="268" class="sublabel">방식: 자동 (SMON)</text>
  <text x="45" y="293" class="sublabel">메커니즘:</text>
  <text x="55" y="311" class="code">1. Roll Forward (Redo 적용)</text>
  <text x="55" y="327" class="code">2. Roll Back (UNDO 적용)</text>
  <text x="147" y="345" text-anchor="middle" class="small">DBA 개입 불필요</text>

  <!-- Media Recovery -->
  <rect x="283" y="165" width="235" height="185" fill="#f3efe4" stroke="#8a5a10" stroke-width="1.5" class="box"/>
  <rect x="283" y="165" width="235" height="32" fill="#8a5a10" fill-opacity="0.2" rx="8" ry="8"/>
  <text x="400" y="186" text-anchor="middle" class="label" fill="#8a5a10">미디어 복구</text>
  <text x="400" y="202" text-anchor="middle" class="small">Media Recovery</text>

  <text x="298" y="225" class="sublabel">원인: 데이터 파일 손실/손상</text>
  <text x="298" y="243" class="small">(디스크 장애, 파일 삭제 등)</text>
  <text x="298" y="268" class="sublabel">방식: 수동 (DBA 개입)</text>
  <text x="298" y="293" class="sublabel">메커니즘:</text>
  <text x="308" y="311" class="code">1. 백업에서 Restore</text>
  <text x="308" y="327" class="code">2. Archive Log Recover</text>
  <text x="400" y="345" text-anchor="middle" class="small">ARCHIVELOG 모드 필수</text>

  <!-- Block Media Recovery -->
  <rect x="536" y="165" width="235" height="185" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1.5" class="box"/>
  <rect x="536" y="165" width="235" height="32" fill="#2f6a1c" fill-opacity="0.2" rx="8" ry="8"/>
  <text x="653" y="186" text-anchor="middle" class="label" fill="#2f6a1c">블록 미디어 복구</text>
  <text x="653" y="202" text-anchor="middle" class="small">Block Media Recovery</text>

  <text x="551" y="225" class="sublabel">원인: 개별 블록 손상</text>
  <text x="551" y="243" class="small">(체크섬 불일치 등)</text>
  <text x="551" y="268" class="sublabel">방식: RMAN 자동/수동</text>
  <text x="551" y="293" class="sublabel">메커니즘:</text>
  <text x="561" y="311" class="code">RMAN BLOCKRECOVER</text>
  <text x="561" y="327" class="code">손상 블록만 대상 복구</text>
  <text x="653" y="345" text-anchor="middle" class="small">파일 오프라인 불필요</text>

  <!-- Core Components Section -->
  <text x="400" y="385" text-anchor="middle" class="label">복구 핵심 구성요소 Core Components</text>

  <!-- Component boxes -->
  <rect x="30" y="400" width="140" height="50" fill="#f3efe4" stroke="#4a2e78" stroke-width="1" class="box"/>
  <text x="100" y="420" text-anchor="middle" class="sublabel" fill="#4a2e78">Online Redo Log</text>
  <text x="100" y="436" text-anchor="middle" class="small">변경사항 기록</text>

  <rect x="185" y="400" width="140" height="50" fill="#f3efe4" stroke="#4a2e78" stroke-width="1" class="box"/>
  <text x="255" y="420" text-anchor="middle" class="sublabel" fill="#4a2e78">Archive Redo Log</text>
  <text x="255" y="436" text-anchor="middle" class="small">과거 변경 보관</text>

  <rect x="340" y="400" width="140" height="50" fill="#f3efe4" stroke="#4a2e78" stroke-width="1" class="box"/>
  <text x="410" y="420" text-anchor="middle" class="sublabel" fill="#4a2e78">UNDO Tablespace</text>
  <text x="410" y="436" text-anchor="middle" class="small">롤백 데이터 보관</text>

  <rect x="495" y="400" width="140" height="50" fill="#f3efe4" stroke="#4a2e78" stroke-width="1" class="box"/>
  <text x="565" y="420" text-anchor="middle" class="sublabel" fill="#4a2e78">Control File</text>
  <text x="565" y="436" text-anchor="middle" class="small">구조 메타데이터</text>

  <rect x="650" y="400" width="120" height="50" fill="#f3efe4" stroke="#4a2e78" stroke-width="1" class="box"/>
  <text x="710" y="420" text-anchor="middle" class="sublabel" fill="#4a2e78">Checkpoint</text>
  <text x="710" y="436" text-anchor="middle" class="small">동기화 시점 기록</text>

  <!-- Arrows from components to recovery types -->
  <line x1="100" y1="400" x2="100" y2="355" stroke="#2456a8" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="255" y1="400" x2="400" y2="355" stroke="#8a5a10" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="410" y1="400" x2="147" y2="355" stroke="#2456a8" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Bottom note -->
  <text x="400" y="480" text-anchor="middle" class="small">인스턴스 복구: Redo + UNDO 사용 | 미디어 복구: 백업 + Archive Log | 블록 복구: RMAN 블록 단위</text>
  <text x="400" y="500" text-anchor="middle" class="code">모든 복구의 기반 = WAL (Write-Ahead Logging) 원칙</text>
</svg>