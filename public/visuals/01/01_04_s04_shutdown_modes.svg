<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .yes { font-size: 12px; font-weight: 600; fill: #2f6a1c; }
    .no { font-size: 12px; font-weight: 600; fill: #be123c; }
    .header-text { font-size: 12px; font-weight: 600; fill: #1a1a1a; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">종료 모드 비교 (Shutdown Modes Comparison)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">안전도: NORMAL > TRANSACTIONAL > IMMEDIATE > ABORT</text>

  <!-- Column headers -->
  <rect x="20" y="70" width="160" height="36" class="box" fill="#f3efe4"/>
  <text x="100" y="93" text-anchor="middle" class="header-text">항목</text>

  <rect x="190" y="70" width="140" height="36" class="box" fill="#2f6a1c" opacity="0.2" stroke="#2f6a1c" stroke-width="1"/>
  <text x="260" y="88" text-anchor="middle" class="label" fill="#2f6a1c">NORMAL</text>
  <text x="260" y="101" text-anchor="middle" class="small">기본 모드</text>

  <rect x="340" y="70" width="140" height="36" class="box" fill="#2456a8" opacity="0.2" stroke="#2456a8" stroke-width="1"/>
  <text x="410" y="88" text-anchor="middle" class="label" fill="#2456a8">TRANSACTIONAL</text>
  <text x="410" y="101" text-anchor="middle" class="small">트랜잭션 보호</text>

  <rect x="490" y="70" width="140" height="36" class="box" fill="#4a2e78" opacity="0.2" stroke="#4a2e78" stroke-width="1"/>
  <text x="560" y="88" text-anchor="middle" class="label" fill="#4a2e78">IMMEDIATE</text>
  <text x="560" y="101" text-anchor="middle" class="small">가장 많이 사용</text>

  <rect x="640" y="70" width="140" height="36" class="box" fill="#be123c" opacity="0.2" stroke="#be123c" stroke-width="1"/>
  <text x="710" y="88" text-anchor="middle" class="label" fill="#be123c">ABORT</text>
  <text x="710" y="101" text-anchor="middle" class="small">비상시만</text>

  <!-- Row 1: 새 접속 허용 -->
  <rect x="20" y="116" width="160" height="32" class="box" fill="#f3efe4" opacity="0.5"/>
  <text x="100" y="137" text-anchor="middle" class="sublabel">새 접속 허용</text>
  <text x="260" y="137" text-anchor="middle" class="no">X</text>
  <text x="410" y="137" text-anchor="middle" class="no">X</text>
  <text x="560" y="137" text-anchor="middle" class="no">X</text>
  <text x="710" y="137" text-anchor="middle" class="no">X</text>

  <!-- Row 2: 세션 종료 대기 -->
  <rect x="20" y="156" width="160" height="32" class="box" fill="none"/>
  <text x="100" y="177" text-anchor="middle" class="sublabel">세션 종료 대기</text>
  <text x="260" y="177" text-anchor="middle" class="yes">O (무한 대기)</text>
  <text x="410" y="177" text-anchor="middle" class="no">X</text>
  <text x="560" y="177" text-anchor="middle" class="no">X</text>
  <text x="710" y="177" text-anchor="middle" class="no">X</text>

  <!-- Row 3: 트랜잭션 완료 대기 -->
  <rect x="20" y="196" width="160" height="32" class="box" fill="#f3efe4" opacity="0.5"/>
  <text x="100" y="217" text-anchor="middle" class="sublabel">트랜잭션 완료 대기</text>
  <text x="260" y="217" text-anchor="middle" class="yes">O</text>
  <text x="410" y="217" text-anchor="middle" class="yes">O</text>
  <text x="560" y="217" text-anchor="middle" class="no">X (롤백)</text>
  <text x="710" y="217" text-anchor="middle" class="no">X (무시)</text>

  <!-- Row 4: 체크포인트 수행 -->
  <rect x="20" y="236" width="160" height="32" class="box" fill="none"/>
  <text x="100" y="257" text-anchor="middle" class="sublabel">체크포인트 수행</text>
  <text x="260" y="257" text-anchor="middle" class="yes">O</text>
  <text x="410" y="257" text-anchor="middle" class="yes">O</text>
  <text x="560" y="257" text-anchor="middle" class="yes">O</text>
  <text x="710" y="257" text-anchor="middle" class="no">X</text>

  <!-- Row 5: Redo 기록 -->
  <rect x="20" y="276" width="160" height="32" class="box" fill="#f3efe4" opacity="0.5"/>
  <text x="100" y="297" text-anchor="middle" class="sublabel">Redo Log 기록</text>
  <text x="260" y="297" text-anchor="middle" class="yes">O</text>
  <text x="410" y="297" text-anchor="middle" class="yes">O</text>
  <text x="560" y="297" text-anchor="middle" class="yes">O</text>
  <text x="710" y="297" text-anchor="middle" class="no">X</text>

  <!-- Row 6: 인스턴스 복구 필요 -->
  <rect x="20" y="316" width="160" height="32" class="box" fill="none"/>
  <text x="100" y="337" text-anchor="middle" class="sublabel">인스턴스 복구 필요</text>
  <text x="260" y="337" text-anchor="middle" class="no">불필요</text>
  <text x="410" y="337" text-anchor="middle" class="no">불필요</text>
  <text x="560" y="337" text-anchor="middle" class="no">불필요</text>
  <text x="710" y="337" text-anchor="middle" class="yes" style="fill:#be123c">필수</text>

  <!-- Row 7: 종료 속도 -->
  <rect x="20" y="356" width="160" height="32" class="box" fill="#f3efe4" opacity="0.5"/>
  <text x="100" y="377" text-anchor="middle" class="sublabel">종료 속도</text>
  <text x="260" y="377" text-anchor="middle" class="small">매우 느림</text>
  <text x="410" y="377" text-anchor="middle" class="small">느림~보통</text>
  <text x="560" y="377" text-anchor="middle" class="sublabel">빠름</text>
  <text x="710" y="377" text-anchor="middle" class="sublabel">즉시</text>

  <!-- Speed bar -->
  <rect x="190" y="396" width="590" height="6" rx="3" ry="3" fill="#f3efe4"/>
  <rect x="190" y="396" width="590" height="6" rx="3" ry="3" fill="url(#speedGrad)"/>

  <!-- Clean / Dirty shutdown divider -->
  <line x1="635" y1="116" x2="635" y2="390" stroke="#8a5a10" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="415" y="430" text-anchor="middle" class="small">Clean Shutdown (정상 종료)</text>
  <text x="710" y="430" text-anchor="middle" class="small" style="fill:#be123c">Dirty Shutdown</text>

  <!-- Bottom recommendations -->
  <rect x="60" y="455" width="300" height="50" class="box" fill="none" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="210" y="475" text-anchor="middle" class="label" fill="#4a2e78">실무 권장: SHUTDOWN IMMEDIATE</text>
  <text x="210" y="493" text-anchor="middle" class="small">안전 + 빠른 종료 = 최적 균형</text>

  <rect x="440" y="455" width="300" height="50" class="box" fill="none" stroke="#be123c" stroke-width="1.5"/>
  <text x="590" y="475" text-anchor="middle" class="label" fill="#be123c">STARTUP FORCE = ABORT + STARTUP</text>
  <text x="590" y="493" text-anchor="middle" class="small">비정상 종료 후 재기동 시 사용</text>

  <defs>
    <linearGradient id="speedGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f6a1c" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#2456a8" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#4a2e78" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#be123c" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
</svg>