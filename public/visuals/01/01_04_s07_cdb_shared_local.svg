<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">CDB 공유 자원 vs PDB 로컬 자원 (Shared vs Local)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">1 Instance = 1 CDB, 인스턴스 자원은 모든 PDB가 공유</text>

  <!-- Instance (shared) layer -->
  <rect x="30" y="68" width="740" height="100" class="box" fill="none" stroke="#6F6BEA" stroke-width="2"/>
  <rect x="30" y="68" width="740" height="28" rx="8" ry="8" fill="#6F6BEA" opacity="0.15"/>
  <text x="50" y="87" class="label" fill="#6F6BEA">인스턴스 (Instance) — CDB 전체 공유</text>
  <text x="720" y="87" text-anchor="end" class="small">Shared</text>

  <!-- SGA box -->
  <rect x="55" y="105" width="200" height="48" class="box" fill="none" stroke="#3B82F6" stroke-width="1"/>
  <text x="155" y="125" text-anchor="middle" class="sublabel" style="fill:#3B82F6">SGA (공유 메모리)</text>
  <text x="155" y="143" text-anchor="middle" class="small">Buffer Cache, Shared Pool...</text>

  <!-- Background processes -->
  <rect x="270" y="105" width="240" height="48" class="box" fill="none" stroke="#3B82F6" stroke-width="1"/>
  <text x="390" y="125" text-anchor="middle" class="sublabel" style="fill:#3B82F6">백그라운드 프로세스 (1세트)</text>
  <text x="390" y="143" text-anchor="middle" class="code">SMON  PMON  DBWn  LGWR  CKPT</text>

  <!-- Redo Log shared -->
  <rect x="525" y="105" width="230" height="48" class="box" fill="none" stroke="#3B82F6" stroke-width="1"/>
  <text x="640" y="125" text-anchor="middle" class="sublabel" style="fill:#3B82F6">공유 파일</text>
  <text x="640" y="143" text-anchor="middle" class="code">제어파일 + Redo Log</text>

  <!-- CDB container area -->
  <rect x="30" y="185" width="740" height="310" class="box" fill="none" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="50" y="208" class="label">CDB 내부 구조</text>

  <!-- CDB$ROOT -->
  <rect x="55" y="220" width="700" height="55" class="box" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <text x="75" y="243" class="sublabel" style="fill:#10B981">CDB$ROOT (CON_ID=1)</text>
  <text x="75" y="261" class="small">공통 메타데이터, 공통 사용자(C##), 시스템 표영역</text>
  <text x="700" y="251" text-anchor="end" class="code">공유 자원 관리</text>

  <!-- PDB$SEED -->
  <rect x="55" y="285" width="700" height="40" class="box" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="75" y="310" class="sublabel" style="fill:#3B82F6">PDB$SEED (CON_ID=2)</text>
  <text x="400" y="310" class="small">항상 READ ONLY — 새 PDB 생성 시 템플릿</text>

  <!-- User PDBs -->
  <rect x="55" y="340" width="225" height="140" class="box" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="75" y="363" class="sublabel" style="fill:#F59E0B">PDB1 (CON_ID=3)</text>

  <rect x="75" y="375" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="167" y="391" text-anchor="middle" class="small">SYSTEM / SYSAUX 데이터 파일</text>
  <rect x="75" y="401" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="167" y="417" text-anchor="middle" class="small">사용자 데이터 파일</text>
  <rect x="75" y="427" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="167" y="443" text-anchor="middle" class="small">임시 파일 (Temp)</text>
  <rect x="75" y="453" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="167" y="469" text-anchor="middle" class="small">로컬 사용자/권한</text>

  <rect x="295" y="340" width="225" height="140" class="box" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="315" y="363" class="sublabel" style="fill:#F59E0B">PDB2 (CON_ID=4)</text>

  <rect x="315" y="375" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="407" y="391" text-anchor="middle" class="small">SYSTEM / SYSAUX 데이터 파일</text>
  <rect x="315" y="401" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="407" y="417" text-anchor="middle" class="small">사용자 데이터 파일</text>
  <rect x="315" y="427" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="407" y="443" text-anchor="middle" class="small">임시 파일 (Temp)</text>
  <rect x="315" y="453" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="407" y="469" text-anchor="middle" class="small">로컬 사용자/권한</text>

  <rect x="535" y="340" width="225" height="140" class="box" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="555" y="363" class="sublabel" style="fill:#F59E0B">PDBn (CON_ID=N)</text>

  <rect x="555" y="375" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="647" y="391" text-anchor="middle" class="small">SYSTEM / SYSAUX 데이터 파일</text>
  <rect x="555" y="401" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="647" y="417" text-anchor="middle" class="small">사용자 데이터 파일</text>
  <rect x="555" y="427" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="647" y="443" text-anchor="middle" class="small">임시 파일 (Temp)</text>
  <rect x="555" y="453" width="185" height="22" class="box" fill="none" stroke="#2A2B3D" stroke-width="1"/>
  <text x="647" y="469" text-anchor="middle" class="small">로컬 사용자/권한</text>

  <!-- Legend -->
  <rect x="30" y="505" width="18" height="12" class="box" fill="none" stroke="#6F6BEA" stroke-width="2"/>
  <text x="55" y="516" class="small" style="fill:#6F6BEA">CDB 공유: SGA, 프로세스, 제어파일, Redo Log, UNDO(기본)</text>

  <rect x="420" y="505" width="18" height="12" class="box" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <text x="445" y="516" class="small" style="fill:#F59E0B">PDB 로컬: 데이터 파일, 임시 파일, 로컬 사용자</text>
</svg>