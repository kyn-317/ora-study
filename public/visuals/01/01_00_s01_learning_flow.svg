<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .small { font-size: 11px; fill: #94A3B8; }
    .code { font-family: 'Consolas', monospace; font-size: 12px; fill: #F59E0B; }
    .box { rx: 10; ry: 10; }
    .arrow-line { stroke-width: 2.5; fill: none; }
    .group-label { font-size: 12px; font-weight: 600; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">챕터 01 학습 순서 흐름도 (Learning Flow)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">6개 단원의 권장 학습 순서와 연결 관계</text>

  <!-- === Group 1: 메모리 + 프로세스 (축 1) === -->
  <rect x="30" y="70" width="280" height="215" class="box" fill="rgba(111,107,234,0.06)" stroke="#6F6BEA" stroke-width="1" stroke-dasharray="6,3" />
  <text x="170" y="92" text-anchor="middle" class="group-label" fill="#6F6BEA">축 1: 메모리 + 프로세스</text>
  <text x="170" y="107" text-anchor="middle" class="small">데이터는 메모리에서 어떻게 처리되는가?</text>

  <!-- 01_01 메모리 구조 -->
  <rect x="55" y="120" width="230" height="60" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="170" y="145" text-anchor="middle" class="label">01_01 메모리 구조</text>
  <text x="170" y="165" text-anchor="middle" class="sublabel">SGA + PGA — Oracle의 "두뇌"</text>

  <!-- 01_02 프로세스 구조 -->
  <rect x="55" y="200" width="230" height="60" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="170" y="225" text-anchor="middle" class="label">01_02 프로세스 구조</text>
  <text x="170" y="245" text-anchor="middle" class="sublabel">DBWn, LGWR 등 — 메모리를 조작하는 손</text>

  <!-- Arrow: 01_01 → 01_02 -->
  <line x1="170" y1="180" x2="170" y2="197" class="arrow-line" stroke="#3B82F6" marker-end="url(#ah-blue)" />

  <!-- === Group 2: 저장 구조 (축 2) === -->
  <rect x="355" y="70" width="200" height="215" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1" stroke-dasharray="6,3" />
  <text x="455" y="92" text-anchor="middle" class="group-label" fill="#F59E0B">축 2: 저장 구조</text>
  <text x="455" y="107" text-anchor="middle" class="small">데이터는 디스크에 어떻게 저장되는가?</text>

  <!-- 01_03 저장 구조 -->
  <rect x="370" y="155" width="170" height="70" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1.5" />
  <text x="455" y="183" text-anchor="middle" class="label">01_03 저장 구조</text>
  <text x="455" y="203" text-anchor="middle" class="sublabel">물리적 + 논리적 저장 계층</text>

  <!-- Arrows: 01_01 → 01_03, 01_02 → 01_03 -->
  <path d="M 285 150 Q 325 150 367 180" class="arrow-line" stroke="#6F6BEA" marker-end="url(#ah)" />
  <path d="M 285 230 Q 325 230 367 200" class="arrow-line" stroke="#6F6BEA" marker-end="url(#ah)" />

  <!-- === Group 3: 기동 · 설정 · 복구 (축 3) === -->
  <rect x="30" y="310" width="740" height="155" class="box" fill="rgba(111,107,234,0.04)" stroke="#6F6BEA" stroke-width="1" stroke-dasharray="6,3" />
  <text x="400" y="332" text-anchor="middle" class="group-label" fill="#6F6BEA">축 3: 기동 · 설정 · 복구</text>
  <text x="400" y="347" text-anchor="middle" class="small">인스턴스를 어떻게 시작하고, 설정하고, 장애에서 복구하는가?</text>

  <!-- 01_04 기동/종료 -->
  <rect x="55" y="360" width="190" height="60" class="box" fill="rgba(111,107,234,0.15)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="150" y="385" text-anchor="middle" class="label">01_04 기동/종료</text>
  <text x="150" y="405" text-anchor="middle" class="sublabel">NOMOUNT → MOUNT → OPEN</text>

  <!-- 01_05 초기화 파라미터 -->
  <rect x="290" y="360" width="210" height="60" class="box" fill="rgba(111,107,234,0.15)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="395" y="385" text-anchor="middle" class="label">01_05 초기화 파라미터</text>
  <text x="395" y="405" text-anchor="middle" class="sublabel">PFILE/SPFILE, ALTER SYSTEM</text>

  <!-- 01_06 복구 기초 -->
  <rect x="545" y="360" width="200" height="60" class="box" fill="rgba(111,107,234,0.15)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="645" y="385" text-anchor="middle" class="label">01_06 복구 기초</text>
  <text x="645" y="405" text-anchor="middle" class="sublabel">인스턴스 복구 / 미디어 복구</text>

  <!-- Arrow: 01_03 → 01_04 -->
  <path d="M 455 225 L 455 290 Q 455 305 440 305 L 160 305 Q 150 305 150 315 L 150 357" class="arrow-line" stroke="#6F6BEA" marker-end="url(#ah)" />

  <!-- Arrow: 01_04 → 01_05 -->
  <line x1="245" y1="390" x2="287" y2="390" class="arrow-line" stroke="#6F6BEA" marker-end="url(#ah)" />

  <!-- Arrow: 01_05 → 01_06 -->
  <line x1="500" y1="390" x2="542" y2="390" class="arrow-line" stroke="#6F6BEA" marker-end="url(#ah)" />

  <!-- Step numbers -->
  <circle cx="56" cy="124" r="11" fill="#3B82F6" />
  <text x="56" y="129" text-anchor="middle" style="font-size:12px; font-weight:700; fill:#fff;">1</text>

  <circle cx="56" cy="204" r="11" fill="#3B82F6" />
  <text x="56" y="209" text-anchor="middle" style="font-size:12px; font-weight:700; fill:#fff;">2</text>

  <circle cx="371" cy="159" r="11" fill="#F59E0B" />
  <text x="371" y="164" text-anchor="middle" style="font-size:12px; font-weight:700; fill:#fff;">3</text>

  <circle cx="56" cy="364" r="11" fill="#6F6BEA" />
  <text x="56" y="369" text-anchor="middle" style="font-size:12px; font-weight:700; fill:#fff;">4</text>

  <circle cx="291" cy="364" r="11" fill="#6F6BEA" />
  <text x="291" y="369" text-anchor="middle" style="font-size:12px; font-weight:700; fill:#fff;">5</text>

  <circle cx="546" cy="364" r="11" fill="#6F6BEA" />
  <text x="546" y="369" text-anchor="middle" style="font-size:12px; font-weight:700; fill:#fff;">6</text>

  <!-- Legend -->
  <rect x="590" y="72" width="12" height="12" rx="2" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1" />
  <text x="608" y="83" class="small">메모리/프로세스</text>
  <rect x="590" y="90" width="12" height="12" rx="2" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1" />
  <text x="608" y="101" class="small">저장 구조</text>
  <rect x="590" y="108" width="12" height="12" rx="2" fill="rgba(111,107,234,0.15)" stroke="#6F6BEA" stroke-width="1" />
  <text x="608" y="119" class="small">기동/설정/복구</text>
</svg>