<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <defs>
    <marker id="aB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2456a8"/>
    </marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#be123c"/>
    </marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a2e78"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">컨트롤 파일 다중화 구조</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Control File Multiplexing — Synchronous Write to All Copies</text>

  <!-- Oracle Instance -->
  <rect x="270" y="70" width="260" height="70" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2"/>
  <text x="400" y="98" text-anchor="middle" class="label" fill="#4a2e78">Oracle 인스턴스 (Instance)</text>
  <text x="400" y="118" text-anchor="middle" class="sublabel">MOUNT 단계에서 컨트롤 파일 읽기</text>

  <!-- Synchronous write arrows -->
  <line x1="310" y1="140" x2="155" y2="210" stroke="#be123c" stroke-width="2" marker-end="url(#aR)"/>
  <line x1="400" y1="140" x2="400" y2="200" stroke="#be123c" stroke-width="2" marker-end="url(#aR)"/>
  <line x1="490" y1="140" x2="655" y2="210" stroke="#be123c" stroke-width="2" marker-end="url(#aR)"/>

  <!-- Sync label -->
  <rect x="310" y="160" width="180" height="22" rx="11" ry="11" fill="#f5d0d0" stroke="#be123c" stroke-width="0.6"/>
  <text x="400" y="175" text-anchor="middle" class="small" fill="#be123c">동기적 동시 갱신 (Sync Write)</text>

  <!-- Control File Copy 1 - Disk 1 -->
  <rect x="40" y="200" width="220" height="120" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <rect x="55" y="210" width="100" height="22" rx="4" ry="4" fill="#dee5f5" stroke="#2456a8" stroke-width="0.6"/>
  <text x="105" y="225" text-anchor="middle" class="small" fill="#2456a8">Disk 1</text>

  <rect x="65" y="245" width="170" height="55" rx="6" ry="6" fill="#f5d0d0" stroke="#be123c" stroke-width="1.2"/>
  <text x="150" y="268" text-anchor="middle" class="label" fill="#be123c">control01.ctl</text>
  <text x="150" y="288" text-anchor="middle" class="code">/disk1/oradata/orcl/</text>

  <!-- Control File Copy 2 - Disk 2 -->
  <rect x="290" y="200" width="220" height="120" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <rect x="305" y="210" width="100" height="22" rx="4" ry="4" fill="#dee5f5" stroke="#2456a8" stroke-width="0.6"/>
  <text x="355" y="225" text-anchor="middle" class="small" fill="#2456a8">Disk 2</text>

  <rect x="315" y="245" width="170" height="55" rx="6" ry="6" fill="#f5d0d0" stroke="#be123c" stroke-width="1.2"/>
  <text x="400" y="268" text-anchor="middle" class="label" fill="#be123c">control02.ctl</text>
  <text x="400" y="288" text-anchor="middle" class="code">/disk2/oradata/orcl/</text>

  <!-- Control File Copy 3 - Disk 3 -->
  <rect x="540" y="200" width="220" height="120" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <rect x="555" y="210" width="100" height="22" rx="4" ry="4" fill="#dee5f5" stroke="#2456a8" stroke-width="0.6"/>
  <text x="605" y="225" text-anchor="middle" class="small" fill="#2456a8">Disk 3</text>

  <rect x="565" y="245" width="170" height="55" rx="6" ry="6" fill="#f5d0d0" stroke="#be123c" stroke-width="1.2"/>
  <text x="650" y="268" text-anchor="middle" class="label" fill="#be123c">control03.ctl</text>
  <text x="650" y="288" text-anchor="middle" class="code">/disk3/oradata/orcl/</text>

  <!-- Identical content indicator -->
  <line x1="235" y1="270" x2="315" y2="270" stroke="#787368" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="275" y="262" text-anchor="middle" class="small">= 동일</text>
  <line x1="485" y1="270" x2="565" y2="270" stroke="#787368" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="525" y="262" text-anchor="middle" class="small">= 동일</text>

  <!-- Stored Information -->
  <rect x="40" y="340" width="720" height="70" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1"/>
  <text x="400" y="362" text-anchor="middle" class="label">컨트롤 파일 저장 정보 (Control File Contents)</text>

  <text x="80" y="385" class="small" fill="#4a4a46">DB Name / DBID</text>
  <text x="210" y="385" class="small" fill="#4a4a46">데이터 파일 경로</text>
  <text x="350" y="385" class="small" fill="#4a4a46">Redo Log 정보</text>
  <text x="490" y="385" class="small" fill="#4a4a46">체크포인트 SCN</text>
  <text x="630" y="385" class="small" fill="#4a4a46">RMAN 백업 정보</text>

  <text x="80" y="400" class="small" fill="#787368">생성 타임스탬프</text>
  <text x="210" y="400" class="small" fill="#787368">테이블스페이스 정보</text>
  <text x="350" y="400" class="small" fill="#787368">로그 시퀀스 번호</text>
  <text x="490" y="400" class="small" fill="#787368">아카이브 로그 이력</text>
  <text x="630" y="400" class="small" fill="#787368">백업 메타데이터</text>
</svg>