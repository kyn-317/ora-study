<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <defs>
    <marker id="arrV" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#6F6BEA"/>
    </marker>
    <marker id="arrVGreen" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">멀티테넌트 파라미터 상속 구조</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">Multitenant Parameter Inheritance (CDB/PDB)</text>

  <!-- CDB$ROOT box -->
  <rect x="200" y="70" width="400" height="130" class="box" fill="none" stroke="#6F6BEA" stroke-width="2"/>
  <rect x="200" y="70" width="400" height="32" rx="8" ry="0" fill="#6F6BEA" fill-opacity="0.25"/>
  <text x="400" y="92" class="label" text-anchor="middle">CDB$ROOT</text>

  <!-- CDB-only params -->
  <rect x="220" y="115" width="170" height="65" class="box" fill="#F43F5E" fill-opacity="0.08" stroke="#F43F5E" stroke-width="1"/>
  <text x="305" y="135" class="sublabel" text-anchor="middle" fill="#F43F5E">CDB 전용 파라미터</text>
  <text x="305" y="152" class="code" text-anchor="middle">PROCESSES</text>
  <text x="305" y="168" class="code" text-anchor="middle">SGA_TARGET  DB_BLOCK_SIZE</text>

  <!-- CDB params that inherit -->
  <rect x="410" y="115" width="170" height="65" class="box" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="495" y="135" class="sublabel" text-anchor="middle" fill="#10B981">상속 가능 파라미터</text>
  <text x="495" y="152" class="code" text-anchor="middle">OPEN_CURSORS</text>
  <text x="495" y="168" class="code" text-anchor="middle">CURSOR_SHARING  NLS_*</text>

  <!-- ISPDB_MODIFIABLE label -->
  <text x="305" y="196" class="small" text-anchor="middle" fill="#F43F5E">ISPDB_MODIFIABLE = FALSE</text>
  <text x="495" y="196" class="small" text-anchor="middle" fill="#10B981">ISPDB_MODIFIABLE = TRUE</text>

  <!-- Inheritance arrows -->
  <line x1="400" y1="200" x2="200" y2="260" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#arrVGreen)"/>
  <line x1="400" y1="200" x2="400" y2="260" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#arrVGreen)"/>
  <line x1="400" y1="200" x2="600" y2="260" stroke="#10B981" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#arrVGreen)"/>

  <text x="400" y="240" class="small" text-anchor="middle" fill="#10B981">값 상속 (미설정 시 CDB 값 사용)</text>

  <!-- PDB 1 - inherits -->
  <rect x="60" y="265" width="200" height="120" class="box" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="60" y="265" width="200" height="28" rx="8" ry="0" fill="#3B82F6" fill-opacity="0.2"/>
  <text x="160" y="284" class="sublabel" text-anchor="middle" fill="#3B82F6">PDB1 (상속)</text>

  <text x="80" y="310" class="code">OPEN_CURSORS = (상속)</text>
  <text x="80" y="330" class="small">CDB$ROOT 값 사용</text>
  <text x="80" y="352" class="sublabel">PDB 딕셔너리에 미설정</text>
  <text x="80" y="372" class="small">-- 명시적 설정 없음</text>

  <!-- PDB 2 - overrides -->
  <rect x="300" y="265" width="200" height="120" class="box" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="300" y="265" width="200" height="28" rx="8" ry="0" fill="#F59E0B" fill-opacity="0.2"/>
  <text x="400" y="284" class="sublabel" text-anchor="middle" fill="#F59E0B">PDB2 (오버라이드)</text>

  <text x="320" y="310" class="code">OPEN_CURSORS = 500</text>
  <text x="320" y="330" class="small" fill="#F59E0B">PDB 고유 값 사용</text>
  <text x="320" y="352" class="sublabel">PDB 딕셔너리에 저장</text>
  <text x="320" y="372" class="small">Unplug/Plug 후에도 유지</text>

  <!-- PDB 3 - inherits -->
  <rect x="540" y="265" width="200" height="120" class="box" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="540" y="265" width="200" height="28" rx="8" ry="0" fill="#3B82F6" fill-opacity="0.2"/>
  <text x="640" y="284" class="sublabel" text-anchor="middle" fill="#3B82F6">PDB3 (상속)</text>

  <text x="560" y="310" class="code">OPEN_CURSORS = (상속)</text>
  <text x="560" y="330" class="small">CDB$ROOT 값 사용</text>
  <text x="560" y="352" class="sublabel">PDB 딕셔너리에 미설정</text>
  <text x="560" y="372" class="small">-- 명시적 설정 없음</text>

  <!-- Setting mechanism -->
  <rect x="60" y="410" width="680" height="90" class="box" fill="#2A2B3D" stroke="#2A2B3D" stroke-width="1"/>
  <text x="400" y="435" class="label" text-anchor="middle">PDB 파라미터 설정 메커니즘</text>

  <text x="80" y="460" class="code">ALTER SESSION SET CONTAINER = pdb2;</text>
  <text x="80" y="478" class="code">ALTER SYSTEM SET open_cursors = 500;</text>
  <text x="520" y="460" class="sublabel">-- PDB 컨텍스트 전환</text>
  <text x="520" y="478" class="sublabel">-- PDB 내부 딕셔너리에 저장</text>

  <!-- CON_ID note -->
  <text x="400" y="510" class="small" text-anchor="middle">V$PARAMETER.CON_ID 로 파라미터가 어느 컨테이너에서 설정되었는지 식별 가능</text>
</svg>