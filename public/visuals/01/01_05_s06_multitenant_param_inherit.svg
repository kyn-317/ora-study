<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <defs>
    <marker id="arrV" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#4a2e78"/>
    </marker>
    <marker id="arrVGreen" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#2f6a1c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">멀티테넌트 파라미터 상속 구조</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">Multitenant Parameter Inheritance (CDB/PDB)</text>

  <!-- CDB$ROOT box -->
  <rect x="200" y="70" width="400" height="130" class="box" fill="none" stroke="#4a2e78" stroke-width="2"/>
  <rect x="202" y="72" width="396" height="30" rx="6" ry="6" fill="#4a2e78" fill-opacity="0.25"/>
  <text x="400" y="92" class="label" text-anchor="middle">CDB$ROOT</text>

  <!-- CDB-only params -->
  <rect x="220" y="115" width="170" height="65" class="box" fill="#be123c" fill-opacity="0.08" stroke="#be123c" stroke-width="1"/>
  <text x="305" y="135" class="sublabel" text-anchor="middle" fill="#be123c">CDB 전용 파라미터</text>
  <text x="305" y="152" class="code" text-anchor="middle">PROCESSES</text>
  <text x="305" y="168" class="code" text-anchor="middle">SGA_TARGET  DB_BLOCK_SIZE</text>

  <!-- CDB params that inherit -->
  <rect x="410" y="115" width="170" height="65" class="box" fill="#2f6a1c" fill-opacity="0.08" stroke="#2f6a1c" stroke-width="1"/>
  <text x="495" y="135" class="sublabel" text-anchor="middle" fill="#2f6a1c">상속 가능 파라미터</text>
  <text x="495" y="152" class="code" text-anchor="middle">OPEN_CURSORS</text>
  <text x="495" y="168" class="code" text-anchor="middle">CURSOR_SHARING  NLS_*</text>

  <!-- ISPDB_MODIFIABLE label -->
  <text x="305" y="196" class="small" text-anchor="middle" fill="#be123c">ISPDB_MODIFIABLE = FALSE</text>
  <text x="495" y="196" class="small" text-anchor="middle" fill="#2f6a1c">ISPDB_MODIFIABLE = TRUE</text>

  <!-- Inheritance arrows -->
  <line x1="400" y1="200" x2="200" y2="265" stroke="#2f6a1c" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#arrVGreen)"/>
  <line x1="400" y1="200" x2="400" y2="265" stroke="#2f6a1c" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#arrVGreen)"/>
  <line x1="400" y1="200" x2="600" y2="265" stroke="#2f6a1c" stroke-width="1.5" stroke-dasharray="6" marker-end="url(#arrVGreen)"/>

  <text x="400" y="240" class="small" text-anchor="middle" fill="#2f6a1c">값 상속 (미설정 시 CDB 값 사용)</text>

  <!-- PDB 1 - inherits -->
  <rect x="60" y="265" width="200" height="120" class="box" fill="none" stroke="#2456a8" stroke-width="1.5"/>
  <rect x="62" y="267" width="196" height="26" rx="6" ry="6" fill="#2456a8" fill-opacity="0.2"/>
  <text x="160" y="284" class="sublabel" text-anchor="middle" fill="#2456a8">PDB1 (상속)</text>

  <text x="80" y="310" class="code">OPEN_CURSORS = (상속)</text>
  <text x="80" y="330" class="small">CDB$ROOT 값 사용</text>
  <text x="80" y="352" class="sublabel">PDB 딕셔너리에 미설정</text>
  <text x="80" y="372" class="small">-- 명시적 설정 없음</text>

  <!-- PDB 2 - overrides -->
  <rect x="300" y="265" width="200" height="120" class="box" fill="none" stroke="#8a5a10" stroke-width="1.5"/>
  <rect x="302" y="267" width="196" height="26" rx="6" ry="6" fill="#8a5a10" fill-opacity="0.2"/>
  <text x="400" y="284" class="sublabel" text-anchor="middle" fill="#8a5a10">PDB2 (오버라이드)</text>

  <text x="320" y="310" class="code">OPEN_CURSORS = 500</text>
  <text x="320" y="330" class="small" fill="#8a5a10">PDB 고유 값 사용</text>
  <text x="320" y="352" class="sublabel">PDB 딕셔너리에 저장</text>
  <text x="320" y="372" class="small">Unplug/Plug 후에도 유지</text>

  <!-- PDB 3 - inherits -->
  <rect x="540" y="265" width="200" height="120" class="box" fill="none" stroke="#2456a8" stroke-width="1.5"/>
  <rect x="542" y="267" width="196" height="26" rx="6" ry="6" fill="#2456a8" fill-opacity="0.2"/>
  <text x="640" y="284" class="sublabel" text-anchor="middle" fill="#2456a8">PDB3 (상속)</text>

  <text x="560" y="310" class="code">OPEN_CURSORS = (상속)</text>
  <text x="560" y="330" class="small">CDB$ROOT 값 사용</text>
  <text x="560" y="352" class="sublabel">PDB 딕셔너리에 미설정</text>
  <text x="560" y="372" class="small">-- 명시적 설정 없음</text>

  <!-- Setting mechanism -->
  <rect x="60" y="410" width="680" height="90" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="400" y="435" class="label" text-anchor="middle">PDB 파라미터 설정 메커니즘</text>

  <text x="80" y="460" class="code">ALTER SESSION SET CONTAINER = pdb2;</text>
  <text x="80" y="478" class="code">ALTER SYSTEM SET open_cursors = 500;</text>
  <text x="520" y="460" class="sublabel">-- PDB 컨텍스트 전환</text>
  <text x="520" y="478" class="sublabel">-- PDB 내부 딕셔너리에 저장</text>

  <!-- CON_ID note -->
  <text x="400" y="510" class="small" text-anchor="middle">V$PARAMETER.CON_ID 로 파라미터가 어느 컨테이너에서 설정되었는지 식별 가능</text>
</svg>