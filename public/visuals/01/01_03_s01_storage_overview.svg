<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Oracle 저장 구조 전체 매핑 관계도</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Physical ↔ Logical Storage Structure Mapping</text>

  <!-- Physical Storage Section -->
  <rect x="30" y="70" width="340" height="510" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="200" y="98" text-anchor="middle" class="label" fill="#6F6BEA">물리적 저장 구조 (Physical)</text>
  <text x="200" y="115" text-anchor="middle" class="small">OS 파일 시스템에서 관리</text>

  <!-- Control File -->
  <rect x="55" y="135" width="290" height="55" class="box" fill="rgba(243,63,94,0.12)" stroke="#F43F5E" stroke-width="1.2"/>
  <text x="200" y="158" text-anchor="middle" class="label" fill="#F43F5E">컨트롤 파일 (Control File)</text>
  <text x="200" y="178" text-anchor="middle" class="sublabel">.ctl — DB 구조 메타데이터</text>

  <!-- Redo Log File -->
  <rect x="55" y="205" width="290" height="55" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="200" y="228" text-anchor="middle" class="label" fill="#3B82F6">온라인 Redo Log (Online Redo Log)</text>
  <text x="200" y="248" text-anchor="middle" class="sublabel">.log — 변경 이력 기록</text>

  <!-- Data Files -->
  <rect x="55" y="275" width="290" height="135" class="box" fill="rgba(111,107,234,0.12)" stroke="#6F6BEA" stroke-width="1.2"/>
  <text x="200" y="298" text-anchor="middle" class="label" fill="#6F6BEA">데이터 파일 (Data Files)</text>
  <text x="200" y="318" text-anchor="middle" class="sublabel">.dbf — 실제 데이터 저장</text>

  <!-- Individual data files -->
  <rect x="75" y="330" width="120" height="32" rx="4" ry="4" fill="rgba(111,107,234,0.2)" stroke="#6F6BEA" stroke-width="0.8"/>
  <text x="135" y="350" text-anchor="middle" class="small" fill="#CBD5E1">users01.dbf</text>

  <rect x="205" y="330" width="120" height="32" rx="4" ry="4" fill="rgba(111,107,234,0.2)" stroke="#6F6BEA" stroke-width="0.8"/>
  <text x="265" y="350" text-anchor="middle" class="small" fill="#CBD5E1">users02.dbf</text>

  <rect x="75" y="370" width="120" height="32" rx="4" ry="4" fill="rgba(111,107,234,0.2)" stroke="#6F6BEA" stroke-width="0.8"/>
  <text x="135" y="390" text-anchor="middle" class="small" fill="#CBD5E1">system01.dbf</text>

  <rect x="205" y="370" width="120" height="32" rx="4" ry="4" fill="rgba(111,107,234,0.2)" stroke="#6F6BEA" stroke-width="0.8"/>
  <text x="265" y="390" text-anchor="middle" class="small" fill="#CBD5E1">undotbs01.dbf</text>

  <!-- Archive / Other Files -->
  <rect x="55" y="425" width="290" height="55" class="box" fill="rgba(16,185,129,0.10)" stroke="#10B981" stroke-width="1.2"/>
  <text x="200" y="448" text-anchor="middle" class="label" fill="#10B981">아카이브 로그 (Archive Log)</text>
  <text x="200" y="468" text-anchor="middle" class="sublabel">.arc — Redo Log의 복사본</text>

  <!-- Temp File -->
  <rect x="55" y="495" width="290" height="55" class="box" fill="rgba(245,158,11,0.10)" stroke="#F59E0B" stroke-width="1.2"/>
  <text x="200" y="518" text-anchor="middle" class="label" fill="#F59E0B">임시 파일 (Temp File)</text>
  <text x="200" y="538" text-anchor="middle" class="sublabel">.dbf — 정렬/해시 임시 공간 (Redo 미기록)</text>

  <!-- Logical Storage Section -->
  <rect x="430" y="70" width="340" height="510" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="600" y="98" text-anchor="middle" class="label" fill="#10B981">논리적 저장 구조 (Logical)</text>
  <text x="600" y="115" text-anchor="middle" class="small">Oracle 내부에서 관리</text>

  <!-- Tablespace -->
  <rect x="455" y="135" width="290" height="430" class="box" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1.2"/>
  <text x="600" y="162" text-anchor="middle" class="label" fill="#10B981">테이블스페이스 (Tablespace)</text>
  <text x="600" y="180" text-anchor="middle" class="small">최상위 논리적 저장 단위</text>

  <!-- Segment -->
  <rect x="475" y="195" width="250" height="300" class="box" fill="rgba(59,130,246,0.08)" stroke="#3B82F6" stroke-width="1.0"/>
  <text x="600" y="218" text-anchor="middle" class="label" fill="#3B82F6">세그먼트 (Segment)</text>
  <text x="600" y="236" text-anchor="middle" class="small">테이블, 인덱스, UNDO 등</text>

  <!-- Extent -->
  <rect x="495" y="250" width="210" height="170" class="box" fill="rgba(245,158,11,0.08)" stroke="#F59E0B" stroke-width="1.0"/>
  <text x="600" y="273" text-anchor="middle" class="label" fill="#F59E0B">익스텐트 (Extent)</text>
  <text x="600" y="291" text-anchor="middle" class="small">연속 블록의 집합</text>

  <!-- Data Blocks -->
  <rect x="515" y="305" width="170" height="100" class="box" fill="rgba(111,107,234,0.10)" stroke="#6F6BEA" stroke-width="1.0"/>
  <text x="600" y="328" text-anchor="middle" class="label" fill="#6F6BEA">데이터 블록 (Block)</text>
  <text x="600" y="346" text-anchor="middle" class="small">최소 I/O 단위 (기본 8KB)</text>

  <!-- Block icons -->
  <rect x="535" y="360" width="26" height="30" rx="3" ry="3" fill="rgba(111,107,234,0.25)" stroke="#6F6BEA" stroke-width="0.6"/>
  <rect x="565" y="360" width="26" height="30" rx="3" ry="3" fill="rgba(111,107,234,0.25)" stroke="#6F6BEA" stroke-width="0.6"/>
  <rect x="595" y="360" width="26" height="30" rx="3" ry="3" fill="rgba(111,107,234,0.25)" stroke="#6F6BEA" stroke-width="0.6"/>
  <rect x="625" y="360" width="26" height="30" rx="3" ry="3" fill="rgba(111,107,234,0.25)" stroke="#6F6BEA" stroke-width="0.6"/>
  <rect x="655" y="360" width="26" height="30" rx="3" ry="3" fill="rgba(111,107,234,0.25)" stroke="#6F6BEA" stroke-width="0.6"/>

  <!-- Segment types list -->
  <text x="510" y="445" class="small" fill="#CBD5E1">Table Segment</text>
  <text x="510" y="462" class="small" fill="#CBD5E1">Index Segment</text>
  <text x="510" y="479" class="small" fill="#CBD5E1">UNDO Segment</text>
  <text x="640" y="445" class="small" fill="#CBD5E1">LOB Segment</text>
  <text x="640" y="462" class="small" fill="#CBD5E1">Temp Segment</text>
  <text x="640" y="479" class="small" fill="#CBD5E1">Cluster Segment</text>

  <!-- Tablespace types -->
  <text x="475" y="535" class="small" fill="#10B981">SYSTEM</text>
  <text x="540" y="535" class="small" fill="#10B981">SYSAUX</text>
  <text x="610" y="535" class="small" fill="#10B981">UNDO</text>
  <text x="665" y="535" class="small" fill="#10B981">TEMP</text>
  <text x="710" y="535" class="small" fill="#10B981">USERS</text>

  <!-- Mapping Arrows: Data Files to Tablespace -->
  <line x1="345" y1="340" x2="455" y2="300" stroke="#6F6BEA" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <line x1="345" y1="380" x2="455" y2="370" stroke="#6F6BEA" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- Mapping label -->
  <rect x="360" y="275" width="80" height="24" rx="12" ry="12" fill="rgba(111,107,234,0.2)" stroke="#6F6BEA" stroke-width="0.8"/>
  <text x="400" y="291" text-anchor="middle" class="small" fill="#6F6BEA">1:N 매핑</text>

  <!-- Key Principles -->
  <rect x="30" y="590" width="740" height="24" rx="4" ry="4" fill="rgba(245,158,11,0.08)"/>
  <text x="400" y="606" text-anchor="middle" class="small" fill="#F59E0B">핵심: 데이터 파일 1개 = 테이블스페이스 1개 (N:1 불가) | 세그먼트는 여러 데이터 파일에 걸쳐 익스텐트를 가질 수 있음</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>
</svg>