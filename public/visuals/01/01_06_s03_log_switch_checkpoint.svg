<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">로그 스위치와 체크포인트 Log Switch &amp; Checkpoint</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">로그 스위치 발생 시 체크포인트 동작과 Redo Log 상태 전환 흐름</text>

  <!-- Main flow diagram -->
  <rect x="30" y="70" width="740" height="230" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1" class="box"/>

  <!-- Step 1: LGWR fills log -->
  <rect x="50" y="90" width="150" height="50" fill="#2A2B3D" stroke="#3B82F6" stroke-width="1.5" class="box"/>
  <text x="125" y="110" text-anchor="middle" class="sublabel" fill="#3B82F6">LGWR</text>
  <text x="125" y="128" text-anchor="middle" class="small">Redo Log 그룹 가득 참</text>

  <!-- Arrow -->
  <line x1="200" y1="115" x2="230" y2="115" stroke="#E2E8F0" stroke-width="1.5"/>
  <polygon points="228,111 228,119 234,115" fill="#E2E8F0"/>

  <!-- Step 2: Log Switch -->
  <rect x="236" y="90" width="120" height="50" fill="#6F6BEA" fill-opacity="0.2" stroke="#6F6BEA" stroke-width="1.5" class="box"/>
  <text x="296" y="110" text-anchor="middle" class="label" fill="#6F6BEA">Log Switch</text>
  <text x="296" y="128" text-anchor="middle" class="small">다음 그룹 전환</text>

  <!-- Arrow -->
  <line x1="356" y1="115" x2="386" y2="115" stroke="#E2E8F0" stroke-width="1.5"/>
  <polygon points="384,111 384,119 390,115" fill="#E2E8F0"/>

  <!-- Step 3: Thread Checkpoint signal -->
  <rect x="392" y="90" width="150" height="50" fill="#2A2B3D" stroke="#F59E0B" stroke-width="1.5" class="box"/>
  <text x="467" y="110" text-anchor="middle" class="sublabel" fill="#F59E0B">CKPT 프로세스</text>
  <text x="467" y="128" text-anchor="middle" class="small">Thread Checkpoint 신호</text>

  <!-- Arrow -->
  <line x1="542" y1="115" x2="572" y2="115" stroke="#E2E8F0" stroke-width="1.5"/>
  <polygon points="570,111 570,119 576,115" fill="#E2E8F0"/>

  <!-- Step 4: DBWn writes -->
  <rect x="578" y="90" width="170" height="50" fill="#2A2B3D" stroke="#10B981" stroke-width="1.5" class="box"/>
  <text x="663" y="110" text-anchor="middle" class="sublabel" fill="#10B981">DBWn</text>
  <text x="663" y="128" text-anchor="middle" class="small">이전 그룹 Dirty Buffer 기록</text>

  <!-- After DBWn: two outcomes -->
  <!-- Down arrow from DBWn -->
  <line x1="663" y1="140" x2="663" y2="160" stroke="#E2E8F0" stroke-width="1.5"/>
  <polygon points="659,158 667,158 663,164" fill="#E2E8F0"/>

  <!-- Branch: NOARCHIVELOG -->
  <rect x="470" y="165" width="170" height="45" fill="#2A2B3D" stroke="#94A3B8" stroke-width="1" class="box"/>
  <text x="555" y="183" text-anchor="middle" class="sublabel">NOARCHIVELOG 모드</text>
  <text x="555" y="200" text-anchor="middle" class="small">→ 즉시 INACTIVE (재사용 가능)</text>

  <!-- Branch: ARCHIVELOG -->
  <rect x="50" y="165" width="400" height="55" fill="#2A2B3D" stroke="#F59E0B" stroke-width="1" class="box"/>
  <text x="250" y="183" text-anchor="middle" class="sublabel" fill="#F59E0B">ARCHIVELOG 모드</text>

  <rect x="65" y="193" width="105" height="22" fill="#F59E0B" fill-opacity="0.1" rx="4"/>
  <text x="117" y="208" text-anchor="middle" class="code">ARCn 아카이브</text>

  <line x1="170" y1="204" x2="185" y2="204" stroke="#F59E0B" stroke-width="1"/>
  <polygon points="183,201 183,207 189,204" fill="#F59E0B"/>

  <rect x="190" y="193" width="105" height="22" fill="#10B981" fill-opacity="0.1" rx="4"/>
  <text x="242" y="208" text-anchor="middle" class="code">아카이브 완료</text>

  <line x1="295" y1="204" x2="310" y2="204" stroke="#10B981" stroke-width="1"/>
  <polygon points="308,201 308,207 314,204" fill="#10B981"/>

  <rect x="315" y="193" width="120" height="22" fill="#10B981" fill-opacity="0.1" rx="4"/>
  <text x="375" y="208" text-anchor="middle" class="code">INACTIVE (재사용)</text>

  <!-- Branching lines -->
  <line x1="663" y1="160" x2="555" y2="165" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="663" y1="160" x2="400" y2="165" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Status transition -->
  <rect x="50" y="235" width="700" height="50" fill="#2A2B3D" class="box"/>
  <text x="400" y="255" text-anchor="middle" class="label">상태 전환 State Transition</text>

  <rect x="80" y="262" width="80" height="18" fill="#10B981" fill-opacity="0.2" rx="4"/>
  <text x="120" y="275" text-anchor="middle" class="small" fill="#10B981">CURRENT</text>

  <line x1="160" y1="271" x2="200" y2="271" stroke="#E2E8F0" stroke-width="1"/>
  <polygon points="198,268 198,274 204,271" fill="#E2E8F0"/>
  <text x="180" y="265" text-anchor="middle" class="small">스위치</text>

  <rect x="208" y="262" width="80" height="18" fill="#F59E0B" fill-opacity="0.2" rx="4"/>
  <text x="248" y="275" text-anchor="middle" class="small" fill="#F59E0B">ACTIVE</text>

  <line x1="288" y1="271" x2="345" y2="271" stroke="#E2E8F0" stroke-width="1"/>
  <polygon points="343,268 343,274 349,271" fill="#E2E8F0"/>
  <text x="316" y="265" text-anchor="middle" class="small">체크포인트</text>

  <rect x="352" y="262" width="80" height="18" fill="#94A3B8" fill-opacity="0.2" rx="4"/>
  <text x="392" y="275" text-anchor="middle" class="small">INACTIVE</text>

  <line x1="432" y1="271" x2="485" y2="271" stroke="#E2E8F0" stroke-width="1"/>
  <polygon points="483,268 483,274 489,271" fill="#E2E8F0"/>
  <text x="458" y="265" text-anchor="middle" class="small">재사용</text>

  <rect x="492" y="262" width="80" height="18" fill="#10B981" fill-opacity="0.2" rx="4"/>
  <text x="532" y="275" text-anchor="middle" class="small" fill="#10B981">CURRENT</text>

  <text x="620" y="275" class="small">(순환 반복)</text>

  <!-- Warning: checkpoint not complete -->
  <rect x="30" y="315" width="740" height="110" fill="#1E1E2E" stroke="#F43F5E" stroke-width="1.5" class="box"/>
  <text x="50" y="340" class="label" fill="#F43F5E">경고 상황: "checkpoint not complete"</text>

  <text x="50" y="365" class="sublabel">모든 Redo Log 그룹이 ACTIVE 상태 (체크포인트 미완료) → LGWR이 기록할 그룹이 없어 대기</text>
  <text x="50" y="385" class="sublabel">데이터베이스 전체 성능에 심각한 영향 (모든 DML 작업 대기)</text>

  <text x="50" y="408" class="sublabel" fill="#10B981">예방 조치:</text>
  <text x="55" y="420" class="code">1. Redo Log 그룹 수 증가 (최소 3개 이상)</text>
  <text x="340" y="420" class="code">2. FAST_START_MTTR_TARGET 적절히 설정</text>
  <text x="620" y="420" class="code">3. Alert Log 모니터링</text>
</svg>