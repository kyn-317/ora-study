<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 555">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke: #4a2e78; stroke-width: 2; fill: none; }
    .dashed { stroke-dasharray: 6,4; }
    .arrow-label { font-size: 13px; font-weight: 700; fill: #2456a8; }
    .arrow-label-bg { fill: #f3efe4; stroke: #2456a8; stroke-width: 1; rx: 4; ry: 4; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2456a8" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Oracle Instance = SGA + Background Processes</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">오라클 인스턴스 = 메모리 구조(SGA + PGA) + 백그라운드 프로세스</text>

  <!-- Instance boundary -->
  <rect x="30" y="60" width="740" height="475" class="box" fill="none" stroke="#4a2e78" stroke-width="2" stroke-dasharray="8,4" />
  <text x="50" y="82" class="label" fill="#4a2e78">Instance (인스턴스)</text>

  <!-- ===== SGA Block ===== -->
  <rect x="50" y="95" width="460" height="380" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" />
  <text x="280" y="118" text-anchor="middle" class="label" fill="#4a2e78">SGA (System Global Area) — 공유 메모리</text>

  <!-- Shared Pool (좌측) -->
  <rect x="70" y="130" width="200" height="55" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="170" y="153" text-anchor="middle" class="sublabel">Shared Pool (공유 풀)</text>
  <text x="170" y="173" text-anchor="middle" class="code">SHARED_POOL_SIZE</text>

  <!-- Database Buffer Cache (우측 — DBWn 화살표 출발) -->
  <rect x="290" y="130" width="200" height="55" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="390" y="153" text-anchor="middle" class="sublabel">Database Buffer Cache</text>
  <text x="390" y="173" text-anchor="middle" class="code">DB_CACHE_SIZE</text>

  <!-- Redo Log Buffer -->
  <rect x="70" y="200" width="200" height="55" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="170" y="223" text-anchor="middle" class="sublabel">Redo Log Buffer</text>
  <text x="170" y="243" text-anchor="middle" class="code">LOG_BUFFER</text>

  <!-- Large Pool -->
  <rect x="290" y="200" width="95" height="55" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="337" y="223" text-anchor="middle" class="sublabel">Large Pool</text>
  <text x="337" y="240" text-anchor="middle" class="small">선택</text>

  <!-- Java Pool -->
  <rect x="395" y="200" width="95" height="55" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="442" y="223" text-anchor="middle" class="sublabel">Java Pool</text>
  <text x="442" y="240" text-anchor="middle" class="small">선택</text>

  <!-- Streams Pool -->
  <rect x="70" y="270" width="130" height="50" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="135" y="293" text-anchor="middle" class="sublabel">Streams Pool</text>
  <text x="135" y="308" text-anchor="middle" class="small">선택</text>

  <!-- In-Memory Area -->
  <rect x="210" y="270" width="130" height="50" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="275" y="293" text-anchor="middle" class="sublabel">In-Memory Area</text>
  <text x="275" y="308" text-anchor="middle" class="small">선택</text>

  <!-- Result Cache -->
  <rect x="350" y="270" width="130" height="50" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="415" y="293" text-anchor="middle" class="sublabel">Result Cache</text>
  <text x="415" y="308" text-anchor="middle" class="small">선택</text>

  <!-- Fixed SGA -->
  <rect x="70" y="335" width="420" height="35" class="box" fill="rgba(42,42,42,0.03)" stroke="#787368" stroke-width="1" />
  <text x="280" y="358" text-anchor="middle" class="small">Fixed SGA (고정, 내부 관리용)</text>

  <!-- SGA size control -->
  <text x="280" y="400" text-anchor="middle" class="code">SGA_TARGET / SGA_MAX_SIZE / MEMORY_TARGET</text>
  <text x="280" y="418" text-anchor="middle" class="small">Granule 단위로 할당 (4MB ~ 128MB+)</text>

  <!-- Shared label -->
  <rect x="135" y="440" width="120" height="24" rx="12" fill="#d8cfe5" stroke="none" />
  <text x="195" y="456" text-anchor="middle" style="font-size:11px; fill:#4a2e78;">모든 프로세스 공유</text>

  <!-- ===== PGA Block ===== -->
  <rect x="530" y="95" width="220" height="210" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="640" y="118" text-anchor="middle" class="label" fill="#2f6a1c">PGA — 프로세스 전용</text>

  <!-- PGA components -->
  <rect x="545" y="130" width="190" height="40" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="640" y="155" text-anchor="middle" class="sublabel">Private SQL Area</text>

  <rect x="545" y="180" width="190" height="40" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="640" y="205" text-anchor="middle" class="sublabel">SQL Work Area (Sort/Hash)</text>

  <rect x="545" y="230" width="190" height="40" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="640" y="255" text-anchor="middle" class="sublabel">Session Memory</text>

  <text x="640" y="290" text-anchor="middle" class="code">PGA_AGGREGATE_TARGET</text>

  <!-- PGA label (between PGA and Background Processes) -->
  <rect x="580" y="311" width="120" height="24" rx="12" fill="#cfe1b8" stroke="none" />
  <text x="640" y="327" text-anchor="middle" style="font-size:11px; fill:#2f6a1c;">프로세스당 1개</text>

  <!-- ===== Background Processes ===== -->
  <rect x="530" y="340" width="220" height="135" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="640" y="363" text-anchor="middle" class="label" fill="#be123c">Background Processes</text>

  <text x="555" y="388" class="sublabel">DBWn  — Buffer → Disk</text>
  <text x="555" y="408" class="sublabel">LGWR — Redo → Log File</text>
  <text x="555" y="428" class="sublabel">CKPT — Checkpoint</text>
  <text x="555" y="448" class="sublabel">SMON — Recovery</text>
  <text x="555" y="468" class="sublabel">PMON — Cleanup</text>

  <!-- Arrow lines: SGA → Background Processes (ㄱ자 꺾임) -->
  <path d="M490,157 H515 V385 H550" fill="none" stroke="#2456a8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-blue)" />
  <path d="M510,227 H525 V405 H550" fill="none" stroke="#2456a8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-blue)" />

  <!-- Legend -->
  <rect x="50" y="488" width="12" height="12" rx="2" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="68" y="499" class="small">필수 구성요소</text>
  <rect x="170" y="488" width="12" height="12" rx="2" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="188" y="499" class="small">선택 구성요소</text>

  <!-- Arrow labels (최상단 레이어 — 점선 위에 렌더링) -->
  <rect x="460" y="255" width="110" height="32" class="arrow-label-bg" />
  <text x="515" y="270" text-anchor="middle" class="arrow-label" style="font-size:11px;">dirty buffer</text>
  <text x="515" y="283" text-anchor="middle" class="arrow-label" style="font-size:11px;">→ 디스크 기록</text>

  <rect x="470" y="320" width="110" height="32" class="arrow-label-bg" />
  <text x="525" y="335" text-anchor="middle" class="arrow-label" style="font-size:11px;">redo 엔트리</text>
  <text x="525" y="348" text-anchor="middle" class="arrow-label" style="font-size:11px;">→ 로그 기록</text>
</svg>
