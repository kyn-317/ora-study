<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2456a8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2f6a1c"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a5a10"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#be123c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">온라인 Redo Log 순환 구조</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Online Redo Log Circular Writing &amp; Log Switch</text>

  <!-- Circular arrangement of 3 Redo Log Groups -->
  <!-- Group 1 (CURRENT) - top -->
  <rect x="280" y="80" width="240" height="90" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" class="label" fill="#be123c">Group 1 — CURRENT</text>
  <text x="400" y="123" text-anchor="middle" class="sublabel">LGWR이 현재 기록 중</text>
  <rect x="300" y="135" width="90" height="22" rx="4" ry="4" fill="#f5d0d0" stroke="#be123c" stroke-width="0.6"/>
  <text x="345" y="150" text-anchor="middle" class="code">redo01a.log</text>
  <rect x="410" y="135" width="90" height="22" rx="4" ry="4" fill="#f5d0d0" stroke="#be123c" stroke-width="0.6"/>
  <text x="455" y="150" text-anchor="middle" class="code">redo01b.log</text>

  <!-- Group 2 (INACTIVE) - bottom left -->
  <rect x="60" y="300" width="240" height="90" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="180" y="325" text-anchor="middle" class="label" fill="#2f6a1c">Group 2 — INACTIVE</text>
  <text x="180" y="343" text-anchor="middle" class="sublabel">재사용 가능</text>
  <rect x="80" y="355" width="90" height="22" rx="4" ry="4" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="0.6"/>
  <text x="125" y="370" text-anchor="middle" class="code">redo02a.log</text>
  <rect x="190" y="355" width="90" height="22" rx="4" ry="4" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="0.6"/>
  <text x="235" y="370" text-anchor="middle" class="code">redo02b.log</text>

  <!-- Group 3 (ACTIVE) - bottom right -->
  <rect x="500" y="300" width="240" height="90" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="620" y="325" text-anchor="middle" class="label" fill="#8a5a10">Group 3 — ACTIVE</text>
  <text x="620" y="343" text-anchor="middle" class="sublabel">복구에 아직 필요</text>
  <rect x="520" y="355" width="90" height="22" rx="4" ry="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="0.6"/>
  <text x="565" y="370" text-anchor="middle" class="code">redo03a.log</text>
  <rect x="630" y="355" width="90" height="22" rx="4" ry="4" fill="#f0ddb3" stroke="#8a5a10" stroke-width="0.6"/>
  <text x="675" y="370" text-anchor="middle" class="code">redo03b.log</text>

  <!-- Circular arrows: Group1 → Group3 → Group2 → Group1 -->
  <!-- Arrow: Group 1 → Group 3 (right side) -->
  <path d="M 520 135 C 580 135, 660 200, 660 295" stroke="#2456a8" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="620" y="215" text-anchor="middle" class="small" fill="#2456a8">Log Switch</text>

  <!-- Arrow: Group 3 → Group 2 (bottom) -->
  <path d="M 500 370 C 420 420, 380 420, 300 370" stroke="#2456a8" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="400" y="430" text-anchor="middle" class="small" fill="#2456a8">Log Switch</text>

  <!-- Arrow: Group 2 → Group 1 (left side) -->
  <path d="M 140 300 C 140 200, 160 135, 280 125" stroke="#2456a8" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="170" y="215" text-anchor="middle" class="small" fill="#2456a8">Log Switch</text>

  <!-- LGWR label -->
  <rect x="340" y="225" width="120" height="45" rx="22" ry="22" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5"/>
  <text x="400" y="245" text-anchor="middle" class="label" fill="#be123c">LGWR</text>
  <text x="400" y="261" text-anchor="middle" class="small" fill="#be123c">순환 기록</text>

  <!-- Status legend -->
  <rect x="50" y="460" width="700" height="90" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1"/>
  <text x="400" y="484" text-anchor="middle" class="label">Redo Log 그룹 상태 (Group Status)</text>

  <rect x="80" y="498" width="14" height="14" rx="3" ry="3" fill="#be123c"/>
  <text x="100" y="510" class="sublabel">CURRENT — LGWR이 기록 중</text>

  <rect x="300" y="498" width="14" height="14" rx="3" ry="3" fill="#8a5a10"/>
  <text x="320" y="510" class="sublabel">ACTIVE — 인스턴스 복구에 필요 (체크포인트 미완료)</text>

  <rect x="80" y="522" width="14" height="14" rx="3" ry="3" fill="#2f6a1c"/>
  <text x="100" y="534" class="sublabel">INACTIVE — 재사용 가능</text>

  <rect x="300" y="522" width="14" height="14" rx="3" ry="3" fill="#787368"/>
  <text x="320" y="534" class="sublabel">UNUSED — 아직 미사용 (신규 추가 그룹)</text>
</svg>