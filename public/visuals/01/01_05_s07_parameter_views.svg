<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">파라미터 조회 뷰 비교</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">Parameter Views: V$PARAMETER vs V$SPPARAMETER</text>

  <!-- Memory side -->
  <rect x="40" y="75" width="330" height="200" class="box" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <rect x="40" y="75" width="330" height="32" rx="8" ry="0" fill="#3B82F6" fill-opacity="0.2"/>
  <text x="205" y="96" class="label" text-anchor="middle" fill="#3B82F6">Instance Memory (메모리)</text>

  <rect x="60" y="120" width="290" height="40" class="box" fill="#3B82F6" fill-opacity="0.08" stroke="#3B82F6" stroke-width="1"/>
  <text x="205" y="136" class="code" text-anchor="middle">V$PARAMETER</text>
  <text x="205" y="152" class="small" text-anchor="middle">현재 세션에서 유효한 값</text>

  <rect x="60" y="170" width="290" height="40" class="box" fill="#3B82F6" fill-opacity="0.05" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4"/>
  <text x="205" y="186" class="code" text-anchor="middle">V$SYSTEM_PARAMETER</text>
  <text x="205" y="202" class="small" text-anchor="middle">시스템 레벨 설정 값</text>

  <rect x="60" y="220" width="290" height="40" class="box" fill="#3B82F6" fill-opacity="0.05" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4"/>
  <text x="205" y="236" class="code" text-anchor="middle">V$PARAMETER2 / V$SYSTEM_PARAMETER2</text>
  <text x="205" y="252" class="small" text-anchor="middle">다중 값을 행 단위로 분리 표시</text>

  <!-- SPFILE side -->
  <rect x="430" y="75" width="330" height="200" class="box" fill="none" stroke="#10B981" stroke-width="2"/>
  <rect x="430" y="75" width="330" height="32" rx="8" ry="0" fill="#10B981" fill-opacity="0.2"/>
  <text x="595" y="96" class="label" text-anchor="middle" fill="#10B981">SPFILE (서버 파라미터 파일)</text>

  <rect x="450" y="120" width="290" height="40" class="box" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="595" y="136" class="code" text-anchor="middle">V$SPPARAMETER</text>
  <text x="595" y="152" class="small" text-anchor="middle">SPFILE에 기록된 값</text>

  <text x="595" y="185" class="sublabel" text-anchor="middle">ISSPECIFIED = 'TRUE'</text>
  <text x="595" y="203" class="small" text-anchor="middle">명시적으로 설정된 파라미터만</text>

  <text x="595" y="232" class="sublabel" text-anchor="middle">ISSPECIFIED = 'FALSE'</text>
  <text x="595" y="250" class="small" text-anchor="middle">미설정 (Oracle 기본값 사용)</text>

  <!-- SCOPE impact table -->
  <rect x="40" y="295" width="720" height="130" class="box" fill="#2A2B3D" stroke="#2A2B3D" stroke-width="1"/>
  <text x="400" y="318" class="label" text-anchor="middle">SCOPE별 뷰 반영 여부</text>

  <!-- Headers -->
  <text x="240" y="342" class="sublabel" text-anchor="middle" fill="#3B82F6">V$PARAMETER</text>
  <text x="430" y="342" class="sublabel" text-anchor="middle" fill="#10B981">V$SPPARAMETER</text>
  <text x="620" y="342" class="sublabel" text-anchor="middle">재기동 후 유지</text>

  <!-- SCOPE=MEMORY -->
  <text x="80" y="366" class="code">SCOPE=MEMORY</text>
  <text x="240" y="366" class="sublabel" text-anchor="middle" fill="#10B981">O (즉시 반영)</text>
  <text x="430" y="366" class="sublabel" text-anchor="middle" fill="#F43F5E">X</text>
  <text x="620" y="366" class="sublabel" text-anchor="middle" fill="#F43F5E">X (소멸)</text>

  <!-- SCOPE=SPFILE -->
  <text x="80" y="390" class="code">SCOPE=SPFILE</text>
  <text x="240" y="390" class="sublabel" text-anchor="middle" fill="#F43F5E">X (미반영)</text>
  <text x="430" y="390" class="sublabel" text-anchor="middle" fill="#10B981">O (즉시 반영)</text>
  <text x="620" y="390" class="sublabel" text-anchor="middle" fill="#10B981">O (유지)</text>

  <!-- SCOPE=BOTH -->
  <text x="80" y="414" class="code">SCOPE=BOTH</text>
  <text x="240" y="414" class="sublabel" text-anchor="middle" fill="#10B981">O</text>
  <text x="430" y="414" class="sublabel" text-anchor="middle" fill="#10B981">O</text>
  <text x="620" y="414" class="sublabel" text-anchor="middle" fill="#10B981">O (유지)</text>

  <!-- Key columns note -->
  <rect x="40" y="440" width="720" height="30" class="box" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="460" class="small" text-anchor="middle">V$PARAMETER 주요 컬럼: ISDEFAULT | ISMODIFIED | ISSYS_MODIFIABLE | ISSES_MODIFIABLE | ISPDB_MODIFIABLE | ISBASIC</text>
</svg>