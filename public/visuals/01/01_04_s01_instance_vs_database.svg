<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">인스턴스와 데이터베이스의 관계 (Instance vs Database)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">인스턴스 = 접근 경로 (Access Path), 데이터베이스 = 물리적 파일</text>

  <!-- Instance -->
  <rect x="40" y="70" width="330" height="180" class="box" fill="none" stroke="#4a2e78" stroke-width="2"/>
  <rect x="40" y="70" width="330" height="28" rx="8" ry="8" fill="#4a2e78" opacity="0.2"/>
  <text x="205" y="89" text-anchor="middle" class="label" fill="#4a2e78">인스턴스 (Instance)</text>

  <!-- SGA -->
  <rect x="60" y="110" width="290" height="55" class="box" fill="none" stroke="#2456a8" stroke-width="1.5"/>
  <text x="205" y="130" text-anchor="middle" class="sublabel" style="fill:#2456a8">SGA (System Global Area)</text>
  <text x="205" y="152" text-anchor="middle" class="small">Buffer Cache, Shared Pool, Redo Log Buffer...</text>

  <!-- Background processes -->
  <rect x="60" y="175" width="290" height="40" class="box" fill="none" stroke="#2456a8" stroke-width="1.5"/>
  <text x="205" y="195" text-anchor="middle" class="sublabel" style="fill:#2456a8">백그라운드 프로세스 (Background Processes)</text>
  <text x="205" y="210" text-anchor="middle" class="code">SMON  PMON  DBWn  LGWR  CKPT  LREG</text>

  <text x="205" y="240" text-anchor="middle" class="small">STARTUP 시 생성, SHUTDOWN 시 소멸</text>
  <text x="205" y="254" text-anchor="middle" class="code">ORACLE_SID 로 식별</text>

  <!-- Arrow -->
  <line x1="370" y1="160" x2="428" y2="160" stroke="#8a5a10" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="399" y="150" text-anchor="middle" class="small" style="fill:#8a5a10">접근</text>
  <text x="399" y="176" text-anchor="middle" class="small" style="fill:#8a5a10">경로</text>

  <!-- Database -->
  <rect x="430" y="70" width="330" height="180" class="box" fill="none" stroke="#2f6a1c" stroke-width="2"/>
  <rect x="430" y="70" width="330" height="28" rx="8" ry="8" fill="#2f6a1c" opacity="0.2"/>
  <text x="595" y="89" text-anchor="middle" class="label" fill="#2f6a1c">데이터베이스 (Database)</text>

  <rect x="450" y="110" width="140" height="36" class="box" fill="none" stroke="#f3efe4" stroke-width="1"/>
  <text x="520" y="133" text-anchor="middle" class="sublabel">데이터 파일</text>

  <rect x="600" y="110" width="140" height="36" class="box" fill="none" stroke="#f3efe4" stroke-width="1"/>
  <text x="670" y="133" text-anchor="middle" class="sublabel">컨트롤 파일</text>

  <rect x="450" y="155" width="140" height="36" class="box" fill="none" stroke="#f3efe4" stroke-width="1"/>
  <text x="520" y="178" text-anchor="middle" class="sublabel">Redo Log 파일</text>

  <rect x="600" y="155" width="140" height="36" class="box" fill="none" stroke="#f3efe4" stroke-width="1"/>
  <text x="670" y="178" text-anchor="middle" class="sublabel">아카이브 Log</text>

  <text x="595" y="215" text-anchor="middle" class="small">디스크에 저장 — 영구적으로 존재</text>
  <text x="595" y="229" text-anchor="middle" class="code">DB_NAME 으로 식별</text>

  <!-- Comparison: Single Instance vs RAC -->
  <rect x="40" y="280" width="330" height="100" class="box" fill="none" stroke="#2456a8" stroke-width="1.5"/>
  <rect x="40" y="280" width="330" height="26" rx="8" ry="8" fill="#2456a8" opacity="0.15"/>
  <text x="205" y="298" text-anchor="middle" class="label" style="fill:#2456a8">단일 인스턴스 (Single Instance)</text>

  <text x="205" y="325" text-anchor="middle" class="sublabel">1 Instance : 1 Database (1:1)</text>

  <rect x="105" y="338" width="60" height="30" class="box" fill="none" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="135" y="358" text-anchor="middle" class="small" style="fill:#4a2e78">Inst</text>
  <line x1="165" y1="353" x2="200" y2="353" stroke="#8a5a10" stroke-width="1.5" marker-end="url(#arrowSm)"/>
  <rect x="202" y="338" width="60" height="30" class="box" fill="none" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="232" y="358" text-anchor="middle" class="small" style="fill:#2f6a1c">DB</text>

  <rect x="430" y="280" width="330" height="100" class="box" fill="none" stroke="#8a5a10" stroke-width="1.5"/>
  <rect x="430" y="280" width="330" height="26" rx="8" ry="8" fill="#8a5a10" opacity="0.15"/>
  <text x="595" y="298" text-anchor="middle" class="label" style="fill:#8a5a10">RAC (Real Application Clusters)</text>

  <text x="595" y="325" text-anchor="middle" class="sublabel">N Instances : 1 Database (N:1)</text>

  <rect x="475" y="338" width="45" height="28" class="box" fill="none" stroke="#4a2e78" stroke-width="1"/>
  <text x="497" y="357" text-anchor="middle" class="small" style="fill:#4a2e78">Inst1</text>
  <rect x="528" y="338" width="45" height="28" class="box" fill="none" stroke="#4a2e78" stroke-width="1"/>
  <text x="550" y="357" text-anchor="middle" class="small" style="fill:#4a2e78">Inst2</text>
  <rect x="581" y="338" width="45" height="28" class="box" fill="none" stroke="#4a2e78" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="603" y="357" text-anchor="middle" class="small" style="fill:#4a2e78">InstN</text>

  <line x1="508" y1="366" x2="660" y2="366" stroke="#8a5a10" stroke-width="1"/>
  <line x1="540" y1="366" x2="660" y2="366" stroke="#8a5a10" stroke-width="1.5" marker-end="url(#arrowSm)"/>
  <line x1="508" y1="366" x2="660" y2="366" stroke="transparent" stroke-width="1"/>

  <rect x="650" y="338" width="60" height="28" class="box" fill="none" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="680" y="357" text-anchor="middle" class="small" style="fill:#2f6a1c">1 DB</text>

  <!-- Arrows connecting instances to DB -->
  <line x1="497" y1="366" x2="650" y2="357" stroke="#8a5a10" stroke-width="1"/>
  <line x1="550" y1="366" x2="650" y2="352" stroke="#8a5a10" stroke-width="1"/>
  <line x1="603" y1="366" x2="648" y2="355" stroke="#8a5a10" stroke-width="1" marker-end="url(#arrowSm)"/>

  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a5a10"/>
    </marker>
    <marker id="arrowSm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a5a10"/>
    </marker>
  </defs>
</svg>