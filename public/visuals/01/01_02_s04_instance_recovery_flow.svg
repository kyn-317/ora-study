<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .step { font-size: 13px; font-weight: 700; }
  </style>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#be123c"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2f6a1c"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2456a8"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a5a10"/>
    </marker>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a2e78"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">SMON 인스턴스 복구 흐름</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Instance Recovery Flow — Roll Forward then Roll Back</text>

  <!-- Timeline -->
  <line x1="50" y1="90" x2="750" y2="90" stroke="#f3efe4" stroke-width="2"/>

  <!-- Crash point -->
  <line x1="350" y1="75" x2="350" y2="105" stroke="#be123c" stroke-width="3"/>
  <text x="350" y="68" text-anchor="middle" class="label" fill="#be123c">인스턴스 크래시</text>
  <text x="350" y="120" text-anchor="middle" class="small" fill="#be123c">Instance Crash</text>

  <!-- Checkpoint SCN -->
  <line x1="150" y1="78" x2="150" y2="102" stroke="#8a5a10" stroke-width="2"/>
  <text x="150" y="68" text-anchor="middle" class="code">마지막 Checkpoint SCN</text>
  <text x="150" y="125" text-anchor="middle" class="small">복구 시작점</text>

  <!-- Restart point -->
  <line x1="550" y1="78" x2="550" y2="102" stroke="#2f6a1c" stroke-width="2"/>
  <text x="550" y="68" text-anchor="middle" class="code">인스턴스 재기동</text>
  <text x="550" y="125" text-anchor="middle" class="small">SMON 자동 시작</text>

  <!-- Redo range -->
  <rect x="150" y="85" width="200" height="10" fill="#f5d0d0" stroke="none"/>
  <text x="250" y="143" text-anchor="middle" class="small" fill="#be123c">Redo 적용 대상 구간</text>

  <!-- Phase 1: Roll Forward -->
  <rect x="30" y="160" width="360" height="140" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5"/>
  <text x="210" y="185" text-anchor="middle" class="label" fill="#be123c">Phase 1: Roll Forward (Cache Recovery)</text>

  <rect x="50" y="200" width="130" height="45" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="115" y="220" text-anchor="middle" class="sublabel">온라인 Redo Log</text>
  <text x="115" y="238" text-anchor="middle" class="small">변경 사항</text>

  <line x1="180" y1="222" x2="220" y2="222" stroke="#be123c" stroke-width="2" marker-end="url(#a1)"/>
  <text x="200" y="215" text-anchor="middle" class="step" fill="#be123c">적용</text>

  <rect x="220" y="200" width="150" height="45" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1"/>
  <text x="295" y="220" text-anchor="middle" class="sublabel">데이터 파일</text>
  <text x="295" y="238" text-anchor="middle" class="small">Data Files</text>

  <text x="210" y="270" text-anchor="middle" class="sublabel" fill="#be123c">COMMIT + 미COMMIT 트랜잭션 모두 적용</text>
  <text x="210" y="290" text-anchor="middle" class="small">All changes replayed from Redo Log</text>

  <!-- Phase 2: DB Open -->
  <rect x="410" y="160" width="370" height="55" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="2"/>
  <text x="595" y="185" text-anchor="middle" class="label" fill="#2f6a1c">Phase 2: 데이터베이스 오픈 (DB Open)</text>
  <text x="595" y="205" text-anchor="middle" class="sublabel">사용자 접속 가능 — 복구 완료를 기다리지 않아도 됨!</text>

  <line x1="390" y1="190" x2="410" y2="190" stroke="#2f6a1c" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Phase 3: Roll Back -->
  <rect x="410" y="230" width="370" height="110" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="595" y="255" text-anchor="middle" class="label" fill="#8a5a10">Phase 3: Roll Back (Transaction Recovery)</text>

  <rect x="430" y="268" width="130" height="40" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="495" y="287" text-anchor="middle" class="sublabel">Undo 데이터</text>
  <text x="495" y="303" text-anchor="middle" class="small">Before Images</text>

  <line x1="560" y1="288" x2="600" y2="288" stroke="#8a5a10" stroke-width="2" marker-end="url(#a4)"/>
  <text x="580" y="280" text-anchor="middle" class="step" fill="#8a5a10">롤백</text>

  <rect x="600" y="268" width="160" height="40" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1"/>
  <text x="680" y="287" text-anchor="middle" class="sublabel">미COMMIT 트랜잭션</text>
  <text x="680" y="303" text-anchor="middle" class="small">Uncommitted Txns</text>

  <text x="595" y="333" text-anchor="middle" class="small">백그라운드에서 수행 (사용자 대기 불필요)</text>

  <!-- Summary flow -->
  <rect x="30" y="360" width="740" height="110" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" class="label">SMON 인스턴스 복구 단계 요약</text>

  <!-- Flow boxes -->
  <rect x="50" y="400" width="150" height="50" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5"/>
  <text x="125" y="422" text-anchor="middle" class="sublabel" fill="#be123c">1. Roll Forward</text>
  <text x="125" y="440" text-anchor="middle" class="small">Redo 재적용</text>

  <line x1="200" y1="425" x2="260" y2="425" stroke="#787368" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="260" y="400" width="150" height="50" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="335" y="422" text-anchor="middle" class="sublabel" fill="#2f6a1c">2. DB 오픈</text>
  <text x="335" y="440" text-anchor="middle" class="small">사용자 접속 가능</text>

  <line x1="410" y1="425" x2="470" y2="425" stroke="#787368" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="470" y="400" width="150" height="50" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="545" y="422" text-anchor="middle" class="sublabel" fill="#8a5a10">3. Roll Back</text>
  <text x="545" y="440" text-anchor="middle" class="small">미COMMIT 트랜잭션 롤백</text>

  <line x1="620" y1="425" x2="680" y2="425" stroke="#787368" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="680" y="407" width="75" height="35" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="717" y="428" text-anchor="middle" class="sublabel" fill="#4a2e78">완료</text>
</svg>