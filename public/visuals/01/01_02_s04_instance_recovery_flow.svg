<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .step { font-size: 13px; font-weight: 700; }
  </style>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F43F5E"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">SMON 인스턴스 복구 흐름</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Instance Recovery Flow — Roll Forward then Roll Back</text>

  <!-- Timeline -->
  <line x1="50" y1="90" x2="750" y2="90" stroke="#2A2B3D" stroke-width="2"/>

  <!-- Crash point -->
  <line x1="350" y1="75" x2="350" y2="105" stroke="#F43F5E" stroke-width="3"/>
  <text x="350" y="68" text-anchor="middle" class="label" fill="#F43F5E">인스턴스 크래시</text>
  <text x="350" y="120" text-anchor="middle" class="small" fill="#F43F5E">Instance Crash</text>

  <!-- Checkpoint SCN -->
  <line x1="150" y1="78" x2="150" y2="102" stroke="#F59E0B" stroke-width="2"/>
  <text x="150" y="68" text-anchor="middle" class="code">마지막 Checkpoint SCN</text>
  <text x="150" y="125" text-anchor="middle" class="small">복구 시작점</text>

  <!-- Restart point -->
  <line x1="550" y1="78" x2="550" y2="102" stroke="#10B981" stroke-width="2"/>
  <text x="550" y="68" text-anchor="middle" class="code">인스턴스 재기동</text>
  <text x="550" y="125" text-anchor="middle" class="small">SMON 자동 시작</text>

  <!-- Redo range -->
  <rect x="150" y="85" width="200" height="10" fill="rgba(244,63,94,0.3)" stroke="none"/>
  <text x="250" y="143" text-anchor="middle" class="small" fill="#F43F5E">Redo 적용 대상 구간</text>

  <!-- Phase 1: Roll Forward -->
  <rect x="30" y="160" width="360" height="140" class="box" fill="rgba(244,63,94,0.06)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="210" y="185" text-anchor="middle" class="label" fill="#F43F5E">Phase 1: Roll Forward (Cache Recovery)</text>

  <rect x="50" y="200" width="130" height="45" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
  <text x="115" y="220" text-anchor="middle" class="sublabel">온라인 Redo Log</text>
  <text x="115" y="238" text-anchor="middle" class="small">변경 사항</text>

  <line x1="180" y1="222" x2="220" y2="222" stroke="#F43F5E" stroke-width="2" marker-end="url(#a1)"/>
  <text x="200" y="215" text-anchor="middle" class="step" fill="#F43F5E">적용</text>

  <rect x="220" y="200" width="150" height="45" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1"/>
  <text x="295" y="220" text-anchor="middle" class="sublabel">데이터 파일</text>
  <text x="295" y="238" text-anchor="middle" class="small">Data Files</text>

  <text x="210" y="270" text-anchor="middle" class="sublabel" fill="#F43F5E">COMMIT + 미COMMIT 트랜잭션 모두 적용</text>
  <text x="210" y="290" text-anchor="middle" class="small">All changes replayed from Redo Log</text>

  <!-- Phase 2: DB Open -->
  <rect x="410" y="160" width="370" height="55" class="box" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="2"/>
  <text x="595" y="185" text-anchor="middle" class="label" fill="#10B981">Phase 2: 데이터베이스 오픈 (DB Open)</text>
  <text x="595" y="205" text-anchor="middle" class="sublabel">사용자 접속 가능 — 복구 완료를 기다리지 않아도 됨!</text>

  <line x1="390" y1="190" x2="410" y2="190" stroke="#10B981" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Phase 3: Roll Back -->
  <rect x="410" y="230" width="370" height="110" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="595" y="255" text-anchor="middle" class="label" fill="#F59E0B">Phase 3: Roll Back (Transaction Recovery)</text>

  <rect x="430" y="268" width="130" height="40" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
  <text x="495" y="287" text-anchor="middle" class="sublabel">Undo 데이터</text>
  <text x="495" y="303" text-anchor="middle" class="small">Before Images</text>

  <line x1="560" y1="288" x2="600" y2="288" stroke="#F59E0B" stroke-width="2" marker-end="url(#a4)"/>
  <text x="580" y="280" text-anchor="middle" class="step" fill="#F59E0B">롤백</text>

  <rect x="600" y="268" width="160" height="40" class="box" fill="rgba(59,130,246,0.12)" stroke="#3B82F6" stroke-width="1"/>
  <text x="680" y="287" text-anchor="middle" class="sublabel">미COMMIT 트랜잭션</text>
  <text x="680" y="303" text-anchor="middle" class="small">Uncommitted Txns</text>

  <text x="595" y="333" text-anchor="middle" class="small">백그라운드에서 수행 (사용자 대기 불필요)</text>

  <!-- Summary flow -->
  <rect x="30" y="360" width="740" height="110" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" class="label">SMON 인스턴스 복구 단계 요약</text>

  <!-- Flow boxes -->
  <rect x="50" y="400" width="150" height="50" class="box" fill="rgba(244,63,94,0.12)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="125" y="422" text-anchor="middle" class="sublabel" fill="#F43F5E">1. Roll Forward</text>
  <text x="125" y="440" text-anchor="middle" class="small">Redo 재적용</text>

  <line x1="200" y1="425" x2="260" y2="425" stroke="#94A3B8" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="260" y="400" width="150" height="50" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1.5"/>
  <text x="335" y="422" text-anchor="middle" class="sublabel" fill="#10B981">2. DB 오픈</text>
  <text x="335" y="440" text-anchor="middle" class="small">사용자 접속 가능</text>

  <line x1="410" y1="425" x2="470" y2="425" stroke="#94A3B8" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="470" y="400" width="150" height="50" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="545" y="422" text-anchor="middle" class="sublabel" fill="#F59E0B">3. Roll Back</text>
  <text x="545" y="440" text-anchor="middle" class="small">미COMMIT 트랜잭션 롤백</text>

  <line x1="620" y1="425" x2="680" y2="425" stroke="#94A3B8" stroke-width="2" marker-end="url(#a3)"/>

  <rect x="680" y="407" width="75" height="35" class="box" fill="rgba(107,107,234,0.12)" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="717" y="428" text-anchor="middle" class="sublabel" fill="#6F6BEA">완료</text>
</svg>