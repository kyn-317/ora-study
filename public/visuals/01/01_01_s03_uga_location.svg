<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6a1c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">UGA Location: Dedicated vs Shared Server</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">UGA(User Global Area) 위치는 서버 연결 방식에 따라 변동</text>

  <!-- ========== Dedicated Server (Left) ========== -->
  <rect x="30" y="65" width="355" height="340" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="2" />
  <text x="207" y="90" text-anchor="middle" class="label" fill="#2f6a1c">Dedicated Server Mode</text>
  <text x="207" y="108" text-anchor="middle" class="small">전용 서버 모드 — 세션:프로세스 = 1:1</text>

  <!-- Client -->
  <rect x="55" y="125" width="80" height="35" rx="6" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="95" y="147" text-anchor="middle" class="sublabel">Client</text>

  <line x1="135" y1="142" x2="165" y2="142" stroke="#4a2e78" stroke-width="1.5" marker-end="url(#ah)" />

  <!-- Server Process + PGA -->
  <rect x="165" y="120" width="200" height="260" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5" />
  <text x="265" y="142" text-anchor="middle" class="sublabel" fill="#2f6a1c">Server Process + PGA</text>

  <!-- PGA components -->
  <rect x="180" y="155" width="170" height="35" rx="5" fill="#dee5f5" stroke="#2456a8" stroke-width="1" />
  <text x="265" y="177" text-anchor="middle" class="small">Private SQL Area</text>

  <rect x="180" y="200" width="170" height="35" rx="5" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="265" y="222" text-anchor="middle" class="small">SQL Work Area</text>

  <!-- UGA inside PGA (highlighted) -->
  <rect x="180" y="245" width="170" height="55" rx="5" fill="#f5d0d0" stroke="#be123c" stroke-width="2" />
  <text x="265" y="268" text-anchor="middle" class="label" fill="#be123c">UGA</text>
  <text x="265" y="286" text-anchor="middle" class="small">Session Memory</text>

  <text x="180" y="320" class="small">UGA는 PGA 내부에 위치</text>
  <text x="180" y="338" class="small">프로세스와 세션이 1:1 대응</text>
  <text x="180" y="356" class="small">→ PGA에 포함해도 문제 없음</text>

  <!-- SGA (small, no UGA) -->
  <rect x="55" y="170" width="95" height="60" rx="6" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" stroke-dasharray="4,3" />
  <text x="102" y="195" text-anchor="middle" class="small" fill="#4a2e78">SGA</text>
  <text x="102" y="210" text-anchor="middle" class="small">(UGA 없음)</text>

  <!-- ========== Shared Server (Right) ========== -->
  <rect x="415" y="65" width="355" height="340" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2" />
  <text x="592" y="90" text-anchor="middle" class="label" fill="#4a2e78">Shared Server Mode</text>
  <text x="592" y="108" text-anchor="middle" class="small">공유 서버 모드 — 세션:프로세스 = N:1</text>

  <!-- Multiple Clients -->
  <rect x="435" y="125" width="65" height="30" rx="5" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="467" y="145" text-anchor="middle" class="small">Client A</text>
  <rect x="435" y="162" width="65" height="30" rx="5" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="467" y="182" text-anchor="middle" class="small">Client B</text>
  <rect x="435" y="199" width="65" height="30" rx="5" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" />
  <text x="467" y="219" text-anchor="middle" class="small">Client C</text>

  <!-- Arrows to dispatcher -->
  <line x1="500" y1="140" x2="520" y2="170" stroke="#4a2e78" stroke-width="1" />
  <line x1="500" y1="177" x2="520" y2="177" stroke="#4a2e78" stroke-width="1" />
  <line x1="500" y1="214" x2="520" y2="185" stroke="#4a2e78" stroke-width="1" />

  <!-- Shared Server Process -->
  <rect x="525" y="155" width="80" height="40" rx="5" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" />
  <text x="565" y="175" text-anchor="middle" class="small" fill="#2f6a1c">Shared</text>
  <text x="565" y="188" text-anchor="middle" class="small" fill="#2f6a1c">Server</text>

  <!-- PGA of shared server (small, no UGA) -->
  <rect x="620" y="155" width="70" height="40" rx="5" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" stroke-dasharray="4,3" />
  <text x="655" y="175" text-anchor="middle" class="small">PGA</text>
  <text x="655" y="188" text-anchor="middle" class="small">(UGA 없음)</text>

  <!-- SGA with UGA -->
  <rect x="435" y="245" width="315" height="140" rx="6" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" />
  <text x="455" y="268" class="sublabel" fill="#4a2e78">SGA</text>

  <!-- Large Pool / Shared Pool with UGAs -->
  <rect x="450" y="280" width="135" height="90" rx="5" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" />
  <text x="517" y="300" text-anchor="middle" class="small" fill="#8a5a10">Large Pool (우선)</text>

  <!-- UGAs inside SGA -->
  <rect x="460" y="310" width="50" height="25" rx="4" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="485" y="327" text-anchor="middle" class="small" fill="#be123c">UGA-A</text>
  <rect x="518" y="310" width="50" height="25" rx="4" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="543" y="327" text-anchor="middle" class="small" fill="#be123c">UGA-B</text>

  <rect x="460" y="340" width="50" height="25" rx="4" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" />
  <text x="485" y="357" text-anchor="middle" class="small" fill="#be123c">UGA-C</text>

  <!-- Arrow from clients to UGAs -->
  <line x1="467" y1="229" x2="485" y2="275" stroke="#be123c" stroke-width="1" stroke-dasharray="3,3" />

  <!-- Note -->
  <rect x="600" y="280" width="140" height="90" rx="5" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1" />
  <text x="670" y="300" text-anchor="middle" class="small" fill="#be123c">UGA가 SGA로 이동!</text>
  <text x="610" y="320" class="small">세션 공유를 위해</text>
  <text x="610" y="335" class="small">다른 프로세스가</text>
  <text x="610" y="350" class="small">이어받을 수 있도록</text>
  <text x="610" y="365" class="small">공유 메모리 필수</text>

  <!-- Key takeaway -->
  <rect x="30" y="412" width="740" height="22" rx="4" fill="#f5d0d0" stroke="#be123c" stroke-width="1" />
  <text x="400" y="428" text-anchor="middle" class="sublabel" fill="#be123c">핵심: Shared Server 사용 시 SGA(Large Pool) 크기를 충분히 확보해야 UGA를 수용 가능</text>
</svg>