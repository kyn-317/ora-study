<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; fill: #6F6BEA; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">UNDO 특수 환경 제어 전체 구조</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Temporary UNDO + 멀티테넌트 UNDO 모드 (Shared vs Local)</text>

  <!-- Root -->
  <rect x="250" y="65" width="300" height="42" rx="8" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" class="label" fill="#6F6BEA">Oracle UNDO 특수 환경 제어</text>

  <!-- Two branches -->
  <path d="M320 107 L200 135" stroke="#10B981" stroke-width="1.5" marker-end="url(#ag3)"/>
  <path d="M480 107 L600 135" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#ab3)"/>

  <!-- Temporary UNDO Branch -->
  <rect x="30" y="135" width="340" height="270" rx="10" fill="#0F1019" stroke="#10B981" stroke-width="1.5"/>
  <text x="200" y="158" text-anchor="middle" class="label" fill="#10B981">임시 UNDO (Temporary UNDO)</text>
  <text x="200" y="175" text-anchor="middle" class="small">TEMP_UNDO_ENABLED = TRUE</text>

  <!-- GTT box -->
  <rect x="50" y="188" width="300" height="38" rx="5" fill="#1E1F2E" stroke="#10B981" stroke-width="1"/>
  <text x="200" y="207" text-anchor="middle" class="small" fill="#10B981">대상: Global Temporary Table (GTT)</text>
  <text x="200" y="220" text-anchor="middle" class="small">Private Temporary Table, 임시 LOB</text>

  <!-- Benefits -->
  <rect x="50" y="234" width="145" height="55" rx="5" fill="#1E1F2E" stroke="#10B981" stroke-width="1"/>
  <text x="122" y="252" text-anchor="middle" class="small" fill="#10B981">UNDO 저장</text>
  <text x="122" y="268" text-anchor="middle" class="small">Temp Tablespace에</text>
  <text x="122" y="282" text-anchor="middle" class="small">저장 (UNDO TBS 미사용)</text>

  <rect x="205" y="234" width="145" height="55" rx="5" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1"/>
  <text x="277" y="252" text-anchor="middle" class="small" fill="#F59E0B">REDO 생략</text>
  <text x="277" y="268" text-anchor="middle" class="small">REDO 로그 기록 없음</text>
  <text x="277" y="282" text-anchor="middle" class="small">이중 I/O 감소</text>

  <rect x="50" y="297" width="300" height="45" rx="5" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="200" y="315" text-anchor="middle" class="small" fill="#10B981">Oracle 21c+ 기본값: TRUE</text>
  <text x="200" y="332" text-anchor="middle" class="small">인스턴스 복구 불필요 (자동 소멸)</text>

  <rect x="50" y="350" width="300" height="42" rx="5" fill="#1E1F2E" stroke="#F43F5E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="368" text-anchor="middle" class="small" fill="#F43F5E">제한: 분산 TXN 미지원, Flashback 제한</text>
  <text x="200" y="383" text-anchor="middle" class="small" fill="#F43F5E">Data Guard Standby 비전파</text>

  <!-- Multitenant UNDO Branch -->
  <rect x="430" y="135" width="340" height="270" rx="10" fill="#0F1019" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="600" y="158" text-anchor="middle" class="label" fill="#3B82F6">멀티테넌트 UNDO 모드</text>
  <text x="600" y="175" text-anchor="middle" class="small">CDB/PDB 환경의 UNDO 관리</text>

  <!-- Shared Mode -->
  <rect x="450" y="188" width="140" height="115" rx="6" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="520" y="208" text-anchor="middle" class="label" fill="#F59E0B">Shared UNDO</text>
  <text x="520" y="226" text-anchor="middle" class="small">CDB$ROOT에 1개</text>
  <text x="520" y="242" text-anchor="middle" class="small">모든 PDB 공유</text>
  <text x="520" y="262" text-anchor="middle" class="small" fill="#F43F5E">Hot Clone 불가</text>
  <text x="520" y="278" text-anchor="middle" class="small" fill="#F43F5E">Flashback PDB 불가</text>
  <text x="520" y="294" text-anchor="middle" class="small" fill="#F59E0B">레거시 호환</text>

  <!-- Local Mode -->
  <rect x="610" y="188" width="140" height="115" rx="6" fill="#1E1F2E" stroke="#10B981" stroke-width="2"/>
  <text x="680" y="208" text-anchor="middle" class="label" fill="#10B981">Local UNDO</text>
  <text x="680" y="226" text-anchor="middle" class="small">PDB마다 독립 UNDO</text>
  <text x="680" y="242" text-anchor="middle" class="small">완전 격리</text>
  <text x="680" y="262" text-anchor="middle" class="small" fill="#10B981">Hot Clone 가능</text>
  <text x="680" y="278" text-anchor="middle" class="small" fill="#10B981">Flashback PDB 가능</text>
  <text x="680" y="294" text-anchor="middle" class="small" fill="#10B981">21c+ 기본/권장</text>

  <!-- Arrow between modes -->
  <path d="M595 310 L595 330" stroke="#6F6BEA" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="450" y="332" width="300" height="60" rx="5" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="600" y="352" text-anchor="middle" class="small" fill="#10B981">Oracle 26ai 권장: Local UNDO</text>
  <text x="600" y="368" text-anchor="middle" class="small">PDB 이동성, 격리성, 고급 기능 활성화</text>
  <text x="600" y="384" text-anchor="middle" class="mono" fill="#6F6BEA">ALTER DATABASE LOCAL UNDO ON;</text>

  <defs>
    <marker id="ag3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10B981"/></marker>
    <marker id="ab3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3B82F6"/></marker>
  </defs>
</svg>