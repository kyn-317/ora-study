<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #4a2e78; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">UNDO 모드 전환 절차 비교</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Shared → Local (권장) vs Local → Shared (비권장)</text>

  <!-- Shared → Local (Left) -->
  <rect x="20" y="60" width="370" height="350" rx="10" fill="#faf8f3" stroke="#2f6a1c" stroke-width="2"/>
  <text x="205" y="85" text-anchor="middle" class="label" fill="#2f6a1c">Shared → Local UNDO (권장)</text>

  <rect x="45" y="98" width="320" height="30" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="55" y="117" class="small" fill="#2456a8">1</text>
  <text x="75" y="117" class="mono">현재 UNDO 모드 확인</text>
  <path d="M205 128 L205 134" stroke="#787368" stroke-width="1"/>

  <rect x="45" y="136" width="320" height="30" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1"/>
  <text x="55" y="155" class="small" fill="#be123c">2</text>
  <text x="75" y="155" class="mono">SHUTDOWN IMMEDIATE;</text>
  <path d="M205 166 L205 172" stroke="#787368" stroke-width="1"/>

  <rect x="45" y="174" width="320" height="30" rx="5" fill="#f3efe4" stroke="#8a5a10" stroke-width="1"/>
  <text x="55" y="193" class="small" fill="#8a5a10">3</text>
  <text x="75" y="193" class="mono">STARTUP UPGRADE;</text>
  <path d="M205 204 L205 210" stroke="#787368" stroke-width="1"/>

  <rect x="45" y="212" width="320" height="30" rx="5" fill="#2f6a1c" fill-opacity="0.15" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="55" y="231" class="small" fill="#2f6a1c">4</text>
  <text x="75" y="231" class="mono" fill="#2f6a1c">ALTER DATABASE LOCAL UNDO ON;</text>
  <path d="M205 242 L205 248" stroke="#787368" stroke-width="1"/>

  <rect x="45" y="250" width="320" height="30" rx="5" fill="#f3efe4" stroke="#4a2e78" stroke-width="1"/>
  <text x="55" y="269" class="small" fill="#4a2e78">5</text>
  <text x="75" y="269" class="mono">ALTER PLUGGABLE DATABASE ALL OPEN UPGRADE;</text>
  <path d="M205 280 L205 286" stroke="#787368" stroke-width="1"/>

  <rect x="45" y="288" width="320" height="30" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1"/>
  <text x="55" y="307" class="small" fill="#be123c">6</text>
  <text x="75" y="307" class="mono">SHUTDOWN IMMEDIATE; STARTUP;</text>
  <path d="M205 318 L205 324" stroke="#787368" stroke-width="1"/>

  <rect x="45" y="326" width="320" height="30" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="55" y="345" class="small" fill="#2456a8">7</text>
  <text x="75" y="345" class="mono">ALTER PLUGGABLE DATABASE ALL OPEN;</text>

  <rect x="45" y="365" width="320" height="35" rx="5" fill="#2f6a1c" fill-opacity="0.08" stroke="#2f6a1c" stroke-width="1"/>
  <text x="205" y="382" text-anchor="middle" class="small" fill="#2f6a1c">PDB별 UNDO TBS 자동 생성</text>
  <text x="205" y="396" text-anchor="middle" class="small" fill="#8a5a10">디스크 공간 사전 확보 필요!</text>

  <!-- Local → Shared (Right) -->
  <rect x="410" y="60" width="370" height="350" rx="10" fill="#faf8f3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="595" y="85" text-anchor="middle" class="label" fill="#8a5a10">Local → Shared UNDO (비권장)</text>
  <text x="595" y="100" text-anchor="middle" class="small" fill="#be123c">Oracle 21c+ Deprecated</text>

  <rect x="435" y="112" width="320" height="30" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="445" y="131" class="small" fill="#2456a8">1</text>
  <text x="465" y="131" class="mono">현재 UNDO 모드 확인</text>
  <path d="M595 142 L595 148" stroke="#787368" stroke-width="1"/>

  <rect x="435" y="150" width="320" height="30" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1"/>
  <text x="445" y="169" class="small" fill="#be123c">2</text>
  <text x="465" y="169" class="mono">SHUTDOWN IMMEDIATE;</text>
  <path d="M595 180 L595 186" stroke="#787368" stroke-width="1"/>

  <rect x="435" y="188" width="320" height="30" rx="5" fill="#f3efe4" stroke="#8a5a10" stroke-width="1"/>
  <text x="445" y="207" class="small" fill="#8a5a10">3</text>
  <text x="465" y="207" class="mono">STARTUP UPGRADE;</text>
  <path d="M595 218 L595 224" stroke="#787368" stroke-width="1"/>

  <rect x="435" y="226" width="320" height="30" rx="5" fill="#8a5a10" fill-opacity="0.15" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="445" y="245" class="small" fill="#8a5a10">4</text>
  <text x="465" y="245" class="mono" fill="#8a5a10">ALTER DATABASE LOCAL UNDO OFF;</text>
  <path d="M595 256 L595 262" stroke="#787368" stroke-width="1"/>

  <rect x="435" y="264" width="320" height="30" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1"/>
  <text x="445" y="283" class="small" fill="#be123c">5</text>
  <text x="465" y="283" class="mono">SHUTDOWN IMMEDIATE; STARTUP;</text>
  <path d="M595 294 L595 300" stroke="#787368" stroke-width="1"/>

  <rect x="435" y="302" width="320" height="30" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="445" y="321" class="small" fill="#2456a8">6</text>
  <text x="465" y="321" class="mono">ALTER PLUGGABLE DATABASE ALL OPEN;</text>

  <rect x="435" y="345" width="320" height="55" rx="5" fill="#be123c" fill-opacity="0.08" stroke="#be123c" stroke-width="1"/>
  <text x="595" y="362" text-anchor="middle" class="small" fill="#be123c">PDB의 기존 UNDO TBS 수동 삭제 필요</text>
  <text x="595" y="378" text-anchor="middle" class="small" fill="#be123c">Hot Clone, Relocate, Flashback PDB 비활성화</text>
  <text x="595" y="394" text-anchor="middle" class="small" fill="#be123c">기능 다운그레이드 — 영향도 분석 필수</text>

  <!-- Confirmation query -->
  <text x="400" y="432" text-anchor="middle" class="mono" fill="#4a2e78">확인: SELECT PROPERTY_VALUE FROM DATABASE_PROPERTIES WHERE PROPERTY_NAME='LOCAL_UNDO_ENABLED';</text>
</svg>