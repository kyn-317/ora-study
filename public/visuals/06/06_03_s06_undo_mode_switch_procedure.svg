<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; fill: #6F6BEA; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">UNDO 모드 전환 절차 비교</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Shared → Local (권장) vs Local → Shared (비권장)</text>

  <!-- Shared → Local (Left) -->
  <rect x="20" y="60" width="370" height="350" rx="10" fill="#0F1019" stroke="#10B981" stroke-width="2"/>
  <text x="205" y="85" text-anchor="middle" class="label" fill="#10B981">Shared → Local UNDO (권장)</text>

  <rect x="45" y="98" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#3B82F6" stroke-width="1"/>
  <text x="55" y="117" class="small" fill="#3B82F6">1</text>
  <text x="75" y="117" class="mono">현재 UNDO 모드 확인</text>
  <path d="M205 128 L205 134" stroke="#94A3B8" stroke-width="1"/>

  <rect x="45" y="136" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#F43F5E" stroke-width="1"/>
  <text x="55" y="155" class="small" fill="#F43F5E">2</text>
  <text x="75" y="155" class="mono">SHUTDOWN IMMEDIATE;</text>
  <path d="M205 166 L205 172" stroke="#94A3B8" stroke-width="1"/>

  <rect x="45" y="174" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1"/>
  <text x="55" y="193" class="small" fill="#F59E0B">3</text>
  <text x="75" y="193" class="mono">STARTUP UPGRADE;</text>
  <path d="M205 204 L205 210" stroke="#94A3B8" stroke-width="1"/>

  <rect x="45" y="212" width="320" height="30" rx="5" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="55" y="231" class="small" fill="#10B981">4</text>
  <text x="75" y="231" class="mono" fill="#10B981">ALTER DATABASE LOCAL UNDO ON;</text>
  <path d="M205 242 L205 248" stroke="#94A3B8" stroke-width="1"/>

  <rect x="45" y="250" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="1"/>
  <text x="55" y="269" class="small" fill="#6F6BEA">5</text>
  <text x="75" y="269" class="mono">ALTER PLUGGABLE DATABASE ALL OPEN UPGRADE;</text>
  <path d="M205 280 L205 286" stroke="#94A3B8" stroke-width="1"/>

  <rect x="45" y="288" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#F43F5E" stroke-width="1"/>
  <text x="55" y="307" class="small" fill="#F43F5E">6</text>
  <text x="75" y="307" class="mono">SHUTDOWN IMMEDIATE; STARTUP;</text>
  <path d="M205 318 L205 324" stroke="#94A3B8" stroke-width="1"/>

  <rect x="45" y="326" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#3B82F6" stroke-width="1"/>
  <text x="55" y="345" class="small" fill="#3B82F6">7</text>
  <text x="75" y="345" class="mono">ALTER PLUGGABLE DATABASE ALL OPEN;</text>

  <rect x="45" y="365" width="320" height="35" rx="5" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="205" y="382" text-anchor="middle" class="small" fill="#10B981">PDB별 UNDO TBS 자동 생성</text>
  <text x="205" y="396" text-anchor="middle" class="small" fill="#F59E0B">디스크 공간 사전 확보 필요!</text>

  <!-- Local → Shared (Right) -->
  <rect x="410" y="60" width="370" height="350" rx="10" fill="#0F1019" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="595" y="85" text-anchor="middle" class="label" fill="#F59E0B">Local → Shared UNDO (비권장)</text>
  <text x="595" y="100" text-anchor="middle" class="small" fill="#F43F5E">Oracle 21c+ Deprecated</text>

  <rect x="435" y="112" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#3B82F6" stroke-width="1"/>
  <text x="445" y="131" class="small" fill="#3B82F6">1</text>
  <text x="465" y="131" class="mono">현재 UNDO 모드 확인</text>
  <path d="M595 142 L595 148" stroke="#94A3B8" stroke-width="1"/>

  <rect x="435" y="150" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#F43F5E" stroke-width="1"/>
  <text x="445" y="169" class="small" fill="#F43F5E">2</text>
  <text x="465" y="169" class="mono">SHUTDOWN IMMEDIATE;</text>
  <path d="M595 180 L595 186" stroke="#94A3B8" stroke-width="1"/>

  <rect x="435" y="188" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1"/>
  <text x="445" y="207" class="small" fill="#F59E0B">3</text>
  <text x="465" y="207" class="mono">STARTUP UPGRADE;</text>
  <path d="M595 218 L595 224" stroke="#94A3B8" stroke-width="1"/>

  <rect x="435" y="226" width="320" height="30" rx="5" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="445" y="245" class="small" fill="#F59E0B">4</text>
  <text x="465" y="245" class="mono" fill="#F59E0B">ALTER DATABASE LOCAL UNDO OFF;</text>
  <path d="M595 256 L595 262" stroke="#94A3B8" stroke-width="1"/>

  <rect x="435" y="264" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#F43F5E" stroke-width="1"/>
  <text x="445" y="283" class="small" fill="#F43F5E">5</text>
  <text x="465" y="283" class="mono">SHUTDOWN IMMEDIATE; STARTUP;</text>
  <path d="M595 294 L595 300" stroke="#94A3B8" stroke-width="1"/>

  <rect x="435" y="302" width="320" height="30" rx="5" fill="#1E1F2E" stroke="#3B82F6" stroke-width="1"/>
  <text x="445" y="321" class="small" fill="#3B82F6">6</text>
  <text x="465" y="321" class="mono">ALTER PLUGGABLE DATABASE ALL OPEN;</text>

  <rect x="435" y="345" width="320" height="55" rx="5" fill="#F43F5E" fill-opacity="0.08" stroke="#F43F5E" stroke-width="1"/>
  <text x="595" y="362" text-anchor="middle" class="small" fill="#F43F5E">PDB의 기존 UNDO TBS 수동 삭제 필요</text>
  <text x="595" y="378" text-anchor="middle" class="small" fill="#F43F5E">Hot Clone, Relocate, Flashback PDB 비활성화</text>
  <text x="595" y="394" text-anchor="middle" class="small" fill="#F43F5E">기능 다운그레이드 — 영향도 분석 필수</text>

  <!-- Confirmation query -->
  <text x="400" y="432" text-anchor="middle" class="mono" fill="#6F6BEA">확인: SELECT PROPERTY_VALUE FROM DATABASE_PROPERTIES WHERE PROPERTY_NAME='LOCAL_UNDO_ENABLED';</text>
</svg>