<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #4a2e78; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">Flashback 기능 분류와 UNDO 의존성</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">UNDO 기반 vs 비-UNDO 기반 Flashback Features</text>

  <!-- UNDO-based Flashback Features -->
  <rect x="20" y="65" width="470" height="295" rx="10" fill="#faf8f3" stroke="#4a2e78" stroke-width="2"/>
  <text x="255" y="88" text-anchor="middle" class="label" fill="#4a2e78">UNDO 기반 Flashback (UNDO_RETENTION 범위 내)</text>

  <!-- Flashback Query -->
  <rect x="40" y="100" width="210" height="72" rx="6" fill="#f3efe4" stroke="#2456a8" stroke-width="1.5"/>
  <text x="145" y="120" text-anchor="middle" class="label" fill="#2456a8">Flashback Query</text>
  <text x="145" y="137" text-anchor="middle" class="small">AS OF SCN / TIMESTAMP</text>
  <text x="145" y="153" text-anchor="middle" class="small">과거 시점 데이터 SELECT</text>
  <text x="145" y="167" text-anchor="middle" class="mono" fill="#2456a8">CR 블록 생성 메커니즘 동일</text>

  <!-- Flashback Version Query -->
  <rect x="265" y="100" width="210" height="72" rx="6" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="370" y="120" text-anchor="middle" class="label" fill="#2f6a1c">Flashback Version Query</text>
  <text x="370" y="137" text-anchor="middle" class="small">VERSIONS BETWEEN</text>
  <text x="370" y="153" text-anchor="middle" class="small">행 변경 이력 추적</text>
  <text x="370" y="167" text-anchor="middle" class="mono" fill="#2f6a1c">I(Insert) U(Update) D(Delete)</text>

  <!-- Flashback Transaction Query -->
  <rect x="40" y="182" width="210" height="72" rx="6" fill="#f3efe4" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="145" y="202" text-anchor="middle" class="label" fill="#8a5a10">Flashback TXN Query</text>
  <text x="145" y="219" text-anchor="middle" class="small">FLASHBACK_TRANSACTION_QUERY</text>
  <text x="145" y="235" text-anchor="middle" class="small">트랜잭션별 변경 내역</text>
  <text x="145" y="249" text-anchor="middle" class="mono" fill="#8a5a10">UNDO_SQL 자동 생성</text>

  <!-- Flashback Table -->
  <rect x="265" y="182" width="210" height="72" rx="6" fill="#f3efe4" stroke="#be123c" stroke-width="1.5"/>
  <text x="370" y="202" text-anchor="middle" class="label" fill="#be123c">Flashback Table</text>
  <text x="370" y="219" text-anchor="middle" class="small">FLASHBACK TABLE ... TO</text>
  <text x="370" y="235" text-anchor="middle" class="small">테이블 과거 시점 복원</text>
  <text x="370" y="249" text-anchor="middle" class="mono" fill="#be123c">ROW MOVEMENT 활성화 필수</text>

  <!-- Dependency note -->
  <rect x="40" y="266" width="435" height="40" rx="5" fill="#4a2e78" fill-opacity="0.1" stroke="#4a2e78" stroke-width="1"/>
  <text x="257" y="284" text-anchor="middle" class="small" fill="#4a2e78">UNDO_RETENTION 범위 초과 시 → ORA-01555 / ORA-08180</text>
  <text x="257" y="299" text-anchor="middle" class="small" fill="#4a2e78">RETENTION GUARANTEE 설정 시 Flashback 성공률 향상</text>

  <!-- NON-UNDO Flashback Features -->
  <rect x="510" y="65" width="270" height="200" rx="10" fill="#faf8f3" stroke="#f3efe4" stroke-width="1.5"/>
  <text x="645" y="88" text-anchor="middle" class="label" fill="#787368">비-UNDO 기반 Flashback</text>

  <rect x="525" y="100" width="240" height="65" rx="6" fill="#f3efe4" stroke="#787368" stroke-width="1"/>
  <text x="645" y="120" text-anchor="middle" class="label">Flashback Drop</text>
  <text x="645" y="137" text-anchor="middle" class="small">DROP된 테이블 복원</text>
  <text x="645" y="153" text-anchor="middle" class="mono">Recycle Bin 기반</text>

  <rect x="525" y="175" width="240" height="65" rx="6" fill="#f3efe4" stroke="#787368" stroke-width="1"/>
  <text x="645" y="195" text-anchor="middle" class="label">Flashback Database</text>
  <text x="645" y="212" text-anchor="middle" class="small">전체 DB 과거 시점 복원</text>
  <text x="645" y="228" text-anchor="middle" class="mono">Flashback Log 기반</text>

  <!-- Bottom: Key SQL Examples -->
  <rect x="20" y="370" width="760" height="42" rx="6" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="400" y="388" text-anchor="middle" class="label">핵심 SQL 구문</text>
  <text x="200" y="405" text-anchor="middle" class="mono" fill="#2456a8">SELECT * FROM t AS OF TIMESTAMP ...</text>
  <text x="550" y="405" text-anchor="middle" class="mono" fill="#2f6a1c">SELECT * FROM t VERSIONS BETWEEN ...</text>
</svg>