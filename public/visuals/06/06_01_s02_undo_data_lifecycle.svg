<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; fill: #6F6BEA; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">UNDO 데이터 생명주기 (UNDO Data Lifecycle)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">DML 유형별 UNDO 데이터 생성 → Active → Unexpired → Expired</text>

  <!-- DML Type boxes -->
  <rect x="30" y="70" width="170" height="70" rx="8" fill="#1E1F2E" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="115" y="92" text-anchor="middle" class="label" fill="#3B82F6">INSERT</text>
  <text x="115" y="110" text-anchor="middle" class="small">삽입된 행의 ROWID 저장</text>
  <text x="115" y="124" text-anchor="middle" class="small">→ 롤백 시 행 삭제</text>

  <rect x="215" y="70" width="170" height="70" rx="8" fill="#1E1F2E" stroke="#10B981" stroke-width="1.5"/>
  <text x="300" y="92" text-anchor="middle" class="label" fill="#10B981">UPDATE</text>
  <text x="300" y="110" text-anchor="middle" class="small">변경 전 컬럼값 저장</text>
  <text x="300" y="124" text-anchor="middle" class="small">→ 롤백 시 원래값 복원</text>

  <rect x="400" y="70" width="170" height="70" rx="8" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="485" y="92" text-anchor="middle" class="label" fill="#F59E0B">DELETE</text>
  <text x="485" y="110" text-anchor="middle" class="small">전체 행 데이터 저장</text>
  <text x="485" y="124" text-anchor="middle" class="small">→ 롤백 시 행 재삽입</text>

  <rect x="585" y="70" width="170" height="70" rx="8" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="670" y="92" text-anchor="middle" class="label" fill="#6F6BEA">MERGE</text>
  <text x="670" y="110" text-anchor="middle" class="small">INSERT/UPDATE에 따라</text>
  <text x="670" y="124" text-anchor="middle" class="small">해당 UNDO 생성</text>

  <!-- Arrow to lifecycle -->
  <path d="M400 140 L400 165" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- State transition: Active -->
  <rect x="100" y="175" width="200" height="90" rx="10" fill="#1E1F2E" stroke="#F43F5E" stroke-width="2.5"/>
  <circle cx="130" cy="200" r="10" fill="#F43F5E" opacity="0.3"/>
  <circle cx="130" cy="200" r="5" fill="#F43F5E"/>
  <text x="200" y="200" text-anchor="middle" class="label" fill="#F43F5E">ACTIVE (활성)</text>
  <text x="200" y="220" text-anchor="middle" class="small">트랜잭션 진행 중</text>
  <text x="200" y="236" text-anchor="middle" class="small" fill="#F43F5E">절대 덮어쓰기 불가</text>
  <text x="200" y="252" text-anchor="middle" class="mono">롤백에 필수</text>

  <!-- Arrow: Active → Unexpired -->
  <path d="M300 220 L365 220" stroke="#E2E8F0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="333" y="212" text-anchor="middle" class="small" fill="#E2E8F0">COMMIT/</text>
  <text x="333" y="225" text-anchor="middle" class="small" fill="#E2E8F0">ROLLBACK</text>

  <!-- Unexpired -->
  <rect x="370" y="175" width="200" height="90" rx="10" fill="#1E1F2E" stroke="#F59E0B" stroke-width="2.5"/>
  <circle cx="400" cy="200" r="10" fill="#F59E0B" opacity="0.3"/>
  <circle cx="400" cy="200" r="5" fill="#F59E0B"/>
  <text x="470" y="200" text-anchor="middle" class="label" fill="#F59E0B">UNEXPIRED (미만료)</text>
  <text x="470" y="220" text-anchor="middle" class="small">RETENTION 기간 이내</text>
  <text x="470" y="236" text-anchor="middle" class="small" fill="#F59E0B">공간 부족 시 재사용 가능</text>
  <text x="470" y="252" text-anchor="middle" class="mono">읽기 일관성 + Flashback</text>

  <!-- Arrow: Unexpired → Expired -->
  <path d="M570 220 L635 220" stroke="#E2E8F0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="603" y="210" text-anchor="middle" class="small" fill="#E2E8F0">RETENTION</text>
  <text x="603" y="224" text-anchor="middle" class="small" fill="#E2E8F0">경과</text>

  <!-- Expired -->
  <rect x="640" y="175" width="140" height="90" rx="10" fill="#1E1F2E" stroke="#10B981" stroke-width="2.5"/>
  <circle cx="665" cy="200" r="10" fill="#10B981" opacity="0.3"/>
  <circle cx="665" cy="200" r="5" fill="#10B981"/>
  <text x="710" y="200" text-anchor="middle" class="label" fill="#10B981">EXPIRED</text>
  <text x="710" y="216" text-anchor="middle" class="small">(만료)</text>
  <text x="710" y="236" text-anchor="middle" class="small" fill="#10B981">자유롭게 재사용</text>
  <text x="710" y="252" text-anchor="middle" class="mono">우선 재사용 대상</text>

  <!-- UNDO_RETENTION parameter box -->
  <rect x="50" y="300" width="700" height="55" rx="8" fill="#1E1F2E" stroke="#2A2B3D" stroke-width="1"/>
  <text x="400" y="322" text-anchor="middle" class="label">UNDO_RETENTION 파라미터</text>
  <text x="400" y="340" text-anchor="middle" class="mono" fill="#6F6BEA">기본값: 900초 (15분) | ALTER SYSTEM SET UNDO_RETENTION = &lt;seconds&gt;</text>

  <!-- Bottom note: UNDO data also logged to Redo -->
  <rect x="50" y="370" width="700" height="55" rx="8" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="400" y="392" text-anchor="middle" class="label" fill="#F59E0B">핵심 포인트</text>
  <text x="400" y="410" text-anchor="middle" class="small">UNDO 데이터의 변경도 Redo Log에 기록됨 → 장애 복구 시 UNDO 세그먼트도 복구 가능</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E2E8F0"/>
    </marker>
  </defs>
</svg>