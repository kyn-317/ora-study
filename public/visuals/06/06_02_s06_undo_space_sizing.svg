<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; fill: #6F6BEA; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 12px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">UNDO 테이블스페이스 크기 산정 공식</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">UNDO Space = UNDO_RETENTION x UNDO Generation Rate + Overhead</text>

  <!-- Main Formula -->
  <rect x="100" y="65" width="600" height="70" rx="10" fill="#6F6BEA" fill-opacity="0.1" stroke="#6F6BEA" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" class="mono" fill="#6F6BEA" font-size="15">UNDO Size (MB) = (UR × UPS × DB_BLOCK_SIZE) / (1024 × 1024)</text>
  <text x="400" y="122" text-anchor="middle" class="small">UR = UNDO_RETENTION(초) | UPS = 초당 UNDO 블록 생성 수 | + 10~20% 여유</text>

  <!-- Three calculation inputs -->
  <rect x="30" y="155" width="230" height="100" rx="8" fill="#1E1F2E" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="145" y="177" text-anchor="middle" class="label" fill="#3B82F6">UR: UNDO_RETENTION</text>
  <text x="145" y="197" text-anchor="middle" class="small">TUNED_UNDORETENTION 또는</text>
  <text x="145" y="213" text-anchor="middle" class="small">수동 설정값 (기본 900초)</text>
  <text x="145" y="233" text-anchor="middle" class="mono" fill="#3B82F6">V$UNDOSTAT</text>
  <text x="145" y="247" text-anchor="middle" class="mono" fill="#3B82F6">TUNED_UNDORETENTION</text>

  <rect x="280" y="155" width="240" height="100" rx="8" fill="#1E1F2E" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="177" text-anchor="middle" class="label" fill="#10B981">UPS: 초당 UNDO 블록 생성률</text>
  <text x="400" y="197" text-anchor="middle" class="mono" fill="#10B981">SUM(UNDOBLKS) /</text>
  <text x="400" y="213" text-anchor="middle" class="mono" fill="#10B981">SUM((END_TIME-BEGIN_TIME)</text>
  <text x="400" y="229" text-anchor="middle" class="mono" fill="#10B981">* 86400)</text>
  <text x="400" y="247" text-anchor="middle" class="small">V$UNDOSTAT 기반 계산</text>

  <rect x="540" y="155" width="230" height="100" rx="8" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="655" y="177" text-anchor="middle" class="label" fill="#F59E0B">고려 요소</text>
  <text x="655" y="197" text-anchor="middle" class="small">피크 워크로드 기준</text>
  <text x="655" y="213" text-anchor="middle" class="small">최장 쿼리 실행 시간</text>
  <text x="655" y="229" text-anchor="middle" class="small">Flashback 요구사항</text>
  <text x="655" y="245" text-anchor="middle" class="small">GUARANTEE 모드 여부</text>

  <!-- UNDO Advisor -->
  <rect x="100" y="275" width="600" height="45" rx="8" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="1"/>
  <text x="400" y="295" text-anchor="middle" class="label" fill="#6F6BEA">UNDO Advisor (DBMS_UNDO_ADV 패키지)</text>
  <text x="400" y="312" text-anchor="middle" class="small">V$UNDOSTAT 데이터 기반으로 최적의 UNDO_RETENTION 및 테이블스페이스 크기를 자동 권고</text>

  <!-- Monitoring indicators -->
  <rect x="30" y="335" width="740" height="35" rx="6" fill="#0F1019" stroke="#2A2B3D" stroke-width="1"/>
  <text x="120" y="357" text-anchor="middle" class="small" fill="#F43F5E">EXPIRED &lt; 10%: 경고</text>
  <text x="310" y="357" text-anchor="middle" class="small" fill="#F43F5E">NOSPACEERRCNT > 0: 즉시 대응</text>
  <text x="520" y="357" text-anchor="middle" class="small" fill="#F59E0B">UNXPSTEALCNT 증가: 확장 필요</text>
  <text x="700" y="357" text-anchor="middle" class="small" fill="#10B981">Free &gt; 20%: 양호</text>
</svg>