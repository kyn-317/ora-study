<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #4a2e78; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 12px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">UNDO 테이블스페이스 크기 산정 공식</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">UNDO Space = UNDO_RETENTION x UNDO Generation Rate + Overhead</text>

  <!-- Main Formula -->
  <rect x="100" y="65" width="600" height="70" rx="10" fill="#4a2e78" fill-opacity="0.1" stroke="#4a2e78" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" class="mono" fill="#4a2e78" font-size="15">UNDO Size (MB) = (UR × UPS × DB_BLOCK_SIZE) / (1024 × 1024)</text>
  <text x="400" y="122" text-anchor="middle" class="small">UR = UNDO_RETENTION(초) | UPS = 초당 UNDO 블록 생성 수 | + 10~20% 여유</text>

  <!-- Three calculation inputs -->
  <rect x="30" y="155" width="230" height="100" rx="8" fill="#f3efe4" stroke="#2456a8" stroke-width="1.5"/>
  <text x="145" y="177" text-anchor="middle" class="label" fill="#2456a8">UR: UNDO_RETENTION</text>
  <text x="145" y="197" text-anchor="middle" class="small">TUNED_UNDORETENTION 또는</text>
  <text x="145" y="213" text-anchor="middle" class="small">수동 설정값 (기본 900초)</text>
  <text x="145" y="233" text-anchor="middle" class="mono" fill="#2456a8">V$UNDOSTAT</text>
  <text x="145" y="247" text-anchor="middle" class="mono" fill="#2456a8">TUNED_UNDORETENTION</text>

  <rect x="280" y="155" width="240" height="100" rx="8" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="400" y="177" text-anchor="middle" class="label" fill="#2f6a1c">UPS: 초당 UNDO 블록 생성률</text>
  <text x="400" y="197" text-anchor="middle" class="mono" fill="#2f6a1c">SUM(UNDOBLKS) /</text>
  <text x="400" y="213" text-anchor="middle" class="mono" fill="#2f6a1c">SUM((END_TIME-BEGIN_TIME)</text>
  <text x="400" y="229" text-anchor="middle" class="mono" fill="#2f6a1c">* 86400)</text>
  <text x="400" y="247" text-anchor="middle" class="small">V$UNDOSTAT 기반 계산</text>

  <rect x="540" y="155" width="230" height="100" rx="8" fill="#f3efe4" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="655" y="177" text-anchor="middle" class="label" fill="#8a5a10">고려 요소</text>
  <text x="655" y="197" text-anchor="middle" class="small">피크 워크로드 기준</text>
  <text x="655" y="213" text-anchor="middle" class="small">최장 쿼리 실행 시간</text>
  <text x="655" y="229" text-anchor="middle" class="small">Flashback 요구사항</text>
  <text x="655" y="245" text-anchor="middle" class="small">GUARANTEE 모드 여부</text>

  <!-- UNDO Advisor -->
  <rect x="100" y="275" width="600" height="45" rx="8" fill="#f3efe4" stroke="#4a2e78" stroke-width="1"/>
  <text x="400" y="295" text-anchor="middle" class="label" fill="#4a2e78">UNDO Advisor (DBMS_UNDO_ADV 패키지)</text>
  <text x="400" y="312" text-anchor="middle" class="small">V$UNDOSTAT 데이터 기반으로 최적의 UNDO_RETENTION 및 테이블스페이스 크기를 자동 권고</text>

  <!-- Monitoring indicators -->
  <rect x="30" y="335" width="740" height="35" rx="6" fill="#faf8f3" stroke="#f3efe4" stroke-width="1"/>
  <text x="120" y="357" text-anchor="middle" class="small" fill="#be123c">EXPIRED &lt; 10%: 경고</text>
  <text x="310" y="357" text-anchor="middle" class="small" fill="#be123c">NOSPACEERRCNT > 0: 즉시 대응</text>
  <text x="520" y="357" text-anchor="middle" class="small" fill="#8a5a10">UNXPSTEALCNT 증가: 확장 필요</text>
  <text x="700" y="357" text-anchor="middle" class="small" fill="#2f6a1c">Free &gt; 20%: 양호</text>
</svg>