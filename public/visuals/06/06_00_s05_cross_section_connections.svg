<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620">
  <style>
    text { font-family: 'Pretendard', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #94A3B8; }
    .detail { font-size: 11px; fill: #CBD5E1; }
    .code { font-family: monospace; font-size: 12px; fill: #F59E0B; }
    .box { fill: rgba(255,255,255,0.05); stroke: #2A2B3D; stroke-width: 1.5; rx: 8; }
    .unit-01 { fill: rgba(111,107,234,0.12); stroke: #6F6BEA; stroke-width: 2; rx: 10; }
    .unit-02 { fill: rgba(59,130,246,0.1); stroke: #3B82F6; stroke-width: 2; rx: 10; }
    .unit-03 { fill: rgba(245,158,11,0.1); stroke: #F59E0B; stroke-width: 2; rx: 10; }
    .conn-box { fill: rgba(255,255,255,0.04); stroke: #2A2B3D; stroke-width: 1; rx: 6; }
    .link-12 { stroke: #8B5CF6; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; }
    .link-23 { stroke: #14B8A6; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; }
    .link-13 { stroke: #F97316; stroke-width: 1.5; fill: none; stroke-dasharray: 5,3; }
    .link-solid { stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6" />
    </marker>
    <marker id="arrT" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#14B8A6" />
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F97316" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" class="title">단원 간 연결 관계 — 5대 핵심 연결고리</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Cross-Section Connections: 5 Key Linkages Between Study Units</text>

  <!-- ===== Three Unit Blocks (Top) ===== -->
  <rect x="30" y="72" width="210" height="100" class="unit-01"/>
  <text x="135" y="96" text-anchor="middle" class="label" fill="#6F6BEA">06_01 기능 및 목적</text>
  <text x="135" y="113" text-anchor="middle" class="sublabel">Functions &amp; Purpose</text>
  <text x="135" y="132" text-anchor="middle" class="detail">UNDO 정의 / 읽기 일관성</text>
  <text x="135" y="147" text-anchor="middle" class="detail">롤백 / Flashback / ORA-01555</text>
  <text x="135" y="162" text-anchor="middle" class="detail">UNDO 세그먼트 구조</text>

  <rect x="295" y="72" width="210" height="100" class="unit-02"/>
  <text x="400" y="96" text-anchor="middle" class="label" fill="#3B82F6">06_02 데이터 상태</text>
  <text x="400" y="113" text-anchor="middle" class="sublabel">Data States</text>
  <text x="400" y="132" text-anchor="middle" class="detail">Extent 상태 전이</text>
  <text x="400" y="147" text-anchor="middle" class="detail">UNDO_RETENTION / Auto-Tuning</text>
  <text x="400" y="162" text-anchor="middle" class="detail">GUARANTEE / V$UNDOSTAT</text>

  <rect x="560" y="72" width="210" height="100" class="unit-03"/>
  <text x="665" y="96" text-anchor="middle" class="label" fill="#F59E0B">06_03 특수 환경 제어</text>
  <text x="665" y="113" text-anchor="middle" class="sublabel">Special Environment</text>
  <text x="665" y="132" text-anchor="middle" class="detail">Temporary UNDO (GTT)</text>
  <text x="665" y="147" text-anchor="middle" class="detail">Local / Shared UNDO</text>
  <text x="665" y="162" text-anchor="middle" class="detail">PDB별 UNDO 격리</text>

  <!-- ===== Connection 1: 01↔02 ===== -->
  <line x1="200" y1="172" x2="200" y2="198" class="link-12" marker-end="url(#arrP)"/>
  <line x1="340" y1="172" x2="340" y2="198" class="link-12" marker-end="url(#arrP)"/>

  <rect x="55" y="200" width="430" height="68" class="conn-box" style="stroke:#8B5CF6;"/>
  <rect x="55" y="200" width="6" height="68" fill="#8B5CF6" rx="3"/>
  <text x="72" y="218" class="label" style="font-size:12px; fill:#8B5CF6;">연결 1: UNDO 상태 전이 → 읽기 일관성 → ORA-01555</text>
  <text x="72" y="236" class="detail">UNEXPIRED 강제 재사용(06_02) → CR 블록용 Before Image 소실(06_01)</text>
  <text x="72" y="252" class="detail">→ ORA-01555 Snapshot Too Old 발생(06_01)</text>
  <text x="72" y="264" class="sublabel" style="font-size:10px;">State Transition affects Read Consistency → ORA-01555</text>

  <!-- ===== Connection 2: 01↔02 ===== -->
  <rect x="55" y="280" width="430" height="58" class="conn-box" style="stroke:#8B5CF6;"/>
  <rect x="55" y="280" width="6" height="58" fill="#8B5CF6" rx="3"/>
  <text x="72" y="298" class="label" style="font-size:12px; fill:#8B5CF6;">연결 2: UNDO_RETENTION → GUARANTEE → Flashback</text>
  <text x="72" y="314" class="detail">RETENTION Auto-Tuning(06_02) → Flashback 가능 범위 결정(06_01)</text>
  <text x="72" y="328" class="detail">GUARANTEE 설정 → Flashback 안정성↑, ORA-30036 위험↑ (트레이드오프)</text>

  <!-- ===== Connection 3: 01↔02 ===== -->
  <rect x="55" y="350" width="430" height="58" class="conn-box" style="stroke:#8B5CF6;"/>
  <rect x="55" y="350" width="6" height="58" fill="#8B5CF6" rx="3"/>
  <text x="72" y="368" class="label" style="font-size:12px; fill:#8B5CF6;">연결 3: 세그먼트 순환 → 공간 산정 → 에러 대응</text>
  <text x="72" y="384" class="detail">순환적 Extent 사용(06_01) → 공간 부족 시 자동 동작(06_02)</text>
  <text x="72" y="398" class="detail">공간 산정 공식(06_02) + V$UNDOSTAT 모니터링으로 사전 대응</text>

  <!-- ===== Connection 4: 02↔03 ===== -->
  <line x1="460" y1="172" x2="460" y2="418" class="link-23" marker-end="url(#arrT)"/>
  <line x1="610" y1="172" x2="610" y2="418" class="link-23" marker-end="url(#arrT)"/>

  <rect x="315" y="420" width="445" height="58" class="conn-box" style="stroke:#14B8A6;"/>
  <rect x="315" y="420" width="6" height="58" fill="#14B8A6" rx="3"/>
  <text x="332" y="438" class="label" style="font-size:12px; fill:#14B8A6;">연결 4: Local UNDO → PDB 독립성 → UNDO 상태 격리</text>
  <text x="332" y="454" class="detail">Local UNDO(06_03) → PDB별 독립 UNDO 테이블스페이스</text>
  <text x="332" y="468" class="detail">→ Extent 상태(06_02) + RETENTION(06_02)이 PDB별 완전 격리</text>

  <!-- ===== Connection 5: 01↔03 ===== -->
  <line x1="135" y1="172" x2="135" y2="490" class="link-13" marker-end="url(#arrO)"/>
  <line x1="665" y1="172" x2="665" y2="490" class="link-13" marker-end="url(#arrO)"/>

  <rect x="55" y="492" width="705" height="58" class="conn-box" style="stroke:#F97316;"/>
  <rect x="55" y="492" width="6" height="58" fill="#F97316" rx="3"/>
  <text x="72" y="510" class="label" style="font-size:12px; fill:#F97316;">연결 5: Temporary UNDO → UNDO 테이블스페이스 부하 경감</text>
  <text x="72" y="526" class="detail">Temporary UNDO(06_03) → GTT의 UNDO를 Temp TS로 분리 → UNDO TS(06_01) 공간 압박 해소</text>
  <text x="72" y="540" class="detail">UNDO 공간 산정(06_02) 시 Temp UNDO 적용 여부에 따라 필요 크기 변동</text>

  <!-- Legend -->
  <rect x="55" y="565" width="700" height="40" class="box" style="fill:rgba(255,255,255,0.02);"/>
  <line x1="70" y1="587" x2="100" y2="587" class="link-12" style="stroke-width:2;"/>
  <text x="106" y="591" class="sublabel" style="font-size:10px;">06_01 ↔ 06_02 연결 (연결 1~3)</text>
  <line x1="280" y1="587" x2="310" y2="587" class="link-23" style="stroke-width:2;"/>
  <text x="316" y="591" class="sublabel" style="font-size:10px;">06_02 ↔ 06_03 연결 (연결 4)</text>
  <line x1="480" y1="587" x2="510" y2="587" class="link-13" style="stroke-width:2;"/>
  <text x="516" y="591" class="sublabel" style="font-size:10px;">06_01 ↔ 06_03 연결 (연결 5)</text>
</svg>