<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #4a2e78; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">UNDO 세그먼트 구조 및 순환적 Extent 사용</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Segment Header → Transaction Table → Circular Extent Allocation</text>

  <!-- UNDO Segment outer box -->
  <rect x="30" y="65" width="350" height="300" rx="10" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <text x="205" y="88" text-anchor="middle" class="label" fill="#4a2e78">UNDO 세그먼트 (_SYSSMUn_hash$)</text>

  <!-- Segment Header -->
  <rect x="50" y="100" width="310" height="130" rx="6" fill="#faf8f3" stroke="#2456a8" stroke-width="1.5"/>
  <text x="205" y="120" text-anchor="middle" class="label" fill="#2456a8">세그먼트 헤더 블록 (Segment Header)</text>

  <!-- Transaction Table -->
  <rect x="65" y="130" width="280" height="90" rx="4" fill="#f3efe4" stroke="#8a5a10" stroke-width="1"/>
  <text x="205" y="148" text-anchor="middle" class="small" fill="#8a5a10">트랜잭션 테이블 (Transaction Table)</text>
  <text x="80" y="168" class="mono" fill="#1a1a1a">Slot 1: XID=007.001.0045 ACTIVE  UBA</text>
  <text x="80" y="183" class="mono" fill="#1a1a1a">Slot 2: XID=007.002.0023 COMMITTED SCN</text>
  <text x="80" y="198" class="mono" fill="#787368">Slot 3: XID=007.003.0012 DEAD    UBA</text>
  <text x="80" y="213" class="mono" fill="#787368">...     (최대 34~47 슬롯, 블록 크기에 따라)</text>

  <!-- Extents -->
  <rect x="50" y="240" width="100" height="35" rx="4" fill="#be123c" fill-opacity="0.15" stroke="#be123c" stroke-width="1"/>
  <text x="100" y="262" text-anchor="middle" class="small" fill="#be123c">Extent 1</text>
  <text x="100" y="273" text-anchor="middle" class="mono" fill="#be123c">ACTIVE</text>

  <rect x="160" y="240" width="100" height="35" rx="4" fill="#8a5a10" fill-opacity="0.15" stroke="#8a5a10" stroke-width="1"/>
  <text x="210" y="262" text-anchor="middle" class="small" fill="#8a5a10">Extent 2</text>
  <text x="210" y="273" text-anchor="middle" class="mono" fill="#8a5a10">UNEXPIRED</text>

  <rect x="260" y="240" width="80" height="35" rx="4" fill="#2f6a1c" fill-opacity="0.15" stroke="#2f6a1c" stroke-width="1"/>
  <text x="300" y="262" text-anchor="middle" class="small" fill="#2f6a1c">Ext 3</text>
  <text x="300" y="273" text-anchor="middle" class="mono" fill="#2f6a1c">EXPIRED</text>

  <!-- Circular arrow -->
  <path d="M90 290 C90 340, 310 340, 310 290" stroke="#4a2e78" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrP)"/>
  <text x="200" y="335" text-anchor="middle" class="small" fill="#4a2e78">순환적(Circular) 재사용</text>
  <text x="200" y="350" text-anchor="middle" class="small">Active Extent는 건너뜀 → 새 Extent 할당</text>

  <!-- Right side: Extent Allocation Mechanism -->
  <rect x="420" y="65" width="360" height="300" rx="10" fill="#f3efe4" stroke="#f3efe4" stroke-width="1.5"/>
  <text x="600" y="90" text-anchor="middle" class="label">Extent 할당 메커니즘 (Space Allocation)</text>

  <!-- Steps -->
  <rect x="440" y="105" width="320" height="38" rx="5" fill="#2f6a1c" fill-opacity="0.12" stroke="#2f6a1c" stroke-width="1"/>
  <text x="450" y="122" class="small" fill="#2f6a1c">1단계</text>
  <text x="520" y="122" class="small">다음 Extent가 Expired → 재사용</text>
  <text x="520" y="136" class="mono" fill="#2f6a1c">우선순위 1: Expired Extent</text>

  <path d="M600 143 L600 150" stroke="#787368" stroke-width="1" marker-end="url(#arrS)"/>

  <rect x="440" y="153" width="320" height="38" rx="5" fill="#2456a8" fill-opacity="0.12" stroke="#2456a8" stroke-width="1"/>
  <text x="450" y="170" class="small" fill="#2456a8">2단계</text>
  <text x="520" y="170" class="small">Unexpired → 새 Extent 할당 시도</text>
  <text x="520" y="184" class="mono" fill="#2456a8">UNDO Tablespace Free Space</text>

  <path d="M600 191 L600 198" stroke="#787368" stroke-width="1" marker-end="url(#arrS)"/>

  <rect x="440" y="201" width="320" height="38" rx="5" fill="#8a5a10" fill-opacity="0.12" stroke="#8a5a10" stroke-width="1"/>
  <text x="450" y="218" class="small" fill="#8a5a10">3단계</text>
  <text x="520" y="218" class="small">공간 부족 → Unexpired Steal</text>
  <text x="520" y="232" class="mono" fill="#8a5a10">강제 EXPIRED 전환 후 재사용</text>

  <path d="M600 239 L600 246" stroke="#787368" stroke-width="1" marker-end="url(#arrS)"/>

  <rect x="440" y="249" width="320" height="38" rx="5" fill="#be123c" fill-opacity="0.12" stroke="#be123c" stroke-width="1.5"/>
  <text x="450" y="266" class="small" fill="#be123c">4단계</text>
  <text x="520" y="266" class="small">여전히 공간 부족</text>
  <text x="520" y="280" class="mono" fill="#be123c">ORA-30036 에러 발생!</text>

  <!-- Segment Status -->
  <rect x="440" y="300" width="320" height="55" rx="5" fill="#faf8f3" stroke="#f3efe4" stroke-width="1"/>
  <text x="600" y="318" text-anchor="middle" class="small" fill="#4a2e78">세그먼트 상태 (Segment Status)</text>
  <text x="460" y="338" class="mono">ONLINE</text>
  <text x="540" y="338" class="mono" fill="#787368">OFFLINE</text>
  <text x="620" y="338" class="mono" fill="#8a5a10">PENDING</text>
  <text x="710" y="338" class="mono" fill="#be123c">NEEDS RECOVERY</text>

  <!-- Bottom: Related Views -->
  <rect x="30" y="385" width="740" height="70" rx="8" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="400" y="407" text-anchor="middle" class="label">관련 동적 성능 뷰 (Related Dynamic Performance Views)</text>
  <text x="150" y="430" text-anchor="middle" class="mono" fill="#2456a8">V$ROLLSTAT</text>
  <text x="150" y="445" text-anchor="middle" class="small">세그먼트별 통계</text>
  <text x="330" y="430" text-anchor="middle" class="mono" fill="#2f6a1c">V$ROLLNAME</text>
  <text x="330" y="445" text-anchor="middle" class="small">이름/USN 매핑</text>
  <text x="500" y="430" text-anchor="middle" class="mono" fill="#8a5a10">V$TRANSACTION</text>
  <text x="500" y="445" text-anchor="middle" class="small">활성 트랜잭션 정보</text>
  <text x="680" y="430" text-anchor="middle" class="mono" fill="#4a2e78">DBA_ROLLBACK_SEGS</text>
  <text x="680" y="445" text-anchor="middle" class="small">메타데이터</text>

  <!-- XID structure -->
  <rect x="30" y="470" width="740" height="55" rx="8" fill="#f3efe4" stroke="#4a2e78" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="400" y="492" text-anchor="middle" class="label" fill="#4a2e78">Transaction ID (XID) 구조</text>
  <text x="400" y="512" text-anchor="middle" class="mono">XID = USN (UNDO Segment Number) + Slot (트랜잭션 슬롯) + Sequence (시퀀스 번호)</text>

  <defs>
    <marker id="arrP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a2e78"/></marker>
    <marker id="arrS" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#787368"/></marker>
  </defs>
</svg>