<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #4a2e78; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">트랜잭션 롤백 유형 및 인스턴스 복구 프로세스</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Rollback Types / Instance Recovery: Roll Forward → Roll Back</text>

  <!-- Rollback Types Row -->
  <rect x="20" y="70" width="145" height="80" rx="8" fill="#f3efe4" stroke="#2456a8" stroke-width="1.5"/>
  <text x="92" y="92" text-anchor="middle" class="label" fill="#2456a8">사용자 롤백</text>
  <text x="92" y="108" text-anchor="middle" class="small">User Rollback</text>
  <text x="92" y="127" text-anchor="middle" class="mono">ROLLBACK 명령</text>
  <text x="92" y="141" text-anchor="middle" class="small">서버 프로세스 처리</text>

  <rect x="175" y="70" width="145" height="80" rx="8" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="247" y="92" text-anchor="middle" class="label" fill="#2f6a1c">Savepoint 롤백</text>
  <text x="247" y="108" text-anchor="middle" class="small">Partial Rollback</text>
  <text x="247" y="127" text-anchor="middle" class="mono">ROLLBACK TO SP</text>
  <text x="247" y="141" text-anchor="middle" class="small">부분 롤백 + 잠금 해제</text>

  <rect x="330" y="70" width="145" height="80" rx="8" fill="#f3efe4" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="402" y="92" text-anchor="middle" class="label" fill="#8a5a10">문장 수준 롤백</text>
  <text x="402" y="108" text-anchor="middle" class="small">Statement-Level</text>
  <text x="402" y="127" text-anchor="middle" class="mono">DML 에러 발생 시</text>
  <text x="402" y="141" text-anchor="middle" class="small">제약조건 위반 등</text>

  <rect x="485" y="70" width="145" height="80" rx="8" fill="#f3efe4" stroke="#be123c" stroke-width="1.5"/>
  <text x="557" y="92" text-anchor="middle" class="label" fill="#be123c">시스템 롤백</text>
  <text x="557" y="108" text-anchor="middle" class="small">Instance Recovery</text>
  <text x="557" y="127" text-anchor="middle" class="mono">인스턴스 장애 후</text>
  <text x="557" y="141" text-anchor="middle" class="small">SMON 프로세스</text>

  <rect x="640" y="70" width="145" height="80" rx="8" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="712" y="92" text-anchor="middle" class="label" fill="#4a2e78">Dead TXN</text>
  <text x="712" y="108" text-anchor="middle" class="small">Recovery</text>
  <text x="712" y="127" text-anchor="middle" class="mono">프로세스 비정상 종료</text>
  <text x="712" y="141" text-anchor="middle" class="small">PMON 감지 → SMON 롤백</text>

  <!-- User Rollback Internal Process -->
  <rect x="20" y="175" width="760" height="115" rx="10" fill="#faf8f3" stroke="#2456a8" stroke-width="1.5"/>
  <text x="400" y="197" text-anchor="middle" class="label" fill="#2456a8">사용자 롤백 내부 동작 단계 (User Rollback Internal Steps)</text>

  <rect x="40" y="210" width="130" height="40" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="105" y="228" text-anchor="middle" class="small">1) 마지막 UNDO</text>
  <text x="105" y="242" text-anchor="middle" class="small">레코드 탐색 (UBA)</text>
  <path d="M170 230 L190 230" stroke="#787368" stroke-width="1" marker-end="url(#a1)"/>

  <rect x="195" y="210" width="130" height="40" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="260" y="228" text-anchor="middle" class="small">2) Before Image</text>
  <text x="260" y="242" text-anchor="middle" class="small">역순 적용</text>
  <path d="M325 230 L345 230" stroke="#787368" stroke-width="1" marker-end="url(#a1)"/>

  <rect x="350" y="210" width="130" height="40" rx="5" fill="#f3efe4" stroke="#8a5a10" stroke-width="1"/>
  <text x="415" y="228" text-anchor="middle" class="small" fill="#8a5a10">3) 롤백 작업도</text>
  <text x="415" y="242" text-anchor="middle" class="small" fill="#8a5a10">Redo에 기록</text>
  <path d="M480 230 L500 230" stroke="#787368" stroke-width="1" marker-end="url(#a1)"/>

  <rect x="505" y="210" width="130" height="40" rx="5" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="570" y="228" text-anchor="middle" class="small">4) TXN 테이블</text>
  <text x="570" y="242" text-anchor="middle" class="small">COMMITTED 변경</text>
  <path d="M635 230 L655 230" stroke="#787368" stroke-width="1" marker-end="url(#a1)"/>

  <rect x="660" y="210" width="100" height="40" rx="5" fill="#2f6a1c" fill-opacity="0.15" stroke="#2f6a1c" stroke-width="1"/>
  <text x="710" y="228" text-anchor="middle" class="small" fill="#2f6a1c">5) UNDO 공간</text>
  <text x="710" y="242" text-anchor="middle" class="small" fill="#2f6a1c">재사용 가능</text>

  <text x="400" y="278" text-anchor="middle" class="small" fill="#8a5a10">핵심: 롤백도 Redo에 기록됨 → 복구 시 롤백 상태도 복구 가능</text>

  <!-- Instance Recovery Process -->
  <rect x="20" y="310" width="760" height="145" rx="10" fill="#faf8f3" stroke="#be123c" stroke-width="1.5"/>
  <text x="400" y="332" text-anchor="middle" class="label" fill="#be123c">인스턴스 복구 2단계 (Instance Recovery)</text>

  <!-- Phase 1: Roll Forward -->
  <rect x="50" y="345" width="330" height="95" rx="8" fill="#f3efe4" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="215" y="367" text-anchor="middle" class="label" fill="#8a5a10">1단계: Roll Forward (Cache Recovery)</text>
  <text x="215" y="387" text-anchor="middle" class="small">Redo Log를 적용하여</text>
  <text x="215" y="403" text-anchor="middle" class="small">커밋된 + 미커밋된 모든 변경을 재적용</text>
  <text x="215" y="425" text-anchor="middle" class="mono" fill="#8a5a10">Redo Log → 데이터 파일</text>

  <path d="M380 392 L420 392" stroke="#1a1a1a" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Phase 2: Roll Back -->
  <rect x="425" y="345" width="330" height="95" rx="8" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="590" y="367" text-anchor="middle" class="label" fill="#4a2e78">2단계: Roll Back (Transaction Recovery)</text>
  <text x="590" y="387" text-anchor="middle" class="small">UNDO 데이터를 이용하여</text>
  <text x="590" y="403" text-anchor="middle" class="small">미커밋 트랜잭션을 롤백</text>
  <text x="590" y="425" text-anchor="middle" class="mono" fill="#4a2e78">UNDO Segment → 데이터 블록 원복</text>

  <!-- Monitoring Views -->
  <rect x="20" y="465" width="760" height="12" rx="3" fill="#f3efe4"/>
  <text x="200" y="475" text-anchor="middle" class="mono" fill="#2456a8">V$TRANSACTION (USED_UBLK/USED_UREC)</text>
  <text x="500" y="475" text-anchor="middle" class="mono" fill="#2f6a1c">V$FAST_START_TRANSACTIONS</text>
  <text x="700" y="475" text-anchor="middle" class="mono" fill="#8a5a10">V$FAST_START_SERVERS</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#787368"/></marker>
  </defs>
</svg>