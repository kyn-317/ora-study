<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #4a2e78; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">Temporary UNDO 동작 흐름 비교</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">기존 UNDO vs Temporary UNDO: GTT DML 처리 시 I/O 경로 비교</text>

  <!-- Left: Traditional Flow -->
  <rect x="20" y="65" width="365" height="355" rx="10" fill="#faf8f3" stroke="#be123c" stroke-width="1.5"/>
  <text x="202" y="88" text-anchor="middle" class="label" fill="#be123c">기존 방식 (TEMP_UNDO_ENABLED = FALSE)</text>

  <rect x="45" y="100" width="315" height="35" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="202" y="122" text-anchor="middle" class="small">1) GTT에 DML 실행</text>
  <path d="M202 135 L202 145" stroke="#787368" stroke-width="1" marker-end="url(#as3)"/>

  <rect x="45" y="148" width="315" height="35" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1.5"/>
  <text x="202" y="170" text-anchor="middle" class="small" fill="#be123c">2) UNDO 레코드를 UNDO TBS에 기록</text>
  <path d="M202 183 L202 193" stroke="#787368" stroke-width="1" marker-end="url(#as3)"/>

  <rect x="45" y="196" width="315" height="35" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1.5"/>
  <text x="202" y="218" text-anchor="middle" class="small" fill="#be123c">3) UNDO 레코드에 대한 REDO 생성</text>
  <path d="M202 231 L202 241" stroke="#787368" stroke-width="1" marker-end="url(#as3)"/>

  <rect x="45" y="244" width="315" height="35" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1.5"/>
  <text x="202" y="266" text-anchor="middle" class="small" fill="#be123c">4) REDO 로그 버퍼에 기록</text>
  <path d="M202 279 L202 289" stroke="#787368" stroke-width="1" marker-end="url(#as3)"/>

  <rect x="45" y="292" width="315" height="35" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1.5"/>
  <text x="202" y="314" text-anchor="middle" class="small" fill="#be123c">5) LGWR이 REDO를 디스크에 기록</text>
  <path d="M202 327 L202 337" stroke="#787368" stroke-width="1" marker-end="url(#as3)"/>

  <rect x="45" y="340" width="315" height="35" rx="5" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="202" y="362" text-anchor="middle" class="small">6) COMMIT 시 UNDO 보존</text>

  <!-- I/O count -->
  <rect x="45" y="385" width="315" height="25" rx="4" fill="#be123c" fill-opacity="0.1"/>
  <text x="202" y="403" text-anchor="middle" class="small" fill="#be123c">총 6단계 | UNDO I/O + REDO I/O 모두 발생</text>

  <!-- Right: Temporary UNDO Flow -->
  <rect x="415" y="65" width="365" height="355" rx="10" fill="#faf8f3" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="597" y="88" text-anchor="middle" class="label" fill="#2f6a1c">Temporary UNDO (TEMP_UNDO_ENABLED = TRUE)</text>

  <rect x="440" y="100" width="315" height="35" rx="5" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="597" y="122" text-anchor="middle" class="small">1) GTT에 DML 실행</text>
  <path d="M597 135 L597 145" stroke="#787368" stroke-width="1" marker-end="url(#as3)"/>

  <rect x="440" y="148" width="315" height="35" rx="5" fill="#f3efe4" stroke="#2f6a1c" stroke-width="2"/>
  <text x="597" y="170" text-anchor="middle" class="small" fill="#2f6a1c">2) UNDO 레코드를 Temp TBS에 기록</text>
  <path d="M597 183 L597 193" stroke="#787368" stroke-width="1" marker-end="url(#as3)"/>

  <!-- Skipped steps -->
  <rect x="440" y="196" width="315" height="35" rx="5" fill="#f3efe4" fill-opacity="0.3" stroke="#f3efe4" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="597" y="218" text-anchor="middle" class="small" fill="#787368">3) REDO 생성 — 생략!</text>

  <rect x="440" y="244" width="315" height="35" rx="5" fill="#f3efe4" fill-opacity="0.3" stroke="#f3efe4" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="597" y="266" text-anchor="middle" class="small" fill="#787368">4) REDO 버퍼 기록 — 생략!</text>

  <rect x="440" y="292" width="315" height="35" rx="5" fill="#f3efe4" fill-opacity="0.3" stroke="#f3efe4" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="597" y="314" text-anchor="middle" class="small" fill="#787368">5) LGWR 디스크 기록 — 생략!</text>

  <path d="M597 183 L597 337" stroke="#2f6a1c" stroke-width="1.5" stroke-dasharray="5,3"/>

  <rect x="440" y="340" width="315" height="35" rx="5" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="597" y="362" text-anchor="middle" class="small" fill="#2f6a1c">6) COMMIT 시 Temp UNDO 즉시 해제</text>

  <!-- I/O count -->
  <rect x="440" y="385" width="315" height="25" rx="4" fill="#2f6a1c" fill-opacity="0.1"/>
  <text x="597" y="403" text-anchor="middle" class="small" fill="#2f6a1c">총 2단계 | REDO I/O 완전 생략 → 대폭 성능 향상</text>

  <!-- Bottom note -->
  <text x="400" y="440" text-anchor="middle" class="mono" fill="#4a2e78">모니터링: V$TEMPUNDOSTAT (10분 간격 스냅샷) | V$TEMP_SPACE_HEADER (공간 현황)</text>

  <defs>
    <marker id="as3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#787368"/></marker>
  </defs>
</svg>