<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #4a2e78; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">멀티테넌트 UNDO: Shared vs Local 아키텍처 비교</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">CDB/PDB 환경의 UNDO 테이블스페이스 배치와 기능 차이</text>

  <!-- Shared UNDO Architecture (Left) -->
  <rect x="20" y="60" width="370" height="280" rx="10" fill="#faf8f3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="205" y="82" text-anchor="middle" class="label" fill="#8a5a10">Shared UNDO Mode (공유)</text>

  <!-- CDB$ROOT with single UNDO -->
  <rect x="45" y="95" width="320" height="65" rx="6" fill="#f3efe4" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="205" y="113" text-anchor="middle" class="label">CDB$ROOT</text>
  <rect x="60" y="122" width="130" height="28" rx="4" fill="#8a5a10" fill-opacity="0.15" stroke="#8a5a10" stroke-width="1"/>
  <text x="125" y="141" text-anchor="middle" class="mono" fill="#8a5a10">UNDOTBS1 (공유)</text>
  <text x="275" y="141" text-anchor="middle" class="small">SYSTEM/SYSAUX</text>

  <!-- PDBs without UNDO -->
  <rect x="45" y="172" width="150" height="45" rx="5" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="120" y="192" text-anchor="middle" class="small">PDB1</text>
  <text x="120" y="208" text-anchor="middle" class="small" fill="#be123c">UNDO TBS 없음</text>

  <rect x="215" y="172" width="150" height="45" rx="5" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="290" y="192" text-anchor="middle" class="small">PDB2</text>
  <text x="290" y="208" text-anchor="middle" class="small" fill="#be123c">UNDO TBS 없음</text>

  <!-- Arrows from PDBs to shared UNDO -->
  <path d="M120 172 L125 160" stroke="#8a5a10" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M290 172 L125 155" stroke="#8a5a10" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Shared UNDO limitations -->
  <rect x="45" y="228" width="320" height="100" rx="5" fill="#f3efe4" stroke="#be123c" stroke-width="1"/>
  <text x="205" y="248" text-anchor="middle" class="small" fill="#be123c">제한 사항</text>
  <text x="60" y="268" class="small" fill="#be123c">x</text><text x="75" y="268" class="small"> Hot Clone 불가</text>
  <text x="200" y="268" class="small" fill="#be123c">x</text><text x="215" y="268" class="small"> PDB Relocate 불가</text>
  <text x="60" y="286" class="small" fill="#be123c">x</text><text x="75" y="286" class="small"> Flashback PDB 불가</text>
  <text x="200" y="286" class="small" fill="#be123c">x</text><text x="215" y="286" class="small"> UNDO 공간 경합</text>
  <text x="60" y="304" class="small" fill="#be123c">x</text><text x="75" y="304" class="small"> PDB간 ORA-01555 전파</text>
  <text x="200" y="304" class="small" fill="#be123c">x</text><text x="215" y="304" class="small"> PDB별 RETENTION 불가</text>
  <text x="60" y="322" class="small" fill="#2f6a1c">o</text><text x="75" y="322" class="small"> 관리 단순, 공간 효율</text>

  <!-- Local UNDO Architecture (Right) -->
  <rect x="410" y="60" width="370" height="280" rx="10" fill="#faf8f3" stroke="#2f6a1c" stroke-width="2"/>
  <text x="595" y="82" text-anchor="middle" class="label" fill="#2f6a1c">Local UNDO Mode (로컬) — 기본/권장</text>

  <!-- CDB$ROOT with own UNDO -->
  <rect x="435" y="95" width="320" height="45" rx="6" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="525" y="118" text-anchor="middle" class="small">CDB$ROOT</text>
  <rect x="610" y="103" width="130" height="28" rx="4" fill="#2f6a1c" fill-opacity="0.15" stroke="#2f6a1c" stroke-width="1"/>
  <text x="675" y="122" text-anchor="middle" class="mono" fill="#2f6a1c">UNDO_ROOT</text>

  <!-- PDB1 with own UNDO -->
  <rect x="435" y="150" width="150" height="65" rx="5" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="510" y="170" text-anchor="middle" class="small">PDB1</text>
  <rect x="445" y="178" width="130" height="28" rx="4" fill="#2456a8" fill-opacity="0.15" stroke="#2456a8" stroke-width="1"/>
  <text x="510" y="197" text-anchor="middle" class="mono" fill="#2456a8">UNDO_PDB1</text>

  <!-- PDB2 with own UNDO -->
  <rect x="605" y="150" width="150" height="65" rx="5" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="680" y="170" text-anchor="middle" class="small">PDB2</text>
  <rect x="615" y="178" width="130" height="28" rx="4" fill="#8a5a10" fill-opacity="0.15" stroke="#8a5a10" stroke-width="1"/>
  <text x="680" y="197" text-anchor="middle" class="mono" fill="#8a5a10">UNDO_PDB2</text>

  <!-- Local UNDO advantages -->
  <rect x="435" y="228" width="320" height="100" rx="5" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="595" y="248" text-anchor="middle" class="small" fill="#2f6a1c">장점</text>
  <text x="450" y="268" class="small" fill="#2f6a1c">o</text><text x="465" y="268" class="small"> Hot Clone 가능</text>
  <text x="590" y="268" class="small" fill="#2f6a1c">o</text><text x="605" y="268" class="small"> PDB Relocate 가능</text>
  <text x="450" y="286" class="small" fill="#2f6a1c">o</text><text x="465" y="286" class="small"> Flashback PDB 가능</text>
  <text x="590" y="286" class="small" fill="#2f6a1c">o</text><text x="605" y="286" class="small"> UNDO 공간 완전 격리</text>
  <text x="450" y="304" class="small" fill="#2f6a1c">o</text><text x="465" y="304" class="small"> PDB별 독립 RETENTION</text>
  <text x="590" y="304" class="small" fill="#2f6a1c">o</text><text x="605" y="304" class="small"> ORA-01555 격리</text>
  <text x="450" y="322" class="small" fill="#be123c">x</text><text x="465" y="322" class="small"> 관리 복잡성 증가, 디스크 오버헤드</text>

  <!-- Mode Switching -->
  <rect x="20" y="355" width="760" height="75" rx="8" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="400" y="377" text-anchor="middle" class="label" fill="#4a2e78">UNDO 모드 전환 (Mode Switching)</text>

  <text x="200" y="400" text-anchor="middle" class="mono" fill="#2f6a1c">Shared → Local:</text>
  <text x="200" y="416" text-anchor="middle" class="mono">ALTER DATABASE LOCAL UNDO ON;</text>

  <text x="600" y="400" text-anchor="middle" class="mono" fill="#8a5a10">Local → Shared:</text>
  <text x="600" y="416" text-anchor="middle" class="mono">ALTER DATABASE LOCAL UNDO OFF;</text>

  <text x="400" y="400" text-anchor="middle" class="small" fill="#be123c">STARTUP UPGRADE 모드 필수</text>
  <text x="400" y="416" text-anchor="middle" class="small" fill="#be123c">CDB 다운타임 필요</text>

  <!-- Bottom note -->
  <rect x="20" y="445" width="760" height="65" rx="8" fill="#faf8f3" stroke="#f3efe4" stroke-width="1"/>
  <text x="400" y="467" text-anchor="middle" class="label">뷰 조회 차이 (Local UNDO 모드)</text>
  <text x="200" y="490" text-anchor="middle" class="small">PDB 내 V$UNDOSTAT → 해당 PDB 통계만</text>
  <text x="550" y="490" text-anchor="middle" class="small">CDB$ROOT CDB_UNDO_EXTENTS → 전체 PDB 통합</text>
  <text x="400" y="505" text-anchor="middle" class="mono" fill="#4a2e78">CONTAINERS(V_$UNDOSTAT) — CON_ID별 통합 조회</text>
</svg>