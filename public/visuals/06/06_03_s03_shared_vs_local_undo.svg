<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; fill: #6F6BEA; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #94A3B8; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="28" text-anchor="middle" class="title">멀티테넌트 UNDO: Shared vs Local 아키텍처 비교</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">CDB/PDB 환경의 UNDO 테이블스페이스 배치와 기능 차이</text>

  <!-- Shared UNDO Architecture (Left) -->
  <rect x="20" y="60" width="370" height="280" rx="10" fill="#0F1019" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="205" y="82" text-anchor="middle" class="label" fill="#F59E0B">Shared UNDO Mode (공유)</text>

  <!-- CDB$ROOT with single UNDO -->
  <rect x="45" y="95" width="320" height="65" rx="6" fill="#1E1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="205" y="113" text-anchor="middle" class="label">CDB$ROOT</text>
  <rect x="60" y="122" width="130" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
  <text x="125" y="141" text-anchor="middle" class="mono" fill="#F59E0B">UNDOTBS1 (공유)</text>
  <text x="275" y="141" text-anchor="middle" class="small">SYSTEM/SYSAUX</text>

  <!-- PDBs without UNDO -->
  <rect x="45" y="172" width="150" height="45" rx="5" fill="#1E1F2E" stroke="#2A2B3D" stroke-width="1"/>
  <text x="120" y="192" text-anchor="middle" class="small">PDB1</text>
  <text x="120" y="208" text-anchor="middle" class="small" fill="#F43F5E">UNDO TBS 없음</text>

  <rect x="215" y="172" width="150" height="45" rx="5" fill="#1E1F2E" stroke="#2A2B3D" stroke-width="1"/>
  <text x="290" y="192" text-anchor="middle" class="small">PDB2</text>
  <text x="290" y="208" text-anchor="middle" class="small" fill="#F43F5E">UNDO TBS 없음</text>

  <!-- Arrows from PDBs to shared UNDO -->
  <path d="M120 172 L125 160" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M290 172 L125 155" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Shared UNDO limitations -->
  <rect x="45" y="228" width="320" height="100" rx="5" fill="#1E1F2E" stroke="#F43F5E" stroke-width="1"/>
  <text x="205" y="248" text-anchor="middle" class="small" fill="#F43F5E">제한 사항</text>
  <text x="60" y="268" class="small" fill="#F43F5E">x</text><text x="75" y="268" class="small"> Hot Clone 불가</text>
  <text x="200" y="268" class="small" fill="#F43F5E">x</text><text x="215" y="268" class="small"> PDB Relocate 불가</text>
  <text x="60" y="286" class="small" fill="#F43F5E">x</text><text x="75" y="286" class="small"> Flashback PDB 불가</text>
  <text x="200" y="286" class="small" fill="#F43F5E">x</text><text x="215" y="286" class="small"> UNDO 공간 경합</text>
  <text x="60" y="304" class="small" fill="#F43F5E">x</text><text x="75" y="304" class="small"> PDB간 ORA-01555 전파</text>
  <text x="200" y="304" class="small" fill="#F43F5E">x</text><text x="215" y="304" class="small"> PDB별 RETENTION 불가</text>
  <text x="60" y="322" class="small" fill="#10B981">o</text><text x="75" y="322" class="small"> 관리 단순, 공간 효율</text>

  <!-- Local UNDO Architecture (Right) -->
  <rect x="410" y="60" width="370" height="280" rx="10" fill="#0F1019" stroke="#10B981" stroke-width="2"/>
  <text x="595" y="82" text-anchor="middle" class="label" fill="#10B981">Local UNDO Mode (로컬) — 기본/권장</text>

  <!-- CDB$ROOT with own UNDO -->
  <rect x="435" y="95" width="320" height="45" rx="6" fill="#1E1F2E" stroke="#10B981" stroke-width="1"/>
  <text x="525" y="118" text-anchor="middle" class="small">CDB$ROOT</text>
  <rect x="610" y="103" width="130" height="28" rx="4" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1"/>
  <text x="675" y="122" text-anchor="middle" class="mono" fill="#10B981">UNDO_ROOT</text>

  <!-- PDB1 with own UNDO -->
  <rect x="435" y="150" width="150" height="65" rx="5" fill="#1E1F2E" stroke="#10B981" stroke-width="1"/>
  <text x="510" y="170" text-anchor="middle" class="small">PDB1</text>
  <rect x="445" y="178" width="130" height="28" rx="4" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="510" y="197" text-anchor="middle" class="mono" fill="#3B82F6">UNDO_PDB1</text>

  <!-- PDB2 with own UNDO -->
  <rect x="605" y="150" width="150" height="65" rx="5" fill="#1E1F2E" stroke="#10B981" stroke-width="1"/>
  <text x="680" y="170" text-anchor="middle" class="small">PDB2</text>
  <rect x="615" y="178" width="130" height="28" rx="4" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
  <text x="680" y="197" text-anchor="middle" class="mono" fill="#F59E0B">UNDO_PDB2</text>

  <!-- Local UNDO advantages -->
  <rect x="435" y="228" width="320" height="100" rx="5" fill="#1E1F2E" stroke="#10B981" stroke-width="1"/>
  <text x="595" y="248" text-anchor="middle" class="small" fill="#10B981">장점</text>
  <text x="450" y="268" class="small" fill="#10B981">o</text><text x="465" y="268" class="small"> Hot Clone 가능</text>
  <text x="590" y="268" class="small" fill="#10B981">o</text><text x="605" y="268" class="small"> PDB Relocate 가능</text>
  <text x="450" y="286" class="small" fill="#10B981">o</text><text x="465" y="286" class="small"> Flashback PDB 가능</text>
  <text x="590" y="286" class="small" fill="#10B981">o</text><text x="605" y="286" class="small"> UNDO 공간 완전 격리</text>
  <text x="450" y="304" class="small" fill="#10B981">o</text><text x="465" y="304" class="small"> PDB별 독립 RETENTION</text>
  <text x="590" y="304" class="small" fill="#10B981">o</text><text x="605" y="304" class="small"> ORA-01555 격리</text>
  <text x="450" y="322" class="small" fill="#F43F5E">x</text><text x="465" y="322" class="small"> 관리 복잡성 증가, 디스크 오버헤드</text>

  <!-- Mode Switching -->
  <rect x="20" y="355" width="760" height="75" rx="8" fill="#1E1F2E" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="400" y="377" text-anchor="middle" class="label" fill="#6F6BEA">UNDO 모드 전환 (Mode Switching)</text>

  <text x="200" y="400" text-anchor="middle" class="mono" fill="#10B981">Shared → Local:</text>
  <text x="200" y="416" text-anchor="middle" class="mono">ALTER DATABASE LOCAL UNDO ON;</text>

  <text x="600" y="400" text-anchor="middle" class="mono" fill="#F59E0B">Local → Shared:</text>
  <text x="600" y="416" text-anchor="middle" class="mono">ALTER DATABASE LOCAL UNDO OFF;</text>

  <text x="400" y="400" text-anchor="middle" class="small" fill="#F43F5E">STARTUP UPGRADE 모드 필수</text>
  <text x="400" y="416" text-anchor="middle" class="small" fill="#F43F5E">CDB 다운타임 필요</text>

  <!-- Bottom note -->
  <rect x="20" y="445" width="760" height="65" rx="8" fill="#0F1019" stroke="#2A2B3D" stroke-width="1"/>
  <text x="400" y="467" text-anchor="middle" class="label">뷰 조회 차이 (Local UNDO 모드)</text>
  <text x="200" y="490" text-anchor="middle" class="small">PDB 내 V$UNDOSTAT → 해당 PDB 통계만</text>
  <text x="550" y="490" text-anchor="middle" class="small">CDB$ROOT CDB_UNDO_EXTENTS → 전체 PDB 통합</text>
  <text x="400" y="505" text-anchor="middle" class="mono" fill="#6F6BEA">CONTAINERS(V_$UNDOSTAT) — CON_ID별 통합 조회</text>
</svg>