<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" fill="none">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; fill: #be123c; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 13px; font-weight: 600; }
    .small { font-size: 11px; fill: #787368; }
    .mono { font-family: 'Consolas', monospace; font-size: 11px; }
  </style>

  <text x="400" y="30" text-anchor="middle" class="title">ORA-01555: Snapshot Too Old 발생 메커니즘</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">필요한 UNDO 데이터가 덮어쓰여져 CR 블록 생성 실패</text>

  <!-- Timeline -->
  <line x1="50" y1="85" x2="750" y2="85" stroke="#f3efe4" stroke-width="2"/>
  <text x="50" y="78" class="small" fill="#4a2e78">시간 →</text>

  <!-- Time markers -->
  <circle cx="120" cy="85" r="5" fill="#2456a8"/>
  <text x="120" y="105" text-anchor="middle" class="mono" fill="#2456a8">t0</text>
  <text x="120" y="118" text-anchor="middle" class="small">세션A 쿼리 시작</text>
  <text x="120" y="131" text-anchor="middle" class="mono" fill="#2456a8">SCN=1000</text>

  <circle cx="320" cy="85" r="5" fill="#be123c"/>
  <text x="320" y="105" text-anchor="middle" class="mono" fill="#be123c">t1</text>
  <text x="320" y="118" text-anchor="middle" class="small">세션B 변경+COMMIT</text>
  <text x="320" y="131" text-anchor="middle" class="mono" fill="#be123c">SCN=1500</text>

  <circle cx="520" cy="85" r="5" fill="#8a5a10"/>
  <text x="520" y="105" text-anchor="middle" class="mono" fill="#8a5a10">t2</text>
  <text x="520" y="118" text-anchor="middle" class="small">UNDO 덮어쓰기 발생</text>
  <text x="520" y="131" text-anchor="middle" class="small" fill="#8a5a10">새 트랜잭션이 공간 사용</text>

  <circle cx="680" cy="85" r="5" fill="#be123c"/>
  <text x="680" y="105" text-anchor="middle" class="mono" fill="#be123c">t3</text>
  <text x="680" y="118" text-anchor="middle" class="small">세션A 해당 블록 읽기</text>
  <text x="680" y="131" text-anchor="middle" class="small" fill="#be123c">ORA-01555!</text>

  <!-- Error mechanism box -->
  <rect x="50" y="150" width="700" height="100" rx="10" fill="#be123c" fill-opacity="0.08" stroke="#be123c" stroke-width="1.5"/>
  <text x="400" y="172" text-anchor="middle" class="label" fill="#be123c">ORA-01555 발생 과정</text>
  <text x="400" y="195" text-anchor="middle" class="small">세션 A: Block SCN(1500) > Query SCN(1000) → CR 블록 생성 필요</text>
  <text x="400" y="212" text-anchor="middle" class="small">→ SCN=1000 시점의 UNDO 데이터 필요 → 이미 덮어쓰여짐</text>
  <text x="400" y="232" text-anchor="middle" class="label" fill="#be123c">→ ORA-01555: snapshot too old 에러 발생</text>

  <!-- Causes and Solutions -->
  <rect x="30" y="265" width="360" height="180" rx="8" fill="#f3efe4" stroke="#be123c" stroke-width="1.5"/>
  <text x="210" y="287" text-anchor="middle" class="label" fill="#be123c">주요 원인 (Causes)</text>

  <text x="50" y="310" class="small" fill="#be123c">1.</text>
  <text x="65" y="310" class="small">UNDO 테이블스페이스 크기 부족</text>
  <text x="50" y="328" class="small" fill="#be123c">2.</text>
  <text x="65" y="328" class="small">UNDO_RETENTION 설정 부족</text>
  <text x="50" y="346" class="small" fill="#be123c">3.</text>
  <text x="65" y="346" class="small">장기 실행 쿼리 (Long-running Query)</text>
  <text x="50" y="364" class="small" fill="#be123c">4.</text>
  <text x="65" y="364" class="small">대량 DML로 UNDO 빠르게 덮어쓰기</text>
  <text x="50" y="382" class="small" fill="#be123c">5.</text>
  <text x="65" y="382" class="small">Fetch across Commit 패턴</text>
  <text x="50" y="400" class="small" fill="#be123c">6.</text>
  <text x="65" y="400" class="small">지연 블록 클린아웃 (Delayed Cleanout)</text>

  <rect x="410" y="265" width="360" height="180" rx="8" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="590" y="287" text-anchor="middle" class="label" fill="#2f6a1c">대응 방안 (Solutions)</text>

  <text x="430" y="310" class="small" fill="#2f6a1c">1.</text>
  <text x="445" y="310" class="small">UNDO 테이블스페이스 확장</text>
  <text x="430" y="328" class="small" fill="#2f6a1c">2.</text>
  <text x="445" y="328" class="small">UNDO_RETENTION 값 증가</text>
  <text x="430" y="346" class="small" fill="#2f6a1c">3.</text>
  <text x="445" y="346" class="small">RETENTION GUARANTEE 설정</text>
  <text x="430" y="364" class="small" fill="#2f6a1c">4.</text>
  <text x="445" y="364" class="small">장기 쿼리 SQL 튜닝</text>
  <text x="430" y="382" class="small" fill="#2f6a1c">5.</text>
  <text x="445" y="382" class="small">Fetch across Commit 패턴 제거</text>
  <text x="430" y="400" class="small" fill="#2f6a1c">6.</text>
  <text x="445" y="400" class="small">UNDO Advisor 활용 (V$UNDOSTAT)</text>

  <!-- Monitoring -->
  <text x="400" y="455" text-anchor="middle" class="mono" fill="#4a2e78">모니터링: V$UNDOSTAT.SSOLDERRCNT (발생 횟수) | MAXQUERYLEN (최장 쿼리 시간)</text>
</svg>