<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow-line { stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2456a8"/>
    </marker>
    <marker id="arrYellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a5a10"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" class="title" text-anchor="middle">클라이언트 접속 아키텍처 (Client Connection Architecture)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">네이밍 해석 → 리스너 접속 → 세션 수립 전체 흐름 (03_03~03_04)</text>

  <!-- Client Box -->
  <rect x="50" y="75" width="160" height="60" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <text x="130" y="100" class="label" text-anchor="middle">클라이언트</text>
  <text x="130" y="118" class="small" text-anchor="middle">Client Application</text>

  <!-- Arrow to Naming -->
  <line x1="210" y1="105" x2="280" y2="105" stroke="#4a2e78" stroke-width="2" marker-end="url(#arr)"/>
  <text x="240" y="97" class="code" text-anchor="middle">@서비스명</text>

  <!-- Naming Methods Box -->
  <rect x="280" y="68" width="230" height="140" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="2"/>
  <rect x="282" y="70" width="226" height="26" rx="6" ry="6" fill="#dee5f5"/>
  <text x="395" y="88" class="label" text-anchor="middle" fill="#2456a8">네이밍 메서드 해석</text>
  <text x="395" y="102" class="small" text-anchor="middle">Name Resolution</text>

  <!-- Naming sub-items -->
  <rect x="295" y="112" width="200" height="24" rx="4" fill="rgba(42,42,42,0.05)" stroke="#f3efe4"/>
  <text x="305" y="128" class="sublabel">1. tnsnames.ora (로컬 네이밍)</text>
  <rect x="295" y="140" width="200" height="24" rx="4" fill="rgba(42,42,42,0.05)" stroke="#f3efe4"/>
  <text x="305" y="156" class="sublabel">2. Easy Connect (간편 접속)</text>
  <rect x="295" y="168" width="200" height="24" rx="4" fill="rgba(42,42,42,0.05)" stroke="#f3efe4"/>
  <text x="305" y="184" class="sublabel">3. LDAP (디렉토리 네이밍)</text>

  <!-- NAMES.DIRECTORY_PATH note -->
  <text x="395" y="206" class="code" text-anchor="middle">NAMES.DIRECTORY_PATH</text>

  <!-- Arrow to Connect Descriptor -->
  <line x1="510" y1="138" x2="580" y2="138" stroke="#2456a8" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Connect Descriptor Box -->
  <rect x="580" y="75" width="180" height="130" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="2"/>
  <rect x="582" y="77" width="176" height="26" rx="6" ry="6" fill="#f0ddb3"/>
  <text x="670" y="95" class="label" text-anchor="middle" fill="#8a5a10">접속 디스크립터</text>
  <text x="670" y="108" class="small" text-anchor="middle">Connect Descriptor</text>
  <text x="600" y="130" class="code">PROTOCOL = TCP</text>
  <text x="600" y="148" class="code">HOST = dbserver</text>
  <text x="600" y="166" class="code">PORT = 1521</text>
  <text x="600" y="184" class="code">SERVICE_NAME = orcl</text>

  <!-- Arrow down to Listener -->
  <line x1="670" y1="205" x2="670" y2="260" stroke="#8a5a10" stroke-width="2" marker-end="url(#arrYellow)"/>

  <!-- Server Side Section -->
  <rect x="40" y="240" width="720" height="200" class="box" fill="rgba(42,42,42,0.02)" stroke="#f3efe4" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="60" y="262" class="small">서버 측 (Server Side)</text>

  <!-- Listener -->
  <rect x="540" y="260" width="200" height="80" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <rect x="542" y="262" width="196" height="26" rx="6" ry="6" fill="#d8cfe5"/>
  <text x="640" y="280" class="label" text-anchor="middle">Oracle Listener</text>
  <text x="640" y="305" class="sublabel" text-anchor="middle">TCP 1521 / TCPS 2484</text>
  <text x="640" y="322" class="code" text-anchor="middle">listener.ora</text>

  <!-- LREG arrow -->
  <rect x="300" y="275" width="200" height="50" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1.5"/>
  <text x="400" y="298" class="sublabel" text-anchor="middle">LREG 프로세스 (동적 등록)</text>
  <text x="400" y="314" class="small" text-anchor="middle">Dynamic Registration</text>
  <line x1="500" y1="300" x2="540" y2="300" stroke="#2456a8" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- Arrow to Server Process -->
  <line x1="640" y1="340" x2="640" y2="365" stroke="#4a2e78" stroke-width="2" marker-end="url(#arr)"/>
  <text x="655" y="355" class="small">세션 할당</text>

  <!-- Server Process -->
  <rect x="560" y="365" width="160" height="55" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="640" y="388" class="label" text-anchor="middle">서버 프로세스</text>
  <text x="640" y="406" class="small" text-anchor="middle">Server Process</text>

  <!-- Database -->
  <rect x="80" y="350" width="180" height="80" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="2"/>
  <text x="170" y="380" class="label" text-anchor="middle">Oracle Database</text>
  <text x="170" y="400" class="sublabel" text-anchor="middle">CDB / PDB</text>
  <text x="170" y="418" class="code" text-anchor="middle">SERVICE_NAMES</text>

  <!-- Arrow from DB to LREG -->
  <path d="M 170 350 L 170 300 L 290 300" fill="none" stroke="#2456a8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Arrow from Server Process to DB -->
  <line x1="560" y1="392" x2="260" y2="392" stroke="#4a2e78" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="415" y="387" class="small" text-anchor="middle">SQL 실행</text>

  <!-- Error Codes -->
  <rect x="50" y="460" width="700" height="55" rx="6" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1"/>
  <text x="70" y="480" class="label" fill="#8a5a10">주요 접속 오류 (Connection Errors)</text>
  <text x="70" y="500" class="code">ORA-12154</text>
  <text x="160" y="500" class="small">네트 서비스 이름 해석 실패</text>
  <text x="320" y="500" class="code">ORA-12541</text>
  <text x="410" y="500" class="small">리스너 미기동/포트 불일치</text>
  <text x="570" y="500" class="code">ORA-12514</text>
  <text x="660" y="500" class="small">서비스 미등록</text>

  <!-- Config files note -->
  <rect x="60" y="265" width="180" height="55" rx="6" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="70" y="283" class="code">핵심 구성 파일:</text>
  <text x="70" y="300" class="small">listener.ora | tnsnames.ora</text>
  <text x="70" y="313" class="small">sqlnet.ora | TNS_ADMIN</text>

  <!-- Footer -->
  <text x="400" y="540" class="small" text-anchor="middle">Oracle Net Services 접속 아키텍처 — 네이밍 해석 → 리스너 연결 → 서버 프로세스 할당 → 세션 수립</text>
  <text x="400" y="558" class="small" text-anchor="middle">Oracle 26ai: Easy Connect Plus 확장, TLS 1.3 기본 지원, mTLS 구성 마법사</text>
</svg>