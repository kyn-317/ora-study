<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="30" class="title" text-anchor="middle">DB 링크 내부 동작 흐름 (Internal Operation Flow)</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">세션 생성 - SQL 전송 - 결과 반환 - 세션 관리</text>

  <!-- Local DB -->
  <rect x="30" y="75" width="300" height="220" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="2"/>
  <text x="180" y="98" class="label" text-anchor="middle" fill="#2456a8">Local Database</text>

  <!-- User session -->
  <rect x="50" y="110" width="120" height="35" rx="4" ry="4" fill="#4a2e78" opacity="0.3" stroke="#4a2e78"/>
  <text x="110" y="132" class="sublabel" text-anchor="middle">사용자 세션</text>

  <!-- SQL execution -->
  <rect x="50" y="155" width="260" height="55" rx="4" ry="4" fill="#f3efe4" stroke="#f3efe4"/>
  <text x="65" y="175" class="code" font-size="10">SELECT e.name, d.dept_name</text>
  <text x="65" y="190" class="code" font-size="10">FROM emp e JOIN dept@remote_db d</text>
  <text x="65" y="205" class="code" font-size="10">ON e.dept_id = d.dept_id;</text>

  <!-- DB Link session -->
  <rect x="50" y="225" width="260" height="55" rx="4" ry="4" fill="#8a5a10" opacity="0.15" stroke="#8a5a10"/>
  <text x="65" y="245" class="sublabel" fill="#8a5a10">DB Link 원격 세션 생성</text>
  <text x="65" y="263" class="small">OPEN_LINKS 파라미터로 최대 동시 링크 수 제한</text>
  <text x="65" y="278" class="code" font-size="10">기본값: OPEN_LINKS = 4</text>

  <!-- Arrows between DBs -->
  <line x1="330" y1="140" x2="460" y2="140" stroke="#8a5a10" stroke-width="2"/>
  <polygon points="458,137 465,140 458,143" fill="#8a5a10"/>
  <text x="395" y="132" class="code" text-anchor="middle" font-size="9">1. 접속 요청</text>
  <text x="395" y="152" class="small" text-anchor="middle">Oracle Net</text>

  <line x1="460" y1="195" x2="330" y2="195" stroke="#2f6a1c" stroke-width="2"/>
  <polygon points="332,192 325,195 332,198" fill="#2f6a1c"/>
  <text x="395" y="188" class="code" text-anchor="middle" font-size="9">3. 결과 반환</text>

  <line x1="330" y1="250" x2="460" y2="250" stroke="#2456a8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="458,247 465,250 458,253" fill="#2456a8"/>
  <text x="395" y="242" class="code" text-anchor="middle" font-size="9">2. SQL 전송</text>

  <!-- Remote DB -->
  <rect x="465" y="75" width="305" height="220" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="2"/>
  <text x="617" y="98" class="label" text-anchor="middle" fill="#2f6a1c">Remote Database</text>

  <!-- Remote session -->
  <rect x="485" y="110" width="260" height="40" rx="4" ry="4" fill="#2f6a1c" opacity="0.15" stroke="#2f6a1c"/>
  <text x="615" y="128" class="sublabel" text-anchor="middle">원격 세션 (DB Link 전용)</text>
  <text x="615" y="143" class="small" text-anchor="middle">고정/연결/현재 사용자로 인증</text>

  <!-- Remote SQL -->
  <rect x="485" y="160" width="260" height="40" rx="4" ry="4" fill="#f3efe4" stroke="#f3efe4"/>
  <text x="500" y="178" class="code" font-size="10">SELECT dept_name FROM dept</text>
  <text x="500" y="193" class="small">원격에서 실행되는 SQL (분산 쿼리)</text>

  <!-- Remote result -->
  <rect x="485" y="212" width="260" height="70" rx="4" ry="4" fill="#f3efe4" stroke="#f3efe4"/>
  <text x="500" y="232" class="sublabel">DBA_DB_LINK_SOURCES (26ai)</text>
  <text x="500" y="250" class="small">원격 접속 소스 모니터링</text>
  <text x="500" y="268" class="code" font-size="10">V$DBLINK - 활성 링크 조회</text>

  <!-- Session management -->
  <text x="400" y="320" class="label" text-anchor="middle">DB 링크 세션 관리</text>

  <rect x="30" y="335" width="230" height="75" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="145" y="355" class="sublabel" text-anchor="middle" fill="#2456a8">세션 유지</text>
  <text x="50" y="375" class="small">트랜잭션 동안 원격 세션 유지</text>
  <text x="50" y="393" class="small">COMMIT/ROLLBACK 시 세션 유휴</text>
  <text x="50" y="405" class="code" font-size="10">OPEN_LINKS_PER_INSTANCE</text>

  <rect x="280" y="335" width="240" height="75" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="1"/>
  <text x="400" y="355" class="sublabel" text-anchor="middle" fill="#8a5a10">세션 닫기</text>
  <text x="300" y="375" class="code" font-size="10">ALTER SESSION</text>
  <text x="300" y="393" class="code" font-size="10">  CLOSE DATABASE LINK lnk;</text>
  <text x="300" y="405" class="small">수동으로 유휴 링크 세션 정리</text>

  <rect x="540" y="335" width="230" height="75" class="box" fill="#f3efe4" stroke="#be123c" stroke-width="1"/>
  <text x="655" y="355" class="sublabel" text-anchor="middle" fill="#be123c">Two-Phase Commit</text>
  <text x="560" y="375" class="small">분산 트랜잭션 시 2PC 사용</text>
  <text x="560" y="393" class="small">PREPARE -> COMMIT 2단계</text>
  <text x="560" y="405" class="code" font-size="10">DBA_2PC_PENDING 뷰 확인</text>
</svg>