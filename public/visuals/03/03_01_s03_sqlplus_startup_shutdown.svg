<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="30" class="title" text-anchor="middle">SQL*Plus STARTUP / SHUTDOWN 상태 전이도</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">인스턴스 기동 3단계와 종료 4모드</text>

  <!-- STARTUP Flow -->
  <text x="400" y="80" class="label" text-anchor="middle" fill="#2456a8">STARTUP 단계 (Instance Startup Stages)</text>

  <!-- SHUTDOWN state -->
  <rect x="30" y="95" width="150" height="55" class="box" fill="#f3efe4" stroke="#be123c" stroke-width="2"/>
  <text x="105" y="118" class="label" text-anchor="middle" fill="#be123c">SHUTDOWN</text>
  <text x="105" y="138" class="small" text-anchor="middle">인스턴스 미기동</text>

  <!-- Arrow -->
  <line x1="180" y1="122" x2="225" y2="122" stroke="#4a2e78" stroke-width="2"/>
  <polygon points="223,119 230,122 223,125" fill="#4a2e78"/>
  <text x="202" y="112" class="code" text-anchor="middle" font-size="9">STARTUP</text>
  <text x="202" y="142" class="code" text-anchor="middle" font-size="9">NOMOUNT</text>

  <!-- NOMOUNT state -->
  <rect x="230" y="95" width="150" height="55" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="2"/>
  <text x="305" y="115" class="label" text-anchor="middle" fill="#8a5a10">NOMOUNT</text>
  <text x="305" y="132" class="small" text-anchor="middle">SGA 할당</text>
  <text x="305" y="145" class="small" text-anchor="middle">백그라운드 프로세스 기동</text>

  <!-- Arrow -->
  <line x1="380" y1="122" x2="425" y2="122" stroke="#4a2e78" stroke-width="2"/>
  <polygon points="423,119 430,122 423,125" fill="#4a2e78"/>
  <text x="402" y="112" class="code" text-anchor="middle" font-size="9">ALTER DB</text>
  <text x="402" y="142" class="code" text-anchor="middle" font-size="9">MOUNT</text>

  <!-- MOUNT state -->
  <rect x="430" y="95" width="150" height="55" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="2"/>
  <text x="505" y="115" class="label" text-anchor="middle" fill="#2456a8">MOUNT</text>
  <text x="505" y="132" class="small" text-anchor="middle">컨트롤 파일 읽기</text>
  <text x="505" y="145" class="small" text-anchor="middle">데이터파일 위치 확인</text>

  <!-- Arrow -->
  <line x1="580" y1="122" x2="625" y2="122" stroke="#4a2e78" stroke-width="2"/>
  <polygon points="623,119 630,122 623,125" fill="#4a2e78"/>
  <text x="602" y="112" class="code" text-anchor="middle" font-size="9">ALTER DB</text>
  <text x="602" y="142" class="code" text-anchor="middle" font-size="9">OPEN</text>

  <!-- OPEN state -->
  <rect x="630" y="95" width="150" height="55" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="2"/>
  <text x="705" y="115" class="label" text-anchor="middle" fill="#2f6a1c">OPEN</text>
  <text x="705" y="132" class="small" text-anchor="middle">데이터파일/리두 로그 오픈</text>
  <text x="705" y="145" class="small" text-anchor="middle">사용자 접속 가능</text>

  <!-- Use cases -->
  <rect x="230" y="160" width="150" height="35" rx="4" ry="4" fill="#8a5a10" opacity="0.1" stroke="#8a5a10" stroke-dasharray="3,2"/>
  <text x="305" y="182" class="small" text-anchor="middle">DB 생성, 컨트롤파일 재생성</text>

  <rect x="430" y="160" width="150" height="35" rx="4" ry="4" fill="#2456a8" opacity="0.1" stroke="#2456a8" stroke-dasharray="3,2"/>
  <text x="505" y="182" class="small" text-anchor="middle">파일 이동, 미디어 복구</text>

  <rect x="630" y="160" width="150" height="35" rx="4" ry="4" fill="#2f6a1c" opacity="0.1" stroke="#2f6a1c" stroke-dasharray="3,2"/>
  <text x="705" y="182" class="small" text-anchor="middle">정상 운영 상태</text>

  <!-- SHUTDOWN modes comparison -->
  <text x="400" y="225" class="label" text-anchor="middle" fill="#be123c">SHUTDOWN 모드 비교 (Shutdown Modes)</text>

  <!-- Table header -->
  <rect x="30" y="240" width="745" height="30" rx="4" ry="4" fill="#f3efe4"/>
  <text x="120" y="260" class="sublabel" text-anchor="middle">동작</text>
  <text x="270" y="260" class="label" text-anchor="middle" fill="#2f6a1c" font-size="12">NORMAL</text>
  <text x="400" y="260" class="label" text-anchor="middle" fill="#2456a8" font-size="12">TRANSACTIONAL</text>
  <text x="540" y="260" class="label" text-anchor="middle" fill="#8a5a10" font-size="12">IMMEDIATE</text>
  <text x="680" y="260" class="label" text-anchor="middle" fill="#be123c" font-size="12">ABORT</text>

  <!-- Row 1 -->
  <rect x="30" y="272" width="745" height="28" rx="0" ry="0" fill="#f3efe4"/>
  <text x="120" y="290" class="sublabel" text-anchor="middle">새 접속 차단</text>
  <text x="270" y="290" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="400" y="290" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="540" y="290" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="680" y="290" class="small" text-anchor="middle" fill="#2f6a1c">O</text>

  <!-- Row 2 -->
  <rect x="30" y="300" width="745" height="28" rx="0" ry="0" fill="#f3efe4"/>
  <text x="120" y="318" class="sublabel" text-anchor="middle">현재 세션 대기</text>
  <text x="270" y="318" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="400" y="318" class="small" text-anchor="middle" fill="#be123c">X</text>
  <text x="540" y="318" class="small" text-anchor="middle" fill="#be123c">X</text>
  <text x="680" y="318" class="small" text-anchor="middle" fill="#be123c">X</text>

  <!-- Row 3 -->
  <rect x="30" y="328" width="745" height="28" rx="0" ry="0" fill="#f3efe4"/>
  <text x="120" y="346" class="sublabel" text-anchor="middle">트랜잭션 대기</text>
  <text x="270" y="346" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="400" y="346" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="540" y="346" class="small" text-anchor="middle" fill="#be123c">X</text>
  <text x="680" y="346" class="small" text-anchor="middle" fill="#be123c">X</text>

  <!-- Row 4 -->
  <rect x="30" y="356" width="745" height="28" rx="0" ry="0" fill="#f3efe4"/>
  <text x="120" y="374" class="sublabel" text-anchor="middle">체크포인트 수행</text>
  <text x="270" y="374" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="400" y="374" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="540" y="374" class="small" text-anchor="middle" fill="#2f6a1c">O</text>
  <text x="680" y="374" class="small" text-anchor="middle" fill="#be123c">X</text>

  <!-- Row 5 -->
  <rect x="30" y="384" width="745" height="28" rx="0" ry="0" fill="#f3efe4"/>
  <text x="120" y="402" class="sublabel" text-anchor="middle">다음 기동 시 복구</text>
  <text x="270" y="402" class="small" text-anchor="middle" fill="#2f6a1c">불필요</text>
  <text x="400" y="402" class="small" text-anchor="middle" fill="#2f6a1c">불필요</text>
  <text x="540" y="402" class="small" text-anchor="middle" fill="#2f6a1c">불필요</text>
  <text x="680" y="402" class="small" text-anchor="middle" fill="#be123c">필요!</text>

  <!-- Highlight IMMEDIATE -->
  <rect x="475" y="420" width="130" height="25" rx="4" ry="4" fill="#8a5a10" opacity="0.2" stroke="#8a5a10"/>
  <text x="540" y="437" class="code" text-anchor="middle">실무 권장 모드</text>

  <!-- Connection methods -->
  <text x="400" y="475" class="label" text-anchor="middle">SQL*Plus 접속 방식 요약</text>

  <rect x="30" y="490" width="230" height="90" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="45" y="510" class="sublabel" fill="#2456a8">로컬 접속 (리스너 불필요)</text>
  <text x="45" y="530" class="code">sqlplus / as sysdba</text>
  <text x="45" y="548" class="code">sqlplus system/pwd</text>
  <text x="45" y="566" class="small">OS 인증: dba 그룹 멤버십</text>

  <rect x="285" y="490" width="240" height="90" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="300" y="510" class="sublabel" fill="#2f6a1c">원격 접속 (리스너 필요)</text>
  <text x="300" y="530" class="code">sqlplus user/pwd@TNS_NAME</text>
  <text x="300" y="548" class="code">sqlplus user/pwd@host:1521/svc</text>
  <text x="300" y="566" class="small">Easy Connect 또는 TNS 이름</text>

  <rect x="550" y="490" width="225" height="90" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="1"/>
  <text x="565" y="510" class="sublabel" fill="#8a5a10">관리 권한 비교</text>
  <text x="565" y="530" class="small">SYSDBA: CREATE DB + 완전 권한</text>
  <text x="565" y="548" class="small">SYSOPER: 기동/종료만 (제한적)</text>
  <text x="565" y="566" class="small">SYSBACKUP/SYSDG/SYSKM</text>
</svg>