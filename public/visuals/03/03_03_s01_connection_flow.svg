<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="30" class="title" text-anchor="middle">Oracle 클라이언트 접속 흐름 (Client Connection Flow)</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">이름 해석 - 네트워크 연결 - 리스너 수신 - 프로세스 생성 - 인증 - 세션 수립</text>

  <!-- Step 1: Client Application -->
  <rect x="290" y="70" width="220" height="45" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="2"/>
  <text x="400" y="92" class="label" text-anchor="middle" fill="#6F6BEA">클라이언트 애플리케이션</text>
  <text x="400" y="107" class="code" text-anchor="middle">sqlplus user/pwd@ORCL</text>

  <line x1="400" y1="115" x2="400" y2="138" stroke="#6F6BEA" stroke-width="2"/>
  <polygon points="397,136 400,143 403,136" fill="#6F6BEA"/>

  <!-- Step 2: Name Resolution -->
  <rect x="200" y="143" width="400" height="50" class="box" fill="#1E1E2E" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="220" cy="168" r="14" fill="#3B82F6"/>
  <text x="220" y="172" class="label" text-anchor="middle" fill="#FFF" font-size="11">1</text>
  <text x="400" y="163" class="sublabel" text-anchor="middle">이름 해석 (Name Resolution)</text>
  <text x="400" y="180" class="code" text-anchor="middle">ORCL -> (DESCRIPTION=(ADDRESS=...)(CONNECT_DATA=...))</text>

  <!-- Resolution sources -->
  <rect x="30" y="148" width="150" height="40" rx="4" ry="4" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-dasharray="3,2"/>
  <text x="105" y="165" class="code" text-anchor="middle" font-size="10">tnsnames.ora</text>
  <text x="105" y="180" class="small" text-anchor="middle">LDAP / EZCONNECT</text>
  <line x1="180" y1="168" x2="200" y2="168" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2"/>

  <line x1="400" y1="193" x2="400" y2="213" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="397,211 400,218 403,211" fill="#3B82F6"/>

  <!-- Step 3: Network Connection -->
  <rect x="200" y="218" width="400" height="40" class="box" fill="#1E1E2E" stroke="#10B981" stroke-width="2"/>
  <circle cx="220" cy="238" r="14" fill="#10B981"/>
  <text x="220" y="242" class="label" text-anchor="middle" fill="#FFF" font-size="11">2</text>
  <text x="400" y="234" class="sublabel" text-anchor="middle">접속 요청 (TCP 연결 시도)</text>
  <text x="400" y="250" class="code" text-anchor="middle">hostname:1521 -> TNS CONNECT 패킷 전송</text>

  <line x1="400" y1="258" x2="400" y2="278" stroke="#10B981" stroke-width="2"/>
  <polygon points="397,276 400,283 403,276" fill="#10B981"/>

  <!-- Step 4: Listener -->
  <rect x="200" y="283" width="400" height="40" class="box" fill="#1E1E2E" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="220" cy="303" r="14" fill="#F59E0B"/>
  <text x="220" y="307" class="label" text-anchor="middle" fill="#1E1E2E" font-size="11">3</text>
  <text x="400" y="299" class="sublabel" text-anchor="middle">리스너 수신 (서비스 이름/SID 확인)</text>
  <text x="400" y="315" class="code" text-anchor="middle">SERVICE_NAME=orcl.example.com 확인</text>

  <line x1="400" y1="323" x2="400" y2="343" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="397,341 400,348 403,341" fill="#F59E0B"/>

  <!-- Step 5: Process Creation -->
  <rect x="200" y="348" width="400" height="40" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="2"/>
  <circle cx="220" cy="368" r="14" fill="#6F6BEA"/>
  <text x="220" y="372" class="label" text-anchor="middle" fill="#FFF" font-size="11">4</text>
  <text x="400" y="364" class="sublabel" text-anchor="middle">서버 프로세스 생성 + Hand-off</text>
  <text x="400" y="380" class="code" text-anchor="middle">Dedicated: fork/spawn | Shared: Dispatcher 할당</text>

  <line x1="400" y1="388" x2="400" y2="408" stroke="#6F6BEA" stroke-width="2"/>
  <polygon points="397,406 400,413 403,406" fill="#6F6BEA"/>

  <!-- Step 6: Auth + Session -->
  <rect x="200" y="413" width="400" height="40" class="box" fill="#1E1E2E" stroke="#10B981" stroke-width="2"/>
  <circle cx="220" cy="433" r="14" fill="#10B981"/>
  <text x="220" y="437" class="label" text-anchor="middle" fill="#FFF" font-size="11">5</text>
  <text x="400" y="429" class="sublabel" text-anchor="middle">인증 + 세션 수립 (Authentication + Session)</text>
  <text x="400" y="445" class="code" text-anchor="middle">패스워드/인증서 검증 -> 세션 수립 완료</text>

  <!-- Config files reference -->
  <rect x="620" y="148" width="160" height="90" class="box" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1"/>
  <text x="700" y="168" class="label" text-anchor="middle" font-size="11">관련 구성 파일</text>
  <text x="635" y="186" class="code">sqlnet.ora</text>
  <text x="635" y="202" class="code">tnsnames.ora</text>
  <text x="635" y="218" class="code">listener.ora</text>
  <text x="635" y="232" class="small">$ORACLE_HOME/network/admin</text>

  <!-- Dedicated vs Shared -->
  <rect x="30" y="470" width="360" height="65" class="box" fill="#1E1E2E" stroke="#3B82F6" stroke-width="1"/>
  <text x="50" y="490" class="label" fill="#3B82F6" font-size="12">Dedicated Server (기본)</text>
  <text x="50" y="508" class="small">클라이언트당 1 서버 프로세스</text>
  <text x="50" y="524" class="small">PGA 프로세스별 할당 | OLTP 적합</text>

  <rect x="410" y="470" width="365" height="65" class="box" fill="#1E1E2E" stroke="#F59E0B" stroke-width="1"/>
  <text x="430" y="490" class="label" fill="#F59E0B" font-size="12">Shared Server</text>
  <text x="430" y="508" class="small">Dispatcher 공유, Large Pool 사용</text>
  <text x="430" y="524" class="small">대량 동시접속 | SHARED_SERVERS 파라미터</text>
</svg>