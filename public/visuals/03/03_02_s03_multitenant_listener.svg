<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="30" class="title" text-anchor="middle">멀티테넌트 환경 리스너 서비스 등록</text>
  <text x="400" y="50" class="subtitle" text-anchor="middle">CDB/PDB 서비스 자동 등록과 PDB 상태별 리스너 동작</text>

  <!-- Listener -->
  <rect x="280" y="70" width="240" height="55" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="2.5"/>
  <text x="400" y="93" class="label" text-anchor="middle" fill="#2456a8">Listener (TCP:1521)</text>
  <text x="400" y="112" class="sublabel" text-anchor="middle">서비스 등록 목록 관리</text>

  <!-- Arrows from LREG -->
  <line x1="400" y1="125" x2="400" y2="155" stroke="#2f6a1c" stroke-width="2"/>
  <polygon points="397,153 400,160 403,153" fill="#2f6a1c"/>
  <text x="430" y="143" class="small" fill="#2f6a1c">LREG 자동 등록</text>

  <!-- CDB Container -->
  <rect x="50" y="165" width="700" height="160" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <text x="70" y="188" class="label" fill="#4a2e78">CDB (Container Database)</text>

  <!-- CDB$ROOT -->
  <rect x="70" y="200" width="130" height="50" rx="4" ry="4" fill="#4a2e78" opacity="0.2" stroke="#4a2e78"/>
  <text x="135" y="220" class="sublabel" text-anchor="middle">CDB$ROOT</text>
  <text x="135" y="238" class="code" text-anchor="middle" font-size="10">SERVICE: cdb_svc</text>

  <!-- PDB1 - OPEN -->
  <rect x="220" y="200" width="140" height="50" rx="4" ry="4" fill="#2f6a1c" opacity="0.2" stroke="#2f6a1c"/>
  <text x="290" y="218" class="sublabel" text-anchor="middle">PDB1</text>
  <text x="290" y="236" class="code" text-anchor="middle" font-size="10">SERVICE: pdb1</text>
  <rect x="330" y="202" width="25" height="14" rx="2" ry="2" fill="#2f6a1c"/>
  <text x="342" y="213" fill="#1a1a1a" font-size="8" text-anchor="middle">OPEN</text>

  <!-- PDB2 - MOUNTED -->
  <rect x="380" y="200" width="140" height="50" rx="4" ry="4" fill="#8a5a10" opacity="0.2" stroke="#8a5a10"/>
  <text x="450" y="218" class="sublabel" text-anchor="middle">PDB2</text>
  <text x="450" y="236" class="code" text-anchor="middle" font-size="10">SERVICE: pdb2</text>
  <rect x="482" y="202" width="35" height="14" rx="2" ry="2" fill="#8a5a10"/>
  <text x="499" y="213" fill="#1a1a1a" font-size="8" text-anchor="middle">MOUNT</text>

  <!-- PDB3 - CLOSED -->
  <rect x="540" y="200" width="140" height="50" rx="4" ry="4" fill="#be123c" opacity="0.2" stroke="#be123c"/>
  <text x="610" y="218" class="sublabel" text-anchor="middle">PDB3</text>
  <text x="610" y="236" class="code" text-anchor="middle" font-size="10">SERVICE: pdb3</text>
  <rect x="645" y="202" width="32" height="14" rx="2" ry="2" fill="#be123c"/>
  <text x="661" y="213" fill="#1a1a1a" font-size="8" text-anchor="middle">CLOSE</text>

  <!-- Registration status -->
  <text x="290" y="270" class="small" text-anchor="middle" fill="#2f6a1c">READY (접속 가능)</text>
  <text x="450" y="270" class="small" text-anchor="middle" fill="#8a5a10">BLOCKED (접속 불가)</text>
  <text x="610" y="270" class="small" text-anchor="middle" fill="#be123c">미등록 (접속 불가)</text>

  <!-- LREG process -->
  <rect x="70" y="283" width="100" height="30" rx="4" ry="4" fill="#2f6a1c" opacity="0.3" stroke="#2f6a1c"/>
  <text x="120" y="303" class="code" text-anchor="middle" font-size="10">LREG 프로세스</text>

  <!-- PDB state table -->
  <text x="400" y="355" class="label" text-anchor="middle">PDB 상태별 리스너 등록 요약</text>

  <rect x="100" y="367" width="130" height="35" rx="4" ry="4" fill="#2f6a1c" opacity="0.2" stroke="#2f6a1c"/>
  <text x="165" y="382" class="sublabel" text-anchor="middle" fill="#2f6a1c">OPEN</text>
  <text x="165" y="396" class="small" text-anchor="middle">READY - 접속 O</text>

  <rect x="260" y="367" width="130" height="35" rx="4" ry="4" fill="#8a5a10" opacity="0.2" stroke="#8a5a10"/>
  <text x="325" y="382" class="sublabel" text-anchor="middle" fill="#8a5a10">MOUNTED</text>
  <text x="325" y="396" class="small" text-anchor="middle">BLOCKED - 접속 X</text>

  <rect x="420" y="367" width="130" height="35" rx="4" ry="4" fill="#be123c" opacity="0.2" stroke="#be123c"/>
  <text x="485" y="382" class="sublabel" text-anchor="middle" fill="#be123c">CLOSED</text>
  <text x="485" y="396" class="small" text-anchor="middle">등록 해제 - 접속 X</text>

  <text x="400" y="418" class="code" text-anchor="middle">lsnrctl services -- PDB별 서비스 등록 상태 확인</text>
</svg>