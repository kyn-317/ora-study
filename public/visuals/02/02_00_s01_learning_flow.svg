<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <style>
    text { font-family: 'Pretendard', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 11px; fill: #94A3B8; }
    .desc { font-size: 11px; fill: #CBD5E1; }
    .code { font-family: monospace; font-size: 13px; fill: #F59E0B; }
    .axis-label { font-size: 13px; font-weight: 700; fill: #F59E0B; }
    .axis-desc { font-size: 11px; fill: #94A3B8; }
    .box { fill: rgba(255,255,255,0.05); stroke: #2A2B3D; stroke-width: 1.5; rx: 10; }
    .box-primary { fill: rgba(111,107,234,0.15); stroke: #6F6BEA; stroke-width: 2; rx: 10; }
    .box-secondary { fill: rgba(59,130,246,0.1); stroke: #3B82F6; stroke-width: 2; rx: 10; }
    .arrow { stroke: #6F6BEA; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-thin { stroke: #3B82F6; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; }
    .badge { font-size: 10px; font-weight: 700; fill: #1E1E2E; }
    .step-num { font-size: 22px; font-weight: 800; fill: #6F6BEA; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <linearGradient id="axisGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6F6BEA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6F6BEA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="axisGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">챕터 02 학습 순서 흐름도 (Learning Flow)</text>
  <text x="400" y="55" text-anchor="middle" class="subtitle">멀티테넌트 아키텍처 — 4개 단원의 학습 경로와 핵심 축</text>

  <!-- Axis 1: Architecture + Creation -->
  <rect x="30" y="80" width="360" height="30" rx="5" fill="url(#axisGrad1)" stroke="#6F6BEA" stroke-width="1"/>
  <text x="210" y="100" text-anchor="middle" class="axis-label">축 1: 아키텍처 + 생성 (Architecture + Creation)</text>

  <!-- Axis 2: Operation + Management -->
  <rect x="410" y="80" width="360" height="30" rx="5" fill="url(#axisGrad2)" stroke="#3B82F6" stroke-width="1"/>
  <text x="590" y="100" text-anchor="middle" class="axis-label" style="fill:#3B82F6">축 2: 운영 + 관리 (Operation + Management)</text>

  <!-- Step 1: 02_01 -->
  <text x="130" y="155" text-anchor="middle" class="step-num">1</text>
  <rect x="40" y="165" width="180" height="130" class="box-primary"/>
  <text x="130" y="190" text-anchor="middle" class="label">02_01</text>
  <text x="130" y="208" text-anchor="middle" class="label">구조 및 토대</text>
  <text x="130" y="226" text-anchor="middle" class="sublabel">Architecture Foundation</text>
  <line x1="60" y1="238" x2="200" y2="238" stroke="#2A2B3D" stroke-width="1"/>
  <text x="130" y="256" text-anchor="middle" class="desc">CDB/PDB 구조</text>
  <text x="130" y="271" text-anchor="middle" class="desc">공통/로컬 객체 분리</text>
  <text x="130" y="286" text-anchor="middle" class="desc">메모리·프로세스 공유</text>

  <!-- Step 2: 02_02 -->
  <text x="340" y="155" text-anchor="middle" class="step-num">2</text>
  <rect x="250" y="165" width="180" height="130" class="box-primary"/>
  <text x="340" y="190" text-anchor="middle" class="label">02_02</text>
  <text x="340" y="208" text-anchor="middle" class="label">PDB 생성 및 템플릿</text>
  <text x="340" y="226" text-anchor="middle" class="sublabel">PDB Creation &amp; Templates</text>
  <line x1="270" y1="238" x2="410" y2="238" stroke="#2A2B3D" stroke-width="1"/>
  <text x="340" y="256" text-anchor="middle" class="desc">PDB$SEED에서 생성</text>
  <text x="340" y="271" text-anchor="middle" class="desc">파일 관리 (OMF)</text>
  <text x="340" y="286" text-anchor="middle" class="desc">Application Container</text>

  <!-- Step 3: 02_03 -->
  <text x="550" y="155" text-anchor="middle" class="step-num">3</text>
  <rect x="460" y="165" width="180" height="130" class="box-secondary"/>
  <text x="550" y="190" text-anchor="middle" class="label">02_03</text>
  <text x="550" y="208" text-anchor="middle" class="label">PDB 상태 관리 및 분리</text>
  <text x="550" y="226" text-anchor="middle" class="sublabel">State Management &amp; Unplugging</text>
  <line x1="480" y1="238" x2="620" y2="238" stroke="#2A2B3D" stroke-width="1"/>
  <text x="550" y="256" text-anchor="middle" class="desc">오픈 모드 전환</text>
  <text x="550" y="271" text-anchor="middle" class="desc">SAVE STATE</text>
  <text x="550" y="286" text-anchor="middle" class="desc">Unplug / Plug In</text>

  <!-- Step 4: 02_04 -->
  <text x="130" y="335" text-anchor="middle" class="step-num">4</text>
  <rect x="460" y="325" width="180" height="130" class="box-secondary"/>
  <!-- Fix: step 4 number should be near 02_04 -->
  <text x="550" y="350" text-anchor="middle" class="label">02_04</text>
  <text x="550" y="368" text-anchor="middle" class="label">파라미터 및 복제 관리</text>
  <text x="550" y="386" text-anchor="middle" class="sublabel">Parameters &amp; Cloning</text>
  <line x1="480" y1="398" x2="620" y2="398" stroke="#2A2B3D" stroke-width="1"/>
  <text x="550" y="416" text-anchor="middle" class="desc">PDB별 파라미터 설정</text>
  <text x="550" y="431" text-anchor="middle" class="desc">Lockdown Profile</text>
  <text x="550" y="446" text-anchor="middle" class="desc">클론 (Local/Remote/Refresh)</text>

  <!-- Relocate step 4 number -->
  <rect x="530" y="315" width="40" height="25" rx="12" fill="#6F6BEA"/>
  <text x="550" y="333" text-anchor="middle" class="badge" style="font-size:14px;">4</text>
  <!-- Remove misplaced step number by covering -->
  <rect x="110" y="320" width="40" height="25" fill="transparent"/>

  <!-- Arrows between steps -->
  <!-- 1 -> 2 -->
  <path d="M 220 230 L 248 230" class="arrow"/>
  <!-- 2 -> 3 -->
  <path d="M 430 230 L 458 230" class="arrow"/>
  <!-- 3 -> 4 -->
  <path d="M 550 295 L 550 323" class="arrow"/>

  <!-- Summary box at bottom -->
  <rect x="40" y="340" width="380" height="105" class="box" rx="10"/>
  <text x="230" y="365" text-anchor="middle" class="label" style="fill:#F59E0B;">핵심 학습 포인트 (Key Takeaway)</text>
  <line x1="60" y1="375" x2="400" y2="375" stroke="#2A2B3D" stroke-width="1"/>
  <text x="60" y="395" class="desc" style="font-size:12px;">&#x2022; 구조를 먼저 이해하고 (뼈대) → 만들고 → 운영하고 → 복제한다</text>
  <text x="60" y="415" class="desc" style="font-size:12px;">&#x2022; 축1(구조+생성)이 축2(운영+관리)의 전제 조건</text>
  <text x="60" y="435" class="desc" style="font-size:12px;">&#x2022; 모든 단원이 CDB 아키텍처(02_01) 위에서 동작</text>

  <!-- Foundation arrow from 02_01 to summary -->
  <path d="M 130 295 L 130 338" class="arrow-thin" style="marker-end: none;"/>
  <text x="142" y="320" class="sublabel" style="font-size:10px;">기반</text>

  <!-- Oracle 26ai badge -->
  <rect x="620" y="475" width="160" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="#F59E0B" stroke-width="1"/>
  <text x="700" y="494" text-anchor="middle" class="desc" style="fill:#F59E0B; font-size:12px; font-weight:600;">Oracle 26ai 기준</text>
</svg>