<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">메타데이터 링크 vs 객체 링크</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Metadata Link vs Object Link — 데이터 딕셔너리 분리 원리</text>

  <!-- Metadata Link Section -->
  <text x="210" y="80" text-anchor="middle" class="label" fill="#3B82F6">메타데이터 링크 (Metadata Link)</text>

  <!-- CDB$ROOT - Metadata Link -->
  <rect x="60" y="95" width="300" height="80" class="box" fill="#1E1E2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="210" y="115" text-anchor="middle" class="sublabel" fill="#F59E0B">CDB$ROOT</text>
  <text x="80" y="137" class="small" fill="#3B82F6">정의 (DDL) 저장 ✓</text>
  <text x="80" y="155" class="small">DBA_TABLES 뷰 정의, PL/SQL 패키지 코드</text>
  <text x="80" y="165" class="small" fill="#F43F5E">데이터 (행) 없음 ✗</text>

  <!-- Link arrows -->
  <line x1="130" y1="175" x2="130" y2="230" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="125,228 130,238 135,228" fill="#3B82F6"/>
  <text x="140" y="210" class="small" fill="#3B82F6">링크</text>

  <line x1="290" y1="175" x2="290" y2="230" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="285,228 290,238 295,228" fill="#3B82F6"/>
  <text x="300" y="210" class="small" fill="#3B82F6">링크</text>

  <!-- PDB1 - Metadata Link -->
  <rect x="60" y="240" width="130" height="70" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="1"/>
  <text x="125" y="260" text-anchor="middle" class="sublabel" fill="#6F6BEA">PDB1</text>
  <text x="75" y="278" class="small" fill="#3B82F6">정의 → Root 참조</text>
  <text x="75" y="295" class="small" fill="#10B981">데이터 → 로컬 ✓</text>

  <!-- PDB2 - Metadata Link -->
  <rect x="220" y="240" width="130" height="70" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="1"/>
  <text x="285" y="260" text-anchor="middle" class="sublabel" fill="#6F6BEA">PDB2</text>
  <text x="235" y="278" class="small" fill="#3B82F6">정의 → Root 참조</text>
  <text x="235" y="295" class="small" fill="#10B981">데이터 → 로컬 ✓</text>

  <!-- Object Link Section -->
  <text x="600" y="80" text-anchor="middle" class="label" fill="#F43F5E">객체 링크 (Object Link)</text>

  <!-- CDB$ROOT - Object Link -->
  <rect x="450" y="95" width="300" height="80" class="box" fill="#1E1E2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="600" y="115" text-anchor="middle" class="sublabel" fill="#F59E0B">CDB$ROOT</text>
  <text x="470" y="137" class="small" fill="#F43F5E">정의 (DDL) 저장 ✓</text>
  <text x="470" y="155" class="small" fill="#F43F5E">데이터 (행) 저장 ✓</text>
  <text x="470" y="165" class="small">SYS.REGISTRY$, AWR 내부 테이블</text>

  <!-- Link arrows -->
  <line x1="520" y1="175" x2="520" y2="230" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="515,228 520,238 525,228" fill="#F43F5E"/>
  <text x="530" y="210" class="small" fill="#F43F5E">링크</text>

  <line x1="680" y1="175" x2="680" y2="230" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="675,228 680,238 685,228" fill="#F43F5E"/>
  <text x="690" y="210" class="small" fill="#F43F5E">링크</text>

  <!-- PDB1 - Object Link -->
  <rect x="450" y="240" width="130" height="70" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="1"/>
  <text x="515" y="260" text-anchor="middle" class="sublabel" fill="#6F6BEA">PDB1</text>
  <text x="465" y="278" class="small" fill="#F43F5E">정의 → Root 참조</text>
  <text x="465" y="295" class="small" fill="#F43F5E">데이터 → Root 참조</text>

  <!-- PDB2 - Object Link -->
  <rect x="610" y="240" width="130" height="70" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="1"/>
  <text x="675" y="260" text-anchor="middle" class="sublabel" fill="#6F6BEA">PDB2</text>
  <text x="625" y="278" class="small" fill="#F43F5E">정의 → Root 참조</text>
  <text x="625" y="295" class="small" fill="#F43F5E">데이터 → Root 참조</text>

  <!-- Comparison Table -->
  <text x="400" y="345" text-anchor="middle" class="label">비교 요약 (Comparison)</text>

  <!-- Table header -->
  <rect x="60" y="355" width="680" height="28" rx="4" ry="4" fill="#2A2B3D"/>
  <text x="180" y="374" text-anchor="middle" class="sublabel">구분</text>
  <text x="370" y="374" text-anchor="middle" class="sublabel" fill="#3B82F6">메타데이터 링크</text>
  <text x="610" y="374" text-anchor="middle" class="sublabel" fill="#F43F5E">객체 링크</text>

  <!-- Row 1 -->
  <line x1="60" y1="383" x2="740" y2="383" stroke="#2A2B3D" stroke-width="1"/>
  <text x="180" y="400" text-anchor="middle" class="small">정의 위치</text>
  <text x="370" y="400" text-anchor="middle" class="small">CDB$ROOT</text>
  <text x="610" y="400" text-anchor="middle" class="small">CDB$ROOT</text>

  <!-- Row 2 -->
  <line x1="60" y1="408" x2="740" y2="408" stroke="#2A2B3D" stroke-width="1"/>
  <text x="180" y="425" text-anchor="middle" class="small">데이터 위치</text>
  <text x="370" y="425" text-anchor="middle" class="small" fill="#10B981">각 PDB (로컬)</text>
  <text x="610" y="425" text-anchor="middle" class="small" fill="#F43F5E">CDB$ROOT (공유)</text>

  <!-- Row 3 -->
  <line x1="60" y1="433" x2="740" y2="433" stroke="#2A2B3D" stroke-width="1"/>
  <text x="180" y="450" text-anchor="middle" class="small">PDB 격리</text>
  <text x="370" y="450" text-anchor="middle" class="small" fill="#10B981">높음 (데이터 분리)</text>
  <text x="610" y="450" text-anchor="middle" class="small" fill="#F59E0B">낮음 (데이터 공유)</text>

  <!-- Row 4 -->
  <line x1="60" y1="458" x2="740" y2="458" stroke="#2A2B3D" stroke-width="1"/>
  <text x="180" y="475" text-anchor="middle" class="small">대상 예시</text>
  <text x="370" y="475" text-anchor="middle" class="small">딕셔너리 뷰, PL/SQL 패키지</text>
  <text x="610" y="475" text-anchor="middle" class="small">SYS.REGISTRY$, AWR 테이블</text>

  <!-- Check method -->
  <text x="400" y="497" text-anchor="middle" class="code">확인: DBA_OBJECTS.SHARING = 'METADATA LINK' | 'OBJECT LINK' | 'NONE'</text>
</svg>