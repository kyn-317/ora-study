<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">공통 사용자 vs 로컬 사용자 (ADMIN USER)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Common User vs Local User — PDB 관리자 계정 구조</text>

  <!-- Common User -->
  <rect x="40" y="70" width="350" height="210" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="2"/>
  <rect x="40" y="70" width="350" height="30" rx="8" ry="8" fill="#8a5a10" opacity="0.15"/>
  <text x="215" y="92" text-anchor="middle" class="label" fill="#8a5a10">공통 사용자 (Common User)</text>

  <text x="60" y="118" class="sublabel">생성 위치: CDB$ROOT</text>
  <text x="60" y="140" class="sublabel">이름 규칙:</text>
  <text x="160" y="140" class="code">C## 접두사 필수</text>
  <text x="60" y="160" class="sublabel">가시 범위: CDB$ROOT + 모든 PDB</text>
  <text x="60" y="180" class="sublabel">용도: DBA 관리, CDB 모니터링</text>

  <text x="60" y="205" class="code">CREATE USER C##admin IDENTIFIED BY pw</text>
  <text x="60" y="220" class="code">  CONTAINER=ALL;</text>
  <text x="60" y="240" class="code">GRANT DBA TO C##admin CONTAINER=ALL;</text>

  <text x="60" y="265" class="small" fill="#8a5a10">SYS, SYSTEM은 C## 없이도 공통 사용자 (예외)</text>

  <!-- Local User -->
  <rect x="410" y="70" width="350" height="210" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <rect x="410" y="70" width="350" height="30" rx="8" ry="8" fill="#4a2e78" opacity="0.15"/>
  <text x="585" y="92" text-anchor="middle" class="label" fill="#4a2e78">로컬 사용자 (Local User)</text>

  <text x="430" y="118" class="sublabel">생성 위치: 개별 PDB 내부</text>
  <text x="430" y="140" class="sublabel">이름 규칙:</text>
  <text x="530" y="140" class="code">C## 접두사 없음</text>
  <text x="430" y="160" class="sublabel">가시 범위: 해당 PDB 내에서만</text>
  <text x="430" y="180" class="sublabel">용도: 앱 계정, 개발 계정, PDB 관리</text>

  <text x="430" y="205" class="code">-- ADMIN USER로 자동 생성</text>
  <text x="430" y="220" class="code">CREATE PLUGGABLE DATABASE pdb1</text>
  <text x="430" y="235" class="code">  ADMIN USER pdb1admin IDENTIFIED BY pw;</text>

  <text x="430" y="265" class="small" fill="#4a2e78">ADMIN USER → PDB_DBA 역할 자동 부여</text>

  <!-- PDB_DBA Role -->
  <rect x="40" y="295" width="720" height="90" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="400" y="318" text-anchor="middle" class="label" fill="#2f6a1c">PDB_DBA 역할 기본 권한</text>

  <rect x="60" y="330" width="120" height="22" rx="4" ry="4" fill="#2f6a1c" opacity="0.12" stroke="#2f6a1c" stroke-width="0.5"/>
  <text x="120" y="346" text-anchor="middle" class="small" fill="#2f6a1c">CREATE SESSION</text>

  <rect x="190" y="330" width="110" height="22" rx="4" ry="4" fill="#2f6a1c" opacity="0.12" stroke="#2f6a1c" stroke-width="0.5"/>
  <text x="245" y="346" text-anchor="middle" class="small" fill="#2f6a1c">CREATE TABLE</text>

  <rect x="310" y="330" width="100" height="22" rx="4" ry="4" fill="#2f6a1c" opacity="0.12" stroke="#2f6a1c" stroke-width="0.5"/>
  <text x="360" y="346" text-anchor="middle" class="small" fill="#2f6a1c">CREATE VIEW</text>

  <rect x="420" y="330" width="130" height="22" rx="4" ry="4" fill="#2f6a1c" opacity="0.12" stroke="#2f6a1c" stroke-width="0.5"/>
  <text x="485" y="346" text-anchor="middle" class="small" fill="#2f6a1c">CREATE PROCEDURE</text>

  <rect x="560" y="330" width="90" height="22" rx="4" ry="4" fill="#2f6a1c" opacity="0.12" stroke="#2f6a1c" stroke-width="0.5"/>
  <text x="605" y="346" text-anchor="middle" class="small" fill="#2f6a1c">SEQUENCE</text>

  <rect x="660" y="330" width="90" height="22" rx="4" ry="4" fill="#8a5a10" opacity="0.12" stroke="#8a5a10" stroke-width="0.5"/>
  <text x="705" y="346" text-anchor="middle" class="small" fill="#8a5a10">UNLIMITED TS</text>

  <text x="400" y="375" text-anchor="middle" class="small">ADMIN USER 패스워드는 PDB 생성 후 즉시 변경 권장 | 최소 권한 원칙 적용</text>
</svg>