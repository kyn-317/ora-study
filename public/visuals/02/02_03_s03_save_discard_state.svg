<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">SAVE STATE / DISCARD STATE 메커니즘</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">PDB State Preservation — CDB 재시작 시 자동 오픈</text>

  <!-- SAVE STATE Flow -->
  <text x="400" y="78" text-anchor="middle" class="label" fill="#10B981">SAVE STATE 워크플로</text>

  <!-- Step 1: PDB OPEN -->
  <rect x="40" y="90" width="150" height="50" class="box" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="115" y="112" text-anchor="middle" class="sublabel" fill="#10B981">PDB OPEN</text>
  <text x="115" y="128" text-anchor="middle" class="small">READ WRITE</text>

  <line x1="190" y1="115" x2="210" y2="115" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="208,110 218,115 208,120" fill="#94A3B8"/>

  <!-- Step 2: SAVE STATE -->
  <rect x="218" y="90" width="170" height="50" class="box" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="303" y="108" text-anchor="middle" class="sublabel" fill="#F59E0B">SAVE STATE 실행</text>
  <text x="303" y="128" text-anchor="middle" class="code">ALTER PDB ... SAVE STATE</text>

  <line x1="388" y1="115" x2="408" y2="115" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="406,110 416,115 406,120" fill="#94A3B8"/>

  <!-- Step 3: Saved to Dictionary -->
  <rect x="416" y="90" width="170" height="50" class="box" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="501" y="108" text-anchor="middle" class="sublabel" fill="#3B82F6">딕셔너리에 저장</text>
  <text x="501" y="128" text-anchor="middle" class="code">PDB_SAVED_STATES$</text>

  <line x1="586" y1="115" x2="606" y2="115" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="604,110 614,115 604,120" fill="#94A3B8"/>

  <!-- Step 4: After restart -->
  <rect x="614" y="90" width="150" height="50" class="box" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="689" y="108" text-anchor="middle" class="sublabel" fill="#10B981">CDB 재시작 후</text>
  <text x="689" y="128" text-anchor="middle" class="small" fill="#10B981">자동 OPEN (RW)</text>

  <!-- DISCARD STATE Flow -->
  <text x="400" y="175" text-anchor="middle" class="label" fill="#F43F5E">DISCARD STATE 워크플로</text>

  <rect x="40" y="190" width="170" height="50" class="box" fill="#F43F5E" opacity="0.15" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="125" y="210" text-anchor="middle" class="sublabel" fill="#F43F5E">DISCARD STATE 실행</text>
  <text x="125" y="228" text-anchor="middle" class="code">ALTER PDB ... DISCARD STATE</text>

  <line x1="210" y1="215" x2="230" y2="215" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="228,210 238,215 228,220" fill="#94A3B8"/>

  <rect x="238" y="190" width="170" height="50" class="box" fill="#F43F5E" opacity="0.1" stroke="#F43F5E" stroke-width="1"/>
  <text x="323" y="210" text-anchor="middle" class="sublabel" fill="#F43F5E">딕셔너리에서 삭제</text>
  <text x="323" y="228" text-anchor="middle" class="small">저장된 상태 제거</text>

  <line x1="408" y1="215" x2="428" y2="215" stroke="#94A3B8" stroke-width="1.5"/>
  <polygon points="426,210 436,215 426,220" fill="#94A3B8"/>

  <rect x="436" y="190" width="150" height="50" class="box" fill="#F43F5E" opacity="0.1" stroke="#F43F5E" stroke-width="1"/>
  <text x="511" y="210" text-anchor="middle" class="sublabel" fill="#F43F5E">CDB 재시작 후</text>
  <text x="511" y="228" text-anchor="middle" class="small" fill="#F43F5E">MOUNTED (수동 오픈)</text>

  <!-- Comparison Table -->
  <text x="400" y="275" text-anchor="middle" class="label">SAVE STATE vs DISCARD STATE 비교</text>

  <!-- Table header -->
  <rect x="60" y="285" width="680" height="25" rx="4" ry="4" fill="#2A2B3D"/>
  <text x="160" y="302" text-anchor="middle" class="sublabel">항목</text>
  <text x="370" y="302" text-anchor="middle" class="sublabel" fill="#10B981">SAVE STATE</text>
  <text x="590" y="302" text-anchor="middle" class="sublabel" fill="#F43F5E">DISCARD STATE</text>

  <line x1="60" y1="310" x2="740" y2="310" stroke="#2A2B3D" stroke-width="1"/>
  <text x="160" y="327" text-anchor="middle" class="small">목적</text>
  <text x="370" y="327" text-anchor="middle" class="small">오픈 모드 영구 저장</text>
  <text x="590" y="327" text-anchor="middle" class="small">저장된 상태 삭제</text>

  <line x1="60" y1="335" x2="740" y2="335" stroke="#2A2B3D" stroke-width="1"/>
  <text x="160" y="352" text-anchor="middle" class="small">재시작 후</text>
  <text x="370" y="352" text-anchor="middle" class="small" fill="#10B981">저장된 모드로 자동 오픈</text>
  <text x="590" y="352" text-anchor="middle" class="small" fill="#F43F5E">MOUNTED (수동 오픈 필요)</text>

  <line x1="60" y1="360" x2="740" y2="360" stroke="#2A2B3D" stroke-width="1"/>
  <text x="160" y="377" text-anchor="middle" class="small">실행 조건</text>
  <text x="370" y="377" text-anchor="middle" class="small">PDB OPEN 상태에서만</text>
  <text x="590" y="377" text-anchor="middle" class="small">OPEN 또는 MOUNTED 모두 가능</text>

  <line x1="60" y1="385" x2="740" y2="385" stroke="#2A2B3D" stroke-width="1"/>
  <text x="160" y="402" text-anchor="middle" class="small">확인 뷰</text>
  <text x="490" y="402" text-anchor="middle" class="code">DBA_PDB_SAVED_STATES (행 있으면 자동 오픈, 없으면 수동)</text>
</svg>