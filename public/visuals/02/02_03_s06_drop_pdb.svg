<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">PDB 삭제 및 Unplug-DROP-Plug In 패턴</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">DROP PLUGGABLE DATABASE — INCLUDING vs KEEP DATAFILES</text>

  <!-- Standard Migration Pattern -->
  <text x="400" y="78" text-anchor="middle" class="label" fill="#4a2e78">PDB 이동 표준 패턴 (Unplug → DROP → Plug In)</text>

  <rect x="40" y="90" width="120" height="45" class="box" fill="#be123c" opacity="0.15" stroke="#be123c" stroke-width="1.5"/>
  <text x="100" y="108" text-anchor="middle" class="sublabel" fill="#be123c">1. CLOSE</text>
  <text x="100" y="125" text-anchor="middle" class="small">MOUNTED 상태</text>

  <line x1="160" y1="112" x2="180" y2="112" stroke="#787368" stroke-width="1.5"/>
  <polygon points="178,107 188,112 178,117" fill="#787368"/>

  <rect x="188" y="90" width="120" height="45" class="box" fill="#8a5a10" opacity="0.15" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="248" y="108" text-anchor="middle" class="sublabel" fill="#8a5a10">2. UNPLUG</text>
  <text x="248" y="125" text-anchor="middle" class="code">.xml / .pdb</text>

  <line x1="308" y1="112" x2="328" y2="112" stroke="#787368" stroke-width="1.5"/>
  <polygon points="326,107 336,112 326,117" fill="#787368"/>

  <rect x="336" y="90" width="140" height="45" class="box" fill="#be123c" opacity="0.12" stroke="#be123c" stroke-width="1.5"/>
  <text x="406" y="108" text-anchor="middle" class="sublabel" fill="#be123c">3. DROP</text>
  <text x="406" y="125" text-anchor="middle" class="code">KEEP DATAFILES</text>

  <line x1="476" y1="112" x2="496" y2="112" stroke="#787368" stroke-width="1.5"/>
  <polygon points="494,107 504,112 494,117" fill="#787368"/>

  <rect x="504" y="90" width="130" height="45" class="box" fill="#2456a8" opacity="0.15" stroke="#2456a8" stroke-width="1.5"/>
  <text x="569" y="108" text-anchor="middle" class="sublabel" fill="#2456a8">4. Plug In</text>
  <text x="569" y="125" text-anchor="middle" class="code">대상 CDB에서</text>

  <line x1="634" y1="112" x2="654" y2="112" stroke="#787368" stroke-width="1.5"/>
  <polygon points="652,107 662,112 652,117" fill="#787368"/>

  <rect x="662" y="90" width="100" height="45" class="box" fill="#2f6a1c" opacity="0.15" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="712" y="108" text-anchor="middle" class="sublabel" fill="#2f6a1c">5. OPEN</text>
  <text x="712" y="125" text-anchor="middle" class="small">READ WRITE</text>

  <!-- DROP Comparison -->
  <text x="400" y="170" text-anchor="middle" class="label">INCLUDING DATAFILES vs KEEP DATAFILES</text>

  <!-- INCLUDING -->
  <rect x="40" y="185" width="350" height="160" class="box" fill="#f3efe4" stroke="#be123c" stroke-width="2"/>
  <rect x="40" y="185" width="350" height="28" rx="8" ry="8" fill="#be123c" opacity="0.15"/>
  <text x="215" y="205" text-anchor="middle" class="label" fill="#be123c">INCLUDING DATAFILES (완전 삭제)</text>

  <text x="55" y="232" class="code">DROP PLUGGABLE DATABASE pdb1</text>
  <text x="55" y="248" class="code">  INCLUDING DATAFILES;</text>
  <text x="55" y="275" class="small">딕셔너리 정보: 삭제</text>
  <text x="55" y="292" class="small" fill="#be123c">데이터 파일: 물리적으로 삭제</text>
  <text x="55" y="309" class="small" fill="#be123c">복구: 불가능</text>
  <text x="55" y="326" class="small">기본값: OMF 환경에서 기본</text>
  <text x="55" y="338" class="small" fill="#8a5a10">용도: PDB 완전 폐기 시</text>

  <!-- KEEP -->
  <rect x="410" y="185" width="350" height="160" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="2"/>
  <rect x="410" y="185" width="350" height="28" rx="8" ry="8" fill="#2f6a1c" opacity="0.15"/>
  <text x="585" y="205" text-anchor="middle" class="label" fill="#2f6a1c">KEEP DATAFILES (딕셔너리만 제거)</text>

  <text x="425" y="232" class="code">DROP PLUGGABLE DATABASE pdb1</text>
  <text x="425" y="248" class="code">  KEEP DATAFILES;</text>
  <text x="425" y="275" class="small">딕셔너리 정보: 삭제</text>
  <text x="425" y="292" class="small" fill="#2f6a1c">데이터 파일: 원래 위치에 유지</text>
  <text x="425" y="309" class="small" fill="#2f6a1c">복구: 데이터 파일로 Plug In 가능</text>
  <text x="425" y="326" class="small">기본값: 비OMF 환경에서 기본</text>
  <text x="425" y="338" class="small" fill="#8a5a10">용도: Unplug 후 DROP 시 (이동 패턴)</text>

  <!-- Warning -->
  <text x="400" y="365" text-anchor="middle" class="code">OMF 환경에서 Unplug 후 DROP 시 반드시 KEEP DATAFILES를 명시할 것!</text>
</svg>