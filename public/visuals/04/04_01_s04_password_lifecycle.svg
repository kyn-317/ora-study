<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94A3B8"/>
    </marker>
  </defs>

  <text x="400" y="32" class="title" text-anchor="middle">패스워드 수명주기 및 프로파일 (Password Lifecycle &amp; Profile)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">프로파일 기반 패스워드 정책 관리 흐름</text>

  <!-- Password Lifecycle Flow -->
  <rect x="30" y="75" width="150" height="45" class="box" fill="#10B981" opacity="0.3" stroke="#10B981" stroke-width="1.5"/>
  <text x="105" y="95" class="label" text-anchor="middle">패스워드 생성</text>
  <text x="105" y="112" class="small" text-anchor="middle">CREATE/ALTER USER</text>

  <line x1="180" y1="97" x2="230" y2="97" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="75" width="160" height="45" class="box" fill="#1E1E2E" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="310" y="93" class="label" text-anchor="middle">유효 기간</text>
  <text x="310" y="110" class="code" text-anchor="middle">PASSWORD_LIFE_TIME (180일)</text>

  <line x1="390" y1="97" x2="430" y2="97" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="430" y="75" width="160" height="45" class="box" fill="#1E1E2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="510" y="93" class="label" text-anchor="middle" fill="#F59E0B">유예 기간</text>
  <text x="510" y="110" class="code" text-anchor="middle">PASSWORD_GRACE_TIME (7일)</text>

  <line x1="590" y1="97" x2="630" y2="97" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="630" y="75" width="140" height="45" class="box" fill="#F43F5E" opacity="0.2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="700" y="93" class="label" text-anchor="middle" fill="#F43F5E">EXPIRED</text>
  <text x="700" y="110" class="small" text-anchor="middle">변경 강제</text>

  <!-- Login Failure Flow -->
  <rect x="30" y="150" width="740" height="130" class="box" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="50" y="172" class="label">로그인 실패 시 계정 잠금 메커니즘 (Account Locking Mechanism)</text>

  <rect x="50" y="185" width="100" height="35" class="box" fill="#2A2B3D" stroke="#3B82F6" stroke-width="1"/>
  <text x="100" y="207" class="sublabel" text-anchor="middle">로그인 시도</text>

  <line x1="150" y1="202" x2="185" y2="202" stroke="#94A3B8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="185" y="185" width="110" height="35" class="box" fill="#2A2B3D" stroke="#10B981" stroke-width="1"/>
  <text x="240" y="200" class="sublabel" text-anchor="middle">성공</text>
  <text x="240" y="214" class="small" text-anchor="middle">카운터 초기화</text>

  <rect x="185" y="230" width="110" height="35" class="box" fill="#2A2B3D" stroke="#F43F5E" stroke-width="1"/>
  <text x="240" y="245" class="sublabel" text-anchor="middle">실패</text>
  <text x="240" y="259" class="small" text-anchor="middle">카운터 +1</text>

  <line x1="295" y1="247" x2="340" y2="247" stroke="#F43F5E" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="340" y="230" width="150" height="35" class="box" fill="#2A2B3D" stroke="#F59E0B" stroke-width="1"/>
  <text x="415" y="245" class="code" text-anchor="middle">FAILED_LOGIN_ATTEMPTS</text>
  <text x="415" y="259" class="small" text-anchor="middle">기본: 10회</text>

  <line x1="490" y1="247" x2="530" y2="247" stroke="#F43F5E" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="530" y="230" width="100" height="35" class="box" fill="#F43F5E" opacity="0.2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="580" y="245" class="label" text-anchor="middle" fill="#F43F5E">LOCKED</text>
  <text x="580" y="259" class="small" text-anchor="middle">(TIMED)</text>

  <line x1="630" y1="247" x2="660" y2="247" stroke="#94A3B8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="660" y="225" width="100" height="45" class="box" fill="#2A2B3D" stroke="#10B981" stroke-width="1"/>
  <text x="710" y="242" class="code" text-anchor="middle">LOCK_TIME</text>
  <text x="710" y="258" class="small" text-anchor="middle">기본: 1일 후</text>
  <text x="710" y="270" class="small" text-anchor="middle">자동 해제</text>

  <!-- Profile Parameters Table -->
  <rect x="30" y="300" width="370" height="185" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="1.5"/>
  <rect x="30" y="300" width="370" height="26" rx="8" ry="8" fill="#6F6BEA"/>
  <text x="215" y="318" class="label" text-anchor="middle" fill="#FFF">패스워드 프로파일 파라미터</text>

  <text x="50" y="345" class="code">PASSWORD_LIFE_TIME</text>
  <text x="250" y="345" class="small">유효 기간 180일</text>
  <text x="50" y="365" class="code">PASSWORD_GRACE_TIME</text>
  <text x="250" y="365" class="small">유예 기간 7일</text>
  <text x="50" y="385" class="code">PASSWORD_REUSE_TIME</text>
  <text x="250" y="385" class="small">재사용 금지 기간</text>
  <text x="50" y="405" class="code">PASSWORD_REUSE_MAX</text>
  <text x="250" y="405" class="small">재사용 전 변경 횟수</text>
  <text x="50" y="425" class="code">FAILED_LOGIN_ATTEMPTS</text>
  <text x="250" y="425" class="small">잠금 전 실패 10회</text>
  <text x="50" y="445" class="code">PASSWORD_LOCK_TIME</text>
  <text x="250" y="445" class="small">잠금 기간 1일</text>
  <text x="50" y="465" class="code">PASSWORD_VERIFY_FUNCTION</text>
  <text x="270" y="465" class="small">검증 함수</text>
  <text x="50" y="480" class="code">INACTIVE_ACCOUNT_TIME</text>
  <text x="270" y="480" class="small">비활성 잠금</text>

  <!-- Verify Functions -->
  <rect x="420" y="300" width="350" height="185" class="box" fill="#1E1E2E" stroke="#F59E0B" stroke-width="1.5"/>
  <rect x="420" y="300" width="350" height="26" rx="8" ry="8" fill="#F59E0B"/>
  <text x="595" y="318" class="label" text-anchor="middle" fill="#1E1E2E">패스워드 검증 함수</text>

  <text x="440" y="345" class="code">ora12c_verify_function</text>
  <text x="440" y="362" class="small">기본: 8자+, 숫자+영문+특수문자</text>

  <text x="440" y="388" class="code">ora12c_strong_verify_function</text>
  <text x="440" y="405" class="small">강화: 대소문자, 특수문자 2개+</text>

  <text x="440" y="432" class="code">$ORACLE_HOME/rdbms/admin/catpvf.sql</text>
  <text x="440" y="449" class="small">검증 함수 설치 스크립트</text>

  <text x="440" y="472" class="sublabel">REUSE_TIME + REUSE_MAX 동시 설정 시:</text>
  <text x="440" y="485" class="small">양쪽 조건 모두 충족해야 재사용 가능</text>
</svg>