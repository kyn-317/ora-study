<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <style>
    text { font-family: 'Pretendard', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #94A3B8; }
    .code { font-family: monospace; font-size: 12px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .detail { font-size: 12px; }
    .box { fill: rgba(255,255,255,0.05); stroke: #2A2B3D; stroke-width: 1.5; rx: 8; }
    .box-primary { fill: rgba(111,107,234,0.15); stroke: #6F6BEA; stroke-width: 1.5; rx: 10; }
    .box-blue { fill: rgba(59,130,246,0.12); stroke: #3B82F6; stroke-width: 1.5; rx: 10; }
    .box-yellow { fill: rgba(245,158,11,0.12); stroke: #F59E0B; stroke-width: 1.5; rx: 10; }
    .box-green { fill: rgba(16,185,129,0.12); stroke: #10B981; stroke-width: 1.5; rx: 10; }
    .arrow { stroke: #6F6BEA; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-blue { stroke: #3B82F6; stroke-width: 2; fill: none; marker-end: url(#arrowhead-blue); }
    .line { stroke: #2A2B3D; stroke-width: 1.5; }
    .line-primary { stroke: #6F6BEA; stroke-width: 1.5; }
    .line-blue { stroke: #3B82F6; stroke-width: 1.5; }
    .badge { font-size: 10px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Oracle 권한 체계 구조 (Privilege Hierarchy)</text>
  <text x="400" y="55" text-anchor="middle" class="subtitle">시스템 권한, 객체 권한, 롤의 관계와 ADMIN/GRANT OPTION 차이</text>

  <!-- Top: Oracle Privilege System -->
  <rect x="280" y="75" width="240" height="45" class="box-primary" />
  <text x="400" y="103" text-anchor="middle" class="label" fill="#6F6BEA">Oracle 권한 체계</text>

  <!-- Three branches -->
  <line x1="330" y1="120" x2="330" y2="145" class="line-primary" />
  <line x1="400" y1="120" x2="400" y2="145" class="line-primary" />
  <line x1="470" y1="120" x2="470" y2="145" class="line-primary" />
  <line x1="330" y1="120" x2="470" y2="120" class="line-primary" />

  <!-- System Privilege -->
  <rect x="30" y="145" width="240" height="165" class="box-primary" />
  <text x="150" y="170" text-anchor="middle" class="label" fill="#6F6BEA">시스템 권한</text>
  <text x="150" y="187" text-anchor="middle" class="sublabel">System Privilege</text>

  <text x="50" y="210" class="detail">DDL/DML 실행 허가</text>
  <text x="50" y="230" class="code">CREATE TABLE, ALTER USER</text>
  <text x="50" y="250" class="code">CREATE SESSION, DROP ANY</text>

  <rect x="50" y="262" width="200" height="20" rx="4" fill="rgba(111,107,234,0.25)" stroke="none" />
  <text x="150" y="277" text-anchor="middle" class="badge" fill="#6F6BEA">WITH ADMIN OPTION</text>

  <text x="50" y="300" class="small" fill="#E2E8F0">REVOKE 시 연쇄 취소 없음 (No Cascade)</text>

  <!-- Object Privilege -->
  <rect x="280" y="145" width="240" height="165" class="box-blue" />
  <text x="400" y="170" text-anchor="middle" class="label" fill="#3B82F6">객체 권한</text>
  <text x="400" y="187" text-anchor="middle" class="sublabel">Object Privilege</text>

  <text x="300" y="210" class="detail">특정 객체에 대한 접근 허가</text>
  <text x="300" y="230" class="code">SELECT, INSERT, UPDATE</text>
  <text x="300" y="250" class="code">DELETE, EXECUTE ON obj</text>

  <rect x="300" y="262" width="200" height="20" rx="4" fill="rgba(59,130,246,0.25)" stroke="none" />
  <text x="400" y="277" text-anchor="middle" class="badge" fill="#3B82F6">WITH GRANT OPTION</text>

  <text x="300" y="300" class="small" fill="#E2E8F0">REVOKE 시 연쇄 취소 발생 (Cascade)</text>

  <!-- Role -->
  <rect x="530" y="145" width="240" height="165" class="box-yellow" />
  <text x="650" y="170" text-anchor="middle" class="label" fill="#F59E0B">롤 (Role)</text>
  <text x="650" y="187" text-anchor="middle" class="sublabel">Named Group of Privileges</text>

  <text x="550" y="210" class="detail">권한 묶음 (관리 편의)</text>
  <text x="550" y="230" class="code">CONNECT, RESOURCE, DBA</text>
  <text x="550" y="250" class="code">사용자정의: APP_READONLY</text>

  <rect x="550" y="262" width="200" height="20" rx="4" fill="rgba(245,158,11,0.25)" stroke="none" />
  <text x="650" y="277" text-anchor="middle" class="badge" fill="#F59E0B">Secure Application Role</text>

  <text x="550" y="300" class="small" fill="#E2E8F0">PL/SQL 패키지로 활성화 조건 제어</text>

  <!-- Connection lines to top -->
  <line x1="150" y1="145" x2="330" y2="120" class="line-primary" />
  <line x1="400" y1="145" x2="400" y2="120" class="line-blue" />
  <line x1="650" y1="145" x2="470" y2="120" stroke="#F59E0B" stroke-width="1.5" fill="none" />

  <!-- ADMIN vs GRANT comparison -->
  <text x="50" y="350" class="label" fill="#6F6BEA" font-size="15">ADMIN OPTION vs GRANT OPTION 비교</text>

  <!-- ADMIN OPTION side -->
  <rect x="30" y="365" width="365" height="190" class="box" />
  <rect x="30" y="365" width="365" height="30" rx="8" fill="rgba(111,107,234,0.15)" stroke="#6F6BEA" stroke-width="1.5" />
  <text x="212" y="385" text-anchor="middle" class="label" fill="#6F6BEA" font-size="13">ADMIN OPTION (시스템 권한)</text>

  <!-- Flow: A grants to B grants to C, revoke A->B doesn't affect C -->
  <rect x="55" y="410" width="70" height="35" class="box-primary" rx="6" />
  <text x="90" y="432" text-anchor="middle" class="detail">DBA</text>

  <path d="M125,427 L155,427" class="arrow" />

  <rect x="155" y="410" width="80" height="35" class="box-primary" rx="6" />
  <text x="195" y="426" text-anchor="middle" class="code" font-size="11">GRANT TO</text>
  <text x="195" y="440" text-anchor="middle" class="detail">User A</text>

  <path d="M235,427 L265,427" class="arrow" />

  <rect x="265" y="410" width="80" height="35" class="box-primary" rx="6" />
  <text x="305" y="426" text-anchor="middle" class="code" font-size="11">GRANT TO</text>
  <text x="305" y="440" text-anchor="middle" class="detail">User B</text>

  <!-- Revoke scenario -->
  <text x="55" y="475" class="detail" fill="#E2E8F0">REVOKE from User A:</text>
  <rect x="55" y="485" width="110" height="25" rx="4" fill="rgba(239,68,68,0.15)" stroke="#EF4444" stroke-width="1" />
  <text x="110" y="502" text-anchor="middle" class="small" fill="#EF4444">User A 권한 해제</text>

  <rect x="185" y="485" width="140" height="25" rx="4" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1" />
  <text x="255" y="502" text-anchor="middle" class="small" fill="#10B981">User B 권한 유지!</text>

  <text x="55" y="540" class="small" fill="#94A3B8">부여자 미추적 → 연쇄 취소 불가</text>

  <!-- GRANT OPTION side -->
  <rect x="405" y="365" width="365" height="190" class="box" />
  <rect x="405" y="365" width="365" height="30" rx="8" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5" />
  <text x="587" y="385" text-anchor="middle" class="label" fill="#3B82F6" font-size="13">GRANT OPTION (객체 권한)</text>

  <!-- Flow: Owner grants to A grants to B, revoke A affects B -->
  <rect x="430" y="410" width="70" height="35" class="box-blue" rx="6" />
  <text x="465" y="432" text-anchor="middle" class="detail">Owner</text>

  <path d="M500,427 L530,427" class="arrow-blue" />

  <rect x="530" y="410" width="80" height="35" class="box-blue" rx="6" />
  <text x="570" y="426" text-anchor="middle" class="code" font-size="11">GRANT TO</text>
  <text x="570" y="440" text-anchor="middle" class="detail">User A</text>

  <path d="M610,427 L640,427" class="arrow-blue" />

  <rect x="640" y="410" width="80" height="35" class="box-blue" rx="6" />
  <text x="680" y="426" text-anchor="middle" class="code" font-size="11">GRANT TO</text>
  <text x="680" y="440" text-anchor="middle" class="detail">User B</text>

  <!-- Revoke scenario -->
  <text x="430" y="475" class="detail" fill="#E2E8F0">REVOKE from User A:</text>
  <rect x="430" y="485" width="110" height="25" rx="4" fill="rgba(239,68,68,0.15)" stroke="#EF4444" stroke-width="1" />
  <text x="485" y="502" text-anchor="middle" class="small" fill="#EF4444">User A 권한 해제</text>

  <rect x="560" y="485" width="140" height="25" rx="4" fill="rgba(239,68,68,0.15)" stroke="#EF4444" stroke-width="1" />
  <text x="630" y="502" text-anchor="middle" class="small" fill="#EF4444">User B 권한도 해제!</text>

  <text x="430" y="540" class="small" fill="#94A3B8">부여자 추적 → 연쇄 취소 (Cascade Revoke)</text>
</svg>