<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .kept { fill: #10B981; }
    .lost { fill: #F43F5E; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94A3B8"/>
    </marker>
    <marker id="redarr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#F43F5E"/>
    </marker>
  </defs>

  <text x="400" y="32" class="title" text-anchor="middle">ADMIN OPTION vs GRANT OPTION 비교 (Revoke Behavior)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">취소 시 연쇄 효과의 핵심 차이 - 시험 핵심 출제 포인트</text>

  <!-- ADMIN OPTION Side -->
  <rect x="30" y="70" width="360" height="380" class="box" fill="#1E1E2E" stroke="#3B82F6" stroke-width="2"/>
  <rect x="30" y="70" width="360" height="30" rx="8" ry="8" fill="#3B82F6"/>
  <text x="210" y="90" class="label" text-anchor="middle" fill="#FFF">WITH ADMIN OPTION (시스템 권한/롤)</text>

  <!-- Grant chain -->
  <rect x="120" y="115" width="80" height="35" class="box" fill="#2A2B3D" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="160" y="137" class="label" text-anchor="middle">DBA</text>

  <line x1="160" y1="150" x2="160" y2="175" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="175" y="168" class="code">GRANT</text>

  <rect x="110" y="175" width="100" height="35" class="box" fill="#2A2B3D" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="160" y="190" class="label" text-anchor="middle">User A</text>
  <text x="160" y="205" class="small" text-anchor="middle">ADMIN OPTION</text>

  <line x1="160" y1="210" x2="160" y2="235" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="175" y="228" class="code">GRANT</text>

  <rect x="120" y="235" width="80" height="35" class="box" fill="#2A2B3D" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="160" y="257" class="label" text-anchor="middle">User B</text>

  <line x1="160" y1="270" x2="160" y2="295" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="120" y="295" width="80" height="35" class="box" fill="#2A2B3D" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="160" y="317" class="label" text-anchor="middle">User C</text>

  <!-- Revoke scenario -->
  <text x="270" y="130" class="sublabel" fill="#F43F5E">REVOKE FROM A</text>
  <line x1="250" y1="140" x2="250" y2="380" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="4"/>

  <rect x="250" y="180" width="120" height="25" class="box" fill="#F43F5E" opacity="0.2" stroke="#F43F5E" stroke-width="1"/>
  <text x="310" y="197" class="small lost" text-anchor="middle">A: 권한 상실</text>

  <rect x="250" y="240" width="120" height="25" class="box" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1"/>
  <text x="310" y="257" class="small kept" text-anchor="middle">B: 권한 유지!</text>

  <rect x="250" y="300" width="120" height="25" class="box" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1"/>
  <text x="310" y="317" class="small kept" text-anchor="middle">C: 권한 유지!</text>

  <text x="60" y="355" class="sublabel">핵심: 비연쇄 취소 (No Cascade)</text>
  <text x="60" y="375" class="small">SYSAUTH$ 테이블: 부여자 미추적</text>
  <text x="60" y="395" class="small">시스템 권한 + 롤에 적용</text>
  <text x="60" y="415" class="code">DBA_SYS_PRIVS.ADMIN_OPTION='YES'</text>
  <text x="60" y="435" class="small">롤(Role)에도 부여 가능</text>

  <!-- GRANT OPTION Side -->
  <rect x="410" y="70" width="360" height="380" class="box" fill="#1E1E2E" stroke="#10B981" stroke-width="2"/>
  <rect x="410" y="70" width="360" height="30" rx="8" ry="8" fill="#10B981"/>
  <text x="590" y="90" class="label" text-anchor="middle" fill="#FFF">WITH GRANT OPTION (객체 권한)</text>

  <!-- Grant chain -->
  <rect x="490" y="115" width="80" height="35" class="box" fill="#2A2B3D" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="530" y="137" class="label" text-anchor="middle">Owner</text>

  <line x1="530" y1="150" x2="530" y2="175" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="545" y="168" class="code">GRANT</text>

  <rect x="480" y="175" width="100" height="35" class="box" fill="#2A2B3D" stroke="#10B981" stroke-width="1.5"/>
  <text x="530" y="190" class="label" text-anchor="middle">User A</text>
  <text x="530" y="205" class="small" text-anchor="middle">GRANT OPTION</text>

  <line x1="530" y1="210" x2="530" y2="235" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="545" y="228" class="code">GRANT</text>

  <rect x="490" y="235" width="80" height="35" class="box" fill="#2A2B3D" stroke="#10B981" stroke-width="1.5"/>
  <text x="530" y="257" class="label" text-anchor="middle">User B</text>

  <line x1="530" y1="270" x2="530" y2="295" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="490" y="295" width="80" height="35" class="box" fill="#2A2B3D" stroke="#10B981" stroke-width="1.5"/>
  <text x="530" y="317" class="label" text-anchor="middle">User C</text>

  <!-- Revoke scenario -->
  <text x="640" y="130" class="sublabel" fill="#F43F5E">REVOKE FROM A</text>
  <line x1="625" y1="140" x2="625" y2="380" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="4"/>

  <rect x="625" y="180" width="120" height="25" class="box" fill="#F43F5E" opacity="0.2" stroke="#F43F5E" stroke-width="1"/>
  <text x="685" y="197" class="small lost" text-anchor="middle">A: 권한 상실</text>

  <rect x="625" y="240" width="120" height="25" class="box" fill="#F43F5E" opacity="0.2" stroke="#F43F5E" stroke-width="1"/>
  <text x="685" y="257" class="small lost" text-anchor="middle">B: 권한 상실!</text>

  <rect x="625" y="300" width="120" height="25" class="box" fill="#F43F5E" opacity="0.2" stroke="#F43F5E" stroke-width="1"/>
  <text x="685" y="317" class="small lost" text-anchor="middle">C: 권한 상실!</text>

  <text x="430" y="355" class="sublabel" fill="#F43F5E">핵심: 연쇄 취소 (Cascade Revoke!)</text>
  <text x="430" y="375" class="small">OBJAUTH$ 테이블: GRANTOR# 추적</text>
  <text x="430" y="395" class="small">객체 권한에만 적용</text>
  <text x="430" y="415" class="code">DBA_TAB_PRIVS.GRANTABLE='YES'</text>
  <text x="430" y="435" class="small">롤(Role)에는 부여 불가 (사용자만)</text>
</svg>