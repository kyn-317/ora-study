<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="32" class="title" text-anchor="middle">멀티테넌트 사용자 관리 구조 (Multitenant User Management)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">CDB 관리자 vs PDB 관리자 역할 분리</text>

  <!-- CDB Admin Side -->
  <rect x="30" y="70" width="360" height="320" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <rect x="30" y="70" width="360" height="28" rx="8" ry="8" fill="#4a2e78"/>
  <text x="210" y="89" class="label" text-anchor="middle" fill="#1a1a1a">CDB 관리자 (SYS, SYSTEM)</text>

  <text x="50" y="118" class="sublabel">주요 작업:</text>
  <text x="50" y="138" class="code">CREATE USER C##admin CONTAINER=ALL</text>
  <text x="50" y="158" class="code">GRANT DBA TO C##admin CONTAINER=ALL</text>
  <text x="50" y="178" class="code">ALTER PLUGGABLE DATABASE pdb OPEN</text>
  <text x="50" y="198" class="code">SELECT * FROM CDB_USERS</text>

  <text x="50" y="228" class="sublabel">CONTAINER 절:</text>
  <rect x="50" y="238" width="150" height="35" class="box" fill="#2f6a1c" opacity="0.15" stroke="#2f6a1c" stroke-width="1"/>
  <text x="125" y="253" class="code" text-anchor="middle">CONTAINER=ALL</text>
  <text x="125" y="268" class="small" text-anchor="middle">모든 컨테이너에 적용</text>

  <rect x="215" y="238" width="160" height="35" class="box" fill="#8a5a10" opacity="0.15" stroke="#8a5a10" stroke-width="1"/>
  <text x="295" y="253" class="code" text-anchor="middle">CONTAINER=CURRENT</text>
  <text x="295" y="268" class="small" text-anchor="middle">현재 컨테이너만 적용</text>

  <text x="50" y="300" class="sublabel">CONTAINER_DATA 속성:</text>
  <text x="50" y="318" class="code">ALTER USER C##mon SET CONTAINER_DATA</text>
  <text x="50" y="335" class="code">= (CDB$ROOT, PDB1) FOR V$SESSION</text>
  <text x="50" y="355" class="small">공통 사용자의 CDB_* 뷰 조회 범위 제어</text>
  <text x="50" y="375" class="small">PDB 단위로 조회 가능한 데이터 범위 제한</text>

  <!-- PDB Admin Side -->
  <rect x="410" y="70" width="360" height="320" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="2"/>
  <rect x="410" y="70" width="360" height="28" rx="8" ry="8" fill="#2f6a1c"/>
  <text x="590" y="89" class="label" text-anchor="middle" fill="#1a1a1a">PDB 관리자 (PDB_DBA 역할)</text>

  <text x="430" y="118" class="sublabel">주요 작업:</text>
  <text x="430" y="138" class="code">CREATE USER app_user IDENTIFIED BY pwd</text>
  <text x="430" y="158" class="code">GRANT CREATE SESSION TO app_user</text>
  <text x="430" y="178" class="code">ALTER USER app_user PROFILE secure</text>
  <text x="430" y="198" class="code">SELECT * FROM DBA_USERS</text>

  <text x="430" y="228" class="sublabel">PDB 관리자 생성:</text>
  <rect x="430" y="238" width="320" height="55" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="450" y="258" class="code">ALTER SESSION SET CONTAINER = pdb1;</text>
  <text x="450" y="275" class="code">CREATE USER pdb_admin IDENTIFIED BY pwd;</text>
  <text x="450" y="285" class="code">GRANT PDB_DBA TO pdb_admin;</text>

  <text x="430" y="318" class="sublabel">관련 뷰:</text>
  <text x="430" y="338" class="code">DBA_USERS</text>
  <text x="545" y="338" class="small">현재 PDB 사용자</text>
  <text x="430" y="358" class="code">V$CONTAINERS</text>
  <text x="555" y="358" class="small">컨테이너 목록</text>
  <text x="430" y="378" class="code">V$PDBS</text>
  <text x="555" y="378" class="small">PDB 상태</text>

  <!-- Arrow between -->
  <line x1="390" y1="230" x2="410" y2="230" stroke="#787368" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Bottom note -->
  <rect x="30" y="400" width="740" height="15" class="box" fill="none"/>
  <text x="400" y="412" class="small" text-anchor="middle">CDB 관리자: 공통 사용자(C##) 전체 환경 관리 | PDB 관리자: 로컬 사용자 개별 PDB 관리 | DBA_CONTAINER_DATA: CONTAINER_DATA 설정 조회</text>
</svg>