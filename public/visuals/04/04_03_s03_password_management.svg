<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#787368"/>
    </marker>
  </defs>

  <text x="400" y="32" class="title" text-anchor="middle">비밀번호 수명주기 및 계정 상태 (Password Lifecycle)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">프로파일 기반 비밀번호 정책과 계정 잠금 메커니즘</text>

  <!-- Password Lifecycle Timeline -->
  <rect x="30" y="70" width="740" height="90" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="50" y="90" class="label">비밀번호 수명주기 (Password Lifecycle)</text>

  <!-- Timeline bar -->
  <rect x="50" y="105" width="200" height="20" rx="4" fill="#2f6a1c" opacity="0.3"/>
  <text x="150" y="119" class="small" text-anchor="middle">유효 기간 (PASSWORD_LIFE_TIME: 180일)</text>

  <rect x="250" y="105" width="100" height="20" rx="4" fill="#8a5a10" opacity="0.3"/>
  <text x="300" y="119" class="small" text-anchor="middle">유예 (GRACE: 7일)</text>

  <rect x="350" y="105" width="120" height="20" rx="4" fill="#be123c" opacity="0.3"/>
  <text x="410" y="119" class="small" text-anchor="middle">EXPIRED 상태</text>

  <text x="50" y="148" class="code">OPEN</text>
  <line x1="80" y1="143" x2="120" y2="143" stroke="#787368" stroke-width="1" marker-end="url(#arr)"/>
  <text x="125" y="148" class="code">OPEN</text>
  <line x1="160" y1="143" x2="260" y2="143" stroke="#787368" stroke-width="1" marker-end="url(#arr)"/>
  <text x="265" y="148" class="code">EXPIRED(GRACE)</text>
  <line x1="365" y1="143" x2="385" y2="143" stroke="#787368" stroke-width="1" marker-end="url(#arr)"/>
  <text x="390" y="148" class="code">EXPIRED</text>
  <text x="455" y="148" class="small">- 로그인 시 변경 강제</text>

  <!-- Account Status Types -->
  <rect x="30" y="175" width="360" height="245" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1.5"/>
  <rect x="30" y="175" width="360" height="26" rx="8" ry="8" fill="#2456a8"/>
  <text x="210" y="193" class="label" text-anchor="middle" fill="#1a1a1a">계정 상태 유형 (Account Status)</text>

  <rect x="50" y="210" width="100" height="30" class="box" fill="#2f6a1c" opacity="0.2" stroke="#2f6a1c" stroke-width="1"/>
  <text x="100" y="230" class="code" text-anchor="middle">OPEN</text>

  <rect x="160" y="210" width="100" height="30" class="box" fill="#8a5a10" opacity="0.2" stroke="#8a5a10" stroke-width="1"/>
  <text x="210" y="230" class="code" text-anchor="middle">LOCKED</text>

  <rect x="270" y="210" width="100" height="30" class="box" fill="#be123c" opacity="0.2" stroke="#be123c" stroke-width="1"/>
  <text x="320" y="230" class="code" text-anchor="middle">EXPIRED</text>

  <text x="50" y="260" class="sublabel">LOCKED: DBA 수동 잠금</text>
  <text x="50" y="278" class="sublabel" fill="#be123c">LOCKED(TIMED): 로그인 실패 초과</text>
  <text x="50" y="296" class="small">  PASSWORD_LOCK_TIME 후 자동 해제</text>
  <text x="50" y="314" class="small">  1/1440 = 1분 단위 설정 가능</text>
  <text x="50" y="336" class="sublabel">EXPIRED(GRACE): 유예 기간 중</text>
  <text x="50" y="354" class="sublabel">EXPIRED &amp; LOCKED: 복합 상태</text>

  <text x="50" y="380" class="code">ALTER USER ... ACCOUNT LOCK</text>
  <text x="50" y="398" class="code">ALTER USER ... ACCOUNT UNLOCK</text>
  <text x="50" y="414" class="code">ALTER USER ... PASSWORD EXPIRE</text>

  <!-- Verify Functions & INACTIVE -->
  <rect x="410" y="175" width="360" height="245" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="1.5"/>
  <rect x="410" y="175" width="360" height="26" rx="8" ry="8" fill="#8a5a10"/>
  <text x="590" y="193" class="label" text-anchor="middle" fill="#1a1a1a">검증 함수 &amp; 비활성 잠금</text>

  <text x="430" y="218" class="sublabel">PASSWORD_VERIFY_FUNCTION:</text>

  <rect x="430" y="228" width="160" height="30" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="510" y="247" class="code" text-anchor="middle">ora12c_verify_function</text>

  <rect x="600" y="228" width="150" height="30" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="1"/>
  <text x="675" y="247" class="code" text-anchor="middle">ora12c_strong_verify</text>

  <text x="430" y="278" class="small">기본: 8자+, 숫자+영문+특수문자</text>
  <text x="430" y="293" class="small">강화: 대소문자+특수2개+연속문자 금지</text>
  <text x="430" y="310" class="code">catpvf.sql</text>
  <text x="530" y="310" class="small">검증 함수 설치 스크립트</text>

  <text x="430" y="340" class="sublabel">INACTIVE_ACCOUNT_TIME:</text>
  <text x="430" y="358" class="small">마지막 로그인 이후 미사용 기간 기준 잠금</text>
  <text x="430" y="373" class="small">DBA_USERS.LAST_LOGIN 컬럼으로 판단</text>
  <text x="430" y="388" class="small">미로그인 계정: 생성일 기준</text>

  <text x="430" y="412" class="sublabel">조회 뷰:</text>
  <text x="430" y="428" class="code">DBA_USERS</text>
  <text x="520" y="428" class="small">ACCOUNT_STATUS, LOCK_DATE, EXPIRY_DATE</text>
</svg>