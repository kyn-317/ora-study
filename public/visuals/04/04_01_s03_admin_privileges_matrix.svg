<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .check { font-size: 14px; fill: #10B981; font-weight: 700; }
    .cross { font-size: 14px; fill: #F43F5E; font-weight: 700; }
    .hdr { font-size: 11px; font-weight: 600; fill: #E2E8F0; }
  </style>

  <text x="400" y="32" class="title" text-anchor="middle">관리자 권한 매트릭스 (Administrative Privileges Matrix)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">SYSDBA 외 세분화된 관리 권한 - 직무 분리(Separation of Duties)</text>

  <!-- SYS vs SYSTEM -->
  <rect x="30" y="70" width="170" height="110" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="2"/>
  <rect x="30" y="70" width="170" height="26" rx="8" ry="8" fill="#6F6BEA"/>
  <text x="115" y="88" class="label" text-anchor="middle" fill="#FFF">SYS</text>
  <text x="115" y="112" class="small" text-anchor="middle">데이터 딕셔너리 소유자</text>
  <text x="115" y="128" class="small" text-anchor="middle">AS SYSDBA 필수</text>
  <text x="115" y="144" class="code" text-anchor="middle">sqlplus / as sysdba</text>
  <text x="115" y="165" class="small" text-anchor="middle">최고 권한, 삭제 불가</text>

  <rect x="220" y="70" width="170" height="110" class="box" fill="#1E1E2E" stroke="#3B82F6" stroke-width="2"/>
  <rect x="220" y="70" width="170" height="26" rx="8" ry="8" fill="#3B82F6"/>
  <text x="305" y="88" class="label" text-anchor="middle" fill="#FFF">SYSTEM</text>
  <text x="305" y="112" class="small" text-anchor="middle">관리 테이블/뷰 소유자</text>
  <text x="305" y="128" class="small" text-anchor="middle">AS SYSDBA 없이 접속 가능</text>
  <text x="305" y="144" class="code" text-anchor="middle">DBA 역할 보유</text>
  <text x="305" y="165" class="small" text-anchor="middle">일반 관리 작업에 권장</text>

  <!-- Privilege Matrix Table -->
  <rect x="30" y="200" width="740" height="240" class="box" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1.5"/>

  <!-- Header row -->
  <rect x="30" y="200" width="740" height="28" rx="8" ry="8" fill="#2A2B3D"/>
  <text x="100" y="218" class="hdr" text-anchor="middle">권한</text>
  <text x="220" y="218" class="hdr" text-anchor="middle">STARTUP/ SHUTDOWN</text>
  <text x="330" y="218" class="hdr" text-anchor="middle">CREATE DATABASE</text>
  <text x="440" y="218" class="hdr" text-anchor="middle">백업/복구</text>
  <text x="540" y="218" class="hdr" text-anchor="middle">Data Guard</text>
  <text x="630" y="218" class="hdr" text-anchor="middle">TDE 키관리</text>
  <text x="720" y="218" class="hdr" text-anchor="middle">OS 그룹</text>

  <!-- SYSDBA -->
  <text x="100" y="252" class="label" text-anchor="middle" fill="#6F6BEA">SYSDBA</text>
  <text x="220" y="252" class="check" text-anchor="middle">O</text>
  <text x="330" y="252" class="check" text-anchor="middle">O</text>
  <text x="440" y="252" class="check" text-anchor="middle">O</text>
  <text x="540" y="252" class="check" text-anchor="middle">O</text>
  <text x="630" y="252" class="check" text-anchor="middle">O</text>
  <text x="720" y="252" class="code" text-anchor="middle">dba</text>

  <!-- SYSOPER -->
  <text x="100" y="282" class="label" text-anchor="middle" fill="#3B82F6">SYSOPER</text>
  <text x="220" y="282" class="check" text-anchor="middle">O</text>
  <text x="330" y="282" class="cross" text-anchor="middle">X</text>
  <text x="440" y="282" class="small" text-anchor="middle">제한적</text>
  <text x="540" y="282" class="cross" text-anchor="middle">X</text>
  <text x="630" y="282" class="cross" text-anchor="middle">X</text>
  <text x="720" y="282" class="code" text-anchor="middle">oper</text>

  <!-- SYSBACKUP -->
  <text x="100" y="312" class="label" text-anchor="middle" fill="#10B981">SYSBACKUP</text>
  <text x="220" y="312" class="check" text-anchor="middle">O</text>
  <text x="330" y="312" class="cross" text-anchor="middle">X</text>
  <text x="440" y="312" class="check" text-anchor="middle">O</text>
  <text x="540" y="312" class="cross" text-anchor="middle">X</text>
  <text x="630" y="312" class="cross" text-anchor="middle">X</text>
  <text x="720" y="312" class="code" text-anchor="middle">backupdba</text>

  <!-- SYSDG -->
  <text x="100" y="342" class="label" text-anchor="middle" fill="#F59E0B">SYSDG</text>
  <text x="220" y="342" class="check" text-anchor="middle">O</text>
  <text x="330" y="342" class="cross" text-anchor="middle">X</text>
  <text x="440" y="342" class="cross" text-anchor="middle">X</text>
  <text x="540" y="342" class="check" text-anchor="middle">O</text>
  <text x="630" y="342" class="cross" text-anchor="middle">X</text>
  <text x="720" y="342" class="code" text-anchor="middle">dgdba</text>

  <!-- SYSKM -->
  <text x="100" y="372" class="label" text-anchor="middle" fill="#F43F5E">SYSKM</text>
  <text x="220" y="372" class="cross" text-anchor="middle">X</text>
  <text x="330" y="372" class="cross" text-anchor="middle">X</text>
  <text x="440" y="372" class="cross" text-anchor="middle">X</text>
  <text x="540" y="372" class="cross" text-anchor="middle">X</text>
  <text x="630" y="372" class="check" text-anchor="middle">O</text>
  <text x="720" y="372" class="code" text-anchor="middle">kmdba</text>

  <!-- SYSRAC -->
  <text x="100" y="402" class="label" text-anchor="middle" fill="#8B5CF6">SYSRAC</text>
  <text x="220" y="402" class="check" text-anchor="middle">O</text>
  <text x="330" y="402" class="cross" text-anchor="middle">X</text>
  <text x="440" y="402" class="cross" text-anchor="middle">X</text>
  <text x="540" y="402" class="cross" text-anchor="middle">X</text>
  <text x="630" y="402" class="cross" text-anchor="middle">X</text>
  <text x="720" y="402" class="code" text-anchor="middle">racdba</text>

  <!-- Lines -->
  <line x1="170" y1="228" x2="170" y2="435" stroke="#2A2B3D" stroke-width="0.5"/>
  <line x1="275" y1="228" x2="275" y2="435" stroke="#2A2B3D" stroke-width="0.5"/>
  <line x1="385" y1="228" x2="385" y2="435" stroke="#2A2B3D" stroke-width="0.5"/>
  <line x1="490" y1="228" x2="490" y2="435" stroke="#2A2B3D" stroke-width="0.5"/>
  <line x1="585" y1="228" x2="585" y2="435" stroke="#2A2B3D" stroke-width="0.5"/>
  <line x1="680" y1="228" x2="680" y2="435" stroke="#2A2B3D" stroke-width="0.5"/>

  <!-- Note -->
  <text x="400" y="450" class="small" text-anchor="middle">각 관리 권한으로 접속 시 고유한 스키마로 매핑 (SYSDBA→SYS, SYSOPER→PUBLIC, SYSBACKUP→SYSBACKUP 등)</text>

  <!-- Password File info -->
  <rect x="430" y="70" width="340" height="110" class="box" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="600" y="92" class="label" text-anchor="middle">패스워드 파일 (Password File)</text>
  <text x="600" y="114" class="code" text-anchor="middle">orapwd file=orapw&lt;SID&gt; password=xxx</text>
  <text x="600" y="134" class="small" text-anchor="middle">REMOTE_LOGIN_PASSWORDFILE 파라미터</text>
  <text x="450" y="152" class="small">EXCLUSIVE: SYS 외 사용자도 등록 가능</text>
  <text x="450" y="167" class="small">SHARED: RAC 공유, 기존 사용자만 인증</text>
</svg>