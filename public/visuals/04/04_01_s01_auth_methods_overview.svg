<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="32" class="title" text-anchor="middle">Oracle 인증 방식 전체 구조 (Authentication Methods Overview)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">5가지 인증 방식의 인증 주체, 사용 사례, 설정 방법 비교</text>

  <!-- Central User -->
  <rect x="310" y="75" width="180" height="50" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <text x="400" y="97" class="label" text-anchor="middle">사용자 접속 요청</text>
  <text x="400" y="113" class="small" text-anchor="middle">User Connection Request</text>

  <!-- Lines from center -->
  <line x1="330" y1="125" x2="100" y2="170" stroke="#2456a8" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="370" y1="125" x2="250" y2="170" stroke="#2f6a1c" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="125" x2="400" y2="170" stroke="#8a5a10" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="430" y1="125" x2="550" y2="170" stroke="#be123c" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="470" y1="125" x2="700" y2="170" stroke="#4a2e78" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Password Auth -->
  <rect x="20" y="170" width="160" height="175" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="2"/>
  <rect x="20" y="170" width="160" height="28" rx="8" ry="8" fill="#2456a8"/>
  <text x="100" y="189" class="label" text-anchor="middle" fill="#1a1a1a">패스워드 인증</text>
  <text x="100" y="214" class="sublabel" text-anchor="middle">Password Auth</text>
  <text x="100" y="234" class="small" text-anchor="middle">인증 주체: 데이터 딕셔너리</text>
  <text x="100" y="252" class="small" text-anchor="middle">USER$ 테이블 해시 비교</text>
  <text x="100" y="275" class="code" text-anchor="middle">IDENTIFIED BY pwd</text>
  <text x="100" y="295" class="small" text-anchor="middle">SHA-512 + Salt (12C)</text>
  <text x="100" y="315" class="small" text-anchor="middle">일반 사용자 접속</text>
  <text x="100" y="335" class="small" text-anchor="middle">가장 일반적인 방식</text>

  <!-- OS Auth -->
  <rect x="195" y="170" width="150" height="175" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="2"/>
  <rect x="195" y="170" width="150" height="28" rx="8" ry="8" fill="#2f6a1c"/>
  <text x="270" y="189" class="label" text-anchor="middle" fill="#1a1a1a">OS 인증</text>
  <text x="270" y="214" class="sublabel" text-anchor="middle">OS Authentication</text>
  <text x="270" y="234" class="small" text-anchor="middle">인증 주체: 운영체제</text>
  <text x="270" y="252" class="small" text-anchor="middle">OS 그룹 멤버십 확인</text>
  <text x="270" y="275" class="code" text-anchor="middle">IDENTIFIED EXTERNALLY</text>
  <text x="270" y="295" class="small" text-anchor="middle">OPS$ 접두사 매핑</text>
  <text x="270" y="315" class="small" text-anchor="middle">로컬 관리자 접속</text>
  <text x="270" y="335" class="small" text-anchor="middle">패스워드 입력 불필요</text>

  <!-- Privileged Auth -->
  <rect x="360" y="170" width="160" height="175" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="2"/>
  <rect x="360" y="170" width="160" height="28" rx="8" ry="8" fill="#8a5a10"/>
  <text x="440" y="189" class="label" text-anchor="middle" fill="#1a1a1a">특권 인증</text>
  <text x="440" y="214" class="sublabel" text-anchor="middle">Privileged Auth</text>
  <text x="440" y="234" class="small" text-anchor="middle">인증: 패스워드파일/OS</text>
  <text x="440" y="252" class="small" text-anchor="middle">SYSDBA/SYSOPER 접속</text>
  <text x="440" y="275" class="code" text-anchor="middle">AS SYSDBA</text>
  <text x="440" y="295" class="small" text-anchor="middle">orapwd 유틸리티</text>
  <text x="440" y="315" class="small" text-anchor="middle">DB 미기동 시에도 가능</text>
  <text x="440" y="335" class="small" text-anchor="middle">필수 감사 대상</text>

  <!-- External Auth -->
  <rect x="535" y="170" width="150" height="175" class="box" fill="#f3efe4" stroke="#be123c" stroke-width="2"/>
  <rect x="535" y="170" width="150" height="28" rx="8" ry="8" fill="#be123c"/>
  <text x="610" y="189" class="label" text-anchor="middle" fill="#1a1a1a">외부 인증</text>
  <text x="610" y="214" class="sublabel" text-anchor="middle">External Auth</text>
  <text x="610" y="234" class="small" text-anchor="middle">인증: 네트워크 서비스</text>
  <text x="610" y="252" class="small" text-anchor="middle">Kerberos, SSL/TLS</text>
  <text x="610" y="275" class="code" text-anchor="middle">IDENTIFIED EXTERNALLY</text>
  <text x="610" y="295" class="small" text-anchor="middle">SSO 환경</text>
  <text x="610" y="315" class="small" text-anchor="middle">중앙 집중 인증</text>
  <text x="610" y="335" class="small" text-anchor="middle">REMOTE_OS_AUTHENT</text>

  <!-- Global Auth -->
  <rect x="700" y="170" width="90" height="175" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <rect x="700" y="170" width="90" height="28" rx="8" ry="8" fill="#4a2e78"/>
  <text x="745" y="189" class="label" text-anchor="middle" fill="#1a1a1a">글로벌</text>
  <text x="745" y="214" class="sublabel" text-anchor="middle">Global</text>
  <text x="745" y="234" class="small" text-anchor="middle">LDAP</text>
  <text x="745" y="252" class="small" text-anchor="middle">디렉토리</text>
  <text x="745" y="275" class="code" text-anchor="middle">GLOBALLY</text>
  <text x="745" y="295" class="small" text-anchor="middle">CMU</text>
  <text x="745" y="315" class="small" text-anchor="middle">Entra ID</text>

  <!-- User-Schema Relationship -->
  <rect x="30" y="380" width="740" height="55" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1.5"/>
  <text x="400" y="400" class="label" text-anchor="middle">사용자(User) = 스키마(Schema) 1:1 대응</text>
  <text x="400" y="420" class="small" text-anchor="middle">CREATE USER 실행 시 동일 이름의 스키마 자동 생성 | Schema-Only Account: NO AUTHENTICATION (로그인 불가, 스키마만 존재)</text>

  <!-- Key Views -->
  <rect x="30" y="450" width="740" height="55" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1"/>
  <text x="50" y="470" class="code">DBA_USERS</text>
  <text x="155" y="470" class="small">사용자 정보</text>
  <text x="255" y="470" class="code">V$SESSION</text>
  <text x="355" y="470" class="small">세션 정보</text>
  <text x="455" y="470" class="code">V$PWFILE_USERS</text>
  <text x="595" y="470" class="small">패스워드 파일</text>
  <text x="50" y="492" class="code">CDB_USERS</text>
  <text x="155" y="492" class="small">CDB 전체</text>
  <text x="255" y="492" class="code">DBA_USERS_WITH_DEFPWD</text>
  <text x="455" y="492" class="small">기본 패스워드 계정 조회</text>
</svg>