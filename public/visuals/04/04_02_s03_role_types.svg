<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <text x="400" y="32" class="title" text-anchor="middle">롤 유형 및 구조 (Role Types and Structure)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">Oracle 사전 정의 롤 및 사용자 정의 롤 비교</text>

  <!-- Predefined Roles -->
  <rect x="30" y="70" width="360" height="195" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="2"/>
  <rect x="30" y="70" width="360" height="28" rx="8" ry="8" fill="#4a2e78"/>
  <text x="210" y="89" class="label" text-anchor="middle" fill="#1a1a1a">사전 정의 롤 (Predefined Roles)</text>

  <rect x="50" y="110" width="100" height="40" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="100" y="128" class="code" text-anchor="middle">DBA</text>
  <text x="100" y="143" class="small" text-anchor="middle">거의 모든 권한</text>

  <rect x="160" y="110" width="100" height="40" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="210" y="128" class="code" text-anchor="middle">CONNECT</text>
  <text x="210" y="143" class="small" text-anchor="middle">CREATE SESSION</text>

  <rect x="270" y="110" width="100" height="40" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="320" y="128" class="code" text-anchor="middle">RESOURCE</text>
  <text x="320" y="143" class="small" text-anchor="middle">객체 생성 권한</text>

  <rect x="50" y="160" width="100" height="40" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="100" y="175" class="code" text-anchor="middle">AUDIT_ADMIN</text>
  <text x="100" y="193" class="small" text-anchor="middle">감사 관리</text>

  <rect x="160" y="160" width="100" height="40" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="210" y="175" class="code" text-anchor="middle">AUDIT_VIEWER</text>
  <text x="210" y="193" class="small" text-anchor="middle">감사 조회</text>

  <rect x="270" y="160" width="100" height="40" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="320" y="178" class="code" text-anchor="middle">PDB_DBA</text>
  <text x="320" y="193" class="small" text-anchor="middle">PDB 관리</text>

  <text x="50" y="225" class="small">SELECT_CATALOG_ROLE: 딕셔너리 뷰 조회</text>
  <text x="50" y="242" class="small">EXECUTE_CATALOG_ROLE: 딕셔너리 패키지 실행</text>
  <text x="50" y="259" class="small">CAPTURE_ADMIN: 권한 분석 관리</text>

  <!-- User-Defined Roles -->
  <rect x="410" y="70" width="360" height="195" class="box" fill="#f3efe4" stroke="#8a5a10" stroke-width="2"/>
  <rect x="410" y="70" width="360" height="28" rx="8" ry="8" fill="#8a5a10"/>
  <text x="590" y="89" class="label" text-anchor="middle" fill="#1a1a1a">사용자 정의 롤 (User-Defined Roles)</text>

  <text x="430" y="118" class="sublabel">인증 방식별 유형:</text>

  <rect x="430" y="128" width="150" height="35" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="505" y="143" class="code" text-anchor="middle">NOT IDENTIFIED</text>
  <text x="505" y="158" class="small" text-anchor="middle">기본, 인증 없음</text>

  <rect x="590" y="128" width="160" height="35" class="box" fill="#f3efe4" stroke="#be123c" stroke-width="1"/>
  <text x="670" y="143" class="code" text-anchor="middle">IDENTIFIED BY pwd</text>
  <text x="670" y="158" class="small" text-anchor="middle">패스워드 인증</text>

  <rect x="430" y="172" width="150" height="35" class="box" fill="#f3efe4" stroke="#2f6a1c" stroke-width="1"/>
  <text x="505" y="187" class="code" text-anchor="middle">IDENTIFIED USING pkg</text>
  <text x="505" y="202" class="small" text-anchor="middle">Application Role</text>

  <rect x="590" y="172" width="160" height="35" class="box" fill="#f3efe4" stroke="#4a2e78" stroke-width="1"/>
  <text x="670" y="187" class="code" text-anchor="middle">IDENTIFIED GLOBALLY</text>
  <text x="670" y="202" class="small" text-anchor="middle">글로벌(디렉토리) 인증</text>

  <text x="430" y="230" class="code">CREATE ROLE app_role;</text>
  <text x="430" y="247" class="code">GRANT SELECT ON hr.emp TO app_role;</text>
  <text x="430" y="260" class="code">SET ROLE app_role;</text>

  <!-- Role Nesting -->
  <rect x="30" y="285" width="740" height="135" class="box" fill="#f3efe4" stroke="#f3efe4" stroke-width="1.5"/>
  <text x="50" y="305" class="label">롤 중첩 및 활성화 (Role Nesting &amp; Activation)</text>

  <!-- Nested role diagram -->
  <rect x="50" y="320" width="100" height="35" class="box" fill="#4a2e78" opacity="0.3" stroke="#4a2e78" stroke-width="1"/>
  <text x="100" y="342" class="code" text-anchor="middle">DBA</text>

  <line x1="150" y1="337" x2="180" y2="325" stroke="#787368" stroke-width="1"/>
  <line x1="150" y1="337" x2="180" y2="350" stroke="#787368" stroke-width="1"/>

  <rect x="180" y="310" width="80" height="25" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="220" y="327" class="code" text-anchor="middle">CONNECT</text>

  <rect x="180" y="340" width="80" height="25" class="box" fill="#f3efe4" stroke="#2456a8" stroke-width="1"/>
  <text x="220" y="357" class="code" text-anchor="middle">RESOURCE</text>

  <!-- Activation info -->
  <text x="300" y="325" class="sublabel">롤 활성화:</text>
  <text x="300" y="345" class="code">SET ROLE role_name</text>
  <text x="300" y="362" class="code">SET ROLE ALL EXCEPT role_name</text>
  <text x="300" y="379" class="code">SET ROLE NONE</text>

  <text x="540" y="325" class="sublabel">DEFAULT ROLE 설정:</text>
  <text x="540" y="345" class="code">ALTER USER ... DEFAULT ROLE role1</text>
  <text x="540" y="362" class="small">로그인 시 자동 활성화될 롤 지정</text>
  <text x="540" y="379" class="code">DBA_ROLE_PRIVS.DEFAULT_ROLE='YES'</text>
  <text x="540" y="396" class="small">MAX_ENABLED_ROLES: 세션당 최대 150개</text>

  <!-- Views -->
  <text x="50" y="412" class="code">DBA_ROLES</text>
  <text x="140" y="412" class="small">모든 롤</text>
  <text x="200" y="412" class="code">ROLE_SYS_PRIVS</text>
  <text x="330" y="412" class="small">롤의 시스템 권한</text>
  <text x="430" y="412" class="code">ROLE_TAB_PRIVS</text>
  <text x="560" y="412" class="small">롤의 객체 권한</text>
  <text x="640" y="412" class="code">ROLE_ROLE_PRIVS</text>
</svg>