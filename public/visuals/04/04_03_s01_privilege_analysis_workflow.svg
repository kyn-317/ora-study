<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94A3B8"/>
    </marker>
  </defs>

  <text x="400" y="32" class="title" text-anchor="middle">권한 분석 워크플로우 (Privilege Analysis Workflow)</text>
  <text x="400" y="52" class="subtitle" text-anchor="middle">DBMS_PRIVILEGE_CAPTURE를 통한 최소 권한 원칙 구현</text>

  <!-- Step 1 -->
  <rect x="30" y="80" width="140" height="65" class="box" fill="#6F6BEA" opacity="0.2" stroke="#6F6BEA" stroke-width="2"/>
  <text x="100" y="100" class="label" text-anchor="middle" fill="#6F6BEA">1</text>
  <text x="100" y="118" class="code" text-anchor="middle">CREATE_CAPTURE</text>
  <text x="100" y="135" class="small" text-anchor="middle">정책 생성</text>

  <line x1="170" y1="112" x2="200" y2="112" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="200" y="80" width="140" height="65" class="box" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="2"/>
  <text x="270" y="100" class="label" text-anchor="middle" fill="#3B82F6">2</text>
  <text x="270" y="118" class="code" text-anchor="middle">ENABLE_CAPTURE</text>
  <text x="270" y="135" class="small" text-anchor="middle">캡처 시작</text>

  <line x1="340" y1="112" x2="370" y2="112" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="370" y="80" width="140" height="65" class="box" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="2"/>
  <text x="440" y="100" class="label" text-anchor="middle" fill="#10B981">3</text>
  <text x="440" y="118" class="sublabel" text-anchor="middle">워크로드 실행</text>
  <text x="440" y="135" class="small" text-anchor="middle">일반 업무 수행 기간</text>

  <line x1="510" y1="112" x2="540" y2="112" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="540" y="80" width="140" height="65" class="box" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="2"/>
  <text x="610" y="100" class="label" text-anchor="middle" fill="#F59E0B">4</text>
  <text x="610" y="118" class="code" text-anchor="middle">DISABLE_CAPTURE</text>
  <text x="610" y="135" class="small" text-anchor="middle">캡처 중지</text>

  <line x1="610" y1="145" x2="610" y2="170" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="540" y="170" width="140" height="65" class="box" fill="#F43F5E" opacity="0.2" stroke="#F43F5E" stroke-width="2"/>
  <text x="610" y="190" class="label" text-anchor="middle" fill="#F43F5E">5</text>
  <text x="610" y="208" class="code" text-anchor="middle">GENERATE_RESULT</text>
  <text x="610" y="225" class="small" text-anchor="middle">결과 생성</text>

  <line x1="540" y1="202" x2="480" y2="202" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Results -->
  <rect x="30" y="170" width="450" height="65" class="box" fill="#1E1E2E" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="50" y="192" class="code">DBA_USED_PRIVS</text>
  <text x="185" y="192" class="small">사용된 권한</text>
  <text x="280" y="192" class="code">DBA_UNUSED_PRIVS</text>
  <text x="430" y="192" class="small">미사용 권한</text>
  <text x="50" y="212" class="code">DBA_USED_SYSPRIVS_PATH</text>
  <text x="245" y="212" class="small">부여 경로 추적</text>
  <text x="50" y="226" class="small">GENERATE_RESULT 호출 전에는 결과 뷰에 데이터 없음!</text>

  <!-- Capture Types -->
  <rect x="30" y="255" width="740" height="80" class="box" fill="#1E1E2E" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="50" y="275" class="label">캡처 유형 (Capture Types)</text>

  <rect x="50" y="285" width="110" height="38" class="box" fill="#6F6BEA" opacity="0.15" stroke="#6F6BEA" stroke-width="1"/>
  <text x="105" y="300" class="code" text-anchor="middle">DATABASE</text>
  <text x="105" y="316" class="small" text-anchor="middle">전체 DB (1개만)</text>

  <rect x="175" y="285" width="90" height="38" class="box" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="220" y="300" class="code" text-anchor="middle">ROLE</text>
  <text x="220" y="316" class="small" text-anchor="middle">특정 역할</text>

  <rect x="280" y="285" width="100" height="38" class="box" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1"/>
  <text x="330" y="300" class="code" text-anchor="middle">CONTEXT</text>
  <text x="330" y="316" class="small" text-anchor="middle">조건별 캡처</text>

  <rect x="395" y="285" width="140" height="38" class="box" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
  <text x="465" y="300" class="code" text-anchor="middle">ROLE_AND_CONTEXT</text>
  <text x="465" y="316" class="small" text-anchor="middle">역할+조건 결합</text>

  <text x="560" y="300" class="small">DATABASE: 동시에 1개만 활성화</text>
  <text x="560" y="316" class="small">기타: 여러 개 동시 활성화 가능</text>

  <!-- Exclusions -->
  <rect x="30" y="350" width="740" height="55" class="box" fill="#F43F5E" opacity="0.1" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="50" y="370" class="label" fill="#F43F5E">캡처 제외 대상 (시험 출제 포인트!)</text>
  <text x="50" y="390" class="code">ORACLE_MAINTAINED='Y'</text>
  <text x="230" y="390" class="small">SYS, SYSTEM 등 내부 계정의 권한 사용은 자동 제외</text>
  <text x="50" y="402" class="small">객체 소유자가 자기 스키마 객체에 접근하는 경우도 캡처 대상 아님 (암묵적 권한)</text>
</svg>