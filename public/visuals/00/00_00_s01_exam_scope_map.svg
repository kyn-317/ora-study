<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <style>
    text { font-family: 'Pretendard', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 11px; fill: #94A3B8; }
    .ch-num { font-size: 22px; font-weight: 800; }
    .ch-title { font-size: 13px; font-weight: 600; }
    .ch-sub { font-size: 10.5px; fill: #CBD5E1; }
    .ch-units { font-size: 10px; fill: #94A3B8; font-style: italic; }
    .badge { font-size: 10px; font-weight: 700; fill: #1E1E2E; }
    .box { rx: 10; ry: 10; stroke-width: 1.5; }
    .center-box { fill: rgba(111,107,234,0.2); stroke: #6F6BEA; rx: 14; stroke-width: 2; }
    .arrow { stroke: #6F6BEA; stroke-width: 1.5; fill: none; stroke-dasharray: 4 3; marker-end: url(#arr); opacity: 0.5; }
  </style>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6F6BEA" opacity="0.5" />
    </marker>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6F6BEA" stop-opacity="0.25"/><stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25"/><stop offset="100%" stop-color="#06B6D4" stop-opacity="0.1"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/><stop offset="100%" stop-color="#EF4444" stop-opacity="0.1"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/><stop offset="100%" stop-color="#06B6D4" stop-opacity="0.1"/></linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">1Z0-182 Oracle DBA — 8개 챕터 학습 범위 조감도</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Oracle 26ai 기준 · 총 32개 학습 단원</text>

  <!-- Center circle -->
  <ellipse cx="450" cy="320" rx="80" ry="36" class="center-box" />
  <text x="450" y="314" text-anchor="middle" font-size="13" font-weight="700" fill="#E2E8F0">Oracle DBA</text>
  <text x="450" y="332" text-anchor="middle" font-size="11" fill="#A5B4FC">1Z0-182</text>

  <!-- Ch01 - Top Left -->
  <g transform="translate(30, 68)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g1)" stroke="#6F6BEA" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#6F6BEA" />
    <text x="26" y="26" text-anchor="middle" class="badge">01</text>
    <text x="50" y="26" class="ch-title">아키텍처 및 인스턴스</text>
    <text x="10" y="48" class="ch-sub">Architecture &amp; Instance</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#6F6BEA" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">메모리(SGA/PGA) · 프로세스(DBWn, LGWR)</text>
    <text x="10" y="86" class="ch-sub">저장구조 · 기동/종료 · 파라미터 · 복구</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#6F6BEA" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">6 단원</text>
  </g>

  <!-- Ch02 - Top Right -->
  <g transform="translate(670, 68)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g1)" stroke="#6F6BEA" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#6F6BEA" />
    <text x="26" y="26" text-anchor="middle" class="badge">02</text>
    <text x="50" y="26" class="ch-title">멀티테넌트 (CDB/PDB)</text>
    <text x="10" y="48" class="ch-sub">Multitenant Architecture</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#6F6BEA" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">CDB$ROOT · PDB$SEED · 사용자 PDB</text>
    <text x="10" y="86" class="ch-sub">PDB 생성/관리/클론/Unplug-Plug</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#6F6BEA" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">4 단원</text>
  </g>

  <!-- Ch03 - Left -->
  <g transform="translate(30, 228)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g2)" stroke="#3B82F6" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#3B82F6" />
    <text x="26" y="26" text-anchor="middle" class="badge">03</text>
    <text x="50" y="26" class="ch-title">관리 툴 및 네트워크</text>
    <text x="10" y="48" class="ch-sub">Tools &amp; Net Services</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">DBCA · SQL*Plus · EM · RMAN</text>
    <text x="10" y="86" class="ch-sub">리스너 · 네이밍 · DB Link</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#3B82F6" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">4 단원</text>
  </g>

  <!-- Ch04 - Right -->
  <g transform="translate(670, 228)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g2)" stroke="#3B82F6" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#3B82F6" />
    <text x="26" y="26" text-anchor="middle" class="badge">04</text>
    <text x="50" y="26" class="ch-title">보안, 권한 및 감사</text>
    <text x="10" y="48" class="ch-sub">Security &amp; Auditing</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">사용자/인증 · 권한/롤 · 프로파일</text>
    <text x="10" y="86" class="ch-sub">통합 감사 · FGA · Privilege Capture</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#3B82F6" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">4 단원</text>
  </g>

  <!-- Ch05 - Bottom Left -->
  <g transform="translate(30, 388)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g3)" stroke="#F59E0B" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#F59E0B" />
    <text x="26" y="26" text-anchor="middle" class="badge">05</text>
    <text x="50" y="26" class="ch-title">스토리지 최적화</text>
    <text x="10" y="48" class="ch-sub">Storage &amp; Tablespace</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">테이블스페이스 · 블록 · ROWID</text>
    <text x="10" y="86" class="ch-sub">Resumable · Shrink · 압축</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#F59E0B" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">4 단원</text>
  </g>

  <!-- Ch06 - Bottom -->
  <g transform="translate(350, 490)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g3)" stroke="#F59E0B" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#F59E0B" />
    <text x="26" y="26" text-anchor="middle" class="badge">06</text>
    <text x="50" y="26" class="ch-title">UNDO 데이터 제어</text>
    <text x="10" y="48" class="ch-sub">UNDO Management</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">읽기 일관성 · 롤백 · Flashback</text>
    <text x="10" y="86" class="ch-sub">상태 전이 · Temp UNDO · Local UNDO</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#F59E0B" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">3 단원</text>
  </g>

  <!-- Ch07 - Bottom Right -->
  <g transform="translate(670, 388)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g4)" stroke="#10B981" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#10B981" />
    <text x="26" y="26" text-anchor="middle" class="badge">07</text>
    <text x="50" y="26" class="ch-title">데이터 이동</text>
    <text x="10" y="48" class="ch-sub">Data Movement</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">External Table · SQL*Loader</text>
    <text x="10" y="86" class="ch-sub">Data Pump (expdp/impdp)</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#10B981" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">3 단원</text>
  </g>

  <!-- Ch08 - Top Center -->
  <g transform="translate(350, 68)">
    <rect x="0" y="0" width="200" height="120" class="box" fill="url(#g4)" stroke="#10B981" />
    <rect x="10" y="10" width="32" height="22" rx="4" fill="#10B981" />
    <text x="26" y="26" text-anchor="middle" class="badge">08</text>
    <text x="50" y="26" class="ch-title">성능 모니터링/자동 관리</text>
    <text x="10" y="48" class="ch-sub">Performance &amp; Automation</text>
    <line x1="10" y1="56" x2="190" y2="56" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="10" y="72" class="ch-sub">AWR · ADDM · Resource Manager</text>
    <text x="10" y="86" class="ch-sub">어드바이저 · AutoTask · V$ Views</text>
    <rect x="152" y="98" width="42" height="16" rx="8" fill="#10B981" opacity="0.8"/>
    <text x="173" y="110" text-anchor="middle" class="badge">4 단원</text>
  </g>

  <!-- Connecting lines from center to each chapter -->
  <path d="M 390,300 L 230,175" class="arrow"/>
  <path d="M 510,300 L 670,175" class="arrow"/>
  <path d="M 370,320 L 230,295" class="arrow"/>
  <path d="M 530,320 L 670,295" class="arrow"/>
  <path d="M 390,345 L 230,435" class="arrow"/>
  <path d="M 450,356 L 450,490" class="arrow"/>
  <path d="M 510,345 L 670,435" class="arrow"/>
  <path d="M 450,284 L 450,188" class="arrow"/>
