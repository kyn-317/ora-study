<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <style>
    text { font-family: 'Pretendard', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 11px; fill: #94A3B8; }
    .node-label { font-size: 13px; font-weight: 700; }
    .node-sub { font-size: 9.5px; fill: #CBD5E1; }
    .badge { font-size: 10px; font-weight: 700; fill: #1E1E2E; }
    .conn-label { font-size: 9px; fill: #CBD5E1; }
    .conn-num { font-size: 10px; font-weight: 700; }
    .legend-text { font-size: 10px; fill: #94A3B8; }
    .link-strong { stroke-width: 2.5; fill: none; marker-end: url(#arr4); }
    .link-medium { stroke-width: 1.8; fill: none; stroke-dasharray: 6 3; marker-end: url(#arr4m); }
    .link-light { stroke-width: 1.2; fill: none; stroke-dasharray: 3 4; opacity: 0.6; }
  </style>
  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="arr4m" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6" />
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">챕터 간 10대 핵심 연결 관계</text>
  <text x="450" y="48" text-anchor="middle" class="subtitle">Cross-Chapter Connections — 8 Chapters, 10 Key Links</text>

  <!-- Node positions (radial layout):
    Ch01: center-top (450, 140)
    Ch02: right-top (700, 180)
    Ch03: far-right (780, 340)
    Ch04: right-bottom (700, 490)
    Ch05: center-bottom-left (300, 490)
    Ch06: left-bottom (180, 400)
    Ch07: far-left (120, 260)
    Ch08: center (450, 350) - hub
  -->

  <!-- Connection lines (drawn first, behind nodes) -->

  <!-- 1. Ch01 ↔ Ch02 (아키텍처-멀티테넌트) -->
  <path d="M 500,155 Q 600,130 660,180" class="link-strong" stroke="#6F6BEA"/>
  <rect x="555" y="130" width="56" height="16" rx="3" fill="rgba(111,107,234,0.3)"/>
  <text x="583" y="142" text-anchor="middle" class="conn-num" fill="#A5B4FC">1</text>

  <!-- 2. Ch01 ↔ Ch05 (저장구조-스토리지) -->
  <path d="M 420,170 Q 310,320 310,460" class="link-strong" stroke="#6F6BEA"/>
  <rect x="295" y="310" width="56" height="16" rx="3" fill="rgba(111,107,234,0.3)"/>
  <text x="323" y="322" text-anchor="middle" class="conn-num" fill="#A5B4FC">2</text>

  <!-- 3. Ch01 ↔ Ch06 (UNDO 개념-심화) -->
  <path d="M 405,165 Q 260,250 200,375" class="link-strong" stroke="#6F6BEA"/>
  <rect x="270" y="255" width="56" height="16" rx="3" fill="rgba(111,107,234,0.3)"/>
  <text x="298" y="267" text-anchor="middle" class="conn-num" fill="#A5B4FC">3</text>

  <!-- 4. Ch01 ↔ Ch06 (인스턴스 복구-UNDO 롤백) -->
  <path d="M 400,170 Q 240,280 195,375" class="link-medium" stroke="#3B82F6"/>
  <rect x="265" y="280" width="56" height="16" rx="3" fill="rgba(59,130,246,0.3)"/>
  <text x="293" y="292" text-anchor="middle" class="conn-num" fill="#93C5FD">4</text>

  <!-- 5. Ch02 ↔ Ch04 (멀티테넌트-보안) -->
  <path d="M 720,215 L 720,460" class="link-strong" stroke="#6F6BEA"/>
  <rect x="728" y="340" width="56" height="16" rx="3" fill="rgba(111,107,234,0.3)"/>
  <text x="756" y="352" text-anchor="middle" class="conn-num" fill="#A5B4FC">5</text>

  <!-- 6. Ch03 ↔ Ch07 (네트워크-데이터 이동) -->
  <path d="M 745,345 Q 500,220 165,270" class="link-medium" stroke="#3B82F6"/>
  <rect x="430" y="238" width="56" height="16" rx="3" fill="rgba(59,130,246,0.3)"/>
  <text x="458" y="250" text-anchor="middle" class="conn-num" fill="#93C5FD">6</text>

  <!-- 7. Ch05 ↔ Ch07 (스토리지-데이터 이동) -->
  <path d="M 270,485 Q 180,400 145,295" class="link-medium" stroke="#3B82F6"/>
  <rect x="175" y="378" width="56" height="16" rx="3" fill="rgba(59,130,246,0.3)"/>
  <text x="203" y="390" text-anchor="middle" class="conn-num" fill="#93C5FD">7</text>

  <!-- 8. Ch06 ↔ Ch05 (UNDO-스토리지) -->
  <path d="M 215,430 Q 245,465 280,478" class="link-light" stroke="#F59E0B"/>
  <rect x="220" y="450" width="56" height="16" rx="3" fill="rgba(245,158,11,0.3)"/>
  <text x="248" y="462" text-anchor="middle" class="conn-num" fill="#FCD34D">8</text>

  <!-- 9. Ch04 ↔ Ch08 (감사-모니터링) -->
  <path d="M 670,490 Q 560,430 490,375" class="link-light" stroke="#F59E0B"/>
  <rect x="565" y="415" width="56" height="16" rx="3" fill="rgba(245,158,11,0.3)"/>
  <text x="593" y="427" text-anchor="middle" class="conn-num" fill="#FCD34D">9</text>

  <!-- 10. All → Ch08 (통합 관찰 지점) -->
  <path d="M 450,170 L 450,315" class="link-strong" stroke="#10B981"/>
  <rect x="458" y="240" width="64" height="16" rx="3" fill="rgba(16,185,129,0.3)"/>
  <text x="490" y="252" text-anchor="middle" class="conn-num" fill="#6EE7B7">10</text>

  <!-- Chapter Nodes -->

  <!-- Ch01 - center top -->
  <g filter="url(#glow)">
    <rect x="390" y="100" width="120" height="68" rx="12" fill="rgba(111,107,234,0.25)" stroke="#6F6BEA" stroke-width="2.5"/>
  </g>
  <rect x="403" y="110" width="28" height="18" rx="4" fill="#6F6BEA"/>
  <text x="417" y="123" text-anchor="middle" class="badge">01</text>
  <text x="438" y="123" class="node-label" fill="#E2E8F0">아키텍처</text>
  <text x="403" y="143" class="node-sub">메모리 · 프로세스 · 저장</text>
  <text x="403" y="156" class="node-sub">기동 · 파라미터 · 복구</text>

  <!-- Ch02 - right top -->
  <rect x="660" y="160" width="120" height="55" rx="12" fill="rgba(111,107,234,0.2)" stroke="#6F6BEA" stroke-width="2"/>
  <rect x="673" y="170" width="28" height="18" rx="4" fill="#6F6BEA"/>
  <text x="687" y="183" text-anchor="middle" class="badge">02</text>
  <text x="708" y="183" class="node-label" fill="#E2E8F0">멀티테넌트</text>
  <text x="673" y="203" class="node-sub">CDB/PDB · 생성 · 클론</text>

  <!-- Ch03 - far right -->
  <rect x="735" y="310" width="120" height="55" rx="12" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="2"/>
  <rect x="748" y="320" width="28" height="18" rx="4" fill="#3B82F6"/>
  <text x="762" y="333" text-anchor="middle" class="badge">03</text>
  <text x="783" y="333" class="node-label" fill="#E2E8F0">관리/네트워크</text>
  <text x="748" y="353" class="node-sub">도구 · 리스너 · DB Link</text>

  <!-- Ch04 - right bottom -->
  <rect x="660" y="465" width="120" height="55" rx="12" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="2"/>
  <rect x="673" y="475" width="28" height="18" rx="4" fill="#3B82F6"/>
  <text x="687" y="488" text-anchor="middle" class="badge">04</text>
  <text x="708" y="488" class="node-label" fill="#E2E8F0">보안/감사</text>
  <text x="673" y="508" class="node-sub">권한 · 롤 · 통합 감사</text>

  <!-- Ch05 - center bottom left -->
  <rect x="250" y="465" width="120" height="55" rx="12" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="2"/>
  <rect x="263" y="475" width="28" height="18" rx="4" fill="#F59E0B"/>
  <text x="277" y="488" text-anchor="middle" class="badge">05</text>
  <text x="298" y="488" class="node-label" fill="#E2E8F0">스토리지</text>
  <text x="263" y="508" class="node-sub">TS · 블록 · Shrink · 압축</text>

  <!-- Ch06 - left bottom -->
  <rect x="130" y="375" width="120" height="55" rx="12" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="2"/>
  <rect x="143" y="385" width="28" height="18" rx="4" fill="#F59E0B"/>
  <text x="157" y="398" text-anchor="middle" class="badge">06</text>
  <text x="178" y="398" class="node-label" fill="#E2E8F0">UNDO</text>
  <text x="143" y="418" class="node-sub">읽기 일관성 · Local UNDO</text>

  <!-- Ch07 - far left -->
  <rect x="70" y="240" width="120" height="55" rx="12" fill="rgba(16,185,129,0.2)" stroke="#10B981" stroke-width="2"/>
  <rect x="83" y="250" width="28" height="18" rx="4" fill="#10B981"/>
  <text x="97" y="263" text-anchor="middle" class="badge">07</text>
  <text x="118" y="263" class="node-label" fill="#E2E8F0">데이터 이동</text>
  <text x="83" y="283" class="node-sub">Ext Table · Loader · Pump</text>

  <!-- Ch08 - center (hub) - special styling -->
  <g filter="url(#glow)">
    <rect x="393" y="318" width="114" height="62" rx="14" fill="rgba(16,185,129,0.3)" stroke="#10B981" stroke-width="2.5"/>
  </g>
  <rect x="406" y="328" width="28" height="18" rx="4" fill="#10B981"/>
  <text x="420" y="341" text-anchor="middle" class="badge">08</text>
  <text x="441" y="341" class="node-label" fill="#E2E8F0">성능/자동관리</text>
  <text x="406" y="360" class="node-sub">AWR · ADDM · 어드바이저</text>
  <text x="406" y="372" class="node-sub">통합 관찰 지점 (Hub)</text>

  <!-- Legend -->
  <rect x="20" y="555" width="860" height="130" rx="10" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1"/>
  <text x="40" y="578" font-size="12" font-weight="600" fill="#E2E8F0">10대 핵심 연결 관계</text>

  <!-- Legend - left column -->
  <rect x="40" y="590" width="16" height="12" rx="2" fill="rgba(111,107,234,0.3)"/>
  <text x="42" y="600" class="conn-num" fill="#A5B4FC">1</text>
  <text x="64" y="600" class="legend-text">Ch01↔Ch02 인스턴스 아키텍처-멀티테넌트</text>

  <rect x="40" y="608" width="16" height="12" rx="2" fill="rgba(111,107,234,0.3)"/>
  <text x="42" y="618" class="conn-num" fill="#A5B4FC">2</text>
  <text x="64" y="618" class="legend-text">Ch01↔Ch05 저장 구조-스토리지 최적화</text>

  <rect x="40" y="626" width="16" height="12" rx="2" fill="rgba(111,107,234,0.3)"/>
  <text x="42" y="636" class="conn-num" fill="#A5B4FC">3</text>
  <text x="64" y="636" class="legend-text">Ch01↔Ch06 UNDO 개념-UNDO 심화</text>

  <rect x="40" y="644" width="16" height="12" rx="2" fill="rgba(59,130,246,0.3)"/>
  <text x="42" y="654" class="conn-num" fill="#93C5FD">4</text>
  <text x="64" y="654" class="legend-text">Ch01↔Ch06 인스턴스 복구-UNDO 롤백</text>

  <rect x="40" y="662" width="16" height="12" rx="2" fill="rgba(111,107,234,0.3)"/>
  <text x="42" y="672" class="conn-num" fill="#A5B4FC">5</text>
  <text x="64" y="672" class="legend-text">Ch02↔Ch04 멀티테넌트-보안 권한</text>

  <!-- Legend - right column -->
  <rect x="460" y="590" width="16" height="12" rx="2" fill="rgba(59,130,246,0.3)"/>
  <text x="462" y="600" class="conn-num" fill="#93C5FD">6</text>
  <text x="484" y="600" class="legend-text">Ch03↔Ch07 네트워크-데이터 이동</text>

  <rect x="460" y="608" width="16" height="12" rx="2" fill="rgba(59,130,246,0.3)"/>
  <text x="462" y="618" class="conn-num" fill="#93C5FD">7</text>
  <text x="484" y="618" class="legend-text">Ch05↔Ch07 스토리지-데이터 이동 (Direct Path)</text>

  <rect x="460" y="626" width="16" height="12" rx="2" fill="rgba(245,158,11,0.3)"/>
  <text x="462" y="636" class="conn-num" fill="#FCD34D">8</text>
  <text x="484" y="636" class="legend-text">Ch06↔Ch05 UNDO-스토리지 (공간 관리)</text>

  <rect x="460" y="644" width="16" height="12" rx="2" fill="rgba(245,158,11,0.3)"/>
  <text x="462" y="654" class="conn-num" fill="#FCD34D">9</text>
  <text x="484" y="654" class="legend-text">Ch04↔Ch08 감사-성능 모니터링</text>

  <rect x="460" y="662" width="16" height="12" rx="2" fill="rgba(16,185,129,0.3)"/>
  <text x="462" y="672" class="conn-num" fill="#6EE7B7">10</text>
  <text x="484" y="672" class="legend-text">Ch01~07→Ch08 통합 관찰 지점 (모든 챕터 집대성)</text>
</svg>
