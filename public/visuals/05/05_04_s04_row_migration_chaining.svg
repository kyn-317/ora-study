<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F43F5E" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">Row Migration vs Row Chaining</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">행 이동 vs 행 체이닝 — 추가 I/O 발생 원인</text>

  <!-- Row Migration -->
  <rect x="30" y="65" width="355" height="240" class="box" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="2"/>
  <text x="207" y="88" text-anchor="middle" class="label" fill="#F59E0B">Row Migration (행 이동)</text>
  <text x="207" y="105" text-anchor="middle" class="small">UPDATE로 행 크기 증가 시 발생</text>

  <!-- Block A (original) -->
  <rect x="50" y="118" width="140" height="110" class="box" fill="rgba(255,255,255,0.04)" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="120" y="138" text-anchor="middle" class="sublabel">Block A (원래 블록)</text>
  <rect x="60" y="148" width="120" height="20" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <text x="120" y="163" text-anchor="middle" class="small">Row 1</text>
  <rect x="60" y="172" width="120" height="20" fill="rgba(245,158,11,0.2)" stroke="#F59E0B" stroke-width="1" rx="3"/>
  <text x="120" y="187" text-anchor="middle" class="code">Row 2 → 포인터</text>
  <rect x="60" y="196" width="120" height="20" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <text x="120" y="211" text-anchor="middle" class="small">Row 3</text>

  <!-- Arrow to Block B -->
  <line x1="190" y1="182" x2="225" y2="182" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <!-- Block B (migrated) -->
  <rect x="230" y="118" width="140" height="110" class="box" fill="rgba(255,255,255,0.04)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="300" y="138" text-anchor="middle" class="sublabel" fill="#F59E0B">Block B (이동 대상)</text>
  <rect x="240" y="162" width="120" height="30" fill="rgba(245,158,11,0.25)" stroke="#F59E0B" stroke-width="1.5" rx="3"/>
  <text x="300" y="182" text-anchor="middle" class="code">Row 2 (전체 데이터)</text>

  <!-- Migration explanation -->
  <text x="50" y="248" class="small" fill="#F59E0B">원인: UPDATE로 행 크기 증가 → 원래 블록에 공간 부족</text>
  <text x="50" y="264" class="small">원래 ROWID 유지 → 포인터로 새 블록 참조</text>
  <text x="50" y="280" class="small">Index 변경 불필요 (ROWID 동일)</text>
  <text x="50" y="296" class="small" fill="#F43F5E">영향: 단일 행 접근 시 2개 블록 I/O (추가 1 I/O)</text>

  <!-- Row Chaining -->
  <rect x="415" y="65" width="355" height="240" class="box" fill="rgba(244,63,94,0.06)" stroke="#F43F5E" stroke-width="2"/>
  <text x="592" y="88" text-anchor="middle" class="label" fill="#F43F5E">Row Chaining (행 체이닝)</text>
  <text x="592" y="105" text-anchor="middle" class="small">행 크기 > 블록 크기 시 발생</text>

  <!-- Block C -->
  <rect x="435" y="118" width="100" height="110" class="box" fill="rgba(255,255,255,0.04)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="485" y="138" text-anchor="middle" class="sublabel" fill="#F43F5E">Block C</text>
  <rect x="445" y="150" width="80" height="65" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <text x="485" y="175" text-anchor="middle" class="code">Row 전반부</text>
  <text x="485" y="192" text-anchor="middle" class="small">col1~col5</text>
  <text x="485" y="209" text-anchor="middle" class="small">→ 다음 블록</text>

  <!-- Chain arrow -->
  <line x1="535" y1="182" x2="560" y2="182" stroke="#F43F5E" stroke-width="2" fill="none" marker-end="url(#ah-r)"/>

  <!-- Block D -->
  <rect x="565" y="118" width="100" height="110" class="box" fill="rgba(255,255,255,0.04)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="615" y="138" text-anchor="middle" class="sublabel" fill="#F43F5E">Block D</text>
  <rect x="575" y="150" width="80" height="65" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <text x="615" y="175" text-anchor="middle" class="code">Row 후반부</text>
  <text x="615" y="192" text-anchor="middle" class="small">col6~col20</text>
  <text x="615" y="209" text-anchor="middle" class="small">(가능하면 계속)</text>

  <!-- Chain arrow to more blocks -->
  <line x1="665" y1="182" x2="690" y2="182" stroke="#F43F5E" stroke-width="2" fill="none" marker-end="url(#ah-r)"/>
  <text x="705" y="187" class="small" fill="#F43F5E">...</text>

  <!-- Chaining explanation -->
  <text x="435" y="248" class="small" fill="#F43F5E">원인: 행 크기가 블록 크기보다 큼 (넓은 테이블)</text>
  <text x="435" y="264" class="small">INSERT 시점부터 체이닝 발생 (피할 수 없음)</text>
  <text x="435" y="280" class="small">해결: 블록 사이즈 증가 (16KB, 32KB) 또는 테이블 재설계</text>
  <text x="435" y="296" class="small" fill="#F43F5E">영향: 항상 다중 블록 I/O 필요</text>

  <!-- Detection and Solution -->
  <rect x="30" y="320" width="740" height="105" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="50" y="343" class="label">탐지 및 해결</text>

  <text x="50" y="365" class="code">V$SYSSTAT: 'table fetch continued row'</text>
  <text x="430" y="365" class="small">— 값이 높으면 Migration/Chaining 심각</text>

  <text x="50" y="385" class="code">ANALYZE TABLE ... LIST CHAINED ROWS</text>
  <text x="430" y="385" class="small">— 체이닝/이동된 행 목록 수집</text>

  <text x="50" y="405" class="sublabel" fill="#10B981">Migration 해결:</text>
  <text x="190" y="405" class="small">ALTER TABLE MOVE / SHRINK SPACE / PCTFREE 증가</text>

  <text x="50" y="423" class="sublabel" fill="#F43F5E">Chaining 해결:</text>
  <text x="190" y="423" class="small">더 큰 블록 사이즈 사용 (DB_nK_CACHE_SIZE) 또는 테이블 재설계</text>
</svg>