<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #4a2e78; stroke-width: 2; fill: none; marker-end: url(#ah); }
    .arrow-red { stroke: #be123c; stroke-width: 2; fill: none; marker-end: url(#ah-r); }
    .arrow-green { stroke: #2f6a1c; stroke-width: 2; fill: none; marker-end: url(#ah-g); }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <marker id="ah-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#be123c" />
    </marker>
    <marker id="ah-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6a1c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">공간 부족 시 Oracle 동작 흐름</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Space Exhaustion Handling — AUTOEXTEND → Resumable → Error</text>

  <!-- Step 1 -->
  <rect x="270" y="65" width="260" height="42" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" class="label" fill="#2456a8">새 익스텐트 할당 시도</text>
  <line x1="400" y1="107" x2="400" y2="130" class="arrow"/>

  <!-- Decision 1: Free space? -->
  <polygon points="400,130 490,158 400,186 310,158" fill="rgba(42,42,42,0.04)" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="400" y="160" text-anchor="middle" class="sublabel">여유 공간?</text>

  <!-- Yes: success -->
  <line x1="490" y1="158" x2="620" y2="158" class="arrow-green"/>
  <text x="545" y="150" class="small" fill="#2f6a1c">있음</text>
  <rect x="620" y="140" width="130" height="36" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="685" y="162" text-anchor="middle" class="label" fill="#2f6a1c">할당 성공</text>

  <!-- No -->
  <line x1="400" y1="186" x2="400" y2="210" class="arrow-red"/>
  <text x="410" y="202" class="small" fill="#be123c">없음</text>

  <!-- Decision 2: AUTOEXTEND? -->
  <polygon points="400,210 500,242 400,274 300,242" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="400" y="238" text-anchor="middle" class="sublabel">AUTOEXTEND</text>
  <text x="400" y="254" text-anchor="middle" class="sublabel">ON?</text>

  <!-- Yes: auto extend -->
  <line x1="500" y1="242" x2="620" y2="242" class="arrow-green"/>
  <text x="548" y="234" class="small" fill="#2f6a1c">ON</text>
  <rect x="620" y="220" width="150" height="50" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="695" y="240" text-anchor="middle" class="sublabel" fill="#2f6a1c">데이터 파일 확장</text>
  <text x="695" y="258" text-anchor="middle" class="code">NEXT + MAXSIZE 확인</text>

  <!-- Extend success/fail -->
  <line x1="695" y1="270" x2="695" y2="290" class="arrow"/>
  <polygon points="695,290 740,308 695,326 650,308" fill="rgba(42,42,42,0.04)" stroke="#4a2e78" stroke-width="1"/>
  <text x="695" y="312" text-anchor="middle" class="small">성공?</text>
  <line x1="740" y1="308" x2="770" y2="308" stroke="#2f6a1c" stroke-width="1.5" fill="none"/>
  <text x="762" y="300" class="small" fill="#2f6a1c">OK</text>

  <!-- No: AUTOEXTEND OFF -->
  <line x1="400" y1="274" x2="400" y2="300" class="arrow-red"/>
  <text x="412" y="290" class="small" fill="#be123c">OFF 또는 확장 실패</text>

  <!-- Decision 3: Resumable? -->
  <polygon points="400,300 500,332 400,364 300,332" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="400" y="328" text-anchor="middle" class="sublabel">Resumable</text>
  <text x="400" y="344" text-anchor="middle" class="sublabel">활성화?</text>

  <!-- Yes: Suspend -->
  <line x1="300" y1="332" x2="170" y2="332" class="arrow-green"/>
  <text x="228" y="324" class="small" fill="#2f6a1c">YES</text>
  <rect x="30" y="310" width="150" height="50" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="2"/>
  <text x="105" y="330" text-anchor="middle" class="label" fill="#8a5a10">일시 중지</text>
  <text x="105" y="348" text-anchor="middle" class="small">(Suspended)</text>

  <!-- No: Error -->
  <line x1="400" y1="364" x2="400" y2="388" class="arrow-red"/>
  <text x="412" y="380" class="small" fill="#be123c">NO</text>
  <rect x="300" y="388" width="200" height="28" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="2"/>
  <text x="400" y="406" text-anchor="middle" class="label" fill="#be123c">ORA-01653 오류 발생</text>

  <!-- Left side: Two mechanisms -->
  <rect x="30" y="65" width="220" height="110" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1"/>
  <text x="40" y="85" class="sublabel">공간 관리 2대 메커니즘:</text>
  <text x="40" y="108" class="label" fill="#2f6a1c">Resumable Space Allocation</text>
  <text x="40" y="125" class="small">목적: 작업 실패 방지 (실행 중)</text>
  <text x="40" y="145" class="label" fill="#2456a8">Deferred Segment Creation</text>
  <text x="40" y="162" class="small">목적: 빈 테이블 공간 절약 (생성 시)</text>
</svg>