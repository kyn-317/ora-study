<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 12px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">ROWID 구조 — SMALLFILE vs BIGFILE</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">Row Identifier: 행의 물리적 위치를 식별하는 의사 컬럼 (Pseudocolumn)</text>

  <!-- SMALLFILE ROWID -->
  <rect x="30" y="65" width="740" height="140" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <text x="50" y="88" class="label" fill="#2456a8">SMALLFILE ROWID (18자리 Base64)</text>

  <rect x="50" y="100" width="160" height="45" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2" rx="6"/>
  <text x="130" y="122" text-anchor="middle" class="label" fill="#4a2e78">OOOOOO</text>
  <text x="130" y="138" text-anchor="middle" class="code">32bit</text>

  <rect x="220" y="100" width="100" height="45" fill="#dee5f5" stroke="#2456a8" stroke-width="2" rx="6"/>
  <text x="270" y="122" text-anchor="middle" class="label" fill="#2456a8">FFF</text>
  <text x="270" y="138" text-anchor="middle" class="code">10bit</text>

  <rect x="330" y="100" width="160" height="45" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="2" rx="6"/>
  <text x="410" y="122" text-anchor="middle" class="label" fill="#2f6a1c">BBBBBB</text>
  <text x="410" y="138" text-anchor="middle" class="code">22bit</text>

  <rect x="500" y="100" width="100" height="45" fill="#f0ddb3" stroke="#8a5a10" stroke-width="2" rx="6"/>
  <text x="550" y="122" text-anchor="middle" class="label" fill="#8a5a10">RRR</text>
  <text x="550" y="138" text-anchor="middle" class="code">16bit</text>

  <text x="50" y="168" class="small">Object: 세그먼트 ID</text>
  <text x="220" y="168" class="small">File: 파일# (1,022)</text>
  <text x="360" y="168" class="small">Block: 블록# (~4M)</text>
  <text x="520" y="168" class="small">Row: 행# (~65K)</text>

  <text x="630" y="115" class="sublabel">파일당 최대</text>
  <text x="630" y="133" class="code">32GB (8KB)</text>
  <text x="630" y="150" class="sublabel">TS 최대</text>
  <text x="630" y="168" class="code">~32TB</text>

  <!-- BIGFILE ROWID -->
  <rect x="30" y="215" width="740" height="140" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5"/>
  <text x="50" y="238" class="label" fill="#4a2e78">BIGFILE ROWID (18자리 Base64)</text>

  <rect x="50" y="250" width="160" height="45" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2" rx="6"/>
  <text x="130" y="272" text-anchor="middle" class="label" fill="#4a2e78">OOOOOO</text>
  <text x="130" y="288" text-anchor="middle" class="code">32bit</text>

  <rect x="220" y="250" width="380" height="45" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="2" rx="6"/>
  <text x="410" y="272" text-anchor="middle" class="label" fill="#2f6a1c">BBBBBBBBB (File 없음 — Block에 32bit 할당)</text>
  <text x="410" y="288" text-anchor="middle" class="code">32bit (File 10bit 흡수)</text>

  <text x="50" y="318" class="small">Object: 세그먼트 ID</text>
  <text x="220" y="318" class="small">Block: 블록# (~4.3B) — 파일이 1개이므로 File 비트 불필요</text>

  <text x="630" y="265" class="sublabel">파일 최대</text>
  <text x="630" y="283" class="code">32TB (8KB)</text>
  <text x="630" y="300" class="sublabel">블록 수</text>
  <text x="630" y="318" class="code">2^32 = ~43억</text>

  <!-- Key insight -->
  <rect x="30" y="365" width="740" height="30" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" class="sublabel" fill="#8a5a10">핵심: BIGFILE은 File 비트를 Block에 할당하여 단일 파일로 SMALLFILE TS 전체 크기와 동일한 최대 용량 확보</text>
</svg>