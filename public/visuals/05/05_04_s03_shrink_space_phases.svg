<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">SHRINK SPACE 동작 원리 (2단계)</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">ALTER TABLE ... SHRINK SPACE — 데이터 재배치 + HWM 하향</text>

  <!-- Phase 0: Before -->
  <rect x="30" y="65" width="740" height="90" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5"/>
  <text x="50" y="85" class="label" fill="#be123c">초기 상태: DELETE 후 산재된 데이터</text>

  <rect x="55" y="95" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="105" y="95" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#be123c" stroke-width="1" rx="3"/>
  <rect x="155" y="95" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="205" y="95" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#be123c" stroke-width="1" rx="3"/>
  <rect x="255" y="95" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#be123c" stroke-width="1" rx="3"/>
  <rect x="305" y="95" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="355" y="95" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#be123c" stroke-width="1" rx="3"/>
  <rect x="405" y="95" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="455" y="95" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#f3efe4" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="505" y="95" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#f3efe4" stroke-width="1" rx="3" stroke-dasharray="3,2"/>

  <line x1="450" y1="90" x2="450" y2="138" stroke="#be123c" stroke-width="2.5"/>
  <text x="460" y="148" class="small" fill="#be123c">HWM ↑</text>
  <text x="570" y="118" class="small">미사용 블록</text>

  <!-- Arrow down -->
  <line x1="400" y1="155" x2="400" y2="178" stroke="#4a2e78" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <!-- Phase 1: Compaction -->
  <rect x="30" y="180" width="740" height="115" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="50" y="200" class="label" fill="#8a5a10">Phase 1: 데이터 재배치 (Compaction)</text>
  <text x="50" y="215" class="small">DML 동시 수행 가능 (온라인) — SHRINK SPACE COMPACT는 여기까지만</text>

  <!-- Data moving arrows -->
  <rect x="55" y="228" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="105" y="228" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="155" y="228" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="205" y="228" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="255" y="228" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#2f6a1c" stroke-width="1" rx="3"/>
  <rect x="305" y="228" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#2f6a1c" stroke-width="1" rx="3"/>
  <rect x="355" y="228" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#2f6a1c" stroke-width="1" rx="3"/>
  <rect x="405" y="228" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#2f6a1c" stroke-width="1" rx="3"/>
  <rect x="455" y="228" width="45" height="35" fill="rgba(42,42,42,0.02)" stroke="#f3efe4" stroke-width="1" rx="3" stroke-dasharray="3,2"/>

  <text x="170" y="255" text-anchor="middle" class="small" fill="#2456a8">앞쪽으로 압축</text>
  <text x="350" y="255" text-anchor="middle" class="small" fill="#2f6a1c">빈 블록 생성</text>

  <line x1="450" y1="223" x2="450" y2="271" stroke="#be123c" stroke-width="2.5"/>
  <text x="460" y="280" class="small" fill="#be123c">HWM ↑ (아직 그대로)</text>

  <text x="520" y="248" class="sublabel" fill="#8a5a10">ROWID 변경됨!</text>
  <text x="520" y="265" class="small">ROW MOVEMENT ENABLE 필수</text>
  <text x="520" y="280" class="small">인덱스 ROWID 자동 업데이트</text>

  <!-- Arrow down -->
  <line x1="400" y1="295" x2="400" y2="318" stroke="#4a2e78" stroke-width="2" fill="none" marker-end="url(#ah)"/>

  <!-- Phase 2: HWM Adjustment -->
  <rect x="30" y="320" width="740" height="90" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="50" y="340" class="label" fill="#2f6a1c">Phase 2: HWM 하향 (HWM Adjustment)</text>
  <text x="50" y="355" class="small">짧은 Exclusive Lock 획득 — 빈 익스텐트 반환</text>

  <rect x="55" y="365" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="105" y="365" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="155" y="365" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>
  <rect x="205" y="365" width="45" height="35" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="3"/>

  <line x1="250" y1="360" x2="250" y2="408" stroke="#2f6a1c" stroke-width="2.5"/>
  <text x="260" y="418" class="sublabel" fill="#2f6a1c">새 HWM ↑ (하향 완료!)</text>

  <text x="320" y="385" class="small" fill="#2f6a1c">공간 반환됨 → Full Scan 범위 감소</text>

  <!-- Strategy box -->
  <rect x="30" y="425" width="740" height="65" class="box" fill="rgba(42,42,42,0.04)" stroke="#f3efe4" stroke-width="1"/>
  <text x="50" y="445" class="label">실무 2단계 전략:</text>
  <text x="50" y="465" class="code">업무 시간:</text>
  <text x="130" y="465" class="sublabel">SHRINK SPACE COMPACT (재배치만, DML 영향 최소)</text>
  <text x="50" y="483" class="code">유지보수 윈도우:</text>
  <text x="185" y="483" class="sublabel">SHRINK SPACE (HWM 하향, 짧은 Lock)</text>
  <text x="520" y="465" class="code">CASCADE</text>
  <text x="590" y="465" class="small">→ 종속 인덱스도 함께 축소</text>
</svg>