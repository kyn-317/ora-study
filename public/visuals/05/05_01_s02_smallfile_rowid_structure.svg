<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 12px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">SMALLFILE ROWID 구조 (18자리 Base64)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">OOOOOO FFF BBBBBB RRR — Data Object / File / Block / Row</text>

  <!-- ROWID visual breakdown -->
  <rect x="50" y="75" width="700" height="70" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1"/>

  <!-- Object Number -->
  <rect x="65" y="90" width="195" height="40" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2" rx="6"/>
  <text x="162" y="115" text-anchor="middle" class="label" fill="#4a2e78">OOOOOO</text>

  <!-- File Number -->
  <rect x="270" y="90" width="100" height="40" fill="#dee5f5" stroke="#2456a8" stroke-width="2" rx="6"/>
  <text x="320" y="115" text-anchor="middle" class="label" fill="#2456a8">FFF</text>

  <!-- Block Number -->
  <rect x="380" y="90" width="195" height="40" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="2" rx="6"/>
  <text x="477" y="115" text-anchor="middle" class="label" fill="#2f6a1c">BBBBBB</text>

  <!-- Row Number -->
  <rect x="585" y="90" width="100" height="40" fill="#f0ddb3" stroke="#8a5a10" stroke-width="2" rx="6"/>
  <text x="635" y="115" text-anchor="middle" class="label" fill="#8a5a10">RRR</text>

  <!-- Bit details -->
  <text x="162" y="160" text-anchor="middle" class="label" fill="#4a2e78">Data Object Number</text>
  <text x="162" y="178" text-anchor="middle" class="code">32비트 (6자리)</text>
  <text x="162" y="196" text-anchor="middle" class="small">세그먼트 식별</text>

  <text x="320" y="160" text-anchor="middle" class="label" fill="#2456a8">Relative File#</text>
  <text x="320" y="178" text-anchor="middle" class="code">10비트 (3자리)</text>
  <text x="320" y="196" text-anchor="middle" class="small">최대 1,022 파일</text>

  <text x="477" y="160" text-anchor="middle" class="label" fill="#2f6a1c">Block Number</text>
  <text x="477" y="178" text-anchor="middle" class="code">22비트 (6자리)</text>
  <text x="477" y="196" text-anchor="middle" class="small">파일 내 ~4백만 블록</text>

  <text x="635" y="160" text-anchor="middle" class="label" fill="#8a5a10">Row Number</text>
  <text x="635" y="178" text-anchor="middle" class="code">16비트 (3자리)</text>
  <text x="635" y="196" text-anchor="middle" class="small">블록 내 ~65K 행</text>

  <!-- Example -->
  <rect x="100" y="220" width="600" height="100" class="box" fill="rgba(42,42,42,0.04)" stroke="#f3efe4" stroke-width="1"/>
  <text x="120" y="245" class="sublabel">ROWID 예시 (Example):</text>
  <text x="120" y="268" class="code" font-size="16">AAASwi AAF AAACXQ AAA</text>
  <text x="120" y="290" class="small">Object: AAASwi → 세그먼트 식별</text>
  <text x="120" y="306" class="small">File: AAF → 데이터 파일 번호 5</text>
  <text x="400" y="290" class="small">Block: AAACXQ → 블록 주소</text>
  <text x="400" y="306" class="small">Row: AAA → 블록 내 행 번호 0</text>
</svg>