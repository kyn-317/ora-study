<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">HWM (High Water Mark, 최고수위표) 개념</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">ASSM 환경의 Low HWM / High HWM — Full Table Scan과의 관계</text>

  <!-- Segment diagram: Before DELETE -->
  <rect x="30" y="65" width="740" height="135" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1.5"/>
  <text x="50" y="85" class="label">DELETE 전 — 세그먼트 상태</text>

  <!-- Blocks with data -->
  <rect x="50" y="100" width="50" height="40" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="105" y="100" width="50" height="40" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="160" y="100" width="50" height="40" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="215" y="100" width="50" height="40" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="270" y="100" width="50" height="40" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="325" y="100" width="50" height="40" fill="rgba(59,130,246,0.25)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="380" y="100" width="50" height="40" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="435" y="100" width="50" height="40" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <!-- Empty blocks -->
  <rect x="490" y="100" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="545" y="100" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="600" y="100" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="655" y="100" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>

  <!-- Low HWM marker -->
  <line x1="375" y1="95" x2="375" y2="148" stroke="#10B981" stroke-width="2"/>
  <text x="375" y="165" text-anchor="middle" class="sublabel" fill="#10B981">Low HWM</text>
  <text x="375" y="180" text-anchor="middle" class="small">모든 블록 포맷 완료</text>

  <!-- High HWM marker -->
  <line x1="485" y1="95" x2="485" y2="148" stroke="#F43F5E" stroke-width="2.5"/>
  <text x="485" y="165" text-anchor="middle" class="sublabel" fill="#F43F5E">High HWM</text>
  <text x="485" y="180" text-anchor="middle" class="small">Full Scan은 여기까지</text>

  <!-- Labels -->
  <text x="170" y="155" text-anchor="middle" class="small" fill="#3B82F6">데이터 있음</text>
  <text x="408" y="155" text-anchor="middle" class="small" fill="#10B981">혼합 영역</text>
  <text x="620" y="155" text-anchor="middle" class="small">미사용</text>

  <!-- Segment diagram: After DELETE -->
  <rect x="30" y="210" width="740" height="135" class="box" fill="rgba(244,63,94,0.04)" stroke="#F43F5E" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="230" class="label" fill="#F43F5E">대량 DELETE 후 — HWM은 변화 없음!</text>

  <!-- Mixed blocks: some data, some empty -->
  <rect x="50" y="245" width="50" height="40" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="105" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <text x="130" y="270" text-anchor="middle" class="small" fill="#F43F5E">빈</text>
  <rect x="160" y="245" width="50" height="40" fill="rgba(59,130,246,0.3)" stroke="#3B82F6" stroke-width="1" rx="3"/>
  <rect x="215" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <text x="240" y="270" text-anchor="middle" class="small" fill="#F43F5E">빈</text>
  <rect x="270" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <text x="295" y="270" text-anchor="middle" class="small" fill="#F43F5E">빈</text>
  <rect x="325" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <text x="350" y="270" text-anchor="middle" class="small" fill="#F43F5E">빈</text>
  <rect x="380" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <rect x="435" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#F43F5E" stroke-width="1" rx="3"/>
  <rect x="490" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="545" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="600" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>
  <rect x="655" y="245" width="50" height="40" fill="rgba(255,255,255,0.02)" stroke="#2A2B3D" stroke-width="1" rx="3" stroke-dasharray="3,2"/>

  <!-- HWM unchanged -->
  <line x1="485" y1="240" x2="485" y2="293" stroke="#F43F5E" stroke-width="2.5"/>
  <text x="485" y="310" text-anchor="middle" class="sublabel" fill="#F43F5E">High HWM (변화 없음!)</text>
  <text x="485" y="327" text-anchor="middle" class="small" fill="#F43F5E">Full Scan이 빈 블록도 모두 읽음</text>

  <!-- HWM behavior table -->
  <rect x="30" y="355" width="740" height="150" class="box" fill="rgba(255,255,255,0.03)" stroke="#2A2B3D" stroke-width="1"/>
  <text x="50" y="378" class="label">작업별 HWM 변화</text>

  <!-- Table header -->
  <text x="60" y="400" class="sublabel" fill="#94A3B8">작업</text>
  <text x="240" y="400" class="sublabel" fill="#94A3B8">HWM 변화</text>
  <text x="400" y="400" class="sublabel" fill="#94A3B8">Full Scan 성능</text>
  <text x="600" y="400" class="sublabel" fill="#94A3B8">비고</text>
  <line x1="50" y1="406" x2="750" y2="406" stroke="#2A2B3D" stroke-width="1"/>

  <text x="60" y="422" class="code">DELETE</text>
  <text x="240" y="422" class="small" fill="#F43F5E">변화 없음</text>
  <text x="400" y="422" class="small" fill="#F43F5E">개선 없음</text>
  <text x="600" y="422" class="small">빈 블록도 스캔</text>

  <text x="60" y="442" class="code">TRUNCATE</text>
  <text x="240" y="442" class="small" fill="#10B981">초기화 (최저)</text>
  <text x="400" y="442" class="small" fill="#10B981">즉시 개선</text>
  <text x="600" y="442" class="small">DDL (ROLLBACK 불가)</text>

  <text x="60" y="462" class="code">SHRINK SPACE</text>
  <text x="240" y="462" class="small" fill="#10B981">하향</text>
  <text x="400" y="462" class="small" fill="#10B981">점진적 개선</text>
  <text x="600" y="462" class="small">ROW MOVEMENT 필요, 온라인</text>

  <text x="60" y="482" class="code">ALTER TABLE MOVE</text>
  <text x="240" y="482" class="small" fill="#10B981">초기화 (새 세그먼트)</text>
  <text x="400" y="482" class="small" fill="#10B981">즉시 개선</text>
  <text x="600" y="482" class="small">인덱스 REBUILD 필요</text>

  <text x="60" y="502" class="code">INSERT /*+ APPEND */</text>
  <text x="240" y="502" class="small" fill="#F59E0B">항상 상향</text>
  <text x="400" y="502" class="small">N/A</text>
  <text x="600" y="502" class="small">HWM 위에만 기록</text>
</svg>