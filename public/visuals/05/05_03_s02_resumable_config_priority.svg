<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #4a2e78; stroke-width: 2; fill: none; marker-end: url(#ah); }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title">Resumable Space Allocation 설정 우선순위</text>
  <text x="400" y="48" text-anchor="middle" class="subtitle">세션 레벨 설정이 시스템 레벨보다 우선</text>

  <!-- System Level -->
  <rect x="30" y="70" width="340" height="120" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="2"/>
  <text x="200" y="93" text-anchor="middle" class="label" fill="#2456a8">시스템 레벨 (System Level)</text>
  <text x="50" y="118" class="code">ALTER SYSTEM SET RESUMABLE_TIMEOUT = 3600;</text>
  <text x="50" y="140" class="small">기본값: 0 (비활성)</text>
  <text x="50" y="158" class="small">0 초과 → 모든 세션에서 기본 활성화</text>
  <text x="50" y="176" class="small">PDB 레벨 독립 설정 가능 (멀티테넌트)</text>

  <!-- Session Level -->
  <rect x="430" y="70" width="340" height="120" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2"/>
  <text x="600" y="93" text-anchor="middle" class="label" fill="#4a2e78">세션 레벨 (Session Level)</text>
  <text x="450" y="118" class="code">ALTER SESSION ENABLE RESUMABLE</text>
  <text x="450" y="135" class="code">  TIMEOUT 7200 NAME 'batch_load';</text>
  <text x="450" y="158" class="small">해당 세션만 활성화</text>
  <text x="450" y="176" class="small">ALTER SESSION DISABLE RESUMABLE → 강제 비활성</text>

  <!-- Priority arrow -->
  <line x1="430" y1="130" x2="385" y2="130" stroke="#8a5a10" stroke-width="2" fill="none" marker-end="url(#ah)"/>
  <text x="395" y="122" class="small" fill="#8a5a10">우선</text>

  <!-- Priority tree -->
  <rect x="100" y="210" width="600" height="135" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1.5"/>
  <text x="120" y="233" class="label">우선순위 결정 트리:</text>

  <text x="120" y="260" class="sublabel">세션에서 ALTER SESSION ENABLE/DISABLE RESUMABLE 실행?</text>

  <text x="140" y="283" class="code" fill="#2f6a1c">ENABLE 실행</text>
  <text x="300" y="283" class="small">→ 해당 세션 활성화 (세션 지정 TIMEOUT 사용)</text>

  <text x="140" y="303" class="code" fill="#be123c">DISABLE 실행</text>
  <text x="300" y="303" class="small">→ 해당 세션 비활성화 (시스템 설정 무시)</text>

  <text x="140" y="323" class="code" fill="#8a5a10">미실행</text>
  <text x="300" y="323" class="small">→ RESUMABLE_TIMEOUT > 0이면 활성 / = 0이면 비활성</text>

  <!-- Required privilege note -->
  <rect x="100" y="350" width="600" height="24" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1"/>
  <text x="400" y="366" text-anchor="middle" class="small" fill="#be123c">필요 권한: RESUMABLE 시스템 권한 (없으면 ORA-01031 오류)</text>
</svg>