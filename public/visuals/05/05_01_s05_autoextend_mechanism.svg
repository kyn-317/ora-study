<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #E2E8F0; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #94A3B8; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #CBD5E1; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #F59E0B; }
    .small { font-size: 11px; fill: #94A3B8; }
    .box { rx: 8; ry: 8; }
    .arrow { stroke: #6F6BEA; stroke-width: 2; fill: none; marker-end: url(#ah); }
    .arrow-red { stroke: #F43F5E; stroke-width: 2; fill: none; marker-end: url(#ah-red); }
    .arrow-green { stroke: #10B981; stroke-width: 2; fill: none; marker-end: url(#ah-green); }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6F6BEA" />
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F43F5E" />
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">AUTOEXTEND 자동 확장 메커니즘</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Datafile Auto-Extension Flow — 공간 부족 시 자동 확장 과정</text>

  <!-- Step 1: Space Request -->
  <rect x="280" y="70" width="240" height="50" class="box" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="92" text-anchor="middle" class="label" fill="#3B82F6">새 익스텐트 할당 요청</text>
  <text x="400" y="108" text-anchor="middle" class="small">Segment needs more space</text>

  <!-- Arrow -->
  <line x1="400" y1="120" x2="400" y2="148" class="arrow"/>

  <!-- Step 2: Check free space -->
  <rect x="250" y="150" width="300" height="50" class="box" fill="rgba(111,107,234,0.12)" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="400" y="172" text-anchor="middle" class="label">테이블스페이스 여유 공간 확인</text>
  <text x="400" y="188" text-anchor="middle" class="small">DBA_FREE_SPACE 검사</text>

  <!-- Branch: Enough space -->
  <line x1="550" y1="175" x2="680" y2="175" class="arrow-green"/>
  <rect x="630" y="155" width="140" height="40" class="box" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5"/>
  <text x="700" y="178" text-anchor="middle" class="label" fill="#10B981">할당 성공</text>

  <!-- Arrow down: Not enough -->
  <line x1="400" y1="200" x2="400" y2="228" class="arrow-red"/>
  <text x="410" y="218" class="small" fill="#F43F5E">공간 부족</text>

  <!-- Step 3: Check AUTOEXTEND -->
  <rect x="230" y="230" width="340" height="50" class="box" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="400" y="252" text-anchor="middle" class="label" fill="#F59E0B">AUTOEXTEND ON 여부 확인</text>
  <text x="400" y="268" text-anchor="middle" class="code">DBA_DATA_FILES.AUTOEXTENSIBLE</text>

  <!-- Branch: AUTOEXTEND OFF -->
  <line x1="230" y1="255" x2="90" y2="255" stroke="#F43F5E" stroke-width="2" fill="none"/>
  <line x1="90" y1="255" x2="90" y2="340" class="arrow-red"/>
  <text x="110" y="248" class="small" fill="#F43F5E">OFF</text>
  <rect x="20" y="340" width="160" height="50" class="box" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="100" y="363" text-anchor="middle" class="label" fill="#F43F5E">ORA-01653</text>
  <text x="100" y="380" text-anchor="middle" class="small">공간 부족 오류 발생</text>

  <!-- Arrow down: AUTOEXTEND ON -->
  <line x1="400" y1="280" x2="400" y2="308" class="arrow-green"/>
  <text x="410" y="298" class="small" fill="#10B981">ON</text>

  <!-- Step 4: Extend -->
  <rect x="250" y="310" width="300" height="60" class="box" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="332" text-anchor="middle" class="label" fill="#10B981">데이터 파일 자동 확장</text>
  <text x="400" y="350" text-anchor="middle" class="code">NEXT 크기만큼 확장 (MAXSIZE까지)</text>
  <text x="400" y="364" text-anchor="middle" class="small">INCREMENT_BY * DB_BLOCK_SIZE 바이트 증가</text>

  <!-- Arrow down -->
  <line x1="400" y1="370" x2="400" y2="398" class="arrow"/>

  <!-- Step 5: Check MAXSIZE -->
  <rect x="250" y="400" width="300" height="50" class="box" fill="rgba(111,107,234,0.12)" stroke="#6F6BEA" stroke-width="1.5"/>
  <text x="400" y="422" text-anchor="middle" class="label">MAXSIZE 도달 여부 확인</text>
  <text x="400" y="438" text-anchor="middle" class="code">MAXSIZE UNLIMITED | 지정값</text>

  <!-- Branch: Under MAXSIZE -->
  <line x1="550" y1="425" x2="680" y2="425" class="arrow-green"/>
  <rect x="630" y="405" width="140" height="40" class="box" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="1.5"/>
  <text x="700" y="428" text-anchor="middle" class="label" fill="#10B981">확장 성공</text>

  <!-- Branch: MAXSIZE reached -->
  <line x1="250" y1="425" x2="120" y2="425" class="arrow-red"/>
  <text x="140" y="418" class="small" fill="#F43F5E">MAXSIZE 도달</text>
  <rect x="20" y="405" width="110" height="40" class="box" fill="rgba(244,63,94,0.15)" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="75" y="428" text-anchor="middle" class="label" fill="#F43F5E">오류 발생</text>

  <!-- Syntax box -->
  <rect x="20" y="70" width="240" height="70" class="box" fill="rgba(255,255,255,0.04)" stroke="#2A2B3D" stroke-width="1"/>
  <text x="30" y="90" class="sublabel">AUTOEXTEND 구문:</text>
  <text x="30" y="108" class="code">AUTOEXTEND ON</text>
  <text x="30" y="124" class="code">  NEXT 100M MAXSIZE 32G</text>
</svg>