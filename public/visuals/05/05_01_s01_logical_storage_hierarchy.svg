<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', 'Segoe UI', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #4a4a46; }
    .code { font-family: 'Consolas', monospace; font-size: 11px; fill: #8a5a10; }
    .small { font-size: 11px; fill: #787368; }
    .box { rx: 8; ry: 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Oracle 논리적 저장 구조 계층 (Logical Storage Hierarchy)</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Tablespace → Segment → Extent → Data Block (4단계 계층)</text>

  <!-- Database (top level) -->
  <rect x="280" y="70" width="240" height="44" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" class="label" fill="#4a2e78">Database (데이터베이스)</text>
  <text x="400" y="105" text-anchor="middle" class="small">논리 + 물리 구조의 최상위</text>

  <!-- Arrow DB -> Tablespace -->
  <line x1="400" y1="114" x2="400" y2="140" stroke="#4a2e78" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Tablespace -->
  <rect x="50" y="145" width="700" height="420" class="box" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="70" y="168" class="label" fill="#4a2e78">Tablespace (테이블스페이스)</text>
  <text x="70" y="184" class="small">논리적 최상위 컨테이너 — 1:N Datafile 매핑</text>

  <!-- Segment 1 -->
  <rect x="80" y="200" width="310" height="340" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <text x="95" y="222" class="label" fill="#2456a8">Segment (세그먼트)</text>
  <text x="95" y="238" class="small">테이블, 인덱스 등 객체 단위</text>

  <!-- Extent 1 in Segment 1 -->
  <rect x="100" y="250" width="270" height="130" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="115" y="272" class="label" fill="#2f6a1c">Extent (익스텐트)</text>
  <text x="115" y="288" class="small">연속된 블록 집합 — 할당 최소 단위</text>

  <!-- Data Blocks in Extent 1 -->
  <rect x="115" y="298" width="56" height="68" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="143" y="322" text-anchor="middle" class="code">Block</text>
  <text x="143" y="337" text-anchor="middle" class="small">8KB</text>
  <text x="143" y="355" text-anchor="middle" class="small">I/O 최소</text>

  <rect x="180" y="298" width="56" height="68" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="208" y="322" text-anchor="middle" class="code">Block</text>
  <text x="208" y="337" text-anchor="middle" class="small">8KB</text>

  <rect x="245" y="298" width="56" height="68" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="273" y="322" text-anchor="middle" class="code">Block</text>
  <text x="273" y="337" text-anchor="middle" class="small">8KB</text>

  <rect x="310" y="298" width="56" height="68" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="338" y="322" text-anchor="middle" class="code">Block</text>
  <text x="338" y="337" text-anchor="middle" class="small">8KB</text>

  <!-- Extent 2 in Segment 1 -->
  <rect x="100" y="395" width="270" height="60" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="235" y="425" text-anchor="middle" class="label" fill="#2f6a1c">Extent 2</text>
  <text x="235" y="443" text-anchor="middle" class="small">Block Block Block ...</text>

  <!-- Segment 2 (smaller) -->
  <rect x="420" y="200" width="310" height="160" class="box" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <text x="435" y="222" class="label" fill="#2456a8">Segment (인덱스 세그먼트)</text>
  <text x="435" y="238" class="small">Index Segment — B-Tree, Bitmap</text>

  <rect x="440" y="250" width="270" height="95" class="box" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1.5"/>
  <text x="575" y="275" text-anchor="middle" class="label" fill="#2f6a1c">Extent</text>
  <rect x="455" y="290" width="50" height="44" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="480" y="316" text-anchor="middle" class="code">Block</text>
  <rect x="515" y="290" width="50" height="44" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="540" y="316" text-anchor="middle" class="code">Block</text>
  <rect x="575" y="290" width="50" height="44" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="600" y="316" text-anchor="middle" class="code">Block</text>
  <rect x="635" y="290" width="50" height="44" class="box" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1"/>
  <text x="660" y="316" text-anchor="middle" class="code">Block</text>

  <!-- Physical mapping note -->
  <rect x="420" y="390" width="310" height="70" class="box" fill="#f5d0d0" stroke="#be123c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="575" y="415" text-anchor="middle" class="label" fill="#be123c">Datafile (데이터 파일)</text>
  <text x="575" y="433" text-anchor="middle" class="small">물리적 OS 파일 — 실제 디스크 저장</text>
  <text x="575" y="450" text-anchor="middle" class="code">users01.dbf, system01.dbf</text>

  <!-- Legend -->
  <rect x="80" y="480" width="640" height="70" class="box" fill="rgba(42,42,42,0.03)" stroke="#f3efe4" stroke-width="1"/>
  <text x="100" y="500" class="sublabel">범례 (Legend):</text>
  <rect x="100" y="510" width="14" height="14" fill="#d8cfe5" stroke="#4a2e78" stroke-width="1" rx="2"/>
  <text x="120" y="522" class="small">Tablespace</text>
  <rect x="210" y="510" width="14" height="14" fill="#dee5f5" stroke="#2456a8" stroke-width="1" rx="2"/>
  <text x="230" y="522" class="small">Segment</text>
  <rect x="310" y="510" width="14" height="14" fill="#cfe1b8" stroke="#2f6a1c" stroke-width="1" rx="2"/>
  <text x="330" y="522" class="small">Extent</text>
  <rect x="410" y="510" width="14" height="14" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" rx="2"/>
  <text x="430" y="522" class="small">Data Block (DB_BLOCK_SIZE)</text>
  <rect x="590" y="510" width="14" height="14" fill="#f5d0d0" stroke="#be123c" stroke-width="1" rx="2"/>
  <text x="610" y="522" class="small">Datafile (물리 파일)</text>
  <text x="100" y="542" class="small">AUTOALLOCATE: 64KB → 1MB → 8MB → 64MB | UNIFORM: 고정 크기 (기본 1MB)</text>
</svg>