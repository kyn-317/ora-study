<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <rect x="0" y="0" width="100%" height="100%" fill="#faf8f3" />
  <style>
    text { font-family: 'Pretendard', sans-serif; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #787368; }
    .label { font-size: 14px; font-weight: 600; }
    .sublabel { font-size: 12px; fill: #787368; }
    .small { font-size: 11px; fill: #787368; }
    .code { font-family: monospace; font-size: 13px; fill: #8a5a10; }
    .box { fill: rgba(42,42,42,0.05); stroke: #f3efe4; stroke-width: 1.5; rx: 10; }
    .box-primary { fill: #d8cfe5; stroke: #4a2e78; stroke-width: 2; rx: 10; }
    .box-blue { fill: #dee5f5; stroke: #2456a8; stroke-width: 1.5; rx: 10; }
    .box-yellow { fill: #f0ddb3; stroke: #8a5a10; stroke-width: 1.5; rx: 10; }
    .arrow { stroke: #4a2e78; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-thin { stroke: #787368; stroke-width: 1.5; fill: none; stroke-dasharray: 6,3; }
    .axis-label { font-size: 13px; font-weight: 700; }
    .step-num { font-size: 22px; font-weight: 800; fill: #4a2e78; }
    .tag { font-size: 11px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a2e78" />
    </marker>
    <linearGradient id="flowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a2e78" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2456a8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="35" class="title" text-anchor="middle">챕터 05 학습 순서 흐름도 (Chapter 05 Learning Flow)</text>
  <text x="400" y="55" class="subtitle" text-anchor="middle">스토리지 최적화 및 테이블스페이스 — 2개의 핵심 축과 4개의 단원</text>

  <!-- Axis labels -->
  <!-- Axis 1: 구조와 관리 -->
  <rect x="30" y="80" width="370" height="36" rx="18" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <text x="215" y="103" class="axis-label" text-anchor="middle" fill="#2456a8">축 1: 구조와 관리 (Structure &amp; Management)</text>

  <!-- Axis 2: 공간 최적화 -->
  <rect x="420" y="80" width="350" height="36" rx="18" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="595" y="103" class="axis-label" text-anchor="middle" fill="#8a5a10">축 2: 공간 최적화 (Space Optimization)</text>

  <!-- Flow background bar -->
  <rect x="40" y="130" width="720" height="8" rx="4" fill="url(#flowGrad)"/>

  <!-- Step 1: 05_01 -->
  <text x="110" y="158" class="step-num" text-anchor="middle">1</text>
  <rect x="30" y="168" width="170" height="140" class="box-blue"/>
  <text x="115" y="195" class="label" text-anchor="middle">05_01</text>
  <text x="115" y="215" class="label" text-anchor="middle" font-size="13">테이블스페이스 구조</text>
  <text x="115" y="233" class="sublabel" text-anchor="middle">Tablespace Structure</text>
  <line x1="50" y1="244" x2="180" y2="244" stroke="#f3efe4" stroke-width="1"/>
  <text x="115" y="262" class="small" text-anchor="middle">논리적 저장 계층</text>
  <text x="115" y="278" class="small" text-anchor="middle">SMALLFILE / BIGFILE</text>
  <text x="115" y="294" class="small" text-anchor="middle">AUTOEXTEND, 익스텐트 관리</text>
  <rect x="50" y="172" width="50" height="18" rx="9" fill="#dee5f5"/>
  <text x="75" y="185" class="tag" text-anchor="middle" fill="#2456a8">뼈대</text>

  <!-- Arrow 1->2 -->
  <path d="M 200 238 L 230 238" class="arrow"/>

  <!-- Step 2: 05_02 -->
  <text x="310" y="158" class="step-num" text-anchor="middle">2</text>
  <rect x="235" y="168" width="170" height="140" class="box-blue"/>
  <text x="320" y="195" class="label" text-anchor="middle">05_02</text>
  <text x="320" y="215" class="label" text-anchor="middle" font-size="13">경로 및 블록 관리</text>
  <text x="320" y="233" class="sublabel" text-anchor="middle">Datafile &amp; Block Mgmt</text>
  <line x1="255" y1="244" x2="385" y2="244" stroke="#f3efe4" stroke-width="1"/>
  <text x="320" y="262" class="small" text-anchor="middle">온라인/오프라인 이동</text>
  <text x="320" y="278" class="small" text-anchor="middle">블록 내부 구조, PCTFREE</text>
  <text x="320" y="294" class="small" text-anchor="middle">ROWID 구조, 블록 사이즈</text>
  <rect x="250" y="172" width="66" height="18" rx="9" fill="#dee5f5"/>
  <text x="283" y="185" class="tag" text-anchor="middle" fill="#2456a8">물리 조작</text>

  <!-- Arrow 2->3 -->
  <path d="M 405 238 L 435 238" class="arrow"/>

  <!-- Step 3: 05_03 -->
  <text x="515" y="158" class="step-num" text-anchor="middle">3</text>
  <rect x="440" y="168" width="170" height="140" class="box-yellow"/>
  <text x="525" y="195" class="label" text-anchor="middle">05_03</text>
  <text x="525" y="215" class="label" text-anchor="middle" font-size="13">공간 장애 대응</text>
  <text x="525" y="233" class="sublabel" text-anchor="middle">Resumable &amp; Deferred Seg</text>
  <line x1="460" y1="244" x2="590" y2="244" stroke="#f3efe4" stroke-width="1"/>
  <text x="525" y="262" class="small" text-anchor="middle">Resumable Space Allocation</text>
  <text x="525" y="278" class="small" text-anchor="middle">Deferred Segment Creation</text>
  <text x="525" y="294" class="small" text-anchor="middle">사전 예방 메커니즘</text>
  <rect x="453" y="172" width="66" height="18" rx="9" fill="#f0ddb3"/>
  <text x="486" y="185" class="tag" text-anchor="middle" fill="#8a5a10">사전 예방</text>

  <!-- Arrow 3->4 -->
  <path d="M 610 238 L 640 238" class="arrow"/>

  <!-- Step 4: 05_04 -->
  <text x="720" y="158" class="step-num" text-anchor="middle">4</text>
  <rect x="645" y="168" width="145" height="140" class="box-yellow"/>
  <text x="717" y="195" class="label" text-anchor="middle">05_04</text>
  <text x="717" y="215" class="label" text-anchor="middle" font-size="13">공간 축소/최적화</text>
  <text x="717" y="233" class="sublabel" text-anchor="middle">Reclamation &amp; Optimize</text>
  <line x1="660" y1="244" x2="775" y2="244" stroke="#f3efe4" stroke-width="1"/>
  <text x="717" y="262" class="small" text-anchor="middle">HWM, SHRINK SPACE</text>
  <text x="717" y="278" class="small" text-anchor="middle">데이터 압축 (HCC)</text>
  <text x="717" y="294" class="small" text-anchor="middle">Direct-Path Insert</text>
  <rect x="655" y="172" width="66" height="18" rx="9" fill="#f0ddb3"/>
  <text x="688" y="185" class="tag" text-anchor="middle" fill="#8a5a10">사후 대응</text>

  <!-- Bottom: key question mapping -->
  <rect x="30" y="340" width="370" height="70" rx="8" fill="#dee5f5" stroke="#2456a8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="215" y="365" class="sublabel" text-anchor="middle" fill="#2456a8" font-size="13" font-weight="600">핵심 질문 (Key Question)</text>
  <text x="215" y="387" class="sublabel" text-anchor="middle" font-size="12">"논리적/물리적 저장 구조는 어떻게 구성되고 관리되는가?"</text>
  <text x="215" y="402" class="small" text-anchor="middle" font-style="italic">"How are logical/physical storage structures organized?"</text>

  <rect x="420" y="340" width="370" height="70" rx="8" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="605" y="365" class="sublabel" text-anchor="middle" fill="#8a5a10" font-size="13" font-weight="600">핵심 질문 (Key Question)</text>
  <text x="605" y="387" class="sublabel" text-anchor="middle" font-size="12">"공간 부족은 어떻게 대응하고, 낭비 공간은 어떻게 회수하는가?"</text>
  <text x="605" y="402" class="small" text-anchor="middle" font-style="italic">"How to handle space shortage and reclaim wasted space?"</text>

  <!-- Legend -->
  <rect x="200" y="440" width="400" height="70" rx="8" class="box"/>
  <text x="400" y="462" class="sublabel" text-anchor="middle" font-weight="600" fill="#1a1a1a">범례 (Legend)</text>
  <rect x="230" y="472" width="14" height="14" rx="3" fill="#dee5f5" stroke="#2456a8" stroke-width="1.5"/>
  <text x="252" y="484" class="small" fill="#1a1a1a">구조와 관리 축 (Axis 1)</text>
  <rect x="410" y="472" width="14" height="14" rx="3" fill="#f0ddb3" stroke="#8a5a10" stroke-width="1.5"/>
  <text x="432" y="484" class="small" fill="#1a1a1a">공간 최적화 축 (Axis 2)</text>
  <line x1="280" y1="500" x2="310" y2="500" class="arrow"/>
  <text x="320" y="504" class="small" fill="#1a1a1a">학습 순서 (Learning Order)</text>
</svg>